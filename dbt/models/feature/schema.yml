        description: Home starter xwOBA allowed over the trailing 7 days. Decimal.

      - name: home_starter_xwoba_against_std
        description: Home starter xwOBA allowed, season-to-date. Decimal.

      - name: home_starter_xwoba_vs_lhb
        description: Home starter xwOBA allowed vs left-handed batters (prior season platoon split). Decimal.

      - name: home_starter_xwoba_vs_rhb
        description: Home starter xwOBA allowed vs right-handed batters (prior season platoon split). Decimal.

      # ── Home team defense / standings ─────────────────────────────────────────────
      - name: home_team_oaa_blended
        description: Home team Outs Above Average (OAA) blended across prior season and current season data (0 = league average; positive = above-average defense).

      # ── Home vs handedness / situational splits ───────────────────────────────────
      - name: home_vs_lhp_bb_pct_30d
        description: Home lineup walk rate vs left-handed pitchers over the trailing 30 days. Decimal.

      - name: home_vs_lhp_hard_hit_pct_30d
        description: Home lineup hard-hit rate vs left-handed pitchers over the trailing 30 days. Decimal.

      - name: home_vs_lhp_slugging_30d
        description: Home lineup slugging percentage vs left-handed pitchers over the trailing 30 days. Decimal.

      - name: home_vs_lhp_woba_std
        description: Home lineup wOBA vs left-handed pitchers, season-to-date. Decimal.

      - name: home_vs_lhp_xwoba_30d
        description: Home lineup xwOBA vs left-handed pitchers over the trailing 30 days. Decimal.

      - name: home_vs_lhp_xwoba_std
        description: Home lineup xwOBA vs left-handed pitchers, season-to-date. Decimal.

      - name: home_vs_rhp_slugging_30d
        description: Home lineup slugging percentage vs right-handed pitchers over the trailing 30 days. Decimal.

      - name: home_vs_rhp_woba_std
        description: Home lineup wOBA vs right-handed pitchers, season-to-date. Decimal.

      # ── Home RISP / clutch situational ────────────────────────────────────────────
      - name: home_woba_against_with_risp_30d
        description: Home pitching staff wOBA allowed with runners in scoring position over the trailing 30 days. Decimal.

      - name: home_woba_against_with_runners_on_30d
        description: Home pitching staff wOBA allowed with runners on base over the trailing 30 days. Decimal.

      - name: home_woba_with_risp_30d
        description: Home team offense wOBA with runners in scoring position over the trailing 30 days. Decimal.

      - name: home_xwoba_with_risp_30d
        description: Home team offense xwOBA with runners in scoring position over the trailing 30 days. Decimal.

      - name: home_xwoba_with_runners_on_30d
        description: Home team offense xwOBA with runners on base over the trailing 30 days. Decimal.

      # ── Park / venue / odds context ───────────────────────────────────────────────
      - name: is_new_venue
        description: Flag (1/0) indicating the game is at a venue that opened this season; no prior-season park factor history available.

      - name: over_american
        description: American-format moneyline odds for the over on the total runs market (e.g. -110). Null when no pre-game odds snapshot is available.

      - name: under_american
        description: American-format moneyline odds for the under on the total runs market (e.g. -110). Null when no pre-game odds snapshot is available.

      # ── Pythagorean differential ──────────────────────────────────────────────────
      - name: pythagorean_win_exp_diff
        description: Home team Pythagorean expected win% minus away team Pythagorean expected win%; positive favors the home team.

      # ── Remaining starter / platoon / data-availability columns ─────────────────
      - name: home_starter_k_pct_30d
        description: Home starter's 30-day rolling strikeout rate (K/batters faced) ending strictly before game_date. Null for debut pitchers or early-season games with insufficient history.
      - name: away_starter_k_pct_30d
        description: Away starter's 30-day rolling strikeout rate (K/batters faced) ending strictly before game_date. Null for debut pitchers or early-season games with insufficient history.
      - name: home_starter_fastball_stuff_plus
        description: Home starter's Stuff+ score for their fastball (four-seam or sinker; 100 = league average, higher is better for the pitcher). Null when no Stuff+ data is available.
      - name: away_starter_fastball_stuff_plus
        description: Away starter's Stuff+ score for their fastball (100 = league average). Null when no Stuff+ data is available.
      - name: home_starter_curveball_stuff_plus
        description: Home starter's Stuff+ score for their curveball (100 = league average). Null when the pitcher does not throw a curveball or Stuff+ data is unavailable.
      - name: away_starter_curveball_stuff_plus
        description: Away starter's Stuff+ score for their curveball (100 = league average). Null when the pitcher does not throw a curveball or Stuff+ data is unavailable.
      - name: home_starter_csw_pct_season
        description: Home starter's season-to-date called-strike-plus-whiff rate (CSW%; pitches ending in a called strike or swinging strike / total pitches). Null for debut starters with no current-season appearances.
      - name: away_starter_csw_pct_season
        description: Away starter's season-to-date CSW% (called strikes + whiffs / total pitches). Null for debut starters with no current-season appearances.
      - name: away_starter_bb_pct_7d
        description: Away starter's 7-day rolling walk rate (BB/batters faced) ending strictly before game_date. Short window captures recent control trends. Null for debut pitchers or early-season games.
      - name: away_starter_days_rest
        description: Days since the away starter's most recent prior start. Uses starts only; relief appearances do not reset the clock. Null for debut starters or their first appearance in the dataset.
      - name: away_starter_fastball_pct
        description: Away starter's percentage of pitches that are fastballs (four-seam + sinker / total pitches), season-to-date. Null when no Statcast pitch-type data is available.
      - name: away_vs_lhp_k_pct_30d
        description: Away lineup's 30-day rolling strikeout rate (K/PA) vs left-handed pitchers ending strictly before game_date. Null when no away batters have plate appearances vs LHP in the rolling window.
      - name: has_starter_platoon_data
        description: True when both home and away starters have prior-season xwOBA-against platoon splits (vs LHB and vs RHB) available. False when either starter is a debut or first-season pitcher with no prior-season data; used to flag whether the platoon-adjusted lineup features are populated.

  - name: feature_pregame_game_features_raw
    description: >
      RAW pre-game ML feature assembly (Story 27.7). Holds the heavy as-of joins
      that were previously in feature_pregame_game_features; that public name is now
      a thin wrapper that adds season-normalized contact columns on top of this model.
      One row per game_pk. Do NOT add new consumers here — read the public
      feature_pregame_game_features (it is a superset). Split out so the expensive
      assembly compiles exactly once.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]
    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

  - name: feature_league_contact_baseline
    description: >
      Story 27.7, Task 1. Strictly-prior AS-OF league baseline (mean + std) for every
      contact-quality feature, one row per (game_year, game_date). Used to
      season-normalize the contact family in feature_pregame_game_features (the
      contact->runs conversion regime fix). Leakage-safe: each date's stats are
      computed over STRICTLY-PRIOR same-season games only (window frame excludes the
      current date), shrunk toward the prior season's full-season stats with pseudo-
      count `contact_baseline_shrinkage_k` (default 200) so a baseline exists before
      the current season accrues. Counterpart of the Task-1 run_env_regime_monitor.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_year, game_date]
    columns:
      - name: game_year
        tests:
          - not_null
      - name: game_date
        tests:
          - not_null
      - name: n_asof_min
        description: >
          Minimum strictly-prior as-of game count across all contact columns for this
          (season, date). 0/NULL on the first game_date of a season (no prior games) —
          asserted by the season_normalize_no_lookahead singular test, which guards the
          leakage-safety of the as-of window.

  - name: feature_pregame_odds_features
    description: >
      Pre-game betting market features. One row per game_pk (regular season only).
      Integrates pre-game moneyline and totals odds from lowvig into the Phase 2
      feature store.

      Bookmaker selection (Step 0, 2026-04-23): lowvig has the lowest vig in both
      h2h (2.33% median) and totals (3.39% median) markets with ≥99% coverage in
      each. Runner-up betonlineag ties on h2h vig but trails on totals (4.71%).

      Leakage guard: only odds snapshots where ingestion_ts < commence_time are used.
      Most recent pre-game snapshot per (event_id, market_key, outcome_name) selected
      via ROW_NUMBER ordered by ingestion_ts desc.

      has_odds = true means an event_id was matched for this game in mart_game_odds_bridge
      (72–78% of regular season games, 2021–present). Odds price columns (moneyline,
      implied_prob, vig) are null when no pre-game lowvig snapshot exists — Card 3
      backfill covers 2023 (partial) and live 2026 only.

      Implied probability formula: raw_i = 1.0 / decimal_price_i; implied_prob_i =
      raw_i / sum(all_raw). By construction home + away = 1.0, over + under = 1.0.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique
          - relationships:
              # A1.11 — spine on mart_game_spine (completed games + today's
              # scheduled games), not mart_game_results (completed only). Today's
              # scheduled game_pks legitimately aren't in mart_game_results yet,
              # so the relationship target is the new authoritative game universe.
              arguments:
                to: ref('mart_game_spine')
                field: game_pk

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: has_odds
        description: >
          True when an event_id was matched in mart_game_odds_bridge. Does not
          guarantee that odds price columns are populated.
        tests:
          - not_null

      - name: home_implied_prob
        description: >
          Vig-adjusted home win probability from lowvig h2h market.
          raw_home / (raw_home + raw_away), raw_i = 1.0 / decimal_price_i.
          Null when no pre-game lowvig h2h snapshot exists for the event.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_implied_prob is not null"

      - name: away_implied_prob
        description: >
          Vig-adjusted away win probability. Sums with home_implied_prob to exactly 1.0.
          Null when no pre-game lowvig h2h snapshot exists for the event.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_implied_prob is not null"

      - name: total_market_vig
        description: >
          Overround on the h2h market: SUM(1/decimal) - 1 across both outcomes.
          Null when no pre-game lowvig h2h snapshot exists. Typically 0.02–0.03 for lowvig.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "total_market_vig is not null"

      - name: over_implied_prob
        description: >
          Vig-adjusted over probability from lowvig totals market.
          raw_over / (raw_over + raw_under). Null when no pre-game totals snapshot exists.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "over_implied_prob is not null"

      - name: under_implied_prob
        description: >
          Vig-adjusted under probability. Sums with over_implied_prob to exactly 1.0.
          Null when no pre-game totals snapshot exists.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "under_implied_prob is not null"

      - name: totals_market_vig
        description: >
          Overround on the totals (over/under) market: SUM(1/decimal) - 1.
          Null when no pre-game lowvig totals snapshot exists. Typically 0.03–0.04 for lowvig.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "totals_market_vig is not null"

      - name: home_win_prob_consensus
        description: >
          Average vig-adjusted home win probability across all bookmakers with
          pre-game h2h prices (source: mart_odds_consensus). Card 3.11 benchmark:
          Brier score = 0.2395 on 2021–2025. Null when has_odds = false or no
          bookmaker had pre-game h2h coverage. Recommended as a primary training
          feature (include_consensus_features = True per Card 3.11).

      - name: home_win_prob_sharp
        description: >
          Average vig-adjusted home win probability across sharp books only
          (lowvig, betonlineag, bovada — identified by Card 3.11 calibration).
          Null when no sharp book had pre-game h2h coverage. Present for
          diagnostics; not recommended as a primary training feature
          (include_sharp_soft_features = False per Card 3.11).

      - name: home_win_prob_soft
        description: >
          Average vig-adjusted home win probability across soft books only
          (draftkings, fanduel, betmgm, williamhill_us, betrivers). Null when
          no soft book had pre-game h2h coverage. Diagnostic column only;
          not recommended as a primary training feature per Card 3.11.

      - name: sharp_soft_ml_delta
        description: >
          home_win_prob_sharp minus home_win_prob_soft. Positive values indicate
          sharp books favor the home team more than soft books. Null when either
          sharp or soft group has no coverage. Diagnostic column only;
          not recommended as a primary training feature per Card 3.11.

      - name: ml_consensus_std
        description: >
          Standard deviation of vig-adjusted home win probability across all
          bookmakers. Captures cross-market disagreement. Null (not 0.0) when
          only one bookmaker has coverage. Source: mart_odds_consensus.

      - name: market_bookmaker_count
        description: >
          Count of bookmakers contributing to the h2h consensus for this event.
          Always >= 1 when non-null. Null when has_odds = false.
          Source: mart_odds_consensus.

      - name: total_line_consensus
        description: >
          Average over/under total runs line across all bookmakers with pre-game
          totals prices. Null when no bookmaker has totals coverage.
          Source: mart_odds_consensus.

      - name: total_line_std
        description: >
          Standard deviation of the over/under line across bookmakers. Null
          (not 0.0) when only one bookmaker has totals coverage.
          Source: mart_odds_consensus.

      - name: over_prob_consensus
        description: >
          Average vig-adjusted over probability across all bookmakers with
          pre-game totals prices. Null when no bookmaker has totals coverage.
          Source: mart_odds_consensus.

  - name: feature_pregame_weather_status
    description: >
      SCD-2 history of forecast_pregame weather state per game. Grain: one
      row per (game_pk, valid_from) — a new row is only written when the
      weather hash (temp_f, wind_component_mph, humidity_pct, condition_text)
      changes between fetches. Coverage: Epic T.2 (2026-05-01) onward.
      forecast_intraday and observed_at_first_pitch are excluded — run_env
      models were trained on forecast_pregame only.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, valid_from]
    columns:
      - name: game_pk
        tests: [not_null]
      - name: venue_id
        tests: [not_null]
      - name: valid_from
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: record_hash
        tests: [not_null]
      - name: computed_at
        tests: [not_null]
      - name: is_dome
        tests: [not_null]

  - name: feature_pregame_weather_features
    description: >
      Pre-game weather features for MLB outdoor parks. Grain: one row per
      game_pk. Dome parks have is_dome = TRUE and NULL wind_component_mph.
      Outdoor and convertible-roof parks have non-null wind_component_mph when
      coordinates and weather data are available. DUAL SOURCE (Story 31.4
      weather repair): live games use the pregame FORECAST via
      feature_pregame_weather_status (SCD-2, is_current = true, 2026-05-01+);
      pre-2026 history is backfilled from the realized first-pitch OBSERVED
      weather (observed_at_first_pitch in weather_raw), since forecast_pregame
      did not exist before Epic T.2 and the feature was otherwise ~100% null
      across the training window. Observed is a near-unbiased stand-in for the
      forecast (2026 overlap: temp corr 0.97, wind corr 0.73). weather_
      observation_type marks which source produced each row.

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: venue_id
        tests:
          - not_null

      - name: temp_f
        description: Temperature at first pitch (°F).

      - name: wind_speed_mph
        description: Wind speed (mph).

      - name: wind_direction_deg
        description: Meteorological wind direction (degrees). 0/360=from North.

      - name: wind_component_mph
        description: >
          Wind component along home-plate → CF axis. Positive = out (offense
          favored). Null for dome parks. Expected range −35 to +35 mph.

      - name: humidity_pct
        description: Relative humidity (percent).

      - name: is_dome
        description: True for fixed-roof dome parks; False for open/convertible.
        tests:
          - not_null

  - name: feature_pregame_umpire_features
    description: >
      One row per game_pk with a known HP umpire. Trailing 3-year z-scores
      for HP umpire tendency relative to league average. Leakage guard:
      only games strictly before the target game date are used.
      k_pct/bb_pct z-scores default to 0.0 (not in UmpScorecards by-game export).
      Minimum sample gate: ump_games_sample < 10 sets all z-scores to 0.0.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]
    columns:
      - name: game_pk
        tests: [not_null, unique]
      - name: umpire_name
        tests: [not_null]
      - name: ump_games_sample
        description: Number of trailing 3-year games used to compute the umpire averages.
        tests: [not_null]
      - name: ump_k_pct_zscore
        description: K% z-score vs league average (0.0 until k_pct data is populated).
      - name: ump_bb_pct_zscore
        description: BB% z-score vs league average (0.0 until bb_pct data is populated).
      - name: ump_runs_per_game_zscore
        description: Total runs per game z-score vs league average.
      - name: ump_run_impact_zscore
        description: Total Run Impact z-score — direct measure of umpire zone effect on run expectancy.
      - name: ump_accuracy_zscore
        description: Accuracy Above Expected z-score — how accurately this umpire calls the zone.

  # ============================================================================
  # feature_pitcher_cluster_matchups
  # ============================================================================
  - name: feature_pitcher_cluster_matchups
    description: >
      Pre-game pitcher cluster matchup features for ML. One row per game_pk
      (regular season only, grain matches mart_game_results game_type = 'R').

      Aggregates mart_batter_woba_vs_cluster across all 9 lineup slots, keyed
      on the opposing starter's pitcher cluster ID. Each lineup batter's
      30-day shrinkage-adjusted wOBA and xwOBA vs. that cluster are averaged
      to produce a single game-level matchup score per side.

      Leakage guards:
        - Pitcher cluster joined on prior-season assignment (pc.season = game_year - 1).
          PK on pitcher_clusters is (pitcher_id, season); no deduplication needed.
        - Batter wOBA stats are joined on game_date < game_date (strictly prior),
          inheriting mart_batter_woba_vs_cluster's own leakage guard.

      Availability: cluster data begins 2015; effective coverage begins for games
      in 2016+ (prior-season lag). Null when starter has no prior-season cluster
      assignment (rookies, debuts) or no lineup batter has ≥ 10 PA vs. that cluster.
      slot_coverage tracks how many of 9 lineup slots had a non-null adj_woba match.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null
          - unique

      - name: home_lineup_avg_woba_vs_cluster
        description: >
          Average shrinkage-adjusted wOBA of the home lineup batters vs. the
          away starter's pitcher cluster. Null when no cluster assignment or
          batter coverage exists.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_lineup_avg_woba_vs_cluster is not null"

      - name: home_lineup_avg_xwoba_vs_cluster
        description: >
          Average shrinkage-adjusted xwOBA of the home lineup batters vs. the
          away starter's pitcher cluster. Null under same conditions as
          home_lineup_avg_woba_vs_cluster.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_lineup_avg_xwoba_vs_cluster is not null"

      - name: home_lineup_cluster_slot_coverage
        description: >
          Number of the 9 home lineup slots with a non-null adj_woba match
          vs. the away starter's cluster. 0 when no batter had coverage.
          Null when no home lineup was found.

      - name: away_lineup_avg_woba_vs_cluster
        description: >
          Average shrinkage-adjusted wOBA of the away lineup batters vs. the
          home starter's pitcher cluster. Null when no cluster or batter coverage.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_lineup_avg_woba_vs_cluster is not null"

      - name: away_lineup_avg_xwoba_vs_cluster
        description: >
          Average shrinkage-adjusted xwOBA of the away lineup batters vs. the
          home starter's pitcher cluster. Null under same conditions.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_lineup_avg_xwoba_vs_cluster is not null"

      - name: away_lineup_cluster_slot_coverage
        description: >
          Number of the 9 away lineup slots with a non-null adj_woba match
          vs. the home starter's cluster. 0 when no batter had coverage.
          Null when no away lineup was found.

      - name: home_starter_cluster_id
        description: >
          Prior-season cluster ID of the home starter (season = game_year - 1).
          Null for rookies/debuts with no prior-season cluster and for games
          without a confirmed probable home pitcher.

      - name: away_starter_cluster_id
        description: >
          Prior-season cluster ID of the away starter (season = game_year - 1).
          Null for same reasons as home_starter_cluster_id.

  # feature_batter_archetype_matchups
  # ============================================================================
  - name: feature_batter_archetype_matchups
    description: >
      Pre-game batter archetype × pitcher cluster matchup features for ML.
      One row per game_pk (regular season only).

      For each game, computes expected wOBA advantage based on each lineup's
      batter archetype composition facing the opposing starter's pitcher cluster.
      Archetype pair stats are drawn from mart_batter_archetype_vs_pitcher_cluster
      using the most recent row strictly before game_date.

      Leakage guards:
        - Pitcher cluster joined on prior-season assignment (pc.season = game_year - 1).
        - Batter cluster joined on prior-season assignment (bc.season = game_year - 1).
        - mart_batter_archetype_vs_pitcher_cluster joined on game_date < game_date.

      Availability: effective from 2021+ (both cluster tables require a prior season;
      cluster data begins 2015). Null for rookies/debuts with no prior-season assignment.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null
          - unique

      - name: home_lineup_archetype_avg_woba
        description: >
          Average population-level adj_woba across home lineup slots, using each
          batter's prior-season archetype vs. the away starter's prior-season cluster.
          Null when no archetype coverage for the pairing.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_lineup_archetype_avg_woba is not null"

      - name: home_lineup_archetype_avg_xwoba
        description: >
          Average population-level adj_xwoba across home lineup slots. Null under
          same conditions as home_lineup_archetype_avg_woba.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_lineup_archetype_avg_xwoba is not null"

      - name: home_lineup_archetype_slot_coverage
        description: >
          Number of the 9 home lineup slots with a non-null archetype matchup adj_woba.
          0 when no slot has coverage; null when no home lineup was found.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 9
              config:
                where: "home_lineup_archetype_slot_coverage is not null"

      - name: away_lineup_archetype_avg_woba
        description: >
          Average population-level adj_woba across away lineup slots vs. the home
          starter's prior-season cluster. Null when no archetype coverage.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_lineup_archetype_avg_woba is not null"

      - name: away_lineup_archetype_avg_xwoba
        description: >
          Average population-level adj_xwoba across away lineup slots. Null under
          same conditions as away_lineup_archetype_avg_woba.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_lineup_archetype_avg_xwoba is not null"

      - name: away_lineup_archetype_slot_coverage
        description: >
          Number of the 9 away lineup slots with a non-null archetype matchup adj_woba.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 9
              config:
                where: "away_lineup_archetype_slot_coverage is not null"

      - name: home_batter_cluster_mode
        description: >
          Most common prior-season batter archetype label in the home lineup.
          Null when no batter in the lineup has a prior-season cluster assignment.

      - name: away_batter_cluster_mode
        description: >
          Most common prior-season batter archetype label in the away lineup.
          Null when no batter in the lineup has a prior-season cluster assignment.

  # ============================================================================
  # feature_pitcher_batter_h2h_matchups (Card 8.J)
  # ============================================================================
  - name: feature_pitcher_batter_h2h_matchups
    description: >
      Pre-game lineup-level head-to-head matchup history features for ML.
      One row per game_pk (regular season).

      For each batter in the lineup vs. the OPPOSING starter, aggregates
      mart_pitcher_batter_history with strict leakage guard
      (history.game_date < game.game_date) and applies Bayesian shrinkage
      toward the league prior at low PA counts (k=50, woba_prior=0.320,
      xwoba_prior=0.310). Lineup-level columns are simple averages across
      the 9 lineup slots; coverage tracks the fraction of slots with at
      least 10 career PA against the starter.

      Distinct from the archetype-based matchup models
      (feature_pitcher_cluster_matchups, feature_batter_archetype_matchups)
      which capture stylistic matchup types — this model captures actual
      historical outcomes between specific pitcher-batter pairs.

      Null pattern: per-side columns are null only when the lineup or the
      opposing probable starter is unknown. Debut starters return shrinkage-
      to-prior values (non-null). Card 8.J.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null
          - unique

      - name: home_lineup_vs_away_starter_h2h_woba
        description: >
          Lineup-average Bayesian-shrunk wOBA the home lineup has produced
          against the away starter across prior PA. Returns the league prior
          (0.320) for batters with no prior PA against this starter.

      - name: home_lineup_vs_away_starter_h2h_xwoba
        description: >
          Lineup-average Bayesian-shrunk xwOBA against the away starter.
          Returns the league prior (0.310) for batters with no prior PA.

      - name: home_lineup_h2h_pa_coverage
        description: >
          Fraction of the home lineup's 9 slots with >= 10 career PA against
          the away starter. 0 when no slot meets the threshold.

      - name: away_lineup_vs_home_starter_h2h_woba
        description: >
          Lineup-average Bayesian-shrunk wOBA the away lineup has produced
          against the home starter across prior PA.

      - name: away_lineup_vs_home_starter_h2h_xwoba
        description: >
          Lineup-average Bayesian-shrunk xwOBA against the home starter.

      - name: away_lineup_h2h_pa_coverage
        description: >
          Fraction of the away lineup's 9 slots with >= 10 career PA against
          the home starter.

  # feature_pregame_bullpen_state_features
  # ============================================================================
  - name: feature_pregame_bullpen_state_features
    description: >
      Grain: one row per game_pk × team_abbrev (home and away). Pre-game
      bullpen state for each team entering a given game. Combines workload
      (mart_bullpen_workload), handedness-split effectiveness
      (mart_bullpen_handedness_splits), and opposing lineup composition
      (feature_pregame_lineup_features) into seven ML-ready bullpen features.

      All rolling windows use an upper bound of 1 day preceding — no current-game
      data leaks into any feature column. NULL values should be imputed to 0.0
      (workload/availability columns) or league-average xwOBA ~0.315
      (quality columns) in preprocessing.py.

      Intended use: join on game_pk + side (or game_pk + team_abbrev) to add
      bullpen context to the game-level prediction row.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, team_abbrev]

    columns:

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year.
        tests:
          - not_null

      - name: team_abbrev
        description: Statcast abbreviation of the team whose bullpen is profiled.
        tests:
          - not_null

      - name: side
        description: Whether this team is the home or away team in this game.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: opposing_team
        description: Statcast abbreviation of the opposing team (the batting team).
        tests:
          - not_null

      - name: bullpen_leverage_pitches_prev_1d
        description: >
          Total pitches thrown by this team's bullpen in the prior 1 calendar day.
          Null when the team had no relievers appear the previous day (off-day or
          complete-game starter). Impute to 0.0 in preprocessing.

      - name: bullpen_leverage_pitches_prev_3d
        description: >
          Total pitches thrown by this team's bullpen in the prior 3 calendar days.
          Null when no reliever appearances in the window. Impute to 0.0.

      - name: high_leverage_arms_used_prev_2d
        description: >
          1 if any reliever pitched in inning 7 or later in the prior 2 calendar
          days; 0 otherwise. Null when workload data is unavailable.

      - name: closer_availability_proxy
        description: >
          1 = closer was NOT used yesterday (rested and available); 0 = closer was
          used yesterday. Derived as 1 - closer_used_prev_1d. Null when workload
          data is unavailable. Impute to 1 (assume available) in preprocessing.

      - name: bullpen_lhb_xwoba_against
        description: >
          Rolling 30-day xwOBA this team's bullpen has allowed against
          left-handed batters. Null early in season or when no prior LHB
          appearances exist. Impute to league average (~0.315) in preprocessing.

      - name: bullpen_rhb_xwoba_against
        description: >
          Rolling 30-day xwOBA this team's bullpen has allowed against
          right-handed batters. Null early in season or when no prior RHB
          appearances exist. Impute to league average (~0.315) in preprocessing.

      - name: bullpen_matchup_quality_vs_lineup
        description: >
          This team's bullpen xwOBA weighted by the opposing lineup's actual
          LHB/RHB composition. Higher values = more permissive bullpen for the
          opposing lineup. Computed as:
            bp_xwoba_vs_rhb * (opposing rhb_count / total_batters)
            + bp_xwoba_vs_lhb * (opposing lhb_count / total_batters)
          Null when handedness splits or lineup composition data are unavailable.

  # ── Public betting SCD-2 (Story 15.6) ────────────────────────────────────────

  - name: feature_pregame_public_betting_status
    description: >
      SCD-2 table for Action Network public betting percentages. Grain: one row
      per (game_pk, valid_from). Natural key: game_pk (single denormalized row
      per game; ML and totals co-located). New row only when record_hash changes
      (LAG-based change detection). Coverage: 2026-05-07 onward (Epic T.3).
      Dual coverage gap: (1) Action Network pre-2024-02-22 permanently unrecoverable;
      (2) pre-Epic-T snapshots not captured.

    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: valid_from
        description: Timestamp when this state was first observed (loaded_at from source).
        tests: [not_null]
      - name: valid_to
        description: Timestamp when this state was superseded; null for the current row.
      - name: is_current
        description: True for the most-recent row per game_pk (valid_to is null).
        tests: [not_null]
      - name: record_hash
        description: MD5 of (home_ml_money_pct, home_ml_ticket_pct, over_money_pct, over_ticket_pct).
        tests: [not_null]
      - name: computed_at
        description: Wall-clock timestamp when this SCD-2 row was materialized.
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, valid_from]

  - name: feature_pregame_public_betting_features
    description: >
      Current-state view over feature_pregame_public_betting_status (is_current = true).
      Grain: one row per game_pk. Upstream: feature_pregame_public_betting_status
      (SCD-2, story 15.6). For point-in-time queries use the status table directly.

    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: public_betting_snapshot_ts
        description: Timestamp of the most-recent snapshot (valid_from from SCD-2).

  - name: feature_pregame_umpire_status
    description: >
      SCD-2 table for HP umpire assignments. Grain: one row per (game_pk, valid_from).
      Natural key: game_pk (source has one HP ump per game; no ump_position column).
      New row only when record_hash changes (LAG-based detection on umpire_id +
      tendency stats). Most games have a single row (one assignment, no substitution).
      Coverage: Epic T.4 onward (~2026-05-02). For pre-T history use
      stg_statsapi_umpire_game_log (final deduped state only).

    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: valid_from
        description: Timestamp when this assignment was first observed (loaded_at from source).
        tests: [not_null]
      - name: valid_to
        description: Timestamp when this assignment was superseded; null for the current row.
      - name: is_current
        description: True for the most-recent row per game_pk (valid_to is null).
        tests: [not_null]
      - name: record_hash
        description: MD5 of (umpire_name, total_runs, total_run_impact, accuracy_above_expected). umpire_id excluded — null in 99% of rows (umpscorecards source has no umpire_id).
        tests: [not_null]
      - name: computed_at
        description: Wall-clock timestamp when this SCD-2 row was materialized.
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, valid_from]

  - name: feature_pregame_meta_model_features
    description: >
      Incremental feature mart for the Epic 12 CLV meta-model.
      Grain: one row per (game_pk, market_type). Base rows come from
      mart_clv_labeled_games; every row meets all four CLV label conditions.
      Seven feature groups are joined in; market-derived and future groups
      are nullable with per-group coverage indicator columns.
      coverage_score is the fraction of 6 active groups with non-null values
      (denominator grows to 7 when Epic 16 sequential posteriors ship).
      training_eligible = true when coverage_score >= 0.60 AND both primary
      edges are non-null.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, market_type]
    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: game_date
        description: Game date.
        tests: [not_null]
      - name: market_type
        description: "h2h or totals."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [h2h, totals]
      - name: predicted_at
        description: Timestamp of the canonical pre-game prediction (inserted_at from daily_model_predictions).
        tests: [not_null]
      - name: model_edge
        description: Model edge for this market type (h2h_edge for h2h rows, totals_edge for totals rows).
      - name: clv
        description: Closing line value from the reference bookmaker perspective.
        tests: [not_null]
      - name: clv_positive
        description: True when CLV > 0 (market moved toward reference side by game time).
        tests: [not_null]
      - name: actual_outcome
        description: "1 = reference side won (home won for h2h; over won vs open line for totals)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: h2h_edge_home
        description: Model edge on the home team moneyline.
      - name: totals_edge
        description: Model edge on the over/under totals market.
      - name: game_conviction_score
        description: Composite conviction score from daily_model_predictions.
      - name: win_prob_ci_width
        description: "Width of the home win probability credible interval. NULL until added to daily_model_predictions."
      - name: totals_p_over_ci_width
        description: "Width of the over probability credible interval. NULL until added to daily_model_predictions."
      - name: model_signal_available
        description: True when h2h_edge_home is non-null (Group 1 coverage indicator).
        tests: [not_null]
      - name: gate_signals_met
        description: Count of gate signals met at prediction time.
      - name: signal_completeness_score
        description: "Fraction of sub-model signals available. NULL until added to daily_model_predictions."
      - name: signal_completeness_available
        description: True when gate_signals_met is non-null (Group 2 coverage indicator).
        tests: [not_null]
      - name: bovada_open_devig_prob
        description: Bovada opening de-vigged probability for this market type (from mart_clv_labeled_games).
      - name: bovada_close_devig_prob
        description: Bovada closing de-vigged probability for this market type.
      - name: line_movement_devig
        description: Signed de-vigged probability movement from open to close (close - open).
      - name: h2h_line_movement
        description: H2H line movement from mart_odds_line_movement (Bovada).
      - name: totals_line_movement
        description: Totals line movement from mart_odds_line_movement (Bovada).
      - name: snapshot_count
        description: Number of odds snapshots captured for this game.
      - name: line_movement_available
        description: True when snapshot_count is non-null (Group 3 coverage indicator).
        tests: [not_null]
      - name: ml_implied_prob_std
        description: Standard deviation of moneyline implied probabilities across bookmakers.
      - name: ml_implied_prob_range
        description: Range of moneyline implied probabilities across bookmakers.
      - name: totals_line_std
        description: Standard deviation of totals line across bookmakers.
      - name: totals_line_range
        description: Range of totals line across bookmakers.
      - name: sharp_soft_ml_spread
        description: Spread between sharp and soft book moneyline implied probabilities.
      - name: n_books_available
        description: Number of bookmakers with odds for this game.
      - name: stale_book_flag
        description: "1 if any bookmaker odds are stale; 0 otherwise."
      - name: bovada_vs_consensus_h2h
        description: "Bovada close de-vigged prob minus consensus home win prob (h2h rows only; null for totals)."
      - name: sharp_soft_ml_delta
        description: Sharp minus soft book ML delta from mart_odds_consensus.
      - name: ml_consensus_std
        description: Standard deviation of ML implied probs across all consensus books.
      - name: bovada_vs_pinnacle_h2h
        description: "Bovada close devig minus Pinnacle close devig. NULL until Pinnacle processed mart is built."
      - name: pinnacle_coverage_flag
        description: "True when a Pinnacle line exists for this game. Always false until processed mart ships."
        tests: [not_null]
      - name: bookmaker_disagreement_available
        description: True when ml_implied_prob_std is non-null (Group 4 coverage indicator).
        tests: [not_null]
      - name: hours_to_first_pitch_at_prediction
        description: Hours between prediction time and game first pitch. Must be > 0 (leakage guard).
      - name: lineup_confirmed_hours_before
        description: Hours before first pitch when the lineup was first observed in stg_statsapi_lineups.
      - name: prior_age_days
        description: "Age of the Empirical Bayes prior at prediction time. NULL until Epic 16 ships."
      - name: timing_available
        description: True when game_datetime is non-null (Group 5 coverage indicator).
        tests: [not_null]
      - name: over_money_pct
        description: Fraction of money bet on the over (Action Network; null before 2024-02-22).
      - name: home_ml_money_pct
        description: Fraction of money bet on the home team ML (Action Network; null before 2024-02-22).
      - name: home_ml_ticket_pct
        description: Fraction of tickets on the home team ML (Action Network; null before 2024-02-22).
      - name: ml_sharp_signal
        description: Sharp money signal on the ML market from Action Network.
      - name: total_sharp_signal
        description: Sharp money signal on the totals market from Action Network.
      - name: public_betting_available
        description: True when home_ml_money_pct is non-null (Group 6 coverage indicator).
        tests: [not_null]
      - name: posterior_source
        description: "Identifier for the Epic 16 sequential posterior used. NULL until Epic 16 ships."
      - name: cell_posterior_source
        description: "Identifier for the Epic 8.5 cell posterior used. NULL until Epic 8.5 ships."
      - name: posterior_available
        description: True when sequential posteriors are available for this game. Always false until Epic 16 ships.
        tests: [not_null]
      - name: coverage_score
        description: >
          Fraction of the 6 active feature groups with non-null values.
          Denominator = 6 (sequential posterior excluded until Epic 16 ships).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: training_eligible
        description: >
          True when coverage_score >= 0.60 AND h2h_edge_home IS NOT NULL AND
          totals_edge IS NOT NULL.
        tests: [not_null]
