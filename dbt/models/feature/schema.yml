version: 2

# ============================================================================
# Feature Layer — ML Pre-Game Feature Vectors
# ============================================================================
# Models in this folder materialize into baseball_data.betting_features in
# Snowflake (distinct from baseball_data.betting where mart models live).
#
# LEAKAGE RULE (enforced in every model — audited 2026-04-23):
#   1. Rolling window lookups: rs.game_date::date < game_date  (strictly <)
#   2. Platoon splits: game_year = year(game_date) - 1         (prior season)
#   3. Park run factors: prf.game_year = game_year - 1         (prior season)
#   4. Season record: record_date = game_date - 1              (day before)
#   No same-day data may appear in any feature. Violations invalidate the
#   training set. See data_quality/leakage_audit.md for the full code review
#   checklist and spot-check results (game_pk 777235, 2025-07-04).
#
# Grain: one row per game_pk (master assembly) or game_pk × side/team/starter
# depending on the model. See individual model descriptions below.
# ============================================================================

models:

  - name: feature_pregame_lineup_features
    description: >
      Pre-game batting lineup features for ML. One row per game_pk × side (home/away).
      Aggregates rolling batter stats (30-day and season-to-date) and prior-season
      platoon splits across all 9 lineup slots. All rolling stat joins use
      game_date < official_date (strictly less than) to prevent data leakage.
      Platoon splits use the prior season (game_year - 1) to prevent in-season leakage.
      Nulls are expected for games at or near the start of each season (no prior
      game-date rows yet in rolling stats) and for 2015 games (no 2014 platoon data).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, side]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: has_full_lineup
        tests:
          - not_null

      - name: lhb_count
        tests:
          - not_null

      - name: rhb_count
        tests:
          - not_null

      - name: avg_woba_30d
        description: >
          Average 30-day rolling wOBA across all lineup slots with pre-game data.
          Null when no batter in the lineup has a prior game-date row (e.g. Opening Day 2015).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_xwoba_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_std
        description: Season-to-date rolling wOBA average across lineup. Null early in each season.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_vs_lhp
        description: >
          Average prior-season wOBA vs LHP across lineup. Null for 2015 games (no 2014 data)
          and for any batter with no prior-season appearance in mart_batter_vs_handedness_splits.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_vs_rhp
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

  - name: feature_pregame_starter_features
    description: >
      Pre-game starting pitcher features for ML. One row per game_pk × pitcher_id.
      Only includes games with a confirmed probable pitcher (null probable_pitcher_id
      rows from stg_statsapi_probable_pitchers are excluded). The master assembly
      LEFT JOINs this model to detect missing starters.
      All rolling stat joins use game_date::date < pp.game_date (strictly less than).
      Platoon splits use the prior season (game_year - 1) to prevent in-season leakage.
      Nulls expected for debut pitchers (has_starter_data = false), 2015 Opening Day
      (no prior-season platoon data), and early-season games (limited rolling history).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, pitcher_id]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: pitcher_id
        tests:
          - not_null

      - name: has_starter_data
        description: >
          False when the pitcher has no prior Statcast history (e.g. MLB debut or first
          season before our 2015 data cutoff). True for all pitchers with at least one
          prior regular-season game appearance in mart_pitcher_rolling_stats.
        tests:
          - not_null

      - name: days_rest
        description: >
          Days since the pitcher's most recent start (from mart_starting_pitcher_game_log).
          Uses starts only — relief appearances do not reset the clock.
          Null when no prior starts exist in the dataset (first career start, or first
          start in our 2015+ data window).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: k_pct_30d
        description: >
          30-day rolling K% (strikeouts / batters faced) allowed. Null for debut
          pitchers or when no prior-game data exists within the window.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: xwoba_against_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: xwoba_vs_lhb
        description: >
          Prior-season xwOBA against vs LHB. Null for 2015 starters (no 2014 data)
          and for any pitcher who had no prior-season appearances (injury, minor leagues,
          or debut). Approximately 22% null across the full 2015-present dataset.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 20000"

      - name: xwoba_vs_rhb
        description: Prior-season xwOBA against vs RHB. Same null pattern as xwoba_vs_lhb.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 20000"

      - name: k_pct_7d_minus_std
        description: >
          Starter K% momentum: 7-day rolling K% minus season-to-date K%.
          Positive values indicate the pitcher is striking out batters at a higher rate recently
          than their season baseline. Notebook 03 found starter K% has the largest window effect
          (29% correlation increase from 7-day to STD), making this spread a meaningful velocity signal.
          Null when either the 7-day or STD window is null (debut pitchers, early-season).

      - name: xwoba_7d_minus_std
        description: >
          Starter xwOBA-against momentum: 7-day rolling xwOBA allowed minus season-to-date xwOBA allowed.
          Positive values indicate the pitcher is allowing harder expected contact recently than baseline.
          Null when either the 7-day or STD window is null (debut pitchers, early-season).

      - name: appearances_30d
        description: >
          Number of pitcher appearances (starts) in the 30-day rolling window ending the day before the game.
          Indicates sample size reliability for 30-day rolling stats — a value of 3 means only 3 starts
          contributed to those estimates. Null for debut pitchers with no prior Statcast history.

      - name: appearances_std
        description: >
          Number of pitcher appearances (starts) in the season-to-date window ending the day before the game.
          Indicates sample size reliability for season-to-date rolling stats. Zero is valid for a pitcher's
          first game of the season. Null for debut pitchers with no prior Statcast history.

      - name: avg_ip_last_3
        description: >
          Average decimal innings pitched over the starter's 3 most recent prior starts (any season),
          computed from outs_recorded / 3.0 for proper decimal averaging. A value of 4.67 means the
          starter averaged 4 full innings and 2 outs over their last 3 outings. Null when the starter
          has no prior starts in the dataset (has_ip_history = false).

      - name: avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start, using only starts in the current
          season before this game (< game_date). Null for debut starters and pitchers making their
          first start of the season. Provides a stable seasonal baseline relative to avg_ip_last_3.

      - name: has_ip_history
        description: >
          True when the pitcher has at least one prior regular season start in the dataset before
          this game (any season). False for debut starters. Used as a filter flag to distinguish
          null avg_ip_* values due to missing data from null due to first-career-start nullability.

  - name: feature_pregame_team_features
    description: >
      Pre-game team context features for ML. One row per game_pk × team_abbrev
      (home and away). Joins rolling offense, rolling pitching, platoon splits,
      season win%, bullpen workload, bullpen effectiveness, and schedule context
      (days rest, game frequency, home/away streak, timezone travel) into a
      single team context row.
      All rolling stat joins use game_date::date < spine.game_date::date
      (strictly less than) to prevent data leakage. Season record joins on
      record_date = game_date - 1. Bullpen workload and effectiveness use
      internal '1 day preceding' upper bounds and are joined on game_pk.
      Schedule context is joined on game_pk + team_abbrev — no leakage risk
      as all values look strictly backward from game_date.
      Nulls expected for Opening Day (no prior season record), early-season
      games (limited rolling history), and teams in their first game of the
      2015 data window (no prior rolling stats row).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, team_abbrev]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: team_abbrev
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: off_woba_30d
        description: >
          30-day rolling team wOBA (offense). Null for teams with no prior game
          in the 30-day window (Opening Day, early-season games).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: off_xwoba_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: pit_xwoba_against_30d
        description: >
          30-day rolling team xwOBA allowed (pitching). Null for same early-season pattern.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: win_pct
        description: >
          Team win percentage as of the day before the game (from mart_team_season_record).
          Null for Opening Day games (no record yet on game_date - 1).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: days_rest
        description: >
          Days since this team's previous game (from mart_team_schedule_context).
          Null for the first game of each season. 0 for game 2 of a doubleheader.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: games_last_7d
        description: Games this team played in the 7 calendar days before this game.
        tests:
          - not_null

      - name: games_last_14d
        description: Games this team played in the 14 calendar days before this game.
        tests:
          - not_null

      - name: consecutive_home_games
        description: Length of current home stand including this game. Null when away.

      - name: consecutive_away_games
        description: Length of current road trip including this game. Null when home.

      - name: tz_changed_from_last_game
        description: >
          True when the team traveled across timezone boundaries since their last game.
          False on Opening Day and when venue data is unavailable.
        tests:
          - not_null

      - name: off_woba_7d_minus_30d
        description: >
          Team offense momentum: 7-day rolling wOBA minus 30-day rolling wOBA.
          Positive values indicate the team is hitting better recently than their baseline.
          Null when either window is null (early-season games with insufficient history).

      - name: pit_xwoba_7d_minus_30d
        description: >
          Team pitching momentum: 7-day rolling xwOBA allowed minus 30-day rolling xwOBA allowed.
          Positive values indicate the pitching staff is allowing harder contact recently than baseline.
          Null when either window is null (early-season games with insufficient history).

      - name: off_games_played_7d
        description: >
          Number of team games played in the 7-day rolling window ending the day before the game.
          Indicates sample size reliability for 7-day offensive rolling stats — low values
          (0–2) mean early-season estimates are noisy. Null when no prior rolling offense row exists.

      - name: off_games_played_14d
        description: >
          Number of team games played in the 14-day rolling window ending the day before the game.
          Indicates sample size reliability for 14-day offensive rolling stats.
          Null when no prior rolling offense row exists.

      - name: off_games_played_30d
        description: >
          Number of team games played in the 30-day rolling window ending the day before the game.
          Indicates sample size reliability for 30-day offensive rolling stats — notebook 03 confirmed
          pitching feature |r| was 48% lower in the 0–10 game bucket vs. the 30+ game bucket.
          Null when no prior rolling offense row exists.

      - name: off_games_played_std
        description: >
          Number of team games played season-to-date ending the day before the game.
          Indicates sample size reliability for season-to-date offensive rolling stats.
          Null when no prior rolling offense row exists.

  - name: feature_pregame_park_features
    description: >
      Pre-game park context features for ML. One row per game_pk (regular season only).
      Joins physical park characteristics (dimensions, elevation, surface, roof type)
      from stg_statsapi_venues and empirical run factors from mart_park_run_factors.
      Park run factors use game_year - 1 (prior season) to prevent in-season leakage.
      Nulls are expected in park_run_factor_3yr for 2015 games (no 2014 data in the
      dataset) and for venues with fewer than 10 games in the prior season.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: venue_id
        description: >
          Null for a small number of games where venue data is missing from
          stg_statsapi_games. These games will have null for all venue-derived columns.
        tests:
          - not_null:
              config:
                warn_if: ">= 10"
                error_if: ">= 500"

      - name: elevation_ft
        description: >
          Park elevation in feet above sea level. Null when venue_id is null or
          when the venue record has no elevation in the Stats API.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: center_ft
        description: Center field distance in feet. Null when venue_id is missing.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: runs_per_game_at_park
        description: >
          Prior-season average total runs per game at this venue (both teams combined).
          Null for 2015 games (no 2014 history) and for venues with fewer than 10
          games in the prior season.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: park_run_factor_3yr
        description: >
          3-year rolling average of runs_per_game_at_park ending in game_year - 1.
          Null for 2015 games (no prior data), and for any year where the venue
          has fewer than 10 games in the prior season (mart_park_run_factors
          excludes those rows). ~30 teams × 1 first season = ~2,430 null rows
          expected across the dataset.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

  - name: feature_pregame_game_features
    description: >
      Master pre-game ML feature assembly. One row per game_pk (regular season only).
      Joins all four upstream feature tables into a single wide row per game:
        - feature_pregame_lineup_features   (home_ / away_ prefix)
        - feature_pregame_starter_features  (home_starter_ / away_starter_ prefix)
        - feature_pregame_team_features     (home_ / away_ prefix, retains off_/pit_/bp_ sub-prefixes)
        - feature_pregame_park_features     (no prefix — game-level)
      Row count matches mart_game_results (regular season). Missing features produce
      nulls; no rows are dropped.

      has_full_data = true when: home_has_full_lineup AND away_has_full_lineup AND
      home_starter_has_starter_data AND away_starter_has_starter_data AND
      runs_per_game_at_park IS NOT NULL. Use this flag to select the data-complete
      training subset for EDA and ML.

      Training set size (has_full_data = true) by season — verified 2026-04-23:
        SELECT game_year, count(*) AS games
        FROM baseball_data.betting_features.feature_pregame_game_features
        WHERE has_full_data = true
        GROUP BY game_year
        ORDER BY game_year;

      Results as of 2026-04-23:
        2015:    0  (no prior-season run factor; all rows has_full_data = false)
        2016: 2364
        2017: 2288
        2018: 1953  (shortened season — CBA postponements)
        2019: 2363
        2020:  801  (COVID 60-game season)
        2021: 2320
        2022: 2377
        2023: 2371
        2024: 2369
        2025: 2228  (season in progress at audit date)
        2026:  351  (season in progress at audit date)
        Total (2016–2025 complete seasons): ~23,444 games

      Row count parity (verified 2026-04-23):
        feature_pregame_game_features: 25,146 rows
        mart_game_results (game_type = 'R'): 25,146 rows

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: home_team
        tests:
          - not_null

      - name: away_team
        tests:
          - not_null

      - name: has_full_data
        description: >
          True when both lineups are confirmed full (9 batters), both starters
          have prior Statcast history (has_starter_data = true), and the park
          has a prior-season run factor (runs_per_game_at_park is not null).
          False when any of these conditions is unmet (Opening Day, debut
          pitchers, 2015 games, missing probable pitcher data).
          Use WHERE has_full_data = true to select the data-complete training subset.
        tests:
          - not_null

      - name: has_odds
        description: >
          True when an event_id was matched in mart_game_odds_bridge for this game.
          Does NOT guarantee that odds price columns are populated — Card 3 historical
          backfill covers only 2023 (226 events) and live 2026. Intentionally excluded
          from has_full_data: odds are an optional feature block.
        tests:
          - not_null

      - name: home_lineup_vs_away_starter_xwoba_adj
        description: >
          Weighted average of the away starter's prior-season xwOBA-against platoon splits,
          weighted by the home lineup's handedness composition
          (pct_rhb × xwoba_vs_rhb + pct_lhb × xwoba_vs_lhb). Captures the three-way
          interaction of lineup composition × starter hand × platoon split that tree models
          are unlikely to discover from the raw components alone. Null when away starter
          platoon splits are null (debut pitcher, first-season gap) or when no lineup batters
          have known handedness.

      - name: home_lineup_vs_away_starter_k_pct_adj
        description: >
          Weighted average of the away starter's prior-season K% platoon splits, weighted by
          home lineup handedness composition. Null when away starter platoon splits are null.

      - name: home_lineup_vs_away_starter_bb_pct_adj
        description: >
          Weighted average of the away starter's prior-season BB% platoon splits, weighted by
          home lineup handedness composition. Null when away starter platoon splits are null.

      - name: away_lineup_vs_home_starter_xwoba_adj
        description: >
          Weighted average of the home starter's prior-season xwOBA-against platoon splits,
          weighted by the away lineup's handedness composition
          (pct_rhb × xwoba_vs_rhb + pct_lhb × xwoba_vs_lhb). Null when home starter
          platoon splits are null or when no away lineup batters have known handedness.

      - name: away_lineup_vs_home_starter_k_pct_adj
        description: >
          Weighted average of the home starter's prior-season K% platoon splits, weighted by
          away lineup handedness composition. Null when home starter platoon splits are null.

      - name: away_lineup_vs_home_starter_bb_pct_adj
        description: >
          Weighted average of the home starter's prior-season BB% platoon splits, weighted by
          away lineup handedness composition. Null when home starter platoon splits are null.

      - name: home_starter_avg_ip_last_3
        description: >
          Average decimal innings pitched by the home starter over their 3 most recent prior starts
          (any season, strictly < game_date). Proxy for expected depth and bullpen workload —
          a low value signals the bullpen is likely to throw more innings. Null when has_ip_history = false.

      - name: home_starter_avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start for the home starter, using
          only starts in the current season before this game. Stable seasonal baseline.
          Null when the starter has no same-season prior starts.

      - name: home_starter_has_ip_history
        description: >
          True when the home starter has at least one prior regular season start in the dataset.
          False for debut starters; use to distinguish null avg_ip values from missing data.

      - name: away_starter_avg_ip_last_3
        description: >
          Average decimal innings pitched by the away starter over their 3 most recent prior starts.
          Null when has_ip_history = false.

      - name: away_starter_avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start for the away starter.
          Null when the starter has no same-season prior starts.

      - name: away_starter_has_ip_history
        description: >
          True when the away starter has at least one prior regular season start in the dataset.
          False for debut starters.

      - name: is_day_game
        description: >
          True when the game is scheduled as a day game (day_night = 'day' from stg_statsapi_games).
          False for night games. Null for a small number of games where day_night is unavailable.

      - name: series_game_number
        description: >
          Position of this game within the current series (1, 2, 3, or 4+), from stg_statsapi_games.
          Relevant for bullpen deployment modeling — games 2 and 3 of a series deplete bullpens
          from prior outings. Non-null for all regular season games with schedule data.

      - name: home_win_rate_trailing_3yr
        description: >
          Trailing 3-year MLB-wide home team win rate ending the day before this game (strictly <
          game_date; leakage guard). Computed as avg(home_team_won) across all regular-season games
          in mart_game_results in the 3-year window. Notebook 01 confirmed home win rate declined
          from 0.548 (2020) to 0.519 (2023) — this rolling rate replaces any static 0.529 assumption.
          Null for early 2015 games with insufficient trailing history. Expected range for 2024: 0.519–0.535.

      - name: post_2022_rules
        description: >
          True for games in 2023 or later (game_year >= 2023). Flags the structural rule change era:
          shift ban, pitch clock, and universal DH took effect in 2023, producing a ~0.64-run per game
          scoring increase relative to 2022 (confirmed in Notebook 01). Use as an era interaction term
          or stratification variable in models spanning the 2022–2023 boundary.

      - name: home_win_prob_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across all bookmakers with pre-game
          h2h prices. Card 3.11 Brier benchmark: 0.2395 (2021–2025). Null when no
          bookmaker h2h coverage. Recommended primary training feature.

      - name: home_win_prob_sharp
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across sharp books (lowvig, betonlineag,
          bovada). Null when no sharp book has coverage. Diagnostic; not a recommended
          primary training feature (include_sharp_soft_features = False per Card 3.11).

      - name: home_win_prob_soft
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across soft books (draftkings, fanduel,
          betmgm, williamhill_us, betrivers). Null when no soft book has coverage.
          Diagnostic only; not recommended as primary training feature per Card 3.11.

      - name: sharp_soft_ml_delta
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          home_win_prob_sharp minus home_win_prob_soft. Null when either group has no
          coverage. Diagnostic only per Card 3.11.

      - name: ml_consensus_std
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Standard deviation of vig-adjusted home win probability across all bookmakers.
          Null when only one bookmaker has coverage.

      - name: market_bookmaker_count
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Count of bookmakers contributing to the h2h consensus. Null when has_odds = false.

      - name: total_line_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average over/under total line across bookmakers with totals coverage.
          Null when no totals coverage exists.

      - name: total_line_std
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Standard deviation of over/under line across bookmakers. Null when only one book
          has totals coverage.

      - name: over_prob_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted over probability across bookmakers with totals coverage.
          Null when no totals coverage exists.

  - name: feature_pregame_odds_features
    description: >
      Pre-game betting market features. One row per game_pk (regular season only).
      Integrates pre-game moneyline and totals odds from lowvig into the Phase 2
      feature store.

      Bookmaker selection (Step 0, 2026-04-23): lowvig has the lowest vig in both
      h2h (2.33% median) and totals (3.39% median) markets with ≥99% coverage in
      each. Runner-up betonlineag ties on h2h vig but trails on totals (4.71%).

      Leakage guard: only odds snapshots where ingestion_ts < commence_time are used.
      Most recent pre-game snapshot per (event_id, market_key, outcome_name) selected
      via ROW_NUMBER ordered by ingestion_ts desc.

      has_odds = true means an event_id was matched for this game in mart_game_odds_bridge
      (72–78% of regular season games, 2021–present). Odds price columns (moneyline,
      implied_prob, vig) are null when no pre-game lowvig snapshot exists — Card 3
      backfill covers 2023 (partial) and live 2026 only.

      Implied probability formula: raw_i = 1.0 / decimal_price_i; implied_prob_i =
      raw_i / sum(all_raw). By construction home + away = 1.0, over + under = 1.0.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_game_results')
                field: game_pk

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: has_odds
        description: >
          True when an event_id was matched in mart_game_odds_bridge. Does not
          guarantee that odds price columns are populated.
        tests:
          - not_null

      - name: home_implied_prob
        description: >
          Vig-adjusted home win probability from lowvig h2h market.
          raw_home / (raw_home + raw_away), raw_i = 1.0 / decimal_price_i.
          Null when no pre-game lowvig h2h snapshot exists for the event.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "home_implied_prob is not null"

      - name: away_implied_prob
        description: >
          Vig-adjusted away win probability. Sums with home_implied_prob to exactly 1.0.
          Null when no pre-game lowvig h2h snapshot exists for the event.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "away_implied_prob is not null"

      - name: total_market_vig
        description: >
          Overround on the h2h market: SUM(1/decimal) - 1 across both outcomes.
          Null when no pre-game lowvig h2h snapshot exists. Typically 0.02–0.03 for lowvig.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "total_market_vig is not null"

      - name: over_implied_prob
        description: >
          Vig-adjusted over probability from lowvig totals market.
          raw_over / (raw_over + raw_under). Null when no pre-game totals snapshot exists.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "over_implied_prob is not null"

      - name: under_implied_prob
        description: >
          Vig-adjusted under probability. Sums with over_implied_prob to exactly 1.0.
          Null when no pre-game totals snapshot exists.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
              config:
                where: "under_implied_prob is not null"

      - name: totals_market_vig
        description: >
          Overround on the totals (over/under) market: SUM(1/decimal) - 1.
          Null when no pre-game lowvig totals snapshot exists. Typically 0.03–0.04 for lowvig.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "totals_market_vig is not null"

      - name: home_win_prob_consensus
        description: >
          Average vig-adjusted home win probability across all bookmakers with
          pre-game h2h prices (source: mart_odds_consensus). Card 3.11 benchmark:
          Brier score = 0.2395 on 2021–2025. Null when has_odds = false or no
          bookmaker had pre-game h2h coverage. Recommended as a primary training
          feature (include_consensus_features = True per Card 3.11).

      - name: home_win_prob_sharp
        description: >
          Average vig-adjusted home win probability across sharp books only
          (lowvig, betonlineag, bovada — identified by Card 3.11 calibration).
          Null when no sharp book had pre-game h2h coverage. Present for
          diagnostics; not recommended as a primary training feature
          (include_sharp_soft_features = False per Card 3.11).

      - name: home_win_prob_soft
        description: >
          Average vig-adjusted home win probability across soft books only
          (draftkings, fanduel, betmgm, williamhill_us, betrivers). Null when
          no soft book had pre-game h2h coverage. Diagnostic column only;
          not recommended as a primary training feature per Card 3.11.

      - name: sharp_soft_ml_delta
        description: >
          home_win_prob_sharp minus home_win_prob_soft. Positive values indicate
          sharp books favor the home team more than soft books. Null when either
          sharp or soft group has no coverage. Diagnostic column only;
          not recommended as a primary training feature per Card 3.11.

      - name: ml_consensus_std
        description: >
          Standard deviation of vig-adjusted home win probability across all
          bookmakers. Captures cross-market disagreement. Null (not 0.0) when
          only one bookmaker has coverage. Source: mart_odds_consensus.

      - name: market_bookmaker_count
        description: >
          Count of bookmakers contributing to the h2h consensus for this event.
          Always >= 1 when non-null. Null when has_odds = false.
          Source: mart_odds_consensus.

      - name: total_line_consensus
        description: >
          Average over/under total runs line across all bookmakers with pre-game
          totals prices. Null when no bookmaker has totals coverage.
          Source: mart_odds_consensus.

      - name: total_line_std
        description: >
          Standard deviation of the over/under line across bookmakers. Null
          (not 0.0) when only one bookmaker has totals coverage.
          Source: mart_odds_consensus.

      - name: over_prob_consensus
        description: >
          Average vig-adjusted over probability across all bookmakers with
          pre-game totals prices. Null when no bookmaker has totals coverage.
          Source: mart_odds_consensus.

      - name: temp_f
        description: >
          Temperature at scheduled first pitch (degrees Fahrenheit).
          Sourced from feature_pregame_weather_features. Null for dome parks
          and games with no weather row in weather_raw.

      - name: wind_speed_mph
        description: >
          Wind speed at first pitch (mph). Null for dome parks and games
          with no weather data.

      - name: wind_direction_deg
        description: >
          Meteorological wind direction (degrees). 0/360 = wind from North,
          90 = wind from East. Null for dome parks.

      - name: wind_component_mph
        description: >
          Wind component along the home-plate-to-center-field axis (mph).
          Positive = wind blowing out toward CF (favors offense, increases runs).
          Negative = wind blowing in toward home plate (suppresses scoring).
          Computed as wind_speed_mph × cos(wind_direction_deg − park_facing_degrees).
          Null for dome parks (is_dome = true).

      - name: humidity_pct
        description: >
          Relative humidity at first pitch (percent). Null for dome parks
          and games with no weather data.

      - name: is_dome
        description: >
          True for games played in permanently enclosed dome parks (roof_type =
          'fixed'). False for open-air and convertible-roof parks. Used to
          distinguish NULL wind columns (dome) from genuinely missing weather
          data (outdoor parks with no row in weather_raw).

  - name: feature_pregame_weather_features
    description: >
      Pre-game weather features for MLB outdoor parks. Grain: one row per
      game_pk (games in weather_raw only). Dome parks have is_dome = TRUE
      and NULL wind_component_mph. Outdoor and convertible-roof parks have
      non-null wind_component_mph when coordinates and weather data are
      available. The fetch closest to first pitch is selected via QUALIFY
      on abs(fetch_offset_hours).

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: venue_id
        tests:
          - not_null

      - name: temp_f
        description: Temperature at first pitch (°F).

      - name: wind_speed_mph
        description: Wind speed (mph).

      - name: wind_direction_deg
        description: Meteorological wind direction (degrees). 0/360=from North.

      - name: wind_component_mph
        description: >
          Wind component along home-plate → CF axis. Positive = out (offense
          favored). Null for dome parks. Expected range −35 to +35 mph.

      - name: humidity_pct
        description: Relative humidity (percent).

      - name: is_dome
        description: True for fixed-roof dome parks; False for open/convertible.
        tests:
          - not_null
