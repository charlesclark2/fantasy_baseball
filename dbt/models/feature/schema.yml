version: 2

# ============================================================================
# Feature Layer — ML Pre-Game Feature Vectors
# ============================================================================
# Models in this folder materialize into baseball_data.betting_features in
# Snowflake (distinct from baseball_data.betting where mart models live).
#
# LEAKAGE RULE (enforced in every model — audited 2026-04-23):
#   1. Rolling window lookups: rs.game_date::date < game_date  (strictly <)
#   2. Platoon splits: game_year = year(game_date) - 1         (prior season)
#   3. Park run factors: prf.game_year = game_year - 1         (prior season)
#   4. Season record: record_date = game_date - 1              (day before)
#   No same-day data may appear in any feature. Violations invalidate the
#   training set. See data_quality/leakage_audit.md for the full code review
#   checklist and spot-check results (game_pk 777235, 2025-07-04).
#
# Grain: one row per game_pk (master assembly) or game_pk × side/team/starter
# depending on the model. See individual model descriptions below.
# ============================================================================

models:

  - name: feature_pregame_sub_model_signals
    description: >
      Wide-format sub-model signal view. One row per (game_pk, side) with one
      column per (signal_name, sub_model_version) pair. Built by pivoting
      mart_sub_model_signals using MAX(CASE WHEN) aggregation; only is_current=true
      rows are included. Joins offense_v1_signals and offense_v2_signals directly
      (dedicated tables, not through mart_sub_model_signals). Joins to
      feature_pregame_game_features on (game_pk, side). NULL values in any signal
      column mean signal_available=false for that game (out-of-window or sub-model
      not yet trained). Add new signal columns here as each sub-model Epic ships.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, side]

    columns:
      - name: game_pk
        description: Game identifier (primary join key).
        tests: [not_null]
      - name: side
        description: "'home' | 'away'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      # -----------------------------------------------------------------------
      # Run environment v4 (Epic 3D — champion; Ridge + NegBin)
      # -----------------------------------------------------------------------
      - name: run_env_mu_v4
        description: NegBin conditional mean run environment multiplier from run_env_v4.
      - name: run_env_mu_v4_uncertainty
        description: Uncertainty (80% PI width) for run_env_mu_v4.
      - name: run_env_mu_v4_available
        description: TRUE when run_env_mu_v4 is populated for this game.
      - name: run_env_dispersion_v4
        description: NegBin dispersion parameter r from run_env_v4 (constant per model run).
      - name: run_env_signal_v4
        description: Z-score of run_env_mu_v4 vs. season mean; primary downstream signal for run environment.
      - name: run_env_signal_v4_uncertainty
        description: Uncertainty (80% PI width) for run_env_signal_v4.
      - name: run_env_signal_v4_available
        description: TRUE when run_env_signal_v4 is populated.

      # -----------------------------------------------------------------------
      # Run environment v3 (deprecated; retained for continuity)
      # -----------------------------------------------------------------------
      - name: run_env_signal_v3
        description: Run environment signal from run_env_v3 (deprecated; superseded by v4).
      - name: environment_volatility_v3
        description: Volatility estimate from run_env_v3 (deprecated).

      # -----------------------------------------------------------------------
      # Offensive quality v1 (Epic 4 — LightGBM, bias-corrected; deprecated)
      # -----------------------------------------------------------------------
      - name: pred_runs_raw_v1
        description: Bias-corrected LightGBM run prediction from offense_v1 (CV mean bias −0.523 subtracted). Deprecated; superseded by v2.
      - name: runs_index_v1
        description: Offensive index from offense_v1; 100 = season league average predicted runs. Deprecated.
      - name: pred_runs_raw_v1_available
        description: TRUE when pred_runs_raw_v1 is populated.

      # -----------------------------------------------------------------------
      # Offensive quality v2 (Epic 4D — LightGBM+NegBin distributional; champion)
      # -----------------------------------------------------------------------
      - name: pred_runs_mu_v2
        description: NegBin conditional mean predicted runs scored per game-side from offense_v2. Primary distributional signal.
        tests:
          - not_null:
              config:
                severity: warn
      - name: pred_runs_dispersion_v2
        description: NegBin dispersion parameter r from offense_v2 (constant per model; r=3.4777). Used to reconstruct the full distribution.
        tests:
          - not_null:
              config:
                severity: warn
      - name: pred_runs_raw_v2
        description: Alias for pred_runs_mu_v2 (no bias correction in v2; NegBin mean used directly).
        tests:
          - not_null:
              config:
                severity: warn
      - name: pred_runs_uncertainty_v2
        description: 80% prediction interval width (hi−lo) from the NegBin distribution. Higher = less certain outcome.
        tests:
          - not_null:
              config:
                severity: warn
      - name: pred_runs_mu_v2_available
        description: TRUE when pred_runs_mu_v2 is populated for this game.
        tests: [not_null]

      # -----------------------------------------------------------------------
      # Epic 5 — Starter suppression signals v1
      # -----------------------------------------------------------------------
      - name: starter_suppression_mu_v1
        description: >
          Predicted mean xwOBA-against for this starter from starter_v1 (Normal distribution).
          Lower values indicate better expected suppression (e.g. 0.290 = elite; 0.340 = average).
          NULL for games before 2020 (Statcast xwOBA coverage) or where no probable pitcher is set.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_suppression_sigma_v1
        description: >
          Normal distribution standard deviation from starter_v1. For LightGBM champion, this is
          constant across all predictions (residual sigma from training); for NGBoost, it is
          per-row. Used with mu to construct the full predictive distribution over xwOBA-against.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_suppression_signal_v1
        description: >
          Z-score of starter_suppression_mu relative to the season mean. Negative values indicate
          better-than-average suppression; positive values indicate worse-than-average. Primary
          signal for comparing starters within a season context.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_uncertainty_v1
        description: >
          80% predictive interval width for starter xwOBA-against: 2 × 1.28 × sigma. Higher values
          indicate less certainty about the starter's quality (early season, IL returns, debut).
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_suppression_mu_v1_available
        description: TRUE when starter_v1 signals are populated for this game-side (2020+ regular season with a probable pitcher).
        tests: [not_null]

      # -----------------------------------------------------------------------
      # Epic 5D — Starter IP depth signals v1 (LightGBM+NegBin; outs units)
      # -----------------------------------------------------------------------
      - name: starter_ip_mu_v1
        description: >
          NegBin μ: LightGBM predicted mean outs recorded for this starter.
          Units are OUTS — divide by 3.0 to convert to innings pitched for display;
          keep as outs for NegBin CDF computations (e.g. 6D Candidate B).
          NULL before 2020 or where no probable pitcher is set.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_dispersion_v1
        description: >
          NegBin r (dispersion parameter) for starter outs recorded. Higher r = less
          overdispersion (more Poisson-like). Assigned per predicted-mean decile from training.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_signal_v1
        description: >
          Z-score of starter_ip_mu relative to the season-year mean. Positive = above-average
          expected depth; negative = below-average. Mean-zero by construction within each season.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_p80_outs_v1
        description: >
          80th-percentile outs recorded from NegBin posterior (optimistic depth scenario).
          Used with p20 to bound the expected bullpen exposure range.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_p20_outs_v1
        description: >
          20th-percentile outs recorded from NegBin posterior (pessimistic depth scenario).
          Key input to 6D Candidate B Stage 1: maximum bullpen exposure estimate under short outing.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_uncertainty_v1
        description: >
          80% NegBin predictive interval width: starter_ip_p80_outs − starter_ip_p20_outs.
          Higher values indicate greater uncertainty about how deep the starter will go.
        tests:
          - not_null:
              config:
                severity: warn
      - name: starter_ip_is_bulk_usage_v1
        description: >
          TRUE when starter_ip_mu < 9.0 outs (< 3 innings). Flags bulk or opener roles
          where the bullpen exposure model should not assume a full starter arc.
      - name: starter_ip_mu_v1_available
        description: TRUE when starter_ip_v1 signals are populated for this game-side (2020+ with a confirmed probable pitcher).
        tests: [not_null]

      # -----------------------------------------------------------------------
      # Bullpen distributional signals v2 (Epic 6D — LightGBM+NegBin; champion)
      # -----------------------------------------------------------------------
      - name: bullpen_mu_v2
        description: >
          NegBin μ: LightGBM predicted mean bullpen runs allowed per game-side.
          Primary v2 distributional signal. Mean ~2.04 runs; r=1.4474 (high overdispersion).
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_mu_v2_uncertainty
        description: 80% NegBin PI width for bullpen_mu_v2 (ppf(0.90) − ppf(0.10)).
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_mu_v2_available
        description: TRUE when eb_bullpen_coverage_pct ≥ 0.50 (EB posterior well-supported). NULL for pre-2021 game_pks that predate the backfill window.
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_dispersion_v2
        description: >
          NegBin dispersion parameter r = 1.4474 (constant per model; fit from all-data residuals).
          Lower r = higher overdispersion (r < 2 indicates heavy right tail).
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_dispersion_v2_available
        description: TRUE when eb_bullpen_coverage_pct ≥ 0.50. NULL for pre-2021 game_pks that predate the backfill window.
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_fatigue_adjusted_mu_v2
        description: >
          bullpen_mu_v2 × (eb_bullpen_xwoba / season_avg_xwoba). Multiplicative EB correction:
          teams with better-than-league-average xwOBA posteriors receive downward-adjusted
          expected runs (fewer runs allowed). Bounded ratio [0.1, 3.0] to cap extreme adjustments.
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_fatigue_adjusted_mu_v2_uncertainty
        description: Same 80% NegBin PI width as bullpen_mu_v2_uncertainty (r unchanged by EB correction).
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_fatigue_adjusted_mu_v2_available
        description: TRUE when eb_bullpen_coverage_pct ≥ 0.50. NULL for pre-2021 game_pks that predate the backfill window.
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_uncertainty_v2
        description: >
          80% NegBin predictive interval width: nbinom.ppf(0.90) − nbinom.ppf(0.10).
          Wider values indicate higher uncertainty about bullpen run outcomes. Blowout games
          (score_delta > 5) show ~15% wider PI than close games (5.53 vs 4.81).
        tests:
          - not_null:
              config:
                severity: warn
      - name: bullpen_uncertainty_v2_available
        description: TRUE when eb_bullpen_coverage_pct ≥ 0.50. NULL for pre-2021 game_pks that predate the backfill window.
        tests:
          - not_null:
              config:
                severity: warn

      # -----------------------------------------------------------------------
      # Epics 8 (placeholder — NULL until those epics ship)
      # -----------------------------------------------------------------------
      - name: matchup_advantage_signal_v1
        description: Batter-archetype vs. pitcher-archetype advantage signal from matchup_v1 (Epic 8). NULL until Epic 8 ships.

      - name: test_signal_v1
        description: Synthetic validation signal inserted during Story 2.1 smoke test. Remove column after validation is confirmed.

  - name: feature_pregame_injury_status
    description: >
      SCD-2 store for player injury/IL status. One row per distinct status period per
      player_id. Promoted from stg_statsapi_player_injury_status with standard SCD-2
      columns (valid_from, valid_to, is_current, record_hash, computed_at).
      Coverage: player_transactions inception (2021-03-01+). Full history available.
      DDL: managed by dbt (table materialization; full rebuild from stg on each run).
      Point-in-time join: valid_from <= :ts AND (valid_to > :ts OR valid_to IS NULL).
      Natural key: (player_id, valid_from).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [player_id, valid_from]

    columns:
      - name: player_id
        description: MLBAM player ID.
        tests: [not_null]

      - name: valid_from
        description: >
          Start of the status interval (status_start_date cast to TIMESTAMP_NTZ midnight).
          Equals the effective_date (or transaction_date if effective_date is null)
          of the IL placement or activation event.
        tests: [not_null]

      - name: valid_to
        description: >
          End of the status interval (status_end_date cast to TIMESTAMP_NTZ midnight).
          NULL for the current/open-ended status row.

      - name: is_current
        description: TRUE for the most recent (open-ended) status row per player.
        tests: [not_null]

      - name: is_injured
        description: >
          TRUE = player is on IL / paternity / bereavement list.
          FALSE = player returned or was activated.
          No row = treat as available (COALESCE to false in consumer).
        tests: [not_null]

      - name: record_hash
        description: MD5 of is_injured; present for audit/diff consistency with other SCD-2 tables.
        tests: [not_null]

      - name: computed_at
        description: Timestamp when this row was written (sysdate() at dbt run time).
        tests: [not_null]

  - name: feature_pregame_lineup_features
    description: >
      Pre-game batting lineup features for ML. One row per game_pk × side (home/away).
      Aggregates rolling batter stats (30-day and season-to-date) and prior-season
      platoon splits across all 9 lineup slots. All rolling stat joins use
      game_date < official_date (strictly less than) to prevent data leakage.
      Platoon splits use the prior season (game_year - 1) to prevent in-season leakage.
      Nulls are expected for games at or near the start of each season (no prior
      game-date rows yet in rolling stats) and for 2015 games (no 2014 platoon data).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, side]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: has_full_lineup
        tests:
          - not_null

      - name: lhb_count
        tests:
          - not_null

      - name: rhb_count
        tests:
          - not_null

      - name: avg_woba_30d
        description: >
          Average 30-day rolling wOBA across all lineup slots with pre-game data.
          Null when no batter in the lineup has a prior game-date row (e.g. Opening Day 2015).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_xwoba_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_std
        description: Season-to-date rolling wOBA average across lineup. Null early in each season.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_vs_lhp
        description: >
          Average prior-season wOBA vs LHP across lineup. Null for 2015 games (no 2014 data)
          and for any batter with no prior-season appearance in mart_batter_vs_handedness_splits.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: avg_woba_vs_rhp
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: catcher_framing_runs
        description: >
          CFraming blended (70% current + 30% prior) and regressed toward 0 for
          catchers with < 60 innings. 0 = league average. Source: FanGraphs.
          Imputed to 0 when catcher cannot be identified from lineup data.
      - name: catcher_defensive_runs
        description: >
          FRP blended and regressed. Total catcher defensive value (framing +
          blocking + arm + range). Source: FanGraphs.
          Imputed to 0 when catcher cannot be identified from lineup data.
          Card 8.K.
        tests:
          - not_null

      - name: avg_eb_woba
        description: >
          Average EB posterior wOBA across all 9 lineup slots. Null when
          compute_lineup_posteriors.py has not yet been run for this game_pk.
          Blends prior × ZiPS × current-season data (Epic 4A).

      - name: avg_eb_k_pct
        description: >
          Average EB posterior K% across all 9 lineup slots. Same null pattern
          as avg_eb_woba. Blends prior × ZiPS × current-season data.

      - name: avg_eb_bb_pct
        description: >
          Average EB posterior BB% across all 9 lineup slots. Same null pattern
          as avg_eb_woba.

      - name: avg_eb_iso
        description: >
          Average EB posterior ISO (Normal-Normal conjugate) across all 9 lineup
          slots. Same null pattern as avg_eb_woba.

      - name: avg_eb_woba_uncertainty
        description: >
          Average posterior standard deviation of the EB wOBA estimate across
          lineup slots. Higher values indicate lower data confidence (early season,
          new players). Same null pattern as avg_eb_woba.

      - name: eb_coverage_pct
        description: >
          Fraction of the 9 lineup slots with a non-null EB wOBA posterior.
          0.0 when compute_lineup_posteriors.py has not been run for this game_pk.
          COALESCE(ea.eb_coverage_pct, 0.0) in the final CTE makes this not-null.
        tests:
          - not_null

      - name: posterior_source
        description: >
          Least-informed-wins aggregation of per-slot posterior_source from
          eb_batter_posteriors_raw across all 9 lineup slots. Values: 'sequential'
          (all slots have in-season sequential updates), 'season_eb' (≥1 slot is
          early-season EB only), 'prior_only' (≥1 slot has no in-season PA).
          NULL for pre-2021 games (no sequential backfill). Used as an OHE feature
          in the Epic 16B.1 seq-challenger retrain; NULL maps to __NA__ in the
          trainer. (Epic 16B.1)

      - name: n_power_pull
        description: >
          Count of lineup slots assigned to the power_pull batter archetype (prior season).
          COALESCEd to 0 — 0 is valid when no batter in the lineup had a prior-season power_pull assignment.
          Story 7.4; leakage guard: batter_clusters joined on season = game_year - 1.
        tests:
          - not_null

      - name: n_patient_obp
        description: >
          Count of lineup slots assigned to the patient_obp batter archetype (prior season).
          COALESCEd to 0. Same leakage guard as n_power_pull.
        tests:
          - not_null

      - name: n_high_whiff
        description: >
          Count of lineup slots assigned to the high_whiff batter archetype (prior season).
          COALESCEd to 0. Same leakage guard as n_power_pull.
        tests:
          - not_null

      - name: n_groundball_speed
        description: >
          Count of lineup slots assigned to the groundball_speed batter archetype (prior season).
          COALESCEd to 0. Same leakage guard as n_power_pull.
        tests:
          - not_null

      - name: n_contact_spray
        description: >
          Count of lineup slots assigned to the contact_spray batter archetype (prior season).
          COALESCEd to 0. Same leakage guard as n_power_pull.
        tests:
          - not_null

      - name: n_no_label
        description: >
          Count of lineup slots where the batter has no prior-season archetype assignment
          (rookies, debuts, or players not in batter_clusters for season = game_year - 1).
          COALESCEd to 9 (all slots unlabeled) when no archetype data is available for the game.
          n_power_pull + n_patient_obp + n_high_whiff + n_groundball_speed + n_contact_spray +
          n_no_label = 9 for a full lineup; may be < 9 when lineup slots contain null batter_ids.
        tests:
          - not_null

  - name: feature_pregame_starter_status
    description: >
      SCD-2 table tracking projected starter changes for each team per game.
      Grain: one row per (game_pk, side, valid_from) — a new row is inserted each
      time the probable_pitcher_id changes between ingestion snapshots.

      Point-in-time join pattern (use is_current = false for historical replay):
        ON  ss.game_pk    = game_pk
        AND ss.side       = side
        AND ss.valid_from <= :prediction_ts
        AND (ss.valid_to  > :prediction_ts OR ss.valid_to IS NULL)

      Coverage: full history from monthly_schedule inception. SCD-2 temporal
      resolution only available post-Epic-T (2026-05-12). Pre-Epic-T rows carry
      sentinel valid_from = 1970-01-01 and represent a single "first known state"
      with no change history.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, side, valid_from]
    columns:
      - name: game_pk
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']
      - name: valid_from
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: record_hash
        tests: [not_null]
      - name: computed_at
        tests: [not_null]

  - name: feature_pregame_starter_features
    description: >
      Pre-game starting pitcher features for ML. One row per game_pk × pitcher_id.
      Only includes games with a confirmed probable pitcher (null starter_player_id
      rows from feature_pregame_starter_status are excluded). The master assembly
      LEFT JOINs this model to detect missing starters.
      All rolling stat joins use game_date::date < pp.game_date (strictly less than).
      Platoon splits use the prior season (game_year - 1) to prevent in-season leakage.
      Nulls expected for debut pitchers (has_starter_data = false), 2015 Opening Day
      (no prior-season platoon data), and early-season games (limited rolling history).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, pitcher_id]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: pitcher_id
        tests:
          - not_null

      - name: has_starter_data
        description: >
          False when the pitcher has no prior Statcast history (e.g. MLB debut or first
          season before our 2015 data cutoff). True for all pitchers with at least one
          prior regular-season game appearance in mart_pitcher_rolling_stats.
        tests:
          - not_null

      - name: days_rest
        description: >
          Days since the pitcher's most recent start (from mart_starting_pitcher_game_log).
          Uses starts only — relief appearances do not reset the clock.
          Null when no prior starts exist in the dataset (first career start, or first
          start in our 2015+ data window).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: k_pct_30d
        description: >
          30-day rolling K% (strikeouts / batters faced) allowed. Null for debut
          pitchers or when no prior-game data exists within the window.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: xwoba_against_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: xwoba_vs_lhb
        description: >
          Prior-season xwOBA against vs LHB. Null for 2015 starters (no 2014 data)
          and for any pitcher who had no prior-season appearances (injury, minor leagues,
          or debut). Approximately 22% null across the full 2015-present dataset.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 20000"

      - name: xwoba_vs_rhb
        description: Prior-season xwOBA against vs RHB. Same null pattern as xwoba_vs_lhb.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 20000"

      - name: k_pct_7d_minus_std
        description: >
          Starter K% momentum: 7-day rolling K% minus season-to-date K%.
          Positive values indicate the pitcher is striking out batters at a higher rate recently
          than their season baseline. Notebook 03 found starter K% has the largest window effect
          (29% correlation increase from 7-day to STD), making this spread a meaningful velocity signal.
          Null when either the 7-day or STD window is null (debut pitchers, early-season).

      - name: xwoba_7d_minus_std
        description: >
          Starter xwOBA-against momentum: 7-day rolling xwOBA allowed minus season-to-date xwOBA allowed.
          Positive values indicate the pitcher is allowing harder expected contact recently than baseline.
          Null when either the 7-day or STD window is null (debut pitchers, early-season).

      - name: appearances_30d
        description: >
          Number of pitcher appearances (starts) in the 30-day rolling window ending the day before the game.
          Indicates sample size reliability for 30-day rolling stats — a value of 3 means only 3 starts
          contributed to those estimates. Null for debut pitchers with no prior Statcast history.

      - name: appearances_std
        description: >
          Number of pitcher appearances (starts) in the season-to-date window ending the day before the game.
          Indicates sample size reliability for season-to-date rolling stats. Zero is valid for a pitcher's
          first game of the season. Null for debut pitchers with no prior Statcast history.

      - name: avg_ip_last_3
        description: >
          Average decimal innings pitched over the starter's 3 most recent prior starts (any season),
          computed from outs_recorded / 3.0 for proper decimal averaging. A value of 4.67 means the
          starter averaged 4 full innings and 2 outs over their last 3 outings. Null when the starter
          has no prior starts in the dataset (has_ip_history = false).

      - name: avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start, using only starts in the current
          season before this game (< game_date). Null for debut starters and pitchers making their
          first start of the season. Provides a stable seasonal baseline relative to avg_ip_last_3.

      - name: has_ip_history
        description: >
          True when the pitcher has at least one prior regular season start in the dataset before
          this game (any season). False for debut starters. Used as a filter flag to distinguish
          null avg_ip_* values due to missing data from null due to first-career-start nullability.

      - name: eb_xwoba_against
        description: >
          Empirical Bayes posterior mean xwOBA-against for this starter going into the game.
          Normal-Normal conjugate shrinkage toward an experience-band prior (u25/a25/a30/a33).
          Leakage guard baked in at write time: only current-season starts strictly before
          the game date are used. Null for games before 2016 or starters not listed as
          probable at EB compute time.

      - name: eb_k_pct
        description: >
          Empirical Bayes posterior mean K% (strikeouts / batters faced) for this starter.
          Same conjugate shrinkage and leakage guard as eb_xwoba_against.

      - name: eb_bb_pct
        description: >
          Empirical Bayes posterior mean BB% (walks / batters faced) for this starter.
          Same conjugate shrinkage and leakage guard as eb_xwoba_against.

      - name: eb_xwoba_uncertainty
        description: >
          Posterior standard deviation of the xwOBA-against estimate. Larger values indicate
          the estimate is closer to the prior (fewer observed batters faced). Useful as a
          confidence weight when combining EB features with raw rolling stats.

      - name: eb_data_source
        description: >
          Label describing which estimation path was used.
          'prior_only': pitcher had zero batters faced this season (debut or season start);
          estimate equals the prior mean.
          'il_return_blend': pitcher had fewer than 3 current-season starts but ≥ 10
          prior-season starts; estimate is 50% current-season EB posterior + 50% prior-season
          observed rate.
          'full_eb': standard EB posterior with prior shrinkage applied to current-season data.

      - name: posterior_source
        description: >
          Per-pitcher sequential posterior source from eb_starter_posteriors.
          Values: 'sequential' (in-season sequential updates applied), 'season_eb'
          (early-season EB only, no sequential update yet), 'prior_only' (no in-season
          appearances; estimate equals prior). NULL for pre-2021 games (no sequential
          backfill). Used as an OHE feature in the Epic 16B.3 seq-challenger retrain;
          NULL maps to __NA__ in the trainer. (Epic 16B.3)

      - name: starter_pitcher_archetype
        description: >
          Pitcher archetype cluster label from statsapi.pitcher_clusters.
          Prefers season = game_year - 1; falls back to season = game_year - 2 when
          the prior season is unavailable (injury absence, COVID-2020 data thinness).
          Possible values: power_swing_and_miss, changeup_deceptive, contact_sinker_ball,
          multi_pitch_mix, soft_command.
          NULL for true rookies with no MLB cluster assignment in either prior season.
          Story 7.4; both lookbacks are leakage-safe (strictly prior seasons).
          Achieved coverage: ~83% for 2021+ games (ceiling set by true rookies).

  - name: feature_pregame_team_features
    description: >
      Pre-game team context features for ML. One row per game_pk × team_abbrev
      (home and away). Joins rolling offense, rolling pitching, platoon splits,
      season win%, bullpen workload, bullpen effectiveness, and schedule context
      (days rest, game frequency, home/away streak, timezone travel) into a
      single team context row.
      All rolling stat joins use game_date::date < spine.game_date::date
      (strictly less than) to prevent data leakage. Season record joins on
      record_date = game_date - 1. Bullpen workload and effectiveness use
      internal '1 day preceding' upper bounds and are joined on game_pk.
      Schedule context is joined on game_pk + team_abbrev — no leakage risk
      as all values look strictly backward from game_date.
      Nulls expected for Opening Day (no prior season record), early-season
      games (limited rolling history), and teams in their first game of the
      2015 data window (no prior rolling stats row).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, team_abbrev]

    columns:
      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: team_abbrev
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: off_woba_30d
        description: >
          30-day rolling team wOBA (offense). Null for teams with no prior game
          in the 30-day window (Opening Day, early-season games).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: off_xwoba_30d
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: pit_xwoba_against_30d
        description: >
          30-day rolling team xwOBA allowed (pitching). Null for same early-season pattern.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: win_pct
        description: >
          Team win percentage as of the day before the game (from mart_team_season_record).
          Null for Opening Day games (no record yet on game_date - 1).
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: days_rest
        description: >
          Days since this team's previous game (from mart_team_schedule_context).
          Null for the first game of each season. 0 for game 2 of a doubleheader.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: games_last_7d
        description: Games this team played in the 7 calendar days before this game.
        tests:
          - not_null

      - name: games_last_14d
        description: Games this team played in the 14 calendar days before this game.
        tests:
          - not_null

      - name: consecutive_home_games
        description: Length of current home stand including this game. Null when away.

      - name: consecutive_away_games
        description: Length of current road trip including this game. Null when home.

      - name: tz_changed_from_last_game
        description: >
          True when the team traveled across timezone boundaries since their last game.
          False on Opening Day and when venue data is unavailable.
        tests:
          - not_null

      - name: off_woba_7d_minus_30d
        description: >
          Team offense momentum: 7-day rolling wOBA minus 30-day rolling wOBA.
          Positive values indicate the team is hitting better recently than their baseline.
          Null when either window is null (early-season games with insufficient history).

      - name: pit_xwoba_7d_minus_30d
        description: >
          Team pitching momentum: 7-day rolling xwOBA allowed minus 30-day rolling xwOBA allowed.
          Positive values indicate the pitching staff is allowing harder contact recently than baseline.
          Null when either window is null (early-season games with insufficient history).

      - name: off_games_played_7d
        description: >
          Number of team games played in the 7-day rolling window ending the day before the game.
          Indicates sample size reliability for 7-day offensive rolling stats — low values
          (0–2) mean early-season estimates are noisy. Null when no prior rolling offense row exists.

      - name: off_games_played_14d
        description: >
          Number of team games played in the 14-day rolling window ending the day before the game.
          Indicates sample size reliability for 14-day offensive rolling stats.
          Null when no prior rolling offense row exists.

      - name: off_games_played_30d
        description: >
          Number of team games played in the 30-day rolling window ending the day before the game.
          Indicates sample size reliability for 30-day offensive rolling stats — notebook 03 confirmed
          pitching feature |r| was 48% lower in the 0–10 game bucket vs. the 30+ game bucket.
          Null when no prior rolling offense row exists.

      - name: off_games_played_std
        description: >
          Number of team games played season-to-date ending the day before the game.
          Indicates sample size reliability for season-to-date offensive rolling stats.
          Null when no prior rolling offense row exists.

  - name: feature_pregame_park_features
    description: >
      Pre-game park context features for ML. One row per game_pk (regular season only).
      Joins physical park characteristics (dimensions, elevation, surface, roof type)
      from stg_statsapi_venues and empirical run factors from mart_park_run_factors.
      Park run factors use game_year - 1 (prior season) to prevent in-season leakage.
      Nulls are expected in park_run_factor_3yr for 2015 games (no 2014 data in the
      dataset) and for venues with fewer than 10 games in the prior season.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: venue_id
        description: >
          Null for a small number of games where venue data is missing from
          stg_statsapi_games. These games will have null for all venue-derived columns.
        tests:
          - not_null:
              config:
                warn_if: ">= 10"
                error_if: ">= 500"

      - name: elevation_ft
        description: >
          Park elevation in feet above sea level. Null when venue_id is null or
          when the venue record has no elevation in the Stats API.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: center_ft
        description: Center field distance in feet. Null when venue_id is missing.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: runs_per_game_at_park
        description: >
          Prior-season average total runs per game at this venue (both teams combined).
          Null for 2015 games (no 2014 history) and for venues with fewer than 10
          games in the prior season.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: park_run_factor_3yr
        description: >
          3-year rolling average of runs_per_game_at_park ending in game_year - 1.
          Null for 2015 games (no prior data), and for any year where the venue
          has fewer than 10 games in the prior season (mart_park_run_factors
          excludes those rows). ~30 teams × 1 first season = ~2,430 null rows
          expected across the dataset.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: eb_hr_factor
        description: >
          EB-smoothed HR park factor (ratio; 1.0 = league average) from
          mart_park_factors_granular, joined on game_year - 1. Null before
          the 2016 season (no Savant data) and for venues not covered by
          the Savant park factors page.

      - name: eb_doubles_triples_factor
        description: >
          EB-smoothed 2B+3B combined park factor (ratio; geometric mean of
          2B and 3B Savant indices). game_year - 1 leakage guard.

      - name: eb_singles_factor
        description: EB-smoothed 1B park factor ratio. game_year - 1 leakage guard.

      - name: eb_bb_factor
        description: EB-smoothed walk park factor ratio. game_year - 1 leakage guard.

      - name: eb_so_factor
        description: EB-smoothed strikeout park factor ratio. game_year - 1 leakage guard.

      - name: eb_woba_factor
        description: EB-smoothed wOBA park factor ratio. game_year - 1 leakage guard.

      - name: park_granular_n_pa
        description: Total PAs in the 3yr Savant rolling window for the prior season.

  - name: feature_pregame_park_status
    description: >
      SCD-2 table for park factors. Grain: one row per (venue_id, season).
      Natural key: (venue_id, season) — park factors update once per season.
      valid_from = first regular-season game at this venue for the season.
      valid_to   = first game of next season at this venue; null for venues active
      in the current season (is_current = true). Retired venues get valid_to =
      season_close + 1 day so they are never mis-flagged as is_current.
      Hash: MD5(eb_park_run_factor, elevation_ft, center_ft, roof_type).
      No snapshot staging — source mart_eb_park_factors is already at annual grain.
      feature_pregame_park_features NOT re-pointed (game_year-1 join is correct).

    columns:
      - name: venue_id
        description: MLB Stats API venue identifier.
        tests: [not_null]
      - name: season
        description: Season year (integer).
        tests: [not_null]
      - name: valid_from
        description: First regular-season game date at this venue for the season.
        tests: [not_null]
      - name: valid_to
        description: First game of next season at this venue; null for the current active season.
      - name: is_current
        description: True for venues active in the current season (valid_to is null).
        tests: [not_null]
      - name: record_hash
        description: MD5 of (eb_park_run_factor, elevation_ft, center_ft, roof_type).
        tests: [not_null]
      - name: computed_at
        description: Wall-clock timestamp when this SCD-2 row was materialized.
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [venue_id, season]

  - name: feature_pregame_game_features
    description: >
      Master pre-game ML feature surface (public name). One row per game_pk (regular
      season only). Story 27.7: this is now a THIN wrapper over
      feature_pregame_game_features_raw (the heavy assembly) that passes every raw
      column through unchanged and ADDS a season-normalized `<col>_seasonnorm` version
      of each contact-quality feature (the contact->runs conversion regime fix). The
      season-norm columns z-score each contact feature against a strictly-prior, AS-OF
      league baseline (feature_league_contact_baseline). Raw columns are retained.

      Joins all four upstream feature tables into a single wide row per game:
        - feature_pregame_lineup_features   (home_ / away_ prefix)
        - feature_pregame_starter_features  (home_starter_ / away_starter_ prefix)
        - feature_pregame_team_features     (home_ / away_ prefix, retains off_/pit_/bp_ sub-prefixes)
        - feature_pregame_park_features     (no prefix — game-level)
      Row count matches mart_game_results (regular season). Missing features produce
      nulls; no rows are dropped.

      has_full_data = true when: home_has_full_lineup AND away_has_full_lineup AND
      home_starter_has_starter_data AND away_starter_has_starter_data AND
      runs_per_game_at_park IS NOT NULL. Use this flag to select the data-complete
      training subset for EDA and ML.

      Training set size (has_full_data = true) by season — verified 2026-04-23:
        SELECT game_year, count(*) AS games
        FROM baseball_data.betting_features.feature_pregame_game_features
        WHERE has_full_data = true
        GROUP BY game_year
        ORDER BY game_year;

      Results as of 2026-04-23:
        2015:    0  (no prior-season run factor; all rows has_full_data = false)
        2016: 2364
        2017: 2288
        2018: 1953  (shortened season — CBA postponements)
        2019: 2363
        2020:  801  (COVID 60-game season)
        2021: 2320
        2022: 2377
        2023: 2371
        2024: 2369
        2025: 2228  (season in progress at audit date)
        2026:  351  (season in progress at audit date)
        Total (2016–2025 complete seasons): ~23,444 games

      Row count parity (verified 2026-04-23):
        feature_pregame_game_features: 25,146 rows
        mart_game_results (game_type = 'R'): 25,146 rows

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk]

    columns:
      - name: game_pk
        tests:
          - not_null
          - unique

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: home_team
        tests:
          - not_null

      - name: away_team
        tests:
          - not_null

      - name: has_full_data
        description: >
          True when both lineups are confirmed full (9 batters), both starters
          have prior Statcast history (has_starter_data = true), and the park
          has a prior-season run factor (runs_per_game_at_park is not null).
          False when any of these conditions is unmet (Opening Day, debut
          pitchers, 2015 games, missing probable pitcher data).
          Use WHERE has_full_data = true to select the data-complete training subset.
        tests:
          - not_null

      - name: has_odds
        description: >
          True when an event_id was matched in mart_game_odds_bridge for this game.
          Does NOT guarantee that odds price columns are populated — Card 3 historical
          backfill covers only 2023 (226 events) and live 2026. Intentionally excluded
          from has_full_data: odds are an optional feature block.
        tests:
          - not_null

      # ── Team sequential Bayesian beliefs (Epic 16.3) ──────────────────────────
      - name: home_team_sequential_woba
        description: >
          Home team's sequential offensive belief — the off_xwoba posterior ENTERING
          this game (prior_mu = posterior after the team's previous game, so it is
          leakage-safe). Tracks within-season run-environment drift the static
          rolling/EB features miss. Non-null for all 2021+ regular-season games (a
          team's season opener carries the cold-start league prior ≈0.324).
        tests:
          # Populated for ~all 2021+ games; tolerates the small recency lag (recent
          # games not yet in team_sequential_posteriors) + rare win_prob gaps
          # (NULL home_team_won). A systematic join/abbrev break would tank this.
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.97
              config:
                where: "game_year >= 2021"
      - name: away_team_sequential_woba
        description: >
          Away team's sequential offensive belief (off_xwoba prior_mu, leakage-safe
          pre-game). See home_team_sequential_woba.
        tests:
          # Populated for ~all 2021+ games; tolerates the small recency lag (recent
          # games not yet in team_sequential_posteriors) + rare win_prob gaps
          # (NULL home_team_won). A systematic join/abbrev break would tank this.
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.97
              config:
                where: "game_year >= 2021"
      - name: home_team_sequential_bullpen_xwoba
        description: >
          Home bullpen sequential xwOBA-against belief (prior_mu, leakage-safe). May
          be null for the most recent games until the bullpen posterior catches up
          (reliever identification via eb_bullpen membership lags ~3 days).
      - name: away_team_sequential_bullpen_xwoba
        description: >
          Away bullpen sequential xwOBA-against belief (prior_mu). Same ~3-day lag
          caveat as home_team_sequential_bullpen_xwoba.
      - name: home_team_sequential_win_prob
        description: >
          Home team Beta-Binomial win-probability posterior entering this game
          (prior_mu — the Pythagorean-win analogue). Non-null for 2021+ games
          (cold-start Beta(4,4)=0.500 on the season opener).
        tests:
          # Populated for ~all 2021+ games; tolerates the small recency lag (recent
          # games not yet in team_sequential_posteriors) + rare win_prob gaps
          # (NULL home_team_won). A systematic join/abbrev break would tank this.
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.97
              config:
                where: "game_year >= 2021"
      - name: away_team_sequential_win_prob
        description: >
          Away team Beta-Binomial win-probability posterior (prior_mu). See
          home_team_sequential_win_prob.
        tests:
          # Populated for ~all 2021+ games; tolerates the small recency lag (recent
          # games not yet in team_sequential_posteriors) + rare win_prob gaps
          # (NULL home_team_won). A systematic join/abbrev break would tank this.
          - dbt_utils.not_null_proportion:
              arguments:
                at_least: 0.97
              config:
                where: "game_year >= 2021"

      - name: home_lineup_vs_away_starter_xwoba_adj
        description: >
          Weighted average of the away starter's prior-season xwOBA-against platoon splits,
          weighted by the home lineup's handedness composition
          (pct_rhb × xwoba_vs_rhb + pct_lhb × xwoba_vs_lhb). Captures the three-way
          interaction of lineup composition × starter hand × platoon split that tree models
          are unlikely to discover from the raw components alone. Null when away starter
          platoon splits are null (debut pitcher, first-season gap) or when no lineup batters
          have known handedness.

      - name: home_lineup_vs_away_starter_k_pct_adj
        description: >
          Weighted average of the away starter's prior-season K% platoon splits, weighted by
          home lineup handedness composition. Null when away starter platoon splits are null.

      - name: home_lineup_vs_away_starter_bb_pct_adj
        description: >
          Weighted average of the away starter's prior-season BB% platoon splits, weighted by
          home lineup handedness composition. Null when away starter platoon splits are null.

      - name: away_lineup_vs_home_starter_xwoba_adj
        description: >
          Weighted average of the home starter's prior-season xwOBA-against platoon splits,
          weighted by the away lineup's handedness composition
          (pct_rhb × xwoba_vs_rhb + pct_lhb × xwoba_vs_lhb). Null when home starter
          platoon splits are null or when no away lineup batters have known handedness.

      - name: away_lineup_vs_home_starter_k_pct_adj
        description: >
          Weighted average of the home starter's prior-season K% platoon splits, weighted by
          away lineup handedness composition. Null when home starter platoon splits are null.

      - name: away_lineup_vs_home_starter_bb_pct_adj
        description: >
          Weighted average of the home starter's prior-season BB% platoon splits, weighted by
          away lineup handedness composition. Null when home starter platoon splits are null.

      - name: home_starter_avg_ip_last_3
        description: >
          Average decimal innings pitched by the home starter over their 3 most recent prior starts
          (any season, strictly < game_date). Proxy for expected depth and bullpen workload —
          a low value signals the bullpen is likely to throw more innings. Null when has_ip_history = false.

      - name: home_starter_avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start for the home starter, using
          only starts in the current season before this game. Stable seasonal baseline.
          Null when the starter has no same-season prior starts.

      - name: home_starter_has_ip_history
        description: >
          True when the home starter has at least one prior regular season start in the dataset.
          False for debut starters; use to distinguish null avg_ip values from missing data.

      - name: away_starter_avg_ip_last_3
        description: >
          Average decimal innings pitched by the away starter over their 3 most recent prior starts.
          Null when has_ip_history = false.

      - name: away_starter_avg_ip_season
        description: >
          Season-to-date average decimal innings pitched per start for the away starter.
          Null when the starter has no same-season prior starts.

      - name: away_starter_has_ip_history
        description: >
          True when the away starter has at least one prior regular season start in the dataset.
          False for debut starters.

      - name: is_day_game
        description: >
          True when the game is scheduled as a day game (day_night = 'day' from stg_statsapi_games).
          False for night games. Null for a small number of games where day_night is unavailable.

      - name: series_game_number
        description: >
          Position of this game within the current series (1, 2, 3, or 4+), from stg_statsapi_games.
          Relevant for bullpen deployment modeling — games 2 and 3 of a series deplete bullpens
          from prior outings. Non-null for all regular season games with schedule data.

      - name: home_win_rate_trailing_3yr
        description: >
          Trailing 3-year MLB-wide home team win rate ending the day before this game (strictly <
          game_date; leakage guard). Computed as avg(home_team_won) across all regular-season games
          in mart_game_results in the 3-year window. Notebook 01 confirmed home win rate declined
          from 0.548 (2020) to 0.519 (2023) — this rolling rate replaces any static 0.529 assumption.
          Null for early 2015 games with insufficient trailing history. Expected range for 2024: 0.519–0.535.

      - name: post_2022_rules
        description: >
          True for games in 2023 or later (game_year >= 2023). Flags the structural rule change era:
          shift ban, pitch clock, and universal DH took effect in 2023, producing a ~0.64-run per game
          scoring increase relative to 2022 (confirmed in Notebook 01). Use as an era interaction term
          or stratification variable in models spanning the 2022–2023 boundary.

      - name: home_win_prob_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across all bookmakers with pre-game
          h2h prices. Card 3.11 Brier benchmark: 0.2395 (2021–2025). Null when no
          bookmaker h2h coverage. Recommended primary training feature.

      - name: home_win_prob_sharp
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across sharp books (lowvig, betonlineag,
          bovada). Null when no sharp book has coverage. Diagnostic; not a recommended
          primary training feature (include_sharp_soft_features = False per Card 3.11).

      - name: home_win_prob_soft
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted home win probability across soft books (draftkings, fanduel,
          betmgm, williamhill_us, betrivers). Null when no soft book has coverage.
          Diagnostic only; not recommended as primary training feature per Card 3.11.

      - name: sharp_soft_ml_delta
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          home_win_prob_sharp minus home_win_prob_soft. Null when either group has no
          coverage. Diagnostic only per Card 3.11.

      - name: ml_consensus_std
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Standard deviation of vig-adjusted home win probability across all bookmakers.
          Null when only one bookmaker has coverage.

      - name: market_bookmaker_count
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Count of bookmakers contributing to the h2h consensus. Null when has_odds = false.

      - name: total_line_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average over/under total line across bookmakers with totals coverage.
          Null when no totals coverage exists.

      - name: total_line_std
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Standard deviation of over/under line across bookmakers. Null when only one book
          has totals coverage.

      - name: over_prob_consensus
        description: >
          Passed through from feature_pregame_odds_features (source: mart_odds_consensus).
          Average vig-adjusted over probability across bookmakers with totals coverage.
          Null when no totals coverage exists.

      - name: temp_f
        description: >
          Temperature at scheduled first pitch (degrees Fahrenheit).
          Sourced from feature_pregame_weather_features. Null for dome parks
          and games with no weather row in weather_raw.

      - name: wind_speed_mph
        description: >
          Wind speed at first pitch (mph). Null for dome parks and games
          with no weather data.

      - name: wind_direction_deg
        description: >
          Meteorological wind direction (degrees). 0/360 = wind from North,
          90 = wind from East. Null for dome parks.

      - name: wind_component_mph
        description: >
          Wind component along the home-plate-to-center-field axis (mph).
          Positive = wind blowing out toward CF (favors offense, increases runs).
          Negative = wind blowing in toward home plate (suppresses scoring).
          Computed as wind_speed_mph × cos(wind_direction_deg − park_facing_degrees).
          Null for dome parks (is_dome = true).

      - name: humidity_pct
        description: >
          Relative humidity at first pitch (percent). Null for dome parks
          and games with no weather data.

      - name: is_dome
        description: >
          True for games played in permanently enclosed dome parks (roof_type =
          'fixed'). False for open-air and convertible-roof parks. Used to
          distinguish NULL wind columns (dome) from genuinely missing weather
          data (outdoor parks with no row in weather_raw).

      - name: ml_implied_prob_std
        description: >
          Standard deviation of vig-free home win probability across all
          bookmakers with morning h2h coverage (6:00–8:30 AM ET on game_date).
          Higher values indicate genuine disagreement between books. NULL when
          fewer than 2 books have morning coverage. Card 8.T.
          Imputed to 0.0 in preprocessing.py.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.0
                max_value: 0.25
              config:
                where: "ml_implied_prob_std is not null"

      - name: ml_implied_prob_range
        description: >
          Max minus min vig-free home win probability across morning-snapshot
          books. NULL when fewer than 2 books have morning coverage. Card 8.T.
          Imputed to 0.0 in preprocessing.py.

      - name: totals_line_std
        description: >
          Standard deviation of the total line across bookmakers with morning
          totals coverage. NULL when fewer than 2 books have totals odds. Card 8.T.
          Imputed to 0.0 in preprocessing.py.

      - name: totals_line_range
        description: >
          Max minus min total line across morning-snapshot books. NULL when fewer
          than 2 books have totals odds. Card 8.T. Imputed to 0.0 in
          preprocessing.py.

      - name: sharp_soft_ml_spread
        description: >
          Average vig-free home win prob (sharp books: lowvig, betonlineag,
          bovada) minus average vig-free home win prob (soft books: williamhill_us,
          betmgm, caesars, fanduel). Positive = sharp books favor home more than
          soft books. NULL when fewer than 1 sharp or 1 soft book has morning
          coverage. Expected range: [-0.25, 0.25]. Card 8.T.
          Imputed to 0.0 in preprocessing.py.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -0.25
                max_value: 0.25
              config:
                where: "sharp_soft_ml_spread is not null"

      - name: n_books_available
        description: >
          Number of distinct bookmakers with h2h morning snapshot coverage for
          this game. Always >= 1 for non-null rows (games without any morning
          odds coverage are excluded from mart_bookmaker_disagreement and receive
          NULL here via LEFT JOIN). Imputed to 1 in preprocessing.py. Card 8.T.

      - name: stale_book_flag
        description: >
          1 if any bookmaker's morning snapshot is more than 60 minutes older
          than the freshest bookmaker's morning snapshot (indicating that book
          has not yet digested sharp action). 0 otherwise, including single-book
          games. Imputed to 0 in preprocessing.py. Card 8.T.

      - name: home_bp_matchup_xwoba
        description: >
          Expected xwOBA the home lineup generates against the away bullpen,
          weighted by the home lineup's LHB/RHB composition:
            away_bp_xwoba_vs_rhb_30d * (home_rhb_count / total)
            + away_bp_xwoba_vs_lhb_30d * (home_lhb_count / total)
          Higher = more permissive away bullpen for this home lineup. Null when
          away bullpen handedness splits or home lineup counts are unavailable.
          Impute to league average (~0.315) in preprocessing. Card 8.L.

      - name: away_bp_matchup_xwoba
        description: >
          Expected xwOBA the away lineup generates against the home bullpen,
          weighted by the away lineup's LHB/RHB composition:
            home_bp_xwoba_vs_rhb_30d * (away_rhb_count / total)
            + home_bp_xwoba_vs_lhb_30d * (away_lhb_count / total)
          Higher = more permissive home bullpen for this away lineup. Null when
          home bullpen handedness splits or away lineup counts are unavailable.
          Impute to league average (~0.315) in preprocessing. Card 8.L.

      - name: home_bp_leverage_sum_3d
        description: >
          Sum of |delta_home_win_exp| for all home-team reliever plate appearances
          over the trailing 3 calendar days. Higher = more situational exhaustion
          (high-leverage work), regardless of raw inning volume. Null when no
          home reliever appearances in the trailing window. Impute 0.0. Card 8.U.

      - name: away_bp_leverage_sum_3d
        description: >
          Sum of |delta_home_win_exp| for all away-team reliever plate appearances
          over the trailing 3 calendar days. Null when no away reliever appearances
          in the trailing window. Impute 0.0. Card 8.U.

      - name: home_bp_high_lev_appearances_3d
        description: >
          Count of home-team reliever plate appearances where the at-bat-level
          |delta_home_win_exp| exceeded 0.05 (5pp win-probability swing) over the
          trailing 3 calendar days. Null when no home reliever appearances in the
          trailing window. Impute 0.0. Card 8.U.

      - name: away_bp_high_lev_appearances_3d
        description: >
          Count of away-team reliever plate appearances where the at-bat-level
          |delta_home_win_exp| exceeded 0.05 (5pp win-probability swing) over the
          trailing 3 calendar days. Null when no away reliever appearances in the
          trailing window. Impute 0.0. Card 8.U.

      - name: home_bp_leverage_sum_1d
        description: >
          Sum of |delta_home_win_exp| for all home-team reliever plate appearances
          on the calendar day immediately preceding the game. Captures freshness of
          exhaustion (yesterday's high-leverage work). Null when no home reliever
          appearances on that day. Impute 0.0. Card 8.U.

      - name: away_bp_leverage_sum_1d
        description: >
          Sum of |delta_home_win_exp| for all away-team reliever plate appearances
          on the calendar day immediately preceding the game. Null when no away
          reliever appearances on that day. Impute 0.0. Card 8.U.

      - name: home_catcher_framing_runs
        description: >
          Home catcher CFraming blended (70% current + 30% prior) and regressed
          for < 60 innings. 0 = league average / unidentified catcher. Card 8.K.
        tests:
          - not_null

      - name: away_catcher_framing_runs
        description: >
          Away catcher CFraming. Same construction as home_catcher_framing_runs. Card 8.K.
        tests:
          - not_null

      - name: home_catcher_defensive_runs
        description: >
          Home catcher FRP blended and regressed. Total catcher defensive value
          (framing + blocking + arm + range). 0 = league average / unidentified. Card 8.K.
        tests:
          - not_null

      - name: away_catcher_defensive_runs
        description: >
          Away catcher FRP. Same construction as home_catcher_defensive_runs. Card 8.K.
        tests:
          - not_null

