version: 2

models:

  - name: stg_statsapi_player_profiles
    description: >
      One row per MLBAM player ID. Deduplicated from baseball_data.statsapi.player_profiles_raw
      via ROW_NUMBER() OVER (PARTITION BY player_id ORDER BY last_fetched_at DESC) — latest
      fetch wins. Physical traits (height_inches, weight_lbs, birth_date) are used as
      clustering features in Epic 7 stories 7.1 (batter archetypes) and 7.2 (pitcher
      archetypes). birth_date drives age-band assignment in Epic 7A.1 Dirichlet prior fitting.
      Populated by scripts/ingest_player_profiles.py (backfill + cluster-backfill modes);
      refreshed weekly via Dagster weekly_player_profiles_job.
      Coverage: 100% for 2020+ players; pre-2020 retired players backfilled via cluster-backfill
      mode targeting batter_clusters / pitcher_clusters player IDs.
    columns:
      - name: player_id
        description: MLBAM player ID. Primary key.
        tests:
          - unique
          - not_null

      - name: full_name
        description: Player full name from StatsAPI.
        tests:
          - not_null

      - name: birth_date
        description: >
          Date of birth (DATE). Used to derive age_at_season_start in clustering and
          Dirichlet prior scripts. NULL is possible for a small number of historical
          players whose birth date is not available in the StatsAPI /people endpoint.
          Not tested not_null — nulls are expected and handled by age-band fallback logic.

      - name: height_inches
        description: >
          Height in inches, parsed from StatsAPI string (e.g. "6' 2\"" → 74).
          NULL when StatsAPI returns no height. Valid range: 60–84 inches (5'0"–7'0").
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 60
                max_value: 84
                inclusive: true

      - name: weight_lbs
        description: >
          Weight in pounds as reported by StatsAPI. NULL when not available.
          Valid range: 130–375 lbs (covers the full MLB player distribution).
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 130
                max_value: 375
                inclusive: true

      - name: primary_position_code
        description: >
          Primary position code from StatsAPI (e.g. "1" = pitcher, "2" = catcher,
          "3"–"6" = infield, "7"–"9" = outfield, "10" = DH, "Y" = two-way).
        tests:
          - not_null

      - name: active
        description: >
          Whether the player is currently on an active MLB roster per StatsAPI.
          false for retired players backfilled via cluster-backfill.
        tests:
          - not_null

      - name: last_fetched_at
        description: UTC timestamp of the most recent successful profile fetch from StatsAPI.
        tests:
          - not_null

  - name: stg_statsapi_transactions
    description: >
      One row per transaction_id. Deduplicated from player_transactions using
      ROW_NUMBER() ordered by ingestion_ts DESC. Exposes all transaction fields
      with cleaned types. Feeds stg_statsapi_player_injury_status.
    columns:
      - name: transaction_id
        description: Stats API transaction identifier. Primary key.
        tests:
          - unique
          - not_null
      - name: player_id
        description: MLBAM player ID.
        tests: [not_null]
      - name: transaction_date
        description: Date the transaction was recorded.
        tests: [not_null]
      - name: type_code
        description: Transaction type code (e.g. '10-Day IL', 'Activated').
        tests: [not_null]

  - name: stg_statsapi_player_injury_status
    description: >
      One row per player_id × status interval. Derived from stg_statsapi_transactions
      using LEAD() to bound each status period. Supports point-in-time IL status joins
      for injury-adjusted lineup quality features (Card 7.I).
      Join pattern:
        ON inj.player_id = batter_id
        AND inj.status_start_date <= official_date
        AND (inj.status_end_date > official_date OR inj.status_end_date IS NULL)
    columns:
      - name: player_id
        description: MLBAM player ID.
        tests: [not_null]
      - name: status_start_date
        description: Date the status interval begins (= event_date of the transaction).
        tests: [not_null]
      - name: status_end_date
        description: >
          Date the status interval ends (= event_date of the next transaction for this player).
          NULL means the status is still current.
      - name: is_injured
        description: >
          true = IL placement (player unavailable). false = activation/reinstatement.
          type_code values are provisional; confirm against live API output.
        tests: [not_null]

  - name: stg_statsapi_umpire_game_log
    description: >
      One row per game_pk. HP umpire assignment and per-game tendency metrics
      from UmpScorecards (historical) and MLB Stats API (daily assignment).
      Deduplicates to the most authoritative row: UmpScorecards rows (with
      tendency metrics) are preferred over Stats API rows (assignment only).
    columns:
      - name: game_pk
        description: MLB game identifier. Primary key.
        tests:
          - unique
          - not_null
      - name: game_date
        description: Date the game was played.
        tests: [not_null]
      - name: season
        description: Season year.
        tests: [not_null]
      - name: umpire_name
        description: HP umpire full name.
        tests: [not_null]
      - name: umpire_id
        description: MLB Stats API umpire ID. Null for rows sourced from UmpScorecards only.
      - name: k_pct
        description: Game-level K% (not available in by-game UmpScorecards export; NULL).
      - name: bb_pct
        description: Game-level BB% (not available in by-game UmpScorecards export; NULL).
      - name: total_runs
        description: Total runs scored (home + away). Null for Stats API-only rows.
      - name: called_strikes_above_avg
        description: Correct Calls Above Expected from UmpScorecards.
      - name: run_expectancy_delta
        description: Favor (Home) run expectancy impact from UmpScorecards.
      - name: total_run_impact
        description: Total Run Impact from UmpScorecards.
      - name: accuracy_above_expected
        description: Accuracy Above Expected from UmpScorecards.
      - name: data_source
        description: "'umpscorecards' or 'statsapi'."
        tests: [not_null]
