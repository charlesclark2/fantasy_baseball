version: 2

sources:
  - name: parlayapi
    database: baseball_data
    schema: parlayapi
    description: >
      Raw betting market data from Parlay API, ingested via
      scripts/parlay_api_ingestion.py. Replaces The Odds API as the primary live
      odds source after 2026-05-23. All tables are append-only; raw JSON stored
      at full fidelity. No x_requests_used/remaining headers — credit tracking
      is handled via call-count logging in the ingestion script.

    tables:
      - name: mlb_odds_raw
        description: >
          One row per event per ingestion call of the /sports/baseball_mlb/odds
          or /historical/sports/baseball_mlb/odds endpoint. raw_json holds the
          full event object including the nested bookmakers → markets → outcomes
          structure. Identical nesting to oddsapi.mlb_odds_raw with two
          differences: canonical_event_id is present (null for historical rows),
          and commence_time is a slate placeholder (19:00:00Z) for all games —
          not the actual scheduled start time.
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: raw_json
            description: >
              Full event object as VARIANT. Nested structure:
              bookmakers[] → markets[] → outcomes[]. Each bookmaker entry
              includes key, title, last_update, and a markets array. Each market
              entry includes key, optionally last_update (absent in historical
              rows), and an outcomes array. Each outcome includes name and price
              (American odds); optionally point for totals markets. Some
              bookmakers return null for the away-side price in the live endpoint.
            tests: [not_null]
          - name: event_id
            description: Parlay API event identifier. Joins to stg_parlayapi_odds.event_id.
          - name: canonical_event_id
            description: >
              Cross-source stable event ID. Present in live endpoint responses;
              null in historical odds responses.
          - name: bookmakers_count
            description: Number of bookmakers in the raw_json payload. Convenience field.

      - name: mlb_events_raw
        description: >
          One row per ingestion call of the /sports/baseball_mlb/events endpoint.
          raw_json holds the full response array of upcoming MLB events for the
          requested time window. The live events endpoint returns canonical_event_id
          (cross-source stable ID) in addition to the Parlay-specific event id.
          Note: commence_time is a slate placeholder (19:00:00Z) for all games.
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: raw_json
            description: Full API response as VARIANT. Array of event objects.
            tests: [not_null]

      - name: mlb_matches_raw
        description: >
          One row per date queried against /historical/sports/baseball_mlb/matches.
          raw_json holds the full response array; one element per (game × bookmaker
          source). Includes home_score, away_score, result, and has_odds flag. The
          matches endpoint collapses doubleheader games into a single record — the
          same limitation as the odds endpoint (support ticket open 2026-05-10).
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: game_date
            description: Calendar date the matches were queried for.
            tests: [not_null]
          - name: raw_json
            description: >
              Full response array as VARIANT. Each element is one (game × source)
              record with fields: home_team, away_team, home_score, away_score,
              result, has_odds, season, source, sport_key, sport_title, game_date.
            tests: [not_null]

      - name: mlb_line_movement_raw
        description: >
          One row per event_id per ingestion call of the
          /sports/baseball_mlb/line-movement endpoint. Called once per event_id
          per odds_snapshot.yml run. raw_json holds the full response array for
          that event: one element per (source × market_key × player). Each element
          contains opening/current/movement summary fields plus a snapshots[]
          array of timestamped price points. Grain is intentionally coarse at the
          raw layer — the staging model (stg_parlayapi_line_movement) explodes both
          arrays to one row per (ingestion_ts, event_id, source, market_key,
          player, snapshot_ts).
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: event_id
            description: Parlay API event identifier that was queried.
            tests: [not_null]
          - name: raw_json
            description: >
              Full response array as VARIANT. Each element is one
              (source × market_key × player) record with fields: event_id,
              home_team, away_team, source, player, market_key, line,
              opening_over, current_over, over_movement, opening_under,
              current_under, count, hours_tracked, snapshots[].
              snapshots[] contains: timestamp_ms, time, over_price,
              under_price, line.
            tests: [not_null]
          - name: record_count
            description: Number of (source × market × player) records in raw_json.
          - name: markets_captured
            description: >
              VARIANT array of distinct market_key values present in the
              response. Convenience field for auditing market coverage.

      - name: mlb_canonical_events_raw
        description: >
          One row per ingestion call of the
          /sports/baseball_mlb/events/canonical endpoint. This is the ONLY Parlay
          API endpoint that returns real per-game scheduled start times. All other
          live endpoints (/events, /odds) return 19:00:00Z as a date-bucket
          placeholder for every game in a daily slate.
          Auth uses apiKey as a query parameter — the X-API-Key header is rejected
          on this endpoint. Ingested daily via events-canonical subcommand in
          parlay_api_ingestion.py. raw_json holds the full response array; the
          staging model (stg_parlayapi_canonical_events) flattens to one row per
          (ingestion_ts, event_id) with the real commence_time exposed.
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: raw_json
            description: >
              Full response array as VARIANT. Each element is one event object
              with fields: id (Parlay event_id), canonical_event_id, sport_key,
              home_team, away_team, commence_time (real scheduled UTC start),
              source_count (number of bookmaker sources tracking the event).
              commence_time may be null for games without a confirmed start time.
            tests: [not_null]
          - name: event_count
            description: Number of events in the raw_json array. Convenience field.

  - name: oddsapi
    database: baseball_data
    schema: oddsapi
    description: >
      Raw betting market data from The Odds API, ingested via
      scripts/odds_api_ingestion.py. All tables are append-only; raw JSON is
      stored at full fidelity. Every row carries x_requests_used and
      x_requests_remaining for API credit monitoring.

    tables:
      - name: mlb_events_raw
        description: >
          One row per ingestion run of the /v4/sports/baseball_mlb/events
          endpoint. raw_json holds the full response array of upcoming MLB
          events. Rows with null or empty raw_json exist from earlier ingestion
          iterations and are filtered in the staging layer.
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: raw_json
            description: Full API response array as VARIANT. Each element is one event object.
          - name: x_requests_used
            description: Value of the x-requests-used response header. Null if header absent.
          - name: x_requests_remaining
            description: Value of the x-requests-remaining response header. Null if header absent.

      - name: odds_snapshots_historical
        description: >
          Historical intraday odds snapshots for 2021–2025 MLB regular seasons.
          Three snapshots per game date at 12:00, 17:00, and 23:00 UTC. Written
          by scripts/backfill_historical_odds_snapshots.py (Card 7.P2). Bookmaker:
          bovada. Grain: (game_pk, snapshot_ts, bookmaker).
        columns:
          - name: game_pk
            description: MLB Stats API game ID. May be null for unmatched events.
          - name: snapshot_ts
            description: UTC timestamp of the OddsAPI historical query.
          - name: bookmaker
            description: OddsAPI bookmaker key (e.g., 'bovada').
          - name: home_win_prob
            description: >
              Implied home win probability derived from American odds.
              Formula: abs(odds)/(abs(odds)+100) for negative; 100/(odds+100) for positive.
          - name: total_line
            description: Over/Under total line. Null for ~30–40% of historical snapshots.

      - name: mlb_odds_raw
        description: >
          One row per event per market/region ingestion call of the
          /v4/sports/baseball_mlb/odds endpoint. raw_json holds the full event
          object including the nested bookmakers → markets → outcomes structure.
          Convenience columns (event_id, home_team, etc.) are extracted for
          fast filtering without JSON parsing.
        columns:
          - name: ingestion_ts
            description: Wall-clock UTC timestamp when the row was written to Snowflake.
            tests: [not_null]
          - name: load_id
            description: UUID grouping all rows produced by the same script run.
            tests: [not_null]
          - name: raw_json
            description: >
              Full event object as VARIANT. Nested structure:
              bookmakers[] → markets[] → outcomes[]. Each bookmaker entry
              includes key, title, last_update, and a markets array. Each
              market entry includes key, last_update, and an outcomes array.
              Each outcome includes name, price (American odds), and
              optionally point (for totals markets).
            tests: [not_null]
          - name: event_id
            description: Odds API event identifier. Joins to stg_oddsapi_events.event_id.
          - name: bookmakers_count
            description: Number of bookmakers in the raw_json payload. Convenience field.
          - name: x_requests_used
            description: Value of the x-requests-used response header. Null if header absent.
          - name: x_requests_remaining
            description: Value of the x-requests-remaining response header. Null if header absent.

  - name: statsapi
    database: baseball_data
    schema: statsapi
    description: >
      Raw MLB Stats API data ingested via ingest_statsapi.py.
      Contains schedule, lineup, and venue data.

    tables:
      - name: monthly_schedule
        description: >
          One row per ingested month. The json_field VARIANT column contains
          the full Stats API schedule response including game metadata and
          confirmed lineups for all games in the month.
        columns:
          - name: month_start_date
            description: First day of the ingested month.
            tests: [not_null]
          - name: month_end_date
            description: Last day of the ingested month.
            tests: [not_null]
          - name: games_cnt
            description: Number of games returned in the API response for the month.
            tests: [not_null]
          - name: json_field
            description: Full Stats API schedule response as a VARIANT (semi-structured JSON).
            tests: [not_null]

      - name: venues_raw
        description: >
          Append-only venue records ingested via ingest_statsapi.py venues subcommand.
          The json_field VARIANT column contains the full Stats API venue response
          hydrated with fieldInfo, location, timezone, and xrefId. Multiple rows
          may exist per venue_id across ingestion runs; stg_statsapi_venues deduplicates
          to the latest row. The venues present correspond to all ballparks observed
          in stg_statsapi_games.
        columns:
          - name: venue_id
            description: Stats API venue ID. Not unique at the source level (append-only); deduplicated in stg_statsapi_venues.
            tests: [not_null]
          - name: json_field
            description: >
              Full Stats API venue response as a VARIANT. Top-level structure is
              an object with a "venues" array containing one element. Hydrated
              sections: fieldInfo (dimensions, capacity, turf/roof type),
              location (address, coordinates, elevation), timeZone (IANA id,
              UTC offset), xrefIds (Retrosheet, StubHub, ballpark_code, etc.).
            tests: [not_null]
          - name: ingest_date
            description: Calendar date on which this venue record was last ingested.
            tests: [not_null]

      - name: player_profiles_raw
        description: >
          Append-only raw profile rows fetched from the StatsAPI /people endpoint
          via scripts/ingest_player_profiles.py. Multiple rows per player_id are
          expected; stg_statsapi_player_profiles deduplicates to the latest row
          per player_id using ROW_NUMBER() on last_fetched_at DESC.
          Height, weight, birth_date, and primary_position_code are used as
          features in Epic 7 archetype clustering (stories 7.1 and 7.2).
          Refreshed weekly via Dagster weekly_player_profiles_job.
        columns:
          - name: player_id
            description: MLBAM player ID.
          - name: full_name
            description: Player full name from StatsAPI.
          - name: birth_date
            description: Date of birth. Used to compute age_at_season_start in clustering scripts.
          - name: height_inches
            description: Player height in inches, parsed from StatsAPI string (e.g. "6' 2\"" → 74).
          - name: weight_lbs
            description: Player weight in pounds as reported by StatsAPI.
          - name: primary_position_code
            description: Primary position code from StatsAPI (e.g. "1" = pitcher, "7" = LF).
          - name: active
            description: Whether the player is currently active on a roster.
          - name: last_fetched_at
            description: UTC timestamp of the most recent successful profile fetch.

      - name: player_transactions
        description: >
          One row per roster transaction event per player. Fetched from the
          Stats API /v1/transactions endpoint via scripts/ingest_transactions.py
          with a 7-day lookback. Captures IL placements (10-Day IL, 60-Day IL,
          7-Day IL), activations, reinstatements, and other roster moves.
          The Stats API may return the same transaction_id across overlapping
          date range queries; deduplication happens in stg_statsapi_transactions.
          Ingested daily via daily_ingestion.yml.
          Feeds stg_statsapi_player_injury_status for injury-adjusted lineup
          quality features (Card 7.I).
        columns:
          - name: transaction_id
            description: Stats API transaction identifier. Primary key.
            tests:
              - not_null
              - unique:
                  config:
                    severity: warn
          - name: player_id
            description: MLBAM player ID (person.id from the API).
            tests: [not_null]
          - name: transaction_date
            description: Date the transaction was recorded.
            tests: [not_null]
          - name: type_code
            description: >
              Transaction type code from the Stats API (e.g. '10-Day IL',
              'Activated', 'Reinstated'). Provisional — confirm values
              against live API output from first ingestion run.
            tests: [not_null]

      - name: umpire_game_log
        description: >
          One row per game_pk. HP umpire assignment and per-game tendency
          metrics. Loaded by two scripts: ingest_umpires_historical.py
          (UmpScorecards bulk export, annual refresh) and ingest_umpires.py
          (MLB Stats API daily assignment, morning of game). UmpScorecards rows
          carry tendency metrics; Stats API rows carry only umpire_name/id.

      - name: weather_raw
        description: >
          One row per game_pk × venue_id. Stores weather conditions at or near
          first pitch for outdoor-park MLB games. Ingested via
          scripts/ingest_weather.py using the Open-Meteo API (no key required)
          or OpenWeatherMap (OPENWEATHERMAP_API_KEY required). Dome parks
          (roof_type = 'fixed') are excluded at ingest time and have no rows.
          The grain allows multiple fetches per game (intraday refresh);
          a PRIMARY KEY constraint on (game_pk, venue_id) ensures the most
          recent fetch is retained via MERGE INTO upsert.
        columns:
          - name: game_pk
            description: MLB Stats API game identifier.
            tests: [not_null]
          - name: venue_id
            description: MLB Stats API venue identifier.
            tests: [not_null]
          - name: game_datetime_utc
            description: Scheduled first pitch in UTC.
            tests: [not_null]
          - name: fetch_offset_hours
            description: >
              Hours before first pitch when the weather was fetched. Negative
              values indicate the fetch occurred after the scheduled start.
          - name: temp_f
            description: Temperature at first pitch (degrees Fahrenheit).
          - name: wind_speed_mph
            description: Wind speed (mph).
          - name: wind_direction_deg
            description: >
              Meteorological wind direction (degrees). 0/360 = wind from North,
              90 = wind from East. Note: this is the direction the wind is
              blowing FROM, not toward.
          - name: humidity_pct
            description: Relative humidity (percent).
          - name: condition_text
            description: Human-readable weather condition description from the API.
          - name: api_source
            description: "'open-meteo' or 'openweathermap'."
          - name: loaded_at
            description: UTC timestamp when the row was last written to Snowflake.

      - name: pitcher_clusters
        description: >
          One row per pitcher_id × season. Pitcher k-means cluster assignments
          produced by betting_ml/scripts/pitcher_clustering/cluster_pitchers.py
          (Card 7.K). Populated via DELETE + INSERT for the target season.
          Cluster IDs are per-season and not stable across runs; use cluster_label
          for human-readable interpretation.
        columns:
          - name: pitcher_id
            description: MLBAM pitcher ID. Joins to mart_pitch_characteristics.pitcher_id.
            tests: [not_null]
          - name: season
            description: Season year the clustering was run for.
            tests: [not_null]
          - name: cluster_id
            description: 0-indexed k-means cluster assignment for this pitcher-season.
            tests: [not_null]
          - name: cluster_label
            description: Human-readable cluster archetype label from CLUSTER_LABELS constant.
            tests: [not_null]
          - name: silhouette_score
            description: Silhouette score for the best-k solution used in this run.
          - name: run_timestamp
            description: Wall-clock timestamp when the row was written.

      - name: batter_clusters
        description: >
          One row per batter_id × season. Batter k-means cluster assignments
          produced by betting_ml/scripts/batter_clustering/cluster_batters.py
          (Card 7.K2). Populated via DELETE + INSERT for the target season.
          Cluster IDs are per-season and not stable across runs; use cluster_label
          for human-readable interpretation. Cluster labels: power_pull,
          patient_obp, groundball_speed, high_whiff, contact_spray, balanced.
        columns:
          - name: batter_id
            description: MLBAM batter ID. Joins to mart_pitch_play_event.batter_id.
            tests: [not_null]
          - name: season
            description: Season year the clustering was run for.
            tests: [not_null]
          - name: cluster_id
            description: 0-indexed k-means cluster assignment for this batter-season.
            tests: [not_null]
          - name: cluster_label
            description: Human-readable batter archetype label (power_pull, patient_obp, etc.).
            tests: [not_null]
          - name: silhouette_score
            description: Silhouette score for the best-k solution used in this run.
          - name: run_timestamp
            description: Wall-clock timestamp when the row was written.

  - name: savant
    database: baseball_data
    schema: savant
    description: >
      Raw Statcast / Baseball Savant pitch-level data and reference tables.

    tables:

      # ── Pitch data ────────────────────────────────────────────────────────────
      - name: batter_pitches
        description: >
          Per-pitch Statcast data including pitch physics, batted ball tracking,
          bat tracking (2023+), player identifiers, game context, and advanced
          expected-stat metrics. Grain: one row per pitch per plate appearance
          per game.

        columns:
          - name: game_pk
            description: Unique MLB game identifier.
            tests: [not_null]
          - name: at_bat_number
            description: Sequential plate appearance number within the game.
            tests: [not_null]
          - name: pitch_number
            description: Pitch sequence number within the current plate appearance.
            tests: [not_null]
          - name: batter
            description: MLB Player ID for the batter.
            tests: [not_null]
          - name: pitcher
            description: MLB Player ID for the pitcher.
            tests: [not_null]
          - name: game_date
            description: Date the game was played.
            tests: [not_null]
          - name: game_year
            description: Season year.
            tests: [not_null]
          - name: game_type
            description: >
              E=Exhibition, S=Spring Training, R=Regular Season,
              F=Wild Card, D=Division Series, L=LCS, W=World Series.
          - name: home_team
            description: Abbreviation of the home team.
          - name: away_team
            description: Abbreviation of the away team.
          - name: inning
            description: Pre-pitch inning number.
          - name: inning_topbot
            description: Top or bottom half of the inning.
          - name: balls
            description: Pre-pitch ball count.
          - name: strikes
            description: Pre-pitch strike count.
          - name: outs_when_up
            description: Pre-pitch number of outs in the inning.
          - name: on_1b
            description: Pre-pitch MLB Player ID of runner on 1st base.
          - name: on_2b
            description: Pre-pitch MLB Player ID of runner on 2nd base.
          - name: on_3b
            description: Pre-pitch MLB Player ID of runner on 3rd base.
          - name: stand
            description: Batter's stance — L or R.
          - name: p_throws
            description: Pitcher's throwing hand — L or R.
          - name: fielder_2
            description: Catcher MLB Player ID.
          - name: fielder_3
            description: First baseman MLB Player ID.
          - name: fielder_4
            description: Second baseman MLB Player ID.
          - name: fielder_5
            description: Third baseman MLB Player ID.
          - name: fielder_6
            description: Shortstop MLB Player ID.
          - name: fielder_7
            description: Left fielder MLB Player ID.
          - name: fielder_8
            description: Center fielder MLB Player ID.
          - name: fielder_9
            description: Right fielder MLB Player ID.
          - name: pitch_type
            description: Statcast pitch type abbreviation (FF, SL, CH, CU, etc.).
          - name: pitch_name
            description: Human-readable pitch name.
          - name: type
            description: Pitch result — B=Ball, S=Strike, X=In Play.
          - name: description
            description: Verbose pitch outcome description.
          - name: events
            description: Terminal plate appearance event on the final pitch of a PA.
          - name: des
            description: Full game-day text description of the plate appearance.
          - name: zone
            description: Strike zone region (1–9 in zone, 11–14 out of zone).
          - name: release_speed
            description: Pitch velocity out of hand (mph).
          - name: effective_speed
            description: Release speed adjusted for extension (batter-perceived velocity).
          - name: release_pos_x
            description: Horizontal release position in feet (catcher's POV).
          - name: release_pos_y
            description: Depth of release from home plate in feet.
          - name: release_pos_z
            description: Vertical release height in feet (catcher's POV).
          - name: release_extension
            description: Distance off the mound the pitcher releases the ball (feet).
          - name: release_spin_rate
            description: Spin rate at release (RPM).
          - name: spin_axis
            description: Spin axis in degrees (0–360). 180=backspin, 0=topspin.
          - name: pfx_x
            description: Horizontal pitch movement in feet (catcher's POV).
          - name: pfx_z
            description: Vertical pitch movement in feet (catcher's POV).
          - name: plate_x
            description: Horizontal position at plate crossing (feet, catcher's POV).
          - name: plate_z
            description: Vertical position at plate crossing (feet, catcher's POV).
          - name: sz_top
            description: Top of batter's strike zone when ball is halfway to plate (feet).
          - name: sz_bot
            description: Bottom of batter's strike zone (feet).
          - name: vx0
            description: Pitch x-velocity at y=50ft reference plane (ft/sec).
          - name: vy0
            description: Pitch y-velocity at y=50ft reference plane (ft/sec).
          - name: vz0
            description: Pitch z-velocity at y=50ft reference plane (ft/sec).
          - name: ax
            description: Pitch x-acceleration at y=50ft reference plane (ft/sec²).
          - name: ay
            description: Pitch y-acceleration at y=50ft reference plane (ft/sec²).
          - name: az
            description: Pitch z-acceleration at y=50ft reference plane (ft/sec²).
          - name: api_break_z_with_gravity
            description: Vertical break including gravity (inches). Newer API field.
          - name: api_break_x_arm
            description: Horizontal break from arm-side perspective (inches). Newer API field.
          - name: api_break_x_batter_in
            description: Horizontal break from batter's perspective (inches). Newer API field.
          - name: arm_angle
            description: Pitcher arm angle at release (degrees). Newer API field.
          - name: hc_x
            description: Hit coordinate X (field diagram pixel space).
          - name: hc_y
            description: Hit coordinate Y (field diagram pixel space).
          - name: hit_location
            description: Position number of first fielder to touch the batted ball.
          - name: bb_type
            description: Batted ball type — ground_ball, line_drive, fly_ball, popup.
          - name: hit_distance_sc
            description: Projected hit distance (feet).
          - name: launch_speed
            description: Exit velocity (mph).
          - name: launch_angle
            description: Launch angle (degrees).
          - name: launch_speed_angle
            description: Contact quality zone 1–6 (Weak through Barrel).
          - name: estimated_ba_using_speedangle
            description: Expected Batting Average (xBA).
          - name: estimated_woba_using_speedangle
            description: Expected wOBA (xwOBA).
          - name: estimated_slg_using_speedangle
            description: Expected SLG (xSLG). Newer API field.
          - name: woba_value
            description: Realized wOBA value.
          - name: woba_denom
            description: wOBA denominator.
          - name: babip_value
            description: BABIP value based on play result.
          - name: iso_value
            description: Isolated power value.
          - name: home_win_exp
            description: Home team win expectancy before pitch (0–1). Newer API field.
          - name: bat_win_exp
            description: Batting team win expectancy before pitch (0–1). Newer API field.
          - name: delta_home_win_exp
            description: Change in home team win expectancy for the plate appearance.
          - name: delta_run_exp
            description: Change in run expectancy for the pitch.
          - name: delta_pitcher_run_exp
            description: Run expectancy delta from pitcher's perspective. Newer API field.
          - name: home_score
            description: Pre-pitch home score.
          - name: away_score
            description: Pre-pitch away score.
          - name: bat_score
            description: Pre-pitch batting team score.
          - name: fld_score
            description: Pre-pitch fielding team score.
          - name: post_home_score
            description: Post-pitch home score.
          - name: post_away_score
            description: Post-pitch away score.
          - name: post_bat_score
            description: Post-pitch batting team score.
          - name: post_fld_score
            description: Post-pitch fielding team score.
          - name: home_score_diff
            description: Score differential from home team's perspective. Newer API field.
          - name: bat_score_diff
            description: Score differential from batting team's perspective. Newer API field.
          - name: bat_speed
            description: Bat speed at sweet spot (mph). Available 2023+.
          - name: swing_length
            description: Total bat head travel distance from tracking start to contact (feet).
          - name: attack_angle
            description: Vertical bat angle at contact (degrees). Available 2023+.
          - name: attack_direction
            description: Horizontal bat angle at contact relative to pull/oppo.
          - name: swing_path_tilt
            description: Vertical angle of swing arc over 40ms prior to contact (degrees).
          - name: hyper_speed
            description: Internal Statcast bat speed derivative. Not publicly documented.
          - name: intercept_ball_minus_batter_pos_x_inches
            description: Horizontal ball-to-batter intercept offset (inches). Available 2024+.
          - name: intercept_ball_minus_batter_pos_y_inches
            description: Depth ball-to-batter intercept offset (inches). Available 2024+.
          - name: if_fielding_alignment
            description: Infield alignment (Standard, Shift, Strategic, etc.).
          - name: of_fielding_alignment
            description: Outfield alignment.
          - name: age_pit
            description: Pitcher age (current method).
          - name: age_bat
            description: Batter age (current method).
          - name: age_pit_legacy
            description: Pitcher age (legacy June 30 method).
          - name: age_bat_legacy
            description: Batter age (legacy June 30 method).
          - name: n_thruorder_pitcher
            description: Times pitcher has been through the batting order this game.
          - name: n_priorpa_thisgame_player_at_bat
            description: Batter's prior plate appearances in this game.
          - name: pitcher_days_since_prev_game
            description: Days since pitcher's last game.
          - name: batter_days_since_prev_game
            description: Days since batter's last game.
          - name: pitcher_days_until_next_game
            description: Days until pitcher's next game.
          - name: batter_days_until_next_game
            description: Days until batter's next game.
          # Deprecated — retained in source for lineage; suppressed in staging and mart
          - name: spin_dir
            description: "DEPRECATED — legacy PitchF/X field."
          - name: spin_rate_deprecated
            description: "DEPRECATED — replaced by release_spin_rate."
          - name: break_angle_deprecated
            description: "DEPRECATED — legacy PitchF/X field."
          - name: break_length_deprecated
            description: "DEPRECATED — legacy PitchF/X field."
          - name: tfs_deprecated
            description: "DEPRECATED — legacy timestamp."
          - name: tfs_zulu_deprecated
            description: "DEPRECATED — legacy UTC timestamp."
          - name: umpire
            description: "DEPRECATED — legacy tracking field."
          - name: sv_id
            description: "Non-unique play event ID. Not suitable as a key."

      # ── Catcher framing leaderboard (Card 8.K) ───────────────────────────────
      - name: catcher_framing_raw
        description: >
          Season-level catcher framing data from the Baseball Savant catcher
          framing leaderboard. One row per player_id × season. Ingested by
          scripts/ingest_catcher_framing.py. Grain: player_id × season.

        columns:
          - name: player_id
            description: MLB player ID.
            tests: [not_null]
          - name: season
            description: Season year.
            tests: [not_null]
          - name: framing_runs_above_average
            description: >
              Catcher framing runs above average from Baseball Savant
              (runs_above_average column). Positive = above average framer.
          - name: n_called_pitches
            description: Number of called pitches in the sample window.
          - name: ingestion_timestamp
            description: Timestamp when this row was last written/updated.

      # ── Sprint speed leaderboard (Epic 4A) ───────────────────────────────────
      - name: sprint_speed_raw
        description: >
          Baseball Savant sprint speed leaderboard. Sprint speed is measured in
          ft/s (Statcast sprint speed) and is distinct from the FanGraphs Spd
          speed score. Grain: player_mlbam_id × season × snapshot_date (weekly
          Sunday snapshots). Ingested by scripts/ingest_sprint_speed.py.

        columns:
          - name: player_mlbam_id
            description: MLBAM player ID.
            tests: [not_null]
          - name: season
            description: Season year.
            tests: [not_null]
          - name: snapshot_date
            description: Date this row was captured (weekly Sunday run).
            tests: [not_null]
          - name: sprint_speed_fts
            description: Statcast sprint speed in ft/s.
          - name: competitive_runs
            description: Number of HP-to-2B sprint attempts used to compute the metric.
          - name: hp_to_1b
            description: Average time (seconds) from home plate to first base on right-handed contact.
          - name: hp_to_2b
            description: Average time (seconds) from home plate to second base.
          - name: ingestion_timestamp
            description: Timestamp when this row was written.

      # ── Reference: players ────────────────────────────────────────────────────
      - name: ref_players
        description: >
          MLB player reference table mapping MLB BAM Player IDs to names and
          career date ranges. Used to resolve batter_id and pitcher_id in the
          pitch data to human-readable names.

        columns:
          - name: mlb_bam_id
            description: >
              Unique MLB BAM (Baseball Advanced Media) Player ID. Joins to
              batter_id and pitcher_id in batter_pitches. Rows where mlb_bam_id
              = -1 are sentinel placeholder records and are excluded from the
              uniqueness test.
            tests:
              - not_null
              - unique:
                  config:
                    where: "mlb_bam_id != -1"
          - name: first_name
            description: Player's first name.
          - name: last_name
            description: Player's last name.
          - name: player_name
            description: >
              Full player name in "Last, First" or display format as provided
              by the source.
          - name: mlb_played_first
            description: >
              Season year of the player's first MLB appearance. Stored as float
              in source; cast to integer in staging.
          - name: mlb_played_last
            description: >
              Season year of the player's most recent MLB appearance. Stored as
              float in source; cast to integer in staging.

  - name: fangraphs
    database: baseball_data
    schema: fangraphs
    description: >
      Raw FanGraphs data ingested via scripts/ingest_fangraphs_*.py.
      All tables are append-only; full API/CSV response payloads are stored
      in raw_json VARIANT. Ingest scripts use curl_cffi to bypass Cloudflare
      TLS fingerprinting.

    tables:
      - name: fg_stuff_plus_raw
        description: >
          Raw append-only table for FanGraphs Stuff+ pitching leaderboard (type=36).
          Grain: one row per ingestion run × pitcher × rolling window. Full API
          response stored in raw_json VARIANT. Stuff+ available from 2020 onward.
          Rolling windows: 14d, 30d, and full season.

      - name: fg_zips_pitching_raw
        description: >
          Raw append-only table for FanGraphs ZiPS pitching projections.
          Grain: one row per ingestion run × pitcher × projection_type.
          Pre-season full projection data loaded from manually-downloaded CSVs
          (source_endpoint = 'csv_manual_download'); in-season rolling ZiPS
          loaded via API.

      - name: fg_zips_hitting_raw
        description: >
          Raw append-only table for FanGraphs ZiPS hitting projections.
          Grain: one row per ingestion run × batter × projection_type.
          Pre-season full projection data loaded from manually-downloaded CSVs;
          in-season rolling ZiPS loaded via API.

      - name: fg_hitting_leaderboard_raw
        description: >
          Raw append-only table for FanGraphs hitting leaderboard snapshots
          (Dashboard type=8). Grain: one row per ingestion run × batter ×
          window_type × window date range. Window types: 7d, 14d, 30d, season.

  - name: actionnetwork
    database: baseball_data
    schema: actionnetwork
    description: >
      Public betting percentage data from the Action Network public-betting
      endpoint, ingested via scripts/ingest_actionnetwork_betting.py (Card 8.R).

    tables:
      - name: public_betting_raw
        description: >
          One row per (game_date, an_game_id). Aggregated public money% and
          ticket% for the moneyline and total markets. Action Network only
          populates these percentages on book 15 (FanDuel) in practice; the
          ingestion script prefers that book and falls back to any other book
          with non-zero percentages.
        columns:
          - name: game_date
            description: Calendar date the game was scheduled (Action Network "date" param).
            tests: [not_null]
          - name: an_game_id
            description: Action Network game identifier (string form).
          - name: home_team_abbr
            description: Action Network home team abbreviation (e.g. WSH, ARI). Normalized in staging.
          - name: away_team_abbr
            description: Action Network away team abbreviation. Normalized in staging.
          - name: home_ml_money_pct
            description: Percent of public money on the home team moneyline (0–100).
          - name: home_ml_ticket_pct
            description: Percent of public tickets on the home team moneyline (0–100).
          - name: over_money_pct
            description: Percent of public money on the Over of the totals market (0–100).
          - name: over_ticket_pct
            description: Percent of public tickets on the Over of the totals market (0–100).
          - name: book_ids_used
            description: Comma-separated Action Network book IDs that contributed the populated percentages.
          - name: ingestion_timestamp
            description: Wall-clock UTC timestamp of the most recent upsert for this row.

  - name: external
    database: baseball_data
    schema: external
    description: >
      Derived tables written by ingestion scripts that don't fit the raw source
      schemas (oddsapi, statsapi, savant, fangraphs). Includes team fielding OAA
      from FanGraphs and other script-produced seasonal aggregates.

    tables:
      - name: oaa_team_season_raw
        description: >
          Team-level Outs Above Average (OAA) and Defensive Runs Saved (DRS)
          from the FanGraphs major-league team fielding leaderboard. Written by
          scripts/ingest_oaa.py. Grain: team_abbrev × game_year. Season-level
          totals only (not daily rolling). OAA coverage begins 2016 (Statcast era).

  - name: betting
    database: baseball_data
    schema: betting
    description: >
      Derived baseball_data.betting tables written by Python scripts
      (not managed by dbt). Includes Elo ratings and other script-produced outputs.

    tables:
      - name: team_elo_history
        description: >
          Pre-game and post-game Elo ratings for every team in every regular-season
          game from 2015 onward. Written by betting_ml/scripts/compute_elo.py.
          Parameters: K=4, HOME_ADV=24 Elo points, initial rating=1500,
          season-start regression = 0.667 * elo + 0.333 * 1500 (FiveThirtyEight MLB).
          Grain: game_pk × team_abbrev.
          Only elo_before_game is used as a pre-game feature.

      - name: mart_sub_model_signals
        description: >
          Long-format SCD-2 store for sub-model output signals (run_env, offense,
          starter, bullpen, matchup). One row per (game_pk, side, signal_name,
          sub_model_version, valid_from). Populated by sub-model inference scripts
          in Epics 3–8. Pivoted to wide format by feature_pregame_sub_model_signals.
          DDL: scripts/ddl/mart_sub_model_signals.sql.

      - name: eb_park_factors_raw
        description: >
          Empirical Bayes smoothed park run factors. One row per (venue_id, season).
          Written by betting_ml/scripts/eb_priors/fit_park_priors.py via MERGE upsert.
          Normal-Normal conjugate posterior: prior fit from established venues
          (≥ 40 games/season); shrinkage toward prior is inversely proportional to
          sample size. Sourced by dbt model mart_eb_park_factors.
          DDL: scripts/ddl/eb_park_factors_raw.sql.
          Grain: venue_id × season.

      - name: eb_park_factors_granular_raw
        description: >
          EB-smoothed granular park factors (HR, 2B/3B, 1B, BB, SO, wOBA) derived
          from Baseball Savant statcast-park-factors 3yr rolling data. All factor
          columns are ratios (1.0 = league average). Written by
          betting_ml/scripts/eb_priors/fit_granular_park_priors.py via MERGE upsert.
          Normal-Normal conjugate: per-event Bernoulli σ²_ε used as likelihood
          variance; prior fit from established venues (≥ 5,000 PA in 3yr window).
          DDL: scripts/ddl/eb_park_factors_granular_raw.sql.
          Grain: venue_id × season.

      - name: eb_batter_posteriors_raw
        description: >
          Per-batter-slot Empirical Bayes posteriors for wOBA, K%, BB%, and ISO.
          Written by betting_ml/scripts/eb_priors/compute_lineup_posteriors.py via
          MERGE upsert. Conjugate priors are stratified by role (top/middle/bottom
          batting slot) × handedness × season, fit by fit_lineup_priors.py (4A.1).
          ZiPS DC projections are blended at low sample sizes (PA < 150).
          eb_data_source: 'prior_only' (PA=0, no ZiPS), 'zips_blend' (PA < 150),
          'full_eb' (PA ≥ 150).
          DDL: scripts/ddl/create_eb_batter_posteriors_raw.sql.
          Grain: game_pk × batting_slot × batter_id.

      - name: eb_starter_posteriors
        description: >
          Per-starter Empirical Bayes posteriors for xwOBA-against, K%, and BB%.
          Written by betting_ml/scripts/eb_priors/compute_starter_posteriors.py via
          VARCHAR temp table + MERGE on (game_pk, pitcher_id). Conjugate priors are
          stratified by experience band (u25/a25/a30/a33) × season, fit by
          fit_starter_priors.py (5A.1). IL-return blend applied when current-season
          starts < 3 and prior-season starts ≥ 10.
          eb_data_source: 'prior_only' (BF=0), 'il_return_blend', 'full_eb'.
          Joined into feature_pregame_starter_features on (game_pk, pitcher_id).
          Grain: game_pk × pitcher_id.

      - name: eb_bullpen_team_posteriors
        description: >
          Per-team Empirical Bayes posteriors for bullpen xwOBA-against, aggregated
          to game level. Written by betting_ml/scripts/eb_priors/compute_bullpen_posteriors.py
          via MERGE upsert. Conjugate priors fit by fit_bullpen_priors.py (6A.1).
          team_eb_bullpen_xwoba is the shrunk posterior mean (shrunk toward the
          league-average prior). team_eb_bullpen_uncertainty is the posterior std dev
          (high = few observed relievers or high variability). n_relievers is the count
          of relievers with season plate-appearance data; n_prior_only is the count
          using only the prior (no observed data).
          DDL: scripts/ddl/eb_bullpen_posteriors.sql.
          Grain: game_pk × team.

      - name: team_sequential_posteriors
        description: >
          Team-level sequential Bayesian beliefs (Epic 16.3), updated after every
          completed regular-season game. Written by
          betting_ml/scripts/sequential_bayes/update_team_posteriors.py (SCD-2 MERGE).
          metrics: off_xwoba & bullpen_xwoba (Normal-Normal), win_prob (Beta-Binomial,
          the Pythagorean-win analogue). prior_mu is the belief ENTERING the game
          (= posterior after the team's previous game) and is the leakage-safe
          pre-game value consumed by feature_pregame_game_features; posterior_mu
          includes the game's own observation (do NOT use as a pre-game feature).
          Grain: team × metric × season × game_pk.

  - name: betting_ml
    database: baseball_data
    schema: betting_ml
    description: >
      Output tables written by the betting_ml Python pipeline (predict_today.py
      and related scripts). These tables are written directly by Python, not
      managed by dbt. Used here as sources for downstream mart models.

    tables:
      - name: daily_model_predictions
        description: >
          One row per (score_date, game_pk, model_version). Model predictions
          for every game on the prediction date, including win probability,
          run totals, edge, and Kelly fraction. Written by predict_today.py.
          Score_date is the date predictions were made; game_date is the game's
          actual calendar date (may differ by one day for prediction-vs-game timing).
        columns:
          - name: game_pk
            description: MLB Stats API game identifier.
            tests: [not_null]
          - name: score_date
            description: Date on which the prediction was scored (predict_today.py run date).
            tests: [not_null]
          - name: model_version
            description: Model version tag (e.g. v0, v1, v2).
          - name: has_odds
            description: Whether odds data was available for this game at prediction time.
          - name: calibrated_win_prob
            description: Platt-scaled home win probability (Card 7.C).
          - name: data_source
            description: "'feature_store' or 'intraday_fallback' (Card 7.O)."

  - name: betting_features
    database: baseball_data
    schema: betting_features
    description: >
      Python-script-written feature tables in the baseball_data.betting_features schema.
      These are produced by inference/signal scripts and are not managed by dbt.
      Sourced by dbt feature models that need to reference them alongside dbt-managed
      feature mart tables.

    tables:
      - name: feature_pregame_market_features
        description: >
          SCD-2 store for pre-game market state (moneyline and totals). One row per
          distinct line state per (game_pk, market_type, bookmaker_key). Populated by
          scripts/backfill_market_features_scd2.py via MERGE. Enables point-in-time
          odds replay for CLV reconstruction and walk-forward backtesting (Story 15.1).
          Natural key: (game_pk, market_type, bookmaker_key, valid_from).
          Change-detection: record_hash over price columns (home_moneyline_american,
          away_moneyline_american, total_line, over_american, under_american).
          Coverage: Odds API 2021-01-01+; Parlay API 2026-05-26+.
          DDL: scripts/ddl/feature_pregame_market_features.sql.

      - name: feature_pregame_lineup_state
        description: >
          SCD-2 store for pre-game lineup state. One row per distinct lineup composition
          per (game_pk, home_away). Populated by scripts/backfill_lineup_state_scd2.py
          via MERGE. Enables point-in-time lineup replay for pre-scratch vs. post-scratch
          predictions (Story 15.2). Natural key: (game_pk, home_away, valid_from).
          Change-detection: record_hash over slot_1..9 player_ids (position changes for
          the same player do not trigger a new row). Coverage: Epic T date 2026-05-12+;
          pre-T history permanently unavailable. DDL: scripts/ddl/feature_pregame_lineup_state.sql.

      - name: offense_v1_signals
        description: >
          Per game-side offensive quality signals from the offense_v1 LightGBM model.
          Written by betting_ml/scripts/offense_v1/generate_offense_signals.py via
          VARCHAR temp table + MERGE (idempotent). Grain: game_pk × side × model_version.
          pred_runs_raw is the bias-corrected LightGBM prediction (CV mean bias −0.523
          subtracted). runs_index = 100 × pred_runs_raw / season_league_avg_pred;
          100 = league average for that season. Backfilled 2015–2026.
          DDL: scripts/ddl/offense_v1_signals.sql.
      - name: offense_v2_signals
        description: >
          Per game-side distributional offensive signals from the offense_v2 LightGBM+NegBin model.
          Written by betting_ml/scripts/offense_v2/generate_offense_signals.py via
          VARCHAR temp table + MERGE (idempotent). Grain: game_pk × side × model_version.
          pred_runs_mu is the NegBin conditional mean; pred_runs_dispersion is the
          global dispersion parameter r (constant per model); pred_runs_raw is an alias
          for pred_runs_mu (no bias correction); uncertainty is the 80% PI width (hi−lo).
          Backfilled 2015–2026. DDL: scripts/ddl/offense_v1_signals.sql (schema parity).
      - name: starter_suppression_signals
        description: >
          Per game-side distributional starter suppression signals from the starter_v1 model
          (LightGBM + Normal sigma, or NGBoost Normal — champion selected by walk-forward CV NLL).
          Written by betting_ml/scripts/starter_v1/generate_starter_signals.py via
          VARCHAR temp table + MERGE (idempotent). Grain: game_pk × side × model_version.
          starter_suppression_mu is the predicted mean xwOBA-against; starter_suppression_sigma
          is the Normal standard deviation (constant per model for LightGBM, per-row for NGBoost);
          starter_suppression_signal is the z-score of mu relative to the season mean (negative
          values indicate better-than-average suppression); uncertainty is the 80% PI width
          (2 × 1.28 × sigma). Backfilled 2020–2026 (Statcast xwOBA coverage starts 2020).
      - name: starter_ip_signals
        description: >
          Per game-side distributional starter innings-pitched signals from the starter_ip_v1 model
          (LightGBM mean + NegBin r fitted per predicted-mean decile — Story 5D.2 champion).
          Written by betting_ml/scripts/starter_v1/generate_starter_ip_signals.py via
          VARCHAR temp table + MERGE (idempotent). Grain: game_pk × side × model_version.
          All outs columns are in outs (divide by 3.0 for innings pitched — do NOT convert
          internally; keep as outs for NegBin CDF computations in Epic 6D Candidate B).
          starter_ip_mu is the NegBin conditional mean outs; starter_ip_dispersion is the
          per-decile r parameter; starter_ip_signal is the z-score of mu vs. season mean
          (negative = shorter-than-average outing expected); starter_ip_p80_outs and
          starter_ip_p20_outs are the 80th/20th percentile outs from the NegBin CDF;
          uncertainty is the PI width (p80 - p20); is_bulk_usage flags predicted mu < 9 outs.
          Backfilled 2020–2026. DDL embedded in generate_starter_ip_signals.py.