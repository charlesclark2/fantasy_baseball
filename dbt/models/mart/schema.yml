version: 2

models:

  # ============================================================================
  # dim_team_name_lookup  (Epic A1.9 — canonical cross-source team resolver)
  # ============================================================================
  - name: dim_team_name_lookup
    description: >
      Epic A1.9 — the single canonical resolver from any feed team-name variant
      (Stats API canonical names from ref_teams + odds-feed display aliases from
      the ref_team_aliases seed) to team_id + canonical abbrev/name. Consumers
      normalize input the same way before joining on name_lower:
      lower(regexp_replace(trim(name), '^G[12] ', '')). Replaces the per-site
      inline CASE / _normalize_team_name band-aids that silently dropped odds for
      relocated franchises (e.g. the Athletics: "Athletics" vs "Oakland Athletics").
    columns:
      - name: name_lower
        description: Lowercased team-name variant; the join key.
        tests: [unique, not_null]
      - name: team_id
        description: MLB Stats API team identifier this name resolves to.
        tests: [not_null]
      - name: canonical_abbrev
        description: Canonical Statcast abbreviation (e.g. ATH, CLE).
        tests: [not_null]
      - name: canonical_name
        description: Canonical Stats API team name (e.g. Athletics, Cleveland Guardians).

  # ============================================================================
  # mart_game_spine  (Epic A1.11 — forward-looking game spine)
  # ============================================================================
  - name: mart_game_spine
    description: >
      Epic A1.11 — the single forward-looking game spine for the pregame feature
      pipeline. UNION of completed games (pass-through of mart_game_results) and
      today's scheduled-not-yet-played games (from stg_statsapi_games, for
      game_pks not yet in results, within a tight today±window). Feature marts
      spine on this instead of mart_game_results so the feature store holds
      today's games. Non-destructive: the completed branch is byte-for-byte
      mart_game_results, and the scheduled branch only adds today/future game_pks
      (never a historical date), so every past game's output is unchanged.
      Scheduled rows carry NULL scores (no result yet). Grain: one row per game_pk.
    columns:
      - name: game_pk
        description: MLB game identifier. Unique across completed + scheduled rows.
        tests:
          - not_null
          - unique
      - name: game_date
        description: Game datetime (completed) / scheduled date promoted to timestamp.
        tests:
          - not_null
      - name: game_type
        description: Game type code (R, S, F/D/L/W). Scheduled branch is R-only.
        tests:
          - not_null
      - name: home_team
        description: >
          Canonical home-team abbreviation. For scheduled games resolved via
          dim_team_name_lookup; not_null asserts every spine row maps to a team.
        tests:
          - not_null
      - name: away_team
        description: Canonical away-team abbreviation (resolved as home_team).
        tests:
          - not_null
      - name: is_scheduled
        description: >
          True for forward-looking rows sourced from the schedule (NULL scores);
          false for completed games from mart_game_results.
        tests:
          - not_null

  # ============================================================================
  # mart_batter_bat_tracking_profile
  # ============================================================================
  - name: mart_batter_bat_tracking_profile
    description: >
      One row per batter_id × game_date (regular season, 2023-07-14+ only).
      30-day rolling bat tracking averages from Hawk-Eye bat sensors: bat speed,
      swing length, and attack angle. Pre-2023 rows are absent; joins in
      feature_pregame_lineup_features produce NULLs for those games.
      Apply game_date < official_date leakage guard when joining. Card 8.E.

    columns:
      - name: batter_id
        description: MLB Stats API player identifier for the batter.
        tests: [not_null]

      - name: game_date
        description: Calendar date of the game(s) contributing to this profile row.
        tests: [not_null]

      - name: bat_speed_30d
        description: >
          Swing-count-weighted average bat speed (mph) over the trailing 30
          calendar days including the current game date. NULL before 2023-07-14.

      - name: swing_length_30d
        description: >
          Swing-count-weighted average swing length (ft) over the trailing 30
          calendar days including the current game date. NULL before 2023-07-14.

      - name: attack_angle_30d
        description: >
          Swing-count-weighted average attack angle (degrees) over the trailing
          30 calendar days including the current game date. NULL before
          2023-07-14. Positive = upward swing plane; higher values favor
          fly-ball contact against groundball pitchers.

  # ============================================================================
  # mart_batter_profile_summary
  # ============================================================================
  - name: mart_batter_profile_summary
    description: >
      One row per batter_id × game_year (2015+, minimum 100 PA).
      Cross-season hitting vector used for k-means batter archetype clustering
      (Card 7.1). Statcast batted-ball metrics (gb_pct, fb_pct, ld_pct,
      pull_pct, hard_hit_pct, barrel_pct, avg_exit_velocity) sourced from
      stg_batter_pitches joined via pitch_sk. K%, BB%, and ISO derived from
      plate_appearance_event terminal events in mart_pitch_play_event.
      FanGraphs projected k_pct / bb_pct joined as supplementary signals when
      available.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [batter_id, game_year]

    columns:

      - name: batter_id
        description: MLB Stats API player identifier for the batter.
        tests:
          - not_null

      - name: game_year
        description: Regular season year. Second component of the composite grain key.
        tests:
          - not_null

      - name: pa_count
        description: Total plate appearances in the season. Always ≥ 100 (model filter).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 100"

      - name: k_pct
        description: Strikeout rate (strikeouts / PA). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (k_pct between 0 and 1)"

      - name: bb_pct
        description: Walk rate (walks / PA). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (bb_pct between 0 and 1)"

      - name: iso
        description: >
          Isolated power (extra bases per at-bat). Typically between 0 and 0.4
          for qualified batters; capped test excludes rare extreme seasons.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (iso between 0 and 0.6)"

      - name: pull_pct
        description: >
          Proportion of balls in play hit to the batter's pull side.
          Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (pull_pct between 0 and 1)"

      - name: hard_hit_pct
        description: >
          Proportion of PA with exit velocity ≥ 95 mph. Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (hard_hit_pct between 0 and 1)"

      - name: gb_pct
        description: >
          Ground ball rate (ground balls / balls in play). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (gb_pct between 0 and 1)"

      - name: avg_exit_velocity
        description: >
          Mean exit velocity (mph) across all contact events in the season.
          Typically between 70 and 115 mph for qualified batters.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (avg_exit_velocity between 60 and 125)"

      - name: avg_xwoba
        description: >
          Mean expected weighted on-base average across all PA in the season.
          Typically between 0.2 and 0.6 for qualified batters.

      - name: fb_pct
        description: Fly ball rate (fly balls / balls in play). Between 0 and 1.

      - name: ld_pct
        description: Line drive rate (line drives / balls in play). Between 0 and 1.

      - name: barrel_pct
        description: >
          Barrel rate: exit velocity ≥ 98 mph and launch angle 26–30°, over all PA.

      - name: proj_k_pct
        description: >
          FanGraphs ZiPS projected strikeout rate for the season. NULL when no
          projection is available (e.g., pre-2015 or players without projections).

      - name: proj_bb_pct
        description: >
          FanGraphs ZiPS projected walk rate for the season. NULL when no
          projection is available.

  # ============================================================================
  # mart_pitcher_profile_summary
  # ============================================================================
  - name: mart_pitcher_profile_summary
    description: >
      One row per pitcher × game_year. Per-pitcher-season profile vector for
      k-means pitcher archetype clustering (Card 7.2). Joins mart_pitcher_arsenal_summary
      (pitch mix, velocity, movement, arm angle, Stuff+) with season-level outcome
      metrics (K%, BB%, whiff rate, GB rate) from stg_batter_pitches. Birth date joined
      from stg_statsapi_player_profiles for age computation in the clustering script.
      Season coverage: 2020+ (inherits from mart_pitcher_arsenal_summary). Minimum 100 BF.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, game_year]

    columns:
      - name: pitcher_id
        description: MLBAM pitcher ID. Joins to statsapi.pitcher_clusters and stg_statsapi_player_profiles.
        tests: [not_null]

      - name: game_year
        description: Season year. 2020+.
        tests: [not_null]

      - name: bf_count
        description: Batters faced in the season. Minimum 100 (gate enforced in mart).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 100"

      - name: k_pct
        description: Strikeout rate (strikeouts / BF). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (k_pct between 0 and 1)"

      - name: bb_pct
        description: Walk rate (walks / BF). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (bb_pct between 0 and 1)"

      - name: whiff_pct
        description: Swing-and-miss rate (swinging strikes / total swings). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (whiff_pct between 0 and 1)"

      - name: gb_pct
        description: Groundball rate (ground balls / balls in play). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (gb_pct between 0 and 1)"

      - name: fastball_pct
        description: Fastball family usage share (FF + SI + FC). Between 0 and 1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (fastball_pct between 0 and 1)"

      - name: overall_stuff_plus
        description: >
          FanGraphs composite Stuff+ score. 100 = league average; higher = better raw stuff.
          Fully populated for 2020+ in mart_pitcher_arsenal_summary (0 nulls).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (overall_stuff_plus between 0 and 250)"

      - name: fb_avg_velocity
        description: Average fastball velocity in mph.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (fb_avg_velocity between 60 and 105)"

  # ============================================================================
  # mart_closing_line_value
  # ============================================================================
  - name: mart_closing_line_value
    description: >
      One row per game_pk. Vig-free opening and closing implied home-win
      probability and O/U total line, averaged across all bookmakers that have
      both an opening and closing pre-game snapshot. Opening = first snapshot on
      game day (ET date = game_date). Closing = last snapshot before
      commence_time. CLV = close_vf_home - open_vf_home: positive means the
      market moved toward the home team winning by close. Sources:
      odds_snapshots_historical (2021-2025, approximated vig-free) and
      mart_odds_outcomes + mart_game_odds_bridge (2026+, proper vig-free via
      additive method). Card 8.S.

    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests:
          - not_null
          - unique

      - name: game_date
        description: Calendar date of the game.
        tests:
          - not_null

      - name: open_vf_home
        description: >
          Vig-free implied home win probability at the opening snapshot
          (first snapshot on game day). Approximated for historical data
          (2021-2025); proper additive vig-free for live data (2026+).

      - name: close_vf_home
        description: >
          Vig-free implied home win probability at the closing snapshot
          (last pre-game snapshot before commence_time).

      - name: clv_home_ml
        description: >
          close_vf_home - open_vf_home. Positive = market moved toward home
          team winning by close. NULL when no closing snapshot exists.

      - name: open_total_line
        description: O/U total line at the opening snapshot. NULL when no totals data.

      - name: close_total_line
        description: O/U total line at the closing snapshot.

      - name: clv_total
        description: >
          close_total_line - open_total_line. Positive = total moved up (more
          runs expected by close). NULL when totals unavailable.

      - name: n_books_with_clv
        description: Number of bookmakers contributing to the averaged CLV metrics.

      - name: data_source
        description: "'historical' (2021-2025) or 'live' (2026+)."
        tests:
          - accepted_values:
              arguments:
                values: ['historical', 'live']

  # ============================================================================
  # mart_prediction_clv
  # ============================================================================
  - name: mart_prediction_clv
    description: >
      One row per (score_date, game_pk, model_version). Joins
      daily_model_predictions to mart_closing_line_value to surface CLV metrics
      alongside model predictions. CLV columns are null for games with no
      closing snapshot (games not yet played or no odds data). The primary
      metric for model edge assessment is mean(clv_home_ml) across has_odds
      games: positive mean CLV confirms the model was consistently ahead of
      where the market settled. Card 8.S.

    columns:
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]

      - name: score_date
        description: Date on which the prediction was scored.
        tests: [not_null]

      - name: clv_home_ml
        description: >
          close_vf_home - open_vf_home from mart_closing_line_value. Null
          when the game has no closing snapshot (not yet played or no odds).

      - name: clv_total
        description: >
          close_total_line - open_total_line. Null when totals CLV unavailable.

      - name: has_clv
        description: True when clv_home_ml is populated (game has both open and close snapshots).

  # ============================================================================
  # mart_odds_line_movement
  # ============================================================================
  - name: mart_odds_line_movement
    description: >
      One row per game_pk. Opening and pre-game implied home-win probability and
      O/U total line, computed from intraday odds snapshots. Exposes h2h and
      totals line movement as signed deltas (pregame − open). Bookmaker: bovada.
      Sources: odds_snapshots_historical (2021–2025, Card 7.P2 backfill) and
      mart_odds_outcomes filtered to pre-game ingestions (2026+, Parlay API
      hourly snapshots via odds_snapshot.yml). Card 7.P3.
      Leakage guard (2026+ live path): ingestion_ts < real commence_time sourced
      from stg_parlayapi_canonical_events (Story 0.10). Falls back to the Parlay
      API placeholder (19:00:00Z) for events not yet in the canonical table.

    columns:

      - name: game_pk
        description: MLB Stats API game identifier.
        tests:
          - not_null
          - unique

      - name: game_date
        description: Calendar date of the game.
        tests:
          - not_null

      - name: h2h_line_movement
        description: >
          pregame_home_win_prob − open_home_win_prob. Positive = line moved
          toward home team. NULL when snapshot_count = 1.

      - name: total_line_movement
        description: >
          pregame_total_line − open_total_line. Positive = total moved up.
          NULL when snapshot_count = 1 or no totals data available.

      - name: snapshot_count
        description: Number of distinct pre-game snapshots available for the game.

      - name: data_source
        description: "'historical' (Card 7.P2 backfill) or 'live' (2026+ intraday)."
        tests:
          - accepted_values:
              arguments:
                values: ['historical', 'live']

      - name: bookmaker
        description: Bookmaker key used (bovada for all eras).

  # ============================================================================
  # mart_game_odds_bridge
  # ============================================================================
  - name: mart_game_odds_bridge
    description: >
      Bridge table linking every game in mart_game_results to its corresponding
      odds event_id(s) from The Odds API and/or Parlay API. Enables downstream
      models to combine game outcomes with pre-game betting odds from either source.
      Two source-specific columns (odds_api_event_id, parlay_api_event_id) preserve
      the full audit trail. The coalesced event_id column prefers Parlay API when
      both exist, falling back to Odds API for historical games — use this column
      for all downstream joins to mart_odds_outcomes.
      Priority by era: 2021–2025 = Odds API only; 2026 overlap = Parlay preferred;
      2026 post-cutover = Parlay API only.
      Join logic (A1.9): game_date = commence_date AND home_team_id = odds home_team_id
      AND away_team_id = odds away_team_id. Every feed/Stats API team name is
      resolved to a team_id through dim_team_name_lookup, so the join is immune to
      cross-source name drift ("Cleveland Indians" → Guardians, "Oakland Athletics"
      → Athletics, etc.) — new variants are added to the ref_team_aliases seed, not
      this model.
      Grain: one row per game_pk.

    columns:

      - name: game_pk
        description: >
          MLB game identifier. Primary key of this bridge. Foreign key to
          mart_game_results.game_pk.
        tests:
          - not_null
          - unique

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_type
        description: >
          Game type code from mart_game_results. R=Regular Season,
          S=Spring Training, F=Wild Card, D=Division Series, L=LCS,
          W=World Series.
        tests:
          - not_null

      - name: home_team_abbrev
        description: Statcast abbreviation of the home team (e.g. PHI).
        tests:
          - not_null

      - name: home_team_name
        description: Full name of the home team (e.g. Philadelphia Phillies).
        tests:
          - not_null

      - name: away_team_abbrev
        description: Statcast abbreviation of the away team (e.g. NYM).
        tests:
          - not_null

      - name: away_team_name
        description: Full name of the away team (e.g. New York Mets).
        tests:
          - not_null

      - name: home_team_id
        description: >
          A1.9 — MLB Stats API team_id of the home team, resolved from
          home_team_name via dim_team_name_lookup. The canonical join key to the
          odds sources. Not-null asserts every MLB game's home team resolves.
        tests:
          - not_null

      - name: away_team_id
        description: >
          A1.9 — MLB Stats API team_id of the away team, resolved from
          away_team_name via dim_team_name_lookup. The canonical join key to the
          odds sources. Not-null asserts every MLB game's away team resolves.
        tests:
          - not_null

      - name: odds_api_event_id
        description: >
          The Odds API event identifier for this game. Sourced from mart_odds_events.
          Null for games after the Odds API cutover (2026-05-23) and for any historical
          game not covered by The Odds API (~23-26% of regular season games 2021–2025).

      - name: parlay_api_event_id
        description: >
          The Parlay API event identifier for this game. Sourced from stg_parlayapi_odds.
          Null for historical games (2021–2025) that predate Parlay API ingestion.
          For doubleheader games, Parlay API collapses both games into one event_id —
          the second DH game_pk will have this column null (support ticket open).

      - name: event_id
        description: >
          Coalesced event identifier: COALESCE(parlay_api_event_id, odds_api_event_id).
          Parlay API is preferred when both are present (overlap period). Use this
          column for all downstream joins to mart_odds_outcomes — it automatically
          routes to Parlay API rows for 2026 games and Odds API rows for 2021–2025.
          Null only when neither source has odds for this game.

      - name: has_odds
        description: >
          True when at least one odds source (Odds API or Parlay API) has an event_id
          for this game. False for games with no odds coverage from either source.
        tests:
          - not_null

  # ============================================================================
  # mart_odds_events
  # ============================================================================
  - name: mart_odds_events
    description: >
      One row per MLB event sourced from The Odds API, deduplicating to the
      most recently ingested snapshot per event_id. Use as the authoritative
      event dimension when joining to mart_odds_outcomes.
      Grain: one row per event_id.

    columns:

      - name: event_id
        description: Unique event identifier assigned by The Odds API.
        tests:
          - not_null
          - unique

      - name: sport_key
        description: Sport key from The Odds API (e.g. baseball_mlb).
        tests:
          - not_null

      - name: sport_title
        description: Human-readable sport title (e.g. MLB).
        tests:
          - not_null

      - name: commence_time
        description: Scheduled game start time in UTC (TIMESTAMP_NTZ).
        tests:
          - not_null

      - name: commence_date
        description: Scheduled game start date in UTC, derived from commence_time.
        tests:
          - not_null

      - name: home_team
        description: Full name of the home team as returned by The Odds API.
        tests:
          - not_null

      - name: away_team
        description: Full name of the away team as returned by The Odds API.
        tests:
          - not_null

      - name: ingestion_ts
        description: Timestamp of the ingestion run that produced this snapshot.
        tests:
          - not_null

      - name: load_id
        description: UUID identifying the ingestion run batch.
        tests:
          - not_null

      - name: x_requests_used
        description: >
          Value of the x-requests-used API response header at ingestion time.
          Null if the header was absent.

      - name: x_requests_remaining
        description: >
          Value of the x-requests-remaining API response header at ingestion time.
          Null if the header was absent.

  # ============================================================================
  # mart_odds_outcomes
  # ============================================================================
  - name: mart_odds_outcomes
    description: >
      Unified odds outcomes from all ingestion sources. One row per
      (ingestion_ts, event_id, bookmaker_key, market_key, outcome_name).
      Historical rows (2021–2025) come from The Odds API; live rows (2026+)
      come from both Odds API and Parlay API during the parallel overlap
      period (through 2026-05-23), then Parlay API only after the 2026-06-01
      cutover. source_system discriminates the row origin. Odds API rows are
      deduplicated within a load_id to prevent duplicate rows from us/us2
      region overlap; Parlay API rows have no regional duplication.
      Grain: one row per (ingestion_ts, event_id, bookmaker_key, market_key,
      outcome_name).
      Discriminator: source_system ('odds_api' | 'parlay_api').

    columns:

      - name: ingestion_ts
        description: Timestamp of the ingestion run that produced this snapshot.
        tests:
          - not_null

      - name: load_id
        description: UUID identifying the ingestion run batch.
        tests:
          - not_null

      - name: x_requests_used
        description: >
          Value of the x-requests-used API response header at ingestion time.
          Always null for Parlay API rows (header not exposed by that API).

      - name: x_requests_remaining
        description: >
          Value of the x-requests-remaining API response header at ingestion time.
          Always null for Parlay API rows (header not exposed by that API).

      - name: market_requested
        description: >
          The markets query parameter sent to the upstream API for this row's
          ingestion run (e.g. h2h,totals).

      - name: region_requested
        description: >
          The regions query parameter sent to The Odds API (e.g. us,us2).
          Always null for Parlay API rows (no region parameter in that API).

      - name: source_system
        description: >
          Discriminator identifying which upstream API produced this row.
          'odds_api' for The Odds API (historical 2021–2025 and overlap period).
          'parlay_api' for the Parlay API (2026+ live and post-cutover).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['odds_api', 'parlay_api']

      - name: event_id
        description: >
          Unique event identifier assigned by the upstream API. For Odds API
          rows, this is the Odds API event ID (FK to mart_odds_events). For
          Parlay API rows, this is the Parlay API event ID.
        tests:
          - not_null

      - name: sport_key
        description: Sport key from the upstream API (e.g. baseball_mlb).
        tests:
          - not_null

      - name: sport_title
        description: Human-readable sport title (e.g. MLB).
        tests:
          - not_null

      - name: commence_time
        description: >
          Scheduled game start time in UTC (TIMESTAMP_NTZ).
          For Parlay API rows, this is a 19:00:00Z slate placeholder for all
          games — not the actual start time. Use bookmaker_last_update for
          pre-game leakage guards when working with Parlay API rows.
        tests:
          - not_null

      - name: commence_date
        description: >
          Game date in US/Pacific timezone, derived from commence_time via
          convert_timezone. For Parlay API rows, derived from the 19:00:00Z
          placeholder; reliable as a date but not a time.
        tests:
          - not_null

      - name: home_team
        description: Full name of the home team.
        tests:
          - not_null

      - name: away_team
        description: Full name of the away team.
        tests:
          - not_null

      - name: doubleheader_ambiguous
        description: >
          True when StatsAPI records a traditional (Y) or split (S) doubleheader
          for this (date, home_team, away_team) combination. The Parlay API
          collapses both DH games into a single event_id, so rows with this flag
          set represent ambiguous data. Always false for Odds API rows.
        tests:
          - not_null

      - name: bookmaker_key
        description: >
          Machine-readable bookmaker identifier (e.g. draftkings, fanduel).
          For historical Parlay API rows, bookmaker keys carry an _an suffix
          (e.g. draftkings_an, fanduel_an). Live Parlay API rows (2026+) use
          non-suffixed keys identical to Odds API keys.
        tests:
          - not_null

      - name: bookmaker_title
        description: Human-readable bookmaker name (e.g. DraftKings).
        tests:
          - not_null

      - name: bookmaker_last_update
        description: >
          Timestamp when the bookmaker last updated their odds for this event.
          For historical Parlay API rows (from the /historical endpoint), this
          is a placeholder timestamp rather than the true update time.

      - name: market_key
        description: >
          Market identifier. h2h = head-to-head (moneyline);
          totals = over/under total runs.
        tests:
          - not_null

      - name: market_last_update
        description: >
          Timestamp when this market's odds were last updated.
          Null for historical Parlay API rows (field absent from /historical endpoint).

      - name: outcome_name
        description: >
          Outcome label. For h2h markets, this is the team name. For totals
          markets, this is Over or Under.
        tests:
          - not_null

      - name: outcome_price_american
        description: >
          American-format odds for this outcome (e.g. -110, +150). Negative
          values indicate a favorite; positive values indicate an underdog.
          Rows where the upstream API sent explicit JSON null for price are
          excluded at the staging layer.
        tests:
          - not_null

      - name: outcome_price_decimal
        description: >
          Decimal-format odds derived from outcome_price_american.
          Positive American (≥100): (american / 100.0) + 1. Negative American (<0): (100.0 / ABS(american)) + 1.
          E.g. +150 → 2.50, -110 → ~1.909, -200 → 1.50.
          Null when outcome_price_american is zero (guard against division by zero).
        tests:
          - not_null:
              config:
                where: "outcome_price_american is not null and outcome_price_american != 0"

      - name: outcome_point
        description: >
          The over/under line for totals markets (e.g. 9.5). Null for h2h
          markets which have no point spread.

      - name: is_totals_market
        description: >
          True when outcome_point is not null, indicating this row belongs
          to a totals (over/under) market. False for h2h (moneyline) markets.
        tests:
          - not_null

      - name: is_home_outcome
        description: >
          True when outcome_name matches home_team, indicating this price
          is for the home team to win. False otherwise (including totals rows).
        tests:
          - not_null

      - name: is_away_outcome
        description: >
          True when outcome_name matches away_team, indicating this price
          is for the away team to win. False otherwise (including totals rows).
        tests:
          - not_null

  # ============================================================================
  # mart_odds_consensus
  # ============================================================================
  - name: mart_odds_consensus
    description: >
      Pre-game bookmaker consensus aggregation. One row per event_id.
      Aggregates vig-adjusted implied probabilities across all bookmakers
      in mart_odds_outcomes, filtered to pre-game snapshots only
      (ingestion_ts < commence_time). Card 3.11 benchmark: consensus Brier
      score = 0.2395, confirming these features carry signal for ML training.

      Sharp books (identified by Card 3.11): lowvig, betonlineag, bovada.
      Soft books: draftkings, fanduel, betmgm, williamhill_us, betrivers.

      Grain: one row per event_id. Rows exist only for events with at least
      one pre-game h2h bookmaker price.

    columns:

      - name: event_id
        description: >
          The Odds API event identifier. Primary key. Foreign key to
          mart_odds_events.event_id.
        tests:
          - not_null
          - unique

      - name: home_win_prob_consensus
        description: >
          Average vig-adjusted home win probability across all bookmakers with
          pre-game h2h prices for this event. Non-null for all rows.

      - name: home_win_prob_sharp
        description: >
          Average vig-adjusted home win probability across sharp books only
          (lowvig, betonlineag, bovada — identified by Card 3.11). Null when
          no sharp book had pre-game h2h coverage for this event.

      - name: home_win_prob_soft
        description: >
          Average vig-adjusted home win probability across soft books only
          (draftkings, fanduel, betmgm, williamhill_us, betrivers). Null when
          no soft book had pre-game h2h coverage for this event.

      - name: sharp_soft_ml_delta
        description: >
          home_win_prob_sharp minus home_win_prob_soft. Positive values indicate
          sharp books favor the home team more than soft books — a potential
          signal of sharp action. Null when either sharp or soft group has no
          coverage for this event.

      - name: ml_consensus_std
        description: >
          Standard deviation of vig-adjusted home win probability across all
          bookmakers. Higher values indicate disagreement across the market.
          Null (not 0.0) when only one bookmaker has coverage for this event.

      - name: market_bookmaker_count
        description: >
          Count of bookmakers with valid pre-game h2h prices for this event.
          Always >= 1 for all rows in this mart.

      - name: total_line_consensus
        description: >
          Average over/under total line across all bookmakers with pre-game
          totals prices. Null when no bookmaker has totals coverage.

      - name: total_line_std
        description: >
          Standard deviation of the over/under line across bookmakers. Null
          (not 0.0) when only one bookmaker has totals coverage. Low values
          indicate consensus on the line; higher values indicate disagreement.

      - name: over_prob_consensus
        description: >
          Average vig-adjusted over probability across all bookmakers with
          pre-game totals prices. Null when no bookmaker has totals coverage.

      - name: totals_bookmaker_count
        description: >
          Count of bookmakers with valid pre-game totals prices for this event.
          Null when no totals coverage exists. Diagnostic column — not passed
          through as a model signal feature in feature_pregame_odds_features.

  # ============================================================================
  # mart_bookmaker_disagreement
  # ============================================================================
  - name: mart_bookmaker_disagreement
    description: >
      Bookmaker disagreement features at morning snapshot grain. One row per
      game_pk for games with at least one h2h morning snapshot (6:00–8:30 AM ET
      on game_date). Captures cross-book dispersion in implied probabilities and
      totals lines as ML features. Card 8.T.

      Leakage guard: only ingestion_ts values between 6:00 AM and 8:30 AM ET on
      game_date are included. The earliest snapshot per game × bookmaker in that
      window is used — this is the morning consensus before sharp action has
      meaningfully moved lines.

      Bookmaker tiers: sharp = lowvig, betonlineag, bovada;
      soft = williamhill_us, betmgm, caesars, fanduel; neutral = all others.

      NULL rules: all features are NULL when n_books_available < 2 except
      sharp_soft_ml_spread (which is NULL when fewer than 1 sharp or 1 soft
      book is present) and n_books_available/stale_book_flag (always populated).
      Imputed in preprocessing.py — no COALESCE in this mart.

    columns:

      - name: game_pk
        description: MLB Stats API game identifier. Primary key.
        tests:
          - not_null
          - unique

      - name: game_date
        description: Calendar date of the game.
        tests:
          - not_null

      - name: ml_implied_prob_std
        description: >
          Standard deviation of vig-free home win probability across all books
          with morning h2h coverage. NULL when fewer than 2 books are available.
          Values above 0.15 are implausible (sanity check threshold).

      - name: ml_implied_prob_range
        description: >
          Max minus min vig-free home win probability across all books. NULL when
          fewer than 2 books are available.

      - name: totals_line_std
        description: >
          Standard deviation of the total line across all books with morning
          totals coverage. NULL when fewer than 2 books have totals odds.

      - name: totals_line_range
        description: >
          Max minus min total line across books. NULL when fewer than 2 books
          have totals odds.

      - name: sharp_soft_ml_spread
        description: >
          Average vig-free home win prob (sharp books) minus average vig-free
          home win prob (soft books). NULL when fewer than 1 sharp or 1 soft
          book has morning coverage. Range expected within [-0.10, 0.10].

      - name: n_books_available
        description: >
          Number of distinct bookmakers with h2h morning snapshot coverage.
          Always >= 1 for rows in this mart. Used to null-guard disagreement
          features when only one book is present.

      - name: stale_book_flag
        description: >
          1 if any book's morning snapshot is more than 60 minutes older than
          the freshest book's morning snapshot (stale = book has not yet digested
          sharp action). 0 for all normal cases including single-book games.

  # ============================================================================
  # mart_pitch_game_context
  # ============================================================================
  - name: mart_pitch_game_context
    description: >
      Game-level and situational context at the time of each pitch. Covers game
      identifiers, score state, count/base state, and win/run expectancy.
      Grain: one row per pitch. Join key: pitch_sk.

    columns:

      - name: pitch_sk
        description: >
          Surrogate key derived via md5_number_upper64 on the concatenation of
          game_pk, at_bat_number, batter_id, pitch_number, pitcher_id, and
          inning_half. Uniquely identifies one pitch within a plate appearance
          within a game.
        tests:
          - not_null
          - unique

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: at_bat_number
        description: Sequential plate appearance number within the game.
        tests:
          - not_null

      - name: pitch_number
        description: Pitch sequence number within the current plate appearance.
        tests:
          - not_null

      - name: batter_id
        description: MLB Player ID for the batter. Renamed from batter.
        tests:
          - not_null

      - name: pitcher_id
        description: MLB Player ID for the pitcher. Renamed from pitcher.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null

      - name: game_type
        description: >
          Game type code. E=Exhibition, S=Spring Training, R=Regular Season,
          F=Wild Card, D=Division Series, L=LCS, W=World Series.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['E', 'S', 'R', 'F', 'D', 'L', 'W']

      - name: home_team
        description: Abbreviation of the home team.
        tests:
          - not_null

      - name: away_team
        description: Abbreviation of the away team.
        tests:
          - not_null

      - name: inning
        description: Pre-pitch inning number.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: inning_half
        description: >
          Top or bottom half of the inning. Renamed from inning_topbot.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['Top', 'Bot']

      - name: outs_when_up
        description: Pre-pitch number of outs in the inning.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: [0, 1, 2]

      - name: balls
        description: Pre-pitch ball count.
        tests:
          - not_null
          - accepted_values:
                config:
                  severity: warn
                  error_if: ">= 26"
                  warn_if: ">= 1"
                arguments:
                  values: [0, 1, 2, 3]

      - name: strikes
        description: Pre-pitch strike count.
        tests:
          - not_null
          - accepted_values:
                config:
                  severity: warn
                arguments:
                  values: [0, 1, 2]

      - name: count_state
        description: >
          Derived. Pre-pitch count expressed as a "balls-strikes" string label.
          e.g. "1-2", "3-0", "0-0". Concatenated from balls and strikes columns.
        tests:
          - not_null

      - name: count_leverage
        description: >
          Derived. Broad categorization of count advantage at the time of the pitch.
          full = 3-2 count; hitters = 3 balls (not full); pitchers = 2 strikes
          (not full); neutral = all other counts.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['full', 'hitters', 'pitchers', 'neutral']

      - name: base_state
        description: >
          Derived. Three-character string representing which bases are occupied
          before the pitch. Characters are positional: index 1 = 1st base,
          index 2 = 2nd base, index 3 = 3rd base. Occupied = the base number,
          empty = "-". e.g. "1--" = runner on 1st only, "123" = bases loaded,
          "---" = bases empty.
        tests:
          - not_null

      - name: runner_on_1b
        description: >
          Derived. True if a runner occupied 1st base before the pitch.
          Derived from runner_on_1b_id being non-null.
        tests:
          - not_null

      - name: runner_on_2b
        description: >
          Derived. True if a runner occupied 2nd base before the pitch.
          Derived from runner_on_2b_id being non-null.
        tests:
          - not_null

      - name: runner_on_3b
        description: >
          Derived. True if a runner occupied 3rd base before the pitch.
          Derived from runner_on_3b_id being non-null.
        tests:
          - not_null

      - name: runners_on_base
        description: >
          Derived. True if any base was occupied before the pitch. True when any
          of runner_on_1b, runner_on_2b, or runner_on_3b is true.
        tests:
          - not_null

      - name: pre_pitch_home_score
        description: Home team score before the pitch. Renamed from home_score.
        tests:
          - not_null

      - name: pre_pitch_away_score
        description: Away team score before the pitch. Renamed from away_score.
        tests:
          - not_null

      - name: pre_pitch_bat_score
        description: Batting team score before the pitch. Renamed from bat_score.
        tests:
          - not_null

      - name: pre_pitch_fld_score
        description: Fielding team score before the pitch. Renamed from fld_score.
        tests:
          - not_null

      - name: post_pitch_home_score
        description: Home team score after the pitch. Renamed from post_home_score.
        tests:
          - not_null

      - name: post_pitch_away_score
        description: Away team score after the pitch. Renamed from post_away_score.
        tests:
          - not_null

      - name: post_pitch_bat_score
        description: Batting team score after the pitch. Renamed from post_bat_score.
        tests:
          - not_null

      - name: post_pitch_fld_score
        description: Fielding team score after the pitch. Renamed from post_fld_score.
        tests:
          - not_null

      - name: home_score_diff
        description: >
          Score differential from the home team's perspective before the pitch.
          Not present in legacy CSV docs; derived field in Statcast API exports.

      - name: bat_score_diff
        description: >
          Score differential from the batting team's perspective before the pitch.
          Not present in legacy CSV docs; derived field in Statcast API exports.

      - name: pre_pitch_home_win_exp
        description: >
          Home team win expectancy before the pitch, expressed as a probability
          between 0 and 1. Not present in legacy CSV docs; standard Statcast
          API field. Renamed from home_win_exp.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or (pre_pitch_home_win_exp between 0 and 1)"

      - name: pre_pitch_bat_win_exp
        description: >
          Batting team win expectancy before the pitch, expressed as a probability
          between 0 and 1. Not present in legacy CSV docs; standard Statcast
          API field. Renamed from bat_win_exp.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or (pre_pitch_bat_win_exp between 0 and 1)"

      - name: delta_home_win_exp
        description: >
          Change in home team win expectancy before and after the plate appearance.

      - name: delta_run_exp
        description: Change in run expectancy before and after the pitch.

      - name: delta_pitcher_run_exp
        description: >
          Run expectancy delta from the pitcher's perspective. Derived as the
          inverse of delta_run_exp (delta_run_exp * -1). Not present in legacy
          CSV docs; included in newer Statcast API exports as delta_pitcher_run_exp.


  # ============================================================================
  # mart_pitch_pitcher_profile
  # ============================================================================
  - name: mart_pitch_pitcher_profile
    description: >
      Pitcher identity and usage context at the time of each pitch. Pitcher name
      is resolved via a left join to ref_players on pitcher_id. Grain: one row
      per pitch. Join key: pitch_sk.

    columns:

      - name: pitch_sk
        description: >
          Surrogate key derived via md5_number_upper64 on the concatenation of
          game_pk, at_bat_number, batter_id, pitch_number, pitcher_id, and
          inning_half. Uniquely identifies one pitch within a plate appearance
          within a game.
        tests:
          - not_null
          - unique

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null

      - name: at_bat_number
        description: Sequential plate appearance number within the game.
        tests:
          - not_null

      - name: pitch_number
        description: Pitch sequence number within the current plate appearance.
        tests:
          - not_null

      - name: pitcher_id
        description: MLB Player ID for the pitcher. Renamed from pitcher.
        tests:
          - not_null

      - name: pitcher_first_name
        description: >
          Pitcher's first name resolved from ref_players on pitcher_id.
          Null if pitcher_id is not present in ref_players.

      - name: pitcher_last_name
        description: >
          Pitcher's last name resolved from ref_players on pitcher_id.
          Null if pitcher_id is not present in ref_players.

      - name: pitcher_name
        description: >
          Pitcher's display name (player_name field) resolved from ref_players
          on pitcher_id. Null if pitcher_id is not present in ref_players.

      - name: pitcher_hand
        description: Pitcher's throwing hand. L=Left, R=Right. Renamed from p_throws.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R']

      - name: pitcher_age
        description: >
          Pitcher's age during the season using the current Statcast calculation
          method. Renamed from age_pit.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or (pitcher_age between 15 and 60)"

      - name: pitcher_age_legacy
        description: >
          Pitcher's age using the legacy MLB calculation (as of June 30 of the
          season). Renamed from age_pit_legacy.

      - name: pitcher_times_thru_order
        description: >
          How many times the pitcher has been through the batting order in this
          game at the time of the pitch. Renamed from n_thruorder_pitcher.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or (pitcher_times_thru_order between 0 and 10)"

      - name: pitcher_days_since_prev_game
        description: >
          Calendar days since the pitcher last appeared in a game.
          Renamed from pitcher_days_since_prev_game.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or pitcher_days_since_prev_game >= 0"

      - name: pitcher_days_until_next_game
        description: >
          Calendar days until the pitcher's next game appearance.
          Renamed from pitcher_days_until_next_game.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or pitcher_days_until_next_game >= 0"

      - name: pitcher_rest_bucket
        description: >
          Derived. Categorization of pitcher rest based on days since previous
          game. back_to_back = 0–1 days; normal_rest = 2–4 days;
          extra_rest = 5–7 days; extended_rest = 8+ days;
          unknown = days_since_prev_game is null.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['back_to_back', 'normal_rest', 'extra_rest',
                           'extended_rest', 'unknown']


  # ============================================================================
  # mart_pitch_hitter_profile
  # ============================================================================
  - name: mart_pitch_hitter_profile
    description: >
      Batter identity and at-bat context at the time of each pitch. Batter name
      is resolved via a left join to ref_players on batter_id. Runner IDs are
      included for downstream baserunning joins. Grain: one row per pitch.
      Join key: pitch_sk.

    columns:

      - name: pitch_sk
        description: >
          Surrogate key derived via md5_number_upper64 on the concatenation of
          game_pk, at_bat_number, batter_id, pitch_number, pitcher_id, and
          inning_half. Uniquely identifies one pitch within a plate appearance
          within a game.
        tests:
          - not_null
          - unique

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null

      - name: at_bat_number
        description: Sequential plate appearance number within the game.
        tests:
          - not_null

      - name: pitch_number
        description: Pitch sequence number within the current plate appearance.
        tests:
          - not_null

      - name: batter_id
        description: MLB Player ID for the batter. Renamed from batter.
        tests:
          - not_null

      - name: batter_first_name
        description: >
          Batter's first name resolved from ref_players on batter_id.
          Null if batter_id is not present in ref_players.

      - name: batter_last_name
        description: >
          Batter's last name resolved from ref_players on batter_id.
          Null if batter_id is not present in ref_players.

      - name: batter_name
        description: >
          Batter's display name (player_name field) resolved from ref_players
          on batter_id. Null if batter_id is not present in ref_players.

      - name: batter_hand
        description: >
          Side of the plate the batter stands on. L=Left, R=Right.
          Renamed from stand.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R', 'S']
                    # S = switch hitter; Statcast can record the actual side
                    # faced in a given PA for switch hitters

      - name: batter_age
        description: >
          Batter's age during the season using the current Statcast calculation
          method. Renamed from age_bat.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or (batter_age between 15 and 60)"

      - name: batter_age_legacy
        description: >
          Batter's age using the legacy MLB calculation (as of June 30 of the
          season). Renamed from age_bat_legacy.

      - name: pitcher_hand
        description: Pitcher's throwing hand. L=Left, R=Right. Renamed from p_throws.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R']

      - name: matchup_handedness
        description: >
          Derived. Describes the handedness matchup between batter and pitcher.
          same_hand = batter and pitcher share the same throwing/stance hand
          (e.g. RHP vs RHB); opposite_hand = they differ (e.g. RHP vs LHB).
          Derived by comparing batter_hand and pitcher_hand.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['same_hand', 'opposite_hand']

      - name: batter_prior_pas_this_game
        description: >
          Number of plate appearances the batter has had earlier in this game
          before the current PA. Renamed from n_priorpa_thisgame_player_at_bat.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or batter_prior_pas_this_game >= 0"

      - name: batter_days_since_prev_game
        description: >
          Calendar days since the batter last appeared in a game.
          Renamed from batter_days_since_prev_game.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or batter_days_since_prev_game >= 0"

      - name: batter_days_until_next_game
        description: >
          Calendar days until the batter's next game appearance.
          Renamed from batter_days_until_next_game.
        tests:
          - dbt_utils.expression_is_true:
                arguments:
                  expression: "is null or batter_days_until_next_game >= 0"

      - name: runner_on_1b_id
        description: >
          Pre-pitch MLB Player ID of runner on 1st base. Null if base is empty.
          Renamed from on_1b.

      - name: runner_on_2b_id
        description: >
          Pre-pitch MLB Player ID of runner on 2nd base. Null if base is empty.
          Renamed from on_2b.

      - name: runner_on_3b_id
        description: >
          Pre-pitch MLB Player ID of runner on 3rd base. Null if base is empty.
          Renamed from on_3b.


  # ============================================================================
  # mart_pitch_characteristics
  # ============================================================================
  - name: mart_pitch_characteristics
    description: >
