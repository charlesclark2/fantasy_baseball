  # ============================================================================
  # mart_pitcher_rolling_stats
  # ============================================================================
  - name: mart_pitcher_rolling_stats
    description: >
      Rolling pitcher performance statistics for every pitcher across four
      aggregation windows: trailing 7 days, trailing 14 days, trailing 30 days,
      and season-to-date. Designed as a primary feature source for game outcome
      prediction — a starter's recent form is more predictive than their season
      line, especially after injuries or mechanical changes. Includes K%, BB%,
      whiff rate, swinging strike rate, batter chase rate, barrel rate allowed,
      hard-hit rate allowed, xwOBA against, average fastball velocity, and
      average release extension. Starter is defined as the pitcher who threw
      the first pitch for their team in the game. Regular season only
      (game_type = 'R'). Grain: one row per pitcher × game. Join keys: pitcher_id, game_date.

    tests:
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d <= games_14d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_14d <= games_30d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "batters_faced >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "pitch_count >= batters_faced"

    columns:

      - name: game_pk
        description: Unique MLB game identifier. Foreign key to mart_game_results.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 2008"

      - name: pitcher_id
        description: >
          MLB Player ID for the pitcher. Renamed from pitcher in stg_batter_pitches.
        tests:
          - not_null

      - name: pitcher_hand
        description: >
          Pitching hand of the pitcher. Renamed from p_throws in stg_batter_pitches.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R']

      - name: pitching_team
        description: >
          Statcast abbreviation for the pitcher's team. Derived from home_team or
          away_team based on inning_half.
        tests:
          - not_null

      - name: facing_team
        description: Statcast abbreviation for the opposing (batting) team.
        tests:
          - not_null

      - name: is_starter
        description: >
          True when this pitcher was the starter (threw the first pitch for their
