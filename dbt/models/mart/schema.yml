  # ============================================================================
  # mart_batter_rolling_stats
  # ============================================================================
  - name: mart_batter_rolling_stats
    description: >
      Rolling batter performance statistics for every batter across four
      aggregation windows: trailing 7 days, trailing 14 days, trailing 30 days,
      and season-to-date. Covers traditional rate stats (AVG, OBP, SLG, OPS,
      wOBA), expected metrics (xwOBA, xBA, xSLG), batted-ball quality
      (hard-hit rate, barrel rate), and plate-discipline metrics (K%, BB%,
      whiff rate, swinging strike rate, chase rate, zone swing rate). Single-game
      actuals are included for reference but rolling windows are the intended
      feature source due to small sample noise. Regular season only
      (game_type = 'R'). Grain: one row per batter × game. Join keys: batter_id, game_date.

    tests:
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d <= games_14d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_14d <= games_30d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "pa_count >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "pitches_seen >= pa_count"

    columns:

      - name: game_pk
        description: Unique MLB game identifier. Foreign key to mart_game_results.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 2008"

      - name: batter_id
        description: >
          MLB Player ID for the batter. Renamed from batter in stg_batter_pitches.
        tests:
          - not_null

      - name: batter_hand
        description: >
          Side of the plate the batter stands on. Renamed from stand in
          stg_batter_pitches.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R']

      - name: batting_team
        description: >
          Statcast abbreviation for the batter's team. Derived from home_team or
          away_team based on inning_half.
        tests:
          - not_null

      - name: opposing_team
        description: Statcast abbreviation for the opposing (pitching) team.
        tests:
          - not_null

      # ── Single-game actuals ───────────────────────────────────────────────────

      - name: pa_count
        description: Total plate appearances for this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: pitches_seen
        description: Total pitches seen (all pitch events) by this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: hits
        description: Hits (1B + 2B + 3B + HR) recorded by this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: home_runs
        description: Home runs hit by this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: strikeouts
        description: Strikeouts recorded against this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: walks
        description: Walks (BB + IBB) drawn by this batter in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: avg
        description: >
          Batting average for this game: hits / at-bats. At-bats exclude BB,
          IBB, HBP, SF, sac bunts, and catcher interference. High single-game
          variance; use rolling windows for predictive features.

      - name: obp
        description: >
          On-base percentage for this game: (H + BB + HBP) / (AB + BB + HBP + SF).
          Denominator excludes sac bunts and catcher interference.

      - name: slg
        description: >
          Slugging percentage for this game: total bases / at-bats.

      - name: ops
        description: >
          On-base plus slugging for this game: OBP + SLG.

      - name: woba
        description: >
          Realized wOBA for this game: sum(woba_value) / sum(woba_denom).
          Null when all PAs have woba_denom = 0 (e.g., only IBBs).

      - name: xwoba
        description: >
          Expected wOBA based on exit velocity and launch angle.
          Null when no in-play contact data exists for this game.

      - name: xba
        description: >
          Expected batting average based on exit velocity and launch angle.
          Renamed from estimated_ba_using_speedangle in stg_batter_pitches.

      - name: xslg
        description: >
          Expected slugging based on exit velocity and launch angle.
          Renamed from estimated_slg_using_speedangle in stg_batter_pitches.

      - name: k_pct
        description: >
          Strikeout rate for this game: strikeouts / plate appearances.

      - name: bb_pct
        description: >
          Walk rate for this game: walks / plate appearances.

      - name: hard_hit_pct
        description: >
          Hard-hit rate for this game: batted balls with exit velocity >= 95 mph
          / total batted balls. Null when no batted-ball data exists.

      - name: barrel_pct
        description: >
          Barrel rate for this game: batted balls with launch_speed_angle_zone = 6
          / total batted balls. Null when no batted-ball data exists.

      - name: whiff_rate
        description: >
          Whiff rate for this game: swing-and-miss pitches / total swings.
          Excludes foul_tip (contact made).

      - name: swinging_strike_rate
        description: >
          Swinging strike rate (SwStr%) for this game: swing-and-miss pitches
          / total pitches seen. Differs from whiff_rate in the denominator.

      - name: chase_rate
        description: >
          Chase rate for this game: swings on pitches outside the strike zone
          (Statcast zones 11-14) / total out-of-zone pitches seen. Lower values
          indicate better plate discipline.

      - name: zone_swing_rate
        description: >
          Zone swing rate for this game: swings on pitches inside the strike zone
          (Statcast zones 1-9) / total in-zone pitches seen. Higher values
          indicate better recognition and aggression on strikes.

      # ── Rolling 7-day ─────────────────────────────────────────────────────────

      - name: games_7d
        description: Number of games played by this batter in the trailing 7 calendar days.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: pa_count_7d
        description: Total plate appearances over the trailing 7 calendar days.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: avg_7d
        description: Rolling 7-day batting average.

      - name: obp_7d
        description: Rolling 7-day on-base percentage.

      - name: slg_7d
        description: Rolling 7-day slugging percentage.

      - name: ops_7d
        description: Rolling 7-day OPS. Computed as rolling OBP + rolling SLG from accumulated numerators/denominators, not as avg(OBP) + avg(SLG).

      - name: woba_7d
        description: Rolling 7-day realized wOBA.

      - name: xwoba_7d
        description: Rolling 7-day expected wOBA.

      - name: xba_7d
        description: Rolling 7-day expected batting average.

      - name: xslg_7d
        description: Rolling 7-day expected slugging.

      - name: k_pct_7d
        description: Rolling 7-day strikeout rate.

      - name: bb_pct_7d
        description: Rolling 7-day walk rate.

      - name: hard_hit_pct_7d
        description: Rolling 7-day hard-hit rate.

      - name: barrel_pct_7d
        description: Rolling 7-day barrel rate.

      - name: whiff_rate_7d
        description: Rolling 7-day whiff rate.

      - name: swinging_strike_rate_7d
        description: Rolling 7-day swinging strike rate.

      - name: chase_rate_7d
        description: Rolling 7-day chase rate (out-of-zone swing rate).

      - name: zone_swing_rate_7d
        description: Rolling 7-day zone swing rate (in-zone swing rate).

      # ── Rolling 14-day ────────────────────────────────────────────────────────

      - name: games_14d
        description: Number of games played by this batter in the trailing 14 calendar days.
