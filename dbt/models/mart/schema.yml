  - name: mart_starting_pitcher_game_log
    description: >
      Game-level log for pitchers who qualify as the starting pitcher.
      Grain: pitcher_id × game_pk. One row per qualifying start.

      Starter definition: the pitcher who threw the first pitch for their team
      in the game AND who meets at least one threshold — threw ≥ 20 pitches OR
      appeared in ≥ 3 distinct innings. This floor excludes openers used for
      one- or two-batter platoon matchups while retaining both traditional
      starters and bulk pitchers who enter after a true opener.

      Filtered to regular season games (game_type = 'R') only.
      Foundation for rolling pitcher workload models and days-of-rest derivation.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, game_pk]
      # Cross-column checks must live at model level — column-level expression_is_true
      # prepends the column name, so multi-column expressions go here instead.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "batting_team != pitching_team"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "away_team != home_team"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_pitches >= batters_faced"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "outs_recorded <= batters_faced * 3"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "home_runs_allowed <= hits_allowed"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "strikeouts <= batters_faced"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "walks <= batters_faced"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hit_by_pitch <= batters_faced"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hits_allowed <= batters_faced"
      # Tenths digit of innings_pitched can only be 0, 1, or 2
      - dbt_utils.expression_is_true:
          arguments:
            expression: "mod(round(innings_pitched * 10)::integer, 10) in (0, 1, 2)"

    columns:
      # ── Game context ───────────────────────────────────────────────────────────
      - name: game_pk
        description: Unique MLB game identifier.
        tests: [not_null]
      - name: game_date
        description: Date the game was played.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= '2015-04-01'"
      - name: game_year
        description: Season year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"
      - name: pitcher_id
        description: MLB Player ID for the starting pitcher.
        tests: [not_null]
      - name: pitching_team
        description: Team abbreviation of the pitcher's team for this game.
        tests: [not_null]
      - name: batting_team
        description: >
          Team abbreviation of the opposing (batting) team. Must differ from
          pitching_team — a team cannot pitch against itself.
        tests: [not_null]
      - name: home_team
        description: Home team abbreviation.
      - name: away_team
        description: Away team abbreviation. Must differ from home_team.
      - name: is_home_team
        description: True if the pitcher's team was the home team in this game.

      # ── Volume / workload ──────────────────────────────────────────────────────
      - name: total_pitches
        description: >
          Total pitches thrown by the pitcher in this start. Must be at least
          as large as batters_faced since every batter sees at least one pitch.
        tests: [not_null]
      - name: batters_faced
        description: >
          Number of distinct plate appearances the pitcher was involved in,
          including any at-bat they entered mid-count.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: outs_recorded
        description: >
          Total outs the pitcher was credited with recording, including
          double-play and strikeout-double-play events. Cannot exceed three
          times the number of batters faced (a triple play being the upper bound
          per at-bat).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: innings_pitched
        description: >
          Innings pitched in traditional baseball display format — whole innings
          plus tenths representing thirds (e.g., 6.1 = six and one-third innings,
          6.2 = six and two-thirds). Derived as floor(outs_recorded / 3) +
          mod(outs_recorded, 3) × 0.1. Use outs_recorded for arithmetic;
          use innings_pitched for display only. The tenths digit can only be
          0, 1, or 2 — a value of X.3 would indicate a data error.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      # ── Outcome counts ─────────────────────────────────────────────────────────
      - name: strikeouts
        description: >
          Total strikeouts recorded in this start. Cannot exceed batters faced —
          a pitcher cannot strike out more batters than they faced.
        tests: [not_null]
      - name: walks
        description: >
          Total walks (including intentional walks) issued in this start.
          Cannot exceed batters faced.
        tests: [not_null]
      - name: hit_by_pitch
        description: >
          Total batters hit by pitch in this start. Cannot exceed batters faced.
        tests: [not_null]
      - name: home_runs_allowed
        description: >
          Total home runs allowed in this start. Home runs are a subset of hits,
          so home_runs_allowed must not exceed hits_allowed.
        tests: [not_null]
      - name: hits_allowed
        description: >
          Total hits allowed (singles, doubles, triples, home runs) in this
          start. Cannot exceed batters faced.
        tests: [not_null]

      # ── Rate stats ─────────────────────────────────────────────────────────────
      - name: xwoba_against
        description: >
          Expected weighted on-base average (xwOBA) against for this start.
          Computed as the sum of coalesced xwOBA values (expected for batted
          balls; actual wOBA value for strikeouts, walks, and HBP where no
          expected component exists) divided by wOBA denominators. League
          average is approximately 0.320. Null only when no wOBA-denominator
          plate appearances occurred (extremely rare edge case).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"
      - name: avg_fastball_velo
        description: >
          Average velocity (mph) of fastball-type pitches in this start, rounded
          to one decimal. Includes 4-seam fastball (FF), sinker (SI), and cutter
          (FC). Null if no fastball-type pitches were thrown (e.g., soft-tossers
          classified entirely as off-speed). Valid range for MLB pitchers
          is 70–105 mph.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 70 and 105"

  - name: mart_bullpen_workload
    description: >
      Grain: pitching_team × game_pk. One row per team per game played.
      Tracks bullpen fatigue entering each game using rolling windows over the
      preceding 1, 3, and 7 calendar days.

      Bullpen definition: any pitcher who appears in a game but is not the
      qualifying starter in mart_starting_pitcher_game_log.

      Closer and high-leverage appearances are proxied from inning data —
      high-leverage = inning 7+, closer = inning 9+. Role labels are not
      available in the Statcast source.

      Rolling windows use an upper bound of 1 day prior so current-game
      bullpen usage never leaks into the fatigue predictors. All rolling
      columns will be null for a team's first appearance in the dataset
      (no prior-day data exists).

      Doubleheader handling: rolling windows aggregate to calendar-date
      level before computing preceding-day sums. Both games of a doubleheader
      share the same prior-day fatigue values.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, pitching_team]
      # Monotonicity: longer windows must be >= shorter windows (when both populated)
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              bullpen_pitches_prev_3d is null
              or bullpen_pitches_prev_1d is null
              or bullpen_pitches_prev_3d >= bullpen_pitches_prev_1d
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              bullpen_pitches_prev_7d is null
              or bullpen_pitches_prev_3d is null
              or bullpen_pitches_prev_7d >= bullpen_pitches_prev_3d
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              pitchers_used_prev_7d is null
              or pitchers_used_prev_3d is null
              or pitchers_used_prev_7d >= pitchers_used_prev_3d
      # Teams must differ
      - dbt_utils.expression_is_true:
          arguments:
            expression: "home_team != away_team"

    columns:
      # ── Identifiers ───────────────────────────────────────────────────────────
      - name: game_pk
        description: Unique MLB game identifier.
        tests: [not_null]
      - name: game_date
        description: Date the game was played.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= '2015-04-01'"
      - name: game_year
        description: Season year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"
      - name: pitching_team
        description: Team abbreviation of the team whose bullpen is being profiled.
        tests: [not_null]
      - name: home_team
        description: Home team abbreviation.
      - name: away_team
        description: Away team abbreviation.

      # ── Current game context ──────────────────────────────────────────────────
      - name: bullpen_pitches_today
        description: Total pitches thrown by this team's bullpen in the current game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: pitchers_used_today
        description: Distinct relievers who appeared for this team in the current game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: reliever_appearances_today
        description: Total reliever appearance slots used in the current game (may exceed pitchers_used_today if a pitcher enters multiple times, which is rare but possible).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= pitchers_used_today"
      - name: had_high_leverage_appearance
        description: >
          1 if any reliever pitched in inning 7 or later in this game; 0 otherwise.
          Proxy for whether the team deployed late-inning specialists.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: had_closer_appearance
        description: >
          1 if any reliever pitched in inning 9 or later in this game; 0 otherwise.
          Proxy for closer usage; does not confirm the pitcher holds an official
          closer role.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

      # ── Prior-day fatigue predictors ──────────────────────────────────────────
      - name: bullpen_pitches_prev_1d
        description: >
          Total bullpen pitches thrown by this team in the 1 calendar day
          immediately preceding the game date. Null if no games were played
          in that window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: bullpen_pitches_prev_3d
        description: >
          Total bullpen pitches thrown by this team in the 3 calendar days
          preceding the game date (days −3 through −1). Null if no games
          were played in that window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: bullpen_pitches_prev_7d
        description: >
          Total bullpen pitches thrown by this team in the 7 calendar days
          preceding the game date (days −7 through −1). Null if no games
          were played in that window. Primary fatigue window for weekly
          workload modeling.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: pitchers_used_prev_3d
        description: >
          Sum of distinct-per-game reliever counts across the prior 3 days.
          Represents total reliever slots consumed, not a strict distinct
          count (a pitcher appearing on two of those days is counted twice).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: pitchers_used_prev_7d
        description: >
          Sum of distinct-per-game reliever counts across the prior 7 days.
          See pitchers_used_prev_3d for interpretation note.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: reliever_appearances_prev_3d
        description: Total individual reliever appearances (pitcher-game slots) used by this team in the prior 3 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: reliever_appearances_prev_7d
        description: Total individual reliever appearances (pitcher-game slots) used by this team in the prior 7 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: high_leverage_used_prev_2d
        description: >
          1 if this team deployed a reliever in inning 7+ in either of the 2
          calendar days preceding this game; 0 if games were played but no
          high-leverage reliever appeared; null if no games were played.
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: closer_used_prev_1d
        description: >
          1 if this team deployed a reliever in inning 9+ in the calendar day
          immediately preceding this game; 0 if a game was played but no
          9th-inning reliever appeared; null if no game was played.
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: closer_used_prev_2d
        description: >
          1 if this team deployed a reliever in inning 9+ in either of the 2
          calendar days preceding this game; 0 if games were played but no
          9th-inning reliever appeared; null if no games were played.
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: bullpen_ip_prev_1d
        description: >
          Bullpen innings pitched (outs_recorded / 3) by this team in the 1
          calendar day immediately preceding the game date. Null if no games
          were played in that window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or bullpen_ip_prev_1d >= 0"
      - name: bullpen_ip_prev_2d
        description: >
          Bullpen innings pitched (outs_recorded / 3) by this team in the 2
          calendar days immediately preceding the game date.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or bullpen_ip_prev_2d >= 0"
      - name: bullpen_ip_prev_3d
        description: >
          Bullpen innings pitched (outs_recorded / 3) by this team in the 3
          calendar days immediately preceding the game date. Primary fatigue
          depth metric for the Epic 6 bullpen state model.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or bullpen_ip_prev_3d >= 0"
      - name: pitchers_used_prev_2d
        description: >
          Sum of distinct-per-game reliever counts across the prior 2 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or pitchers_used_prev_2d >= 0"

  # ============================================================================
  # mart_bullpen_effectiveness
  # ============================================================================
  - name: mart_bullpen_effectiveness
    description: >
      Grain: team_abbrev × game_pk. One row per team per game where the team
      deployed at least one reliever. Captures rolling bullpen quality metrics
      over the 14- and 30-day windows preceding each game. All rolling windows
      use an upper bound of 1 day prior so current-game data never leaks into
      the features.

      Reliever definition: any pitcher who is NOT the qualifying starter per
      mart_starting_pitcher_game_log (first pitcher with >= 20 pitches or
      >= 3 distinct innings). Identical to mart_bullpen_workload.

      Complement to mart_bullpen_workload: join both models on
      team_abbrev (= pitching_team) + game_pk for a full pre-game bullpen view.
      mart_bullpen_workload covers fatigue and availability; this model covers
      effectiveness and stuff quality.

      Doubleheader handling: rolling windows aggregate to calendar-date level
      before summing across the window. Both games of a doubleheader carry the
      same prior-day effectiveness values.

      All pct metrics (k_pct, bb_pct, xwoba_against, hard_hit_pct, whiff_rate)
      are null when no prior appearances exist in the window (start of season).
      innings_pitched is coalesced to 0.0 when the window is empty.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team_abbrev, game_pk]
      # 30-day window must be >= 14-day window when both are populated
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              innings_pitched_30d is null
              or innings_pitched_14d is null
              or innings_pitched_30d >= innings_pitched_14d

    columns:

      # ── Identifiers ─────────────────────────────────────────────────────────
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year.
        tests:
          - not_null

      - name: team_abbrev
        description: >
          Statcast abbreviation of the team whose bullpen is being profiled
          (the pitching team). Matches pitching_team in mart_bullpen_workload.
        tests:
          - not_null

      # ── 14-day rolling effectiveness ─────────────────────────────────────────
      - name: k_pct_14d
        description: >
          Strikeout rate for this team's bullpen over the prior 14 days
          (strikeouts / batters_faced). Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (k_pct_14d between 0 and 1)"

      - name: bb_pct_14d
        description: >
          Walk rate for this team's bullpen over the prior 14 days
          (walks / batters_faced). Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (bb_pct_14d between 0 and 1)"

      - name: xwoba_against_14d
        description: >
          Expected wOBA allowed by this team's bullpen over the prior 14 days.
          Uses xwoba for in-play events and woba_value for K/BB/HBP.
          Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (xwoba_against_14d between 0 and 3)"

      - name: hard_hit_pct_14d
        description: >
          Hard-hit rate allowed (exit velocity >= 95 mph / batted balls) over
          the prior 14 days. Null if no in-play events in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (hard_hit_pct_14d between 0 and 1)"

      - name: whiff_rate_14d
        description: >
          Swing-and-miss rate (swinging strikes / pitches thrown) for this
          team's bullpen over the prior 14 days. Null if no appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (whiff_rate_14d between 0 and 1)"

      - name: innings_pitched_14d
        description: >
          Total innings pitched (decimal: outs / 3.0) by this team's bullpen
          over the prior 14 days. 0.0 when no appearances in window.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      # ── 30-day rolling effectiveness ─────────────────────────────────────────
      - name: k_pct_30d
        description: >
          Strikeout rate for this team's bullpen over the prior 30 days
          (strikeouts / batters_faced). Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (k_pct_30d between 0 and 1)"

      - name: bb_pct_30d
        description: >
          Walk rate for this team's bullpen over the prior 30 days
          (walks / batters_faced). Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (bb_pct_30d between 0 and 1)"

      - name: xwoba_against_30d
        description: >
          Expected wOBA allowed by this team's bullpen over the prior 30 days.
          Null if no reliever appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (xwoba_against_30d between 0 and 3)"

      - name: hard_hit_pct_30d
        description: >
          Hard-hit rate allowed (exit velocity >= 95 mph / batted balls) over
          the prior 30 days. Null if no in-play events in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (hard_hit_pct_30d between 0 and 1)"

      - name: whiff_rate_30d
        description: >
          Swing-and-miss rate (swinging strikes / pitches thrown) for this
          team's bullpen over the prior 30 days. Null if no appearances in window.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (whiff_rate_30d between 0 and 1)"

      - name: innings_pitched_30d
        description: >
          Total innings pitched (decimal: outs / 3.0) by this team's bullpen
          over the prior 30 days. 0.0 when no appearances in window.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      # ── Empirical Bayes bullpen estimates ──────────────────────────────────
      - name: eb_bullpen_xwoba
        description: >
          Empirical Bayes shrunk xwOBA-against estimate for this team's bullpen,
          entering the game. Posterior mean from a Normal-Normal conjugate model
          (fit_bullpen_priors.py / compute_bullpen_posteriors.py). Shrinks toward
          the league-average prior for teams with few relievers or high variability.
          Null when no EB posterior exists for this (game_pk, team).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (eb_bullpen_xwoba between 0 and 1.5)"

      - name: eb_bullpen_uncertainty
        description: >
          Posterior standard deviation for this team's EB bullpen xwOBA estimate.
          Higher values indicate fewer observed relievers or greater inter-reliever
          variability; the estimate is pulled more strongly toward the prior mean.
          Null when no EB posterior exists for this (game_pk, team).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or eb_bullpen_uncertainty >= 0"

      - name: eb_bullpen_coverage_pct
        description: >
          Fraction of team relievers with observed season data (n_relievers /
          (n_relievers + n_prior_only)). 1.0 = all relievers had observation data;
          lower values indicate more reliance on the prior (e.g. early season or
          roster turnover). Null when no EB posterior exists for this (game_pk, team).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (eb_bullpen_coverage_pct between 0 and 1)"


  - name: mart_pitcher_vs_handedness_splits
    description: >
      Grain: pitcher_id × batter_hand × game_year. One row per pitcher per
      batter handedness (L or R) per season, covering regular season games only.

      Captures the platoon split profile of each pitcher — performance metrics
      and pitch mix tendencies broken out by whether the batter was left-handed
      or right-handed. Many starting pitchers have severe platoon splits that
      are obscured by overall statistics. These splits are critical inputs for
      modeling matchup advantages before lineup construction is finalized.

      Pitch type buckets:
        Fastball  — FF (4-seam), SI (sinker), FC (cutter)
        Breaking  — SL (slider), CU (curveball), KC (knuckle curve), CS (slow
                    curve), SV (slurve), ST (sweeper), SC (screwball)
        Offspeed  — CH (changeup), FS (split-finger), FO (forkball), EP (eephus)
        Other     — KN, IN, PO, FA, AB, null — included in total_pitches but
                    excluded from pitch mix percentage denominators.

      Count situation definitions (pre-pitch ball-strike count):
        pitcher_ahead — 0-2 or 1-2 (two strikes, at most one ball)
        hitter_ahead  — 2-0, 3-0, or 3-1 (balls exceed strikes by ≥ 2)
        two_strike    — any count with 2 strikes (0-2, 1-2, 2-2, 3-2)

      Small-sample caution: rows with fewer than ~50 plate appearances should
      be interpreted carefully. No minimum PA filter is applied here — filter
      downstream as needed.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, batter_hand, game_year]
      # Rate bounds and internal consistency
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_pitches >= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "strikeouts <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "walks <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hits <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "home_runs <= hits"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "swings <= total_pitches"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "whiffs <= swings"
      # Pitch mix percentages sum to no more than 1 (other/unknown pitches make up the remainder)
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce(fastball_pct, 0) + coalesce(breaking_pct, 0) + coalesce(offspeed_pct, 0) <= 1.01"
      # K% + BB% cannot exceed 1 — they share the same PA denominator
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce(k_pct, 0) + coalesce(bb_pct, 0) <= 1"

    columns:
      # ── Grain ─────────────────────────────────────────────────────────────────
      - name: pitcher_id
        description: MLB Player ID for the pitcher.
        tests: [not_null]
      - name: batter_hand
        description: Batter handedness for this split row — L (left) or R (right).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['L', 'R']
      - name: game_year
        description: Season year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"

      # ── Volume ────────────────────────────────────────────────────────────────
      - name: plate_appearances
        description: Total plate appearances against this pitcher by this batter handedness in the season.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: total_pitches
        description: Total pitches thrown to this batter handedness in the season.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: strikeouts
        description: Strikeouts recorded against this batter handedness in the season.
        tests: [not_null]
      - name: walks
        description: Walks (including intentional) issued to this batter handedness in the season.
        tests: [not_null]
      - name: hit_by_pitch
        description: Batters hit by pitch of this handedness in the season.
        tests: [not_null]
      - name: hits
        description: Hits allowed (singles through home runs) to this batter handedness.
        tests: [not_null]
      - name: home_runs
        description: Home runs allowed to this batter handedness. Subset of hits.
        tests: [not_null]
      - name: swings
        description: Total swings taken by this batter handedness against this pitcher in the season.
        tests: [not_null]
      - name: whiffs
        description: Total whiffs (missed swings) by this batter handedness. Subset of swings.
        tests: [not_null]

      # ── Outcome rates ─────────────────────────────────────────────────────────
      - name: k_pct
        description: Strikeout rate — strikeouts / plate_appearances. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: bb_pct
        description: Walk rate — walks / plate_appearances. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: hr_pct
        description: Home run rate — home_runs / plate_appearances. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: xwoba_against
        description: >
          Expected weighted on-base average (xwOBA) against for this pitcher–
          handedness split. Expected value for batted balls; actual wOBA value
          for strikeouts, walks, and HBP. League average is approximately 0.320.
          Null when no wOBA-denominator plate appearances exist.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      # ── Swing / whiff rates ───────────────────────────────────────────────────
      - name: whiff_rate
        description: Whiffs per swing — whiffs / swings. Scale 0–1. Null if no swings.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: swinging_strike_rate
        description: Whiffs per pitch — whiffs / total_pitches. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Overall pitch mix ─────────────────────────────────────────────────────
      - name: fastball_pct
        description: >
          Fraction of pitches classified as fastballs (FF, SI, FC) against this
          batter handedness. Scale 0–1. Does not sum to 1 with breaking_pct and
          offspeed_pct — the remainder is other/unclassified pitch types.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: breaking_pct
        description: >
          Fraction of pitches classified as breaking balls (SL, CU, KC, CS, SV,
          ST, SC) against this batter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: offspeed_pct
        description: >
          Fraction of pitches classified as offspeed (CH, FS, FO, EP) against
          this batter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Count situation pitch tendencies ──────────────────────────────────────
      - name: pitches_pitcher_ahead
        description: Total pitches thrown in pitcher-ahead counts (0-2, 1-2) to this batter handedness.
        tests: [not_null]
      - name: fastball_pct_pitcher_ahead
        description: Fastball rate in pitcher-ahead counts (0-2, 1-2). Reveals put-away pitch preferences.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: breaking_pct_pitcher_ahead
        description: Breaking ball rate in pitcher-ahead counts (0-2, 1-2).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: offspeed_pct_pitcher_ahead
        description: Offspeed rate in pitcher-ahead counts (0-2, 1-2).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: pitches_hitter_ahead
        description: Total pitches thrown in hitter-ahead counts (2-0, 3-0, 3-1) to this batter handedness.
        tests: [not_null]
      - name: fastball_pct_hitter_ahead
        description: >
          Fastball rate in hitter-ahead counts (2-0, 3-0, 3-1). High values indicate a
          pitcher who must challenge; low values suggest command of secondary pitches.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: breaking_pct_hitter_ahead
        description: Breaking ball rate in hitter-ahead counts (2-0, 3-0, 3-1).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: offspeed_pct_hitter_ahead
        description: Offspeed rate in hitter-ahead counts (2-0, 3-0, 3-1).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: pitches_two_strike
        description: Total pitches thrown with 2 strikes (0-2, 1-2, 2-2, 3-2) to this batter handedness.
        tests: [not_null]
      - name: whiff_rate_two_strike
        description: >
          Whiff rate in two-strike counts. Higher values indicate stronger put-away
          ability; compared across L and R splits to reveal handedness-dependent
          strikeout approach.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: fastball_pct_two_strike
        description: Fastball rate in two-strike counts to this batter handedness.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: breaking_pct_two_strike
        description: Breaking ball rate in two-strike counts to this batter handedness.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: offspeed_pct_two_strike
        description: Offspeed rate in two-strike counts to this batter handedness.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

  - name: mart_batter_vs_handedness_splits
    description: >
      Grain: batter_id × pitcher_hand × game_year. One row per batter per
      pitcher handedness (L or R) per season, covering regular season games only.

      Mirror of mart_pitcher_vs_handedness_splits from the hitter's perspective.
      Together these two tables allow full platoon advantage assessment for every
      batter-pitcher matchup: this table provides how a batter performs against
      each pitcher handedness; the pitcher table provides how that pitcher
      performs against each batter handedness.

      Key metric definitions:
        Hard hit    — exit_velocity_mph >= 95 mph on a batted ball
        Barrel      — launch_speed_angle_zone = 6 (Statcast barrel classification)
        Batted ball — in-play outcome (singles through outs, excludes K/BB/HBP)
        AT-bat      — PA minus walk, intent_walk, HBP, sac fly, sac bunt,
                      catcher interf
        OBP denom   — PA minus sac bunt and catcher interf only
        Chase rate  — swings at pitches in zones 11–14 / total out-of-zone pitches
        Zone contact — swings at pitches in zones 1–9 / total in-zone pitches

      Small-sample caution: rows with fewer than ~50 PA should be interpreted
      carefully. No minimum PA filter is applied — filter downstream as needed.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [batter_id, pitcher_hand, game_year]
      # Internal consistency
      - dbt_utils.expression_is_true:
          arguments:
            expression: "pitches_seen >= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "plate_appearances >= at_bats"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "plate_appearances >= obp_denom"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "strikeouts <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "walks <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hits <= plate_appearances"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "home_runs <= hits"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hard_hits <= batted_balls"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "barrels <= hard_hits"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "whiffs <= swings"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "swings <= pitches_seen"
      # OPS is a computed combination — validate against its components
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ops is null or (ops >= obp and ops >= slg)"
      # K% + BB% share the same PA denominator and cannot together exceed 1
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce(k_pct, 0) + coalesce(bb_pct, 0) <= 1"

    columns:
      # ── Grain ─────────────────────────────────────────────────────────────────
      - name: batter_id
        description: MLB Player ID for the batter.
        tests: [not_null]
      - name: pitcher_hand
        description: Pitcher throwing hand for this split row — L (left) or R (right).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['L', 'R']
      - name: game_year
        description: Season year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"

      # ── Volume ────────────────────────────────────────────────────────────────
      - name: plate_appearances
        description: Total plate appearances against this pitcher handedness in the season.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: at_bats
        description: >
          At-bats against this pitcher handedness. Excludes walks, HBP, sac flies,
          sac bunts, and catcher interference from plate_appearances.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: pitches_seen
        description: Total pitches seen from this pitcher handedness in the season.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: strikeouts
        description: Strikeouts against this pitcher handedness.
        tests: [not_null]
      - name: walks
        description: Walks (including intentional) against this pitcher handedness.
        tests: [not_null]
      - name: hit_by_pitch
        description: Hit by pitch occurrences against this pitcher handedness.
        tests: [not_null]
      - name: singles
        description: Singles hit against this pitcher handedness.
        tests: [not_null]
      - name: doubles
        description: Doubles hit against this pitcher handedness.
        tests: [not_null]
      - name: triples
        description: Triples hit against this pitcher handedness.
        tests: [not_null]
      - name: home_runs
        description: Home runs hit against this pitcher handedness. Subset of hits.
        tests: [not_null]
      - name: hits
        description: Total hits (singles through home runs) against this pitcher handedness.
        tests: [not_null]
      - name: total_bases
        description: Total bases accumulated against this pitcher handedness. Used in SLG calculation.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= hits"
      - name: batted_balls
        description: In-play contact events against this pitcher handedness. Denominator for hard_hit_pct and barrel_pct.
        tests: [not_null]
      - name: hard_hits
        description: Batted balls with exit velocity >= 95 mph against this pitcher handedness.
        tests: [not_null]
      - name: barrels
        description: Batted balls classified as barrels (launch_speed_angle_zone = 6) against this pitcher handedness. Subset of hard_hits.
        tests: [not_null]
      - name: swings
        description: Total swings taken against this pitcher handedness in the season.
        tests: [not_null]
      - name: whiffs
        description: Total missed swings (whiffs) against this pitcher handedness. Subset of swings.
        tests: [not_null]

      # ── Outcome rates ─────────────────────────────────────────────────────────
      - name: k_pct
        description: Strikeout rate — strikeouts / plate_appearances. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: bb_pct
        description: Walk rate — walks / plate_appearances. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: obp
        description: On-base percentage — on_base_events / obp_denom. Scale 0–1. Null if obp_denom is 0.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: slg
        description: Slugging percentage — total_bases / at_bats. Scale 0–4. Null if at_bats is 0.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"
      - name: ops
        description: >
          On-base plus slugging — obp + slg. Scale 0–5. Null if either
          component is null. Computed from accumulated components rather than
          summing per-PA OBP and SLG to avoid averaging bias.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 5"
      - name: woba
        description: >
          Weighted on-base average (actual) against this pitcher handedness.
          Computed as sum(woba_value) / sum(woba_denom). League average is
          approximately 0.320. Null when no wOBA-denominator PAs exist.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"
      - name: xwoba
        description: >
          Expected weighted on-base average against this pitcher handedness.
          Expected value used for batted balls; actual wOBA value used for
          strikeouts, walks, and HBP. League average is approximately 0.320.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      # ── Quality of contact ────────────────────────────────────────────────────
      - name: hard_hit_pct
        description: >
          Fraction of batted balls with exit velocity >= 95 mph. Scale 0–1.
          Null if no batted balls. Primary measure of raw contact quality.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: barrel_pct
        description: >
          Fraction of batted balls classified as barrels (Statcast zone 6).
          Scale 0–1. Null if no batted balls. Strongest single predictor of
          batter power output.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Swing / whiff / discipline ────────────────────────────────────────────
      - name: swing_rate
        description: Fraction of pitches the batter swings at against this pitcher handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: whiff_rate
        description: Whiffs per swing — whiffs / swings. Scale 0–1. Null if no swings.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: swinging_strike_rate
        description: Whiffs per pitch seen — whiffs / pitches_seen. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: chase_rate
        description: >
          Fraction of out-of-zone pitches (zones 11–14) the batter swings at.
          Scale 0–1. High chase rate indicates vulnerability to pitches outside
          the zone — a key exploit for pitchers with good command.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: zone_contact_rate
        description: >
          Fraction of in-zone pitches (zones 1–9) the batter swings at. Scale
          0–1. Combined with chase_rate provides a full picture of plate discipline
          split by pitcher handedness.


  # ============================================================================
  # mart_team_vs_pitcher_hand
  # ============================================================================
  - name: mart_team_vs_pitcher_hand
    description: >
      Grain: one row per batting team × opposing starter hand × game (game_pk).
      Team-level offensive production in regular-season games, split by the
      handedness of the opposing starting pitcher. Rolling windows (7/14/30-day
      and season-to-date) are maintained independently for LHP-starter games and
      RHP-starter games.

      Use case: fast team-level platoon signal. When tonight's starter is a LHP,
      look up the team's recent wOBA, xwOBA, K%, and BB% in prior LHP-starter
      games rather than aggregating individual batter splits at query time.

      Starter identification: the opposing starting pitcher is the first pitcher
      to face batters from each side (lowest at_bat_number + pitch_number in the
      game). All PAs in the game are credited to that starter type, including
      PAs against relievers, so metrics reflect full-game offensive context when
      the opposing starter was of a given handedness.

      Runs scored is derived as max(post_pitch_bat_score) across all terminal PAs
      in the game for the batting team. The raw source column is varchar in
      Statcast; the staging model casts it to integer before this model reads it.

      Rolling windows are partitioned by (team, opp_starter_hand) so LHP-game
      and RHP-game windows accumulate independently. Season-to-date restarts at
      the beginning of each game_year.

      Source: stg_batter_pitches only (regular season, pitcher_hand in L/R).
      Join keys: team, opp_starter_hand, game_date, game_pk.

    tests:
      # ── Grain uniqueness ────────────────────────────────────────────────────
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team, opp_starter_hand, game_pk]

      # ── PA accounting: strikeouts + walks cannot exceed total PAs ───────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "strikeouts + walks <= pa_count"

      # ── Contact quality hierarchy: barrels ⊆ hard_hit_balls ⊆ batted_balls ──
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hard_hit_balls <= batted_balls"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "barrels <= hard_hit_balls"

      # ── Rolling window monotonicity: wider windows must cover at least as
      #    many games as narrower windows (within the same partition order) ────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "games_14d >= games_7d"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "games_30d >= games_14d"

      # ── K% + BB% share the same PA denominator — cannot exceed 1 together ──
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce(k_pct, 0) + coalesce(bb_pct, 0) <= 1"

    columns:

      # ── Grain columns ────────────────────────────────────────────────────────
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"

      - name: team
        description: Abbreviation of the batting team.
        tests:
          - not_null

      - name: opp_starter_hand
        description: >
          Handedness of the opposing starting pitcher — L (left) or R (right).
          Identifies the starting pitcher as the first pitcher to appear for the
          opposing side in the game (minimum at_bat_number + pitch_number).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['L', 'R']

      # ── Single-game volume ────────────────────────────────────────────────────
      - name: runs_scored
        description: >
          Runs scored by the batting team in this game. Derived as the maximum
          post_pitch_bat_score across all terminal PAs in the game for this
          batting team. Represents the final score.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: pa_count
        description: Total plate appearances taken by the batting team in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: strikeouts
        description: Strikeouts recorded for the batting team in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: walks
        description: Walks (including intentional) drawn by the batting team in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_bases
        description: Total bases accumulated by the batting team in this game. Used as slugging numerator.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: at_bats
        description: >
          At-bats for the batting team in this game. Excludes walks, HBP, sac
          flies, and sac bunts from plate_appearances. Denominator for slugging.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: hard_hit_balls
        description: >
          Batted balls with exit velocity >= 95 mph in this game. Subset of
          batted_balls; superset of barrels.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: barrels
        description: >
          Batted balls classified as barrels (launch_speed_angle_zone = 6) in
          this game. Subset of hard_hit_balls.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: batted_balls
        description: >
          In-play contact events (non-null exit_velocity_mph) for the batting
          team in this game. Denominator for hard_hit_pct and barrel_pct.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      # ── Single-game rates ─────────────────────────────────────────────────────
      - name: woba
        description: >
          Weighted on-base average (actual) for this game. sum(woba_value) /
          sum(woba_denom). League average ~0.320. Null when no wOBA-denom PAs.
          Note: in early Statcast years (pre-2019), woba_denom is null for batted
          ball events in the source, so woba can exceed 2 for those games.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba >= 0)"

      - name: xwoba
        description: >
          Expected wOBA for this game. Uses Statcast expected value for batted
          balls; actual wOBA for K/BB/HBP. Null when no qualifying PAs exist.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct
        description: Strikeout rate for this game — strikeouts / pa_count. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct
        description: Walk rate for this game — walks / pa_count. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging
        description: Slugging percentage for this game — total_bases / at_bats. Scale 0–4.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct
        description: >
          Fraction of batted balls hit >= 95 mph in this game. Scale 0–1. Null
          if no batted balls recorded.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct
        description: >
          Fraction of batted balls classified as barrels in this game. Scale 0–1.
          Null if no batted balls recorded. Strongest single-game power indicator.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Rolling 7-day ─────────────────────────────────────────────────────────
      - name: games_7d
        description: >
          Number of games against this starter handedness in the prior 7 days
          (inclusive of today). Denominator context for all _7d rolling metrics.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_7d
        description: Average runs scored per game against this starter type over the trailing 7 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_7d
        description: Rolling 7-day team wOBA against this starter handedness. Scale 0–2 in normal conditions.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba_7d >= 0)"

      - name: xwoba_7d
        description: Rolling 7-day team xwOBA against this starter handedness. Scale 0–2.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct_7d
        description: Rolling 7-day K% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_7d
        description: Rolling 7-day BB% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_7d
        description: Rolling 7-day slugging percentage against this starter handedness. Scale 0–4.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct_7d
        description: Rolling 7-day hard-hit rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct_7d
        description: Rolling 7-day barrel rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Rolling 14-day ────────────────────────────────────────────────────────
      - name: games_14d
        description: Number of games against this starter handedness in the prior 14 days (inclusive).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_14d
        description: Average runs scored per game against this starter type over the trailing 14 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_14d
        description: Rolling 14-day team wOBA against this starter handedness. Scale 0–2 in normal conditions.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba_14d >= 0)"

      - name: xwoba_14d
        description: Rolling 14-day team xwOBA against this starter handedness. Scale 0–2.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct_14d
        description: Rolling 14-day K% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_14d
        description: Rolling 14-day BB% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_14d
        description: Rolling 14-day slugging percentage against this starter handedness. Scale 0–4.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct_14d
        description: Rolling 14-day hard-hit rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct_14d
        description: Rolling 14-day barrel rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Rolling 30-day ────────────────────────────────────────────────────────
      - name: games_30d
        description: Number of games against this starter handedness in the prior 30 days (inclusive).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_30d
        description: Average runs scored per game against this starter type over the trailing 30 days.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_30d
        description: Rolling 30-day team wOBA against this starter handedness. Scale 0–2 in normal conditions.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba_30d >= 0)"

      - name: xwoba_30d
        description: Rolling 30-day team xwOBA against this starter handedness. Scale 0–2.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct_30d
        description: Rolling 30-day K% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_30d
        description: Rolling 30-day BB% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_30d
        description: Rolling 30-day slugging percentage against this starter handedness. Scale 0–4.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct_30d
        description: Rolling 30-day hard-hit rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct_30d
        description: Rolling 30-day barrel rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Season-to-date ────────────────────────────────────────────────────────
      - name: games_std
        description: >
          Number of games against this starter handedness in the current season
          through this game date (season-to-date). Restarts at 1 on the first
          game of each new game_year. Partitioned by (team, opp_starter_hand,
          game_year) using ROWS UNBOUNDED PRECEDING.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_std
        description: Season-to-date average runs scored per game against this starter handedness.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_std
        description: Season-to-date team wOBA against this starter handedness. Scale 0–2 in normal conditions.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba_std >= 0)"

      - name: xwoba_std
        description: Season-to-date team xwOBA against this starter handedness. Scale 0–2.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct_std
        description: Season-to-date K% against this starter handedness. Scale 0–1.
        tests:
