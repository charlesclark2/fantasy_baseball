      - name: bb_pct_std
        description: Season-to-date BB% against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_std
        description: Season-to-date slugging percentage against this starter handedness. Scale 0–4.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
