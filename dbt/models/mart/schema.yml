      - name: hard_hit_pct_std
        description: Season-to-date hard-hit rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct_std
        description: Season-to-date barrel rate against this starter handedness. Scale 0–1.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

  # ============================================================================
  # mart_head_to_head_team_history
  # ============================================================================
  - name: mart_head_to_head_team_history
    description: >
      Grain: one row per team_a × team_b × game_year (season).

      Head-to-head regular-season record, run context, and cumulative franchise
      history for every pair of MLB teams. Captures persistent matchup asymmetry
      — certain team constructions (e.g. contact-heavy lineups vs. extreme-
      strikeout rotations, aggressive base-running vs. strong defensive teams)
      produce systematic outcome skews that are not explained by each team's
      overall record. This model quantifies those effects.

      Team ordering: team_a is always alphabetically less than team_b so each
      franchise pair appears exactly once per season row regardless of home/away
      assignment. All directional metrics (run differential, win percentage) are
      expressed from team_a's perspective.

      Abbreviation normalization: both team columns use canonical_abbrev from
      ref_teams (e.g. OAK is mapped to ATH) so franchise history is continuous
      across rebrands. The coalesce falls back to the raw abbreviation if a team
      is unexpectedly absent from the seed.

      Metrics are provided at two granularities:
        - Season-level: single-season results for the given game_year.
        - Historical cumulative: running totals / averages from the earliest
          season in the data through and including game_year (inclusive). Uses
          ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW partitioned by
          (team_a, team_b) ordered by game_year.

      Source: mart_game_results (regular season only, game_type = 'R').
      Join keys: team_a, team_b, game_year.

    tests:
      # ── Grain uniqueness ──────────────────────────────────────────────────
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team_a, team_b, game_year]

      # ── Canonical pair ordering ───────────────────────────────────────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "team_a < team_b"

      # ── Season accounting identity ────────────────────────────────────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "team_a_wins + team_b_wins + ties = games_played"

      # ── Historical accounting identity ────────────────────────────────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "all_time_team_a_wins + all_time_team_b_wins + all_time_ties = all_time_games_played"

      # ── Cumulative must cover at least the season ─────────────────────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "all_time_games_played >= games_played"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "all_time_team_a_wins >= team_a_wins"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "all_time_team_b_wins >= team_b_wins"

      # ── Extra-innings games are a subset of all games ─────────────────────
      - dbt_utils.expression_is_true:
          arguments:
            expression: "extra_innings_games <= games_played"

    columns:

      # ── Grain columns ──────────────────────────────────────────────────────
      - name: team_a
        description: >
          Canonical abbreviation of the alphabetically-first team in the
          matchup. Always less than team_b. Normalized via ref_teams.canonical_abbrev.
        tests:
          - not_null

      - name: team_b
        description: >
          Canonical abbreviation of the alphabetically-second team in the
          matchup. Always greater than team_a. Normalized via ref_teams.canonical_abbrev.
        tests:
          - not_null

      - name: game_year
        description: Season year (calendar year). Regular season only.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"

      # ── Season volume ──────────────────────────────────────────────────────
      - name: games_played
        description: >
          Number of regular-season games played between the two teams in this
          season. Typically 6–19 depending on division alignment (divisional
          opponents play more frequently than inter-league pairs).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: team_a_wins
        description: Games won by team_a in this season series.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: team_b_wins
        description: Games won by team_b in this season series.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: ties
        description: >
          Games ending in a tie score in this season series. Ties are rare in
          modern MLB (suspended games, weather) but non-zero in historical data.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: team_a_win_pct
        description: >
          Fraction of decided games (non-ties) won by team_a this season.
          Scale 0–1. Null if all games in the series ended in a tie (extremely
          rare edge case). Calculated as team_a_wins / (games_played - ties).
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: season_series_winner
        description: >
          Canonical abbreviation of the team that won the season series (more
          wins than the opponent). Null when the series ended split (equal wins
          for both teams or all games tied). Equals either team_a or team_b.

      # ── Season run context ─────────────────────────────────────────────────
      - name: avg_run_differential
        description: >
          Average per-game run differential from team_a's perspective in this
          season series. Positive = team_a outscored team_b on average; negative
          = team_b outscored team_a. Scale: roughly -10 to +10.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between -30 and 30"

      - name: avg_team_a_runs
        description: Average runs scored per game by team_a in this season series.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: avg_team_b_runs
        description: Average runs scored per game by team_b in this season series.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: avg_total_runs
        description: >
          Average combined runs scored per game in this season series. Useful
          as a matchup-specific over/under baseline — pairs of teams can
          systematically produce high- or low-scoring games based on lineup and
          rotation construction.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      # ── Season game characteristics ────────────────────────────────────────
      - name: extra_innings_games
        description: >
          Number of games between these two teams that went beyond 9 innings
          in this season.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: extra_innings_pct
        description: >
          Fraction of games between these teams that went to extra innings in
          this season. Scale 0–1. Elevated values may indicate evenly-matched
          bullpens or a tendency toward close, low-scoring games in this matchup.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Historical cumulative columns ──────────────────────────────────────
      - name: all_time_games_played
        description: >
          Total regular-season games played between the two teams from the
          earliest season in the dataset through and including game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: all_time_team_a_wins
        description: >
          Cumulative wins for team_a against team_b through and including
          game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: all_time_team_b_wins
        description: >
          Cumulative wins for team_b against team_a through and including
          game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: all_time_ties
        description: >
          Cumulative tied games between the two teams through and including
          game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: all_time_team_a_win_pct
        description: >
          Cumulative win percentage for team_a in decided games against team_b
          through and including game_year. Scale 0–1. Null only if every
          historical game ended in a tie (practically impossible). Provides a
          long-run matchup dominance signal that smooths single-season variance.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: all_time_avg_run_differential
        description: >
          Cumulative average per-game run differential from team_a's perspective
          through and including game_year. Anchored by total games played so it
          does not drift from averaging averages across seasons.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between -30 and 30"

      - name: all_time_avg_team_a_runs
        description: >
          Cumulative average runs scored per game by team_a against team_b
          through and including game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: all_time_avg_team_b_runs
        description: >
          Cumulative average runs scored per game by team_b against team_a
          through and including game_year.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: all_time_avg_total_runs
        description: >
          Cumulative average combined runs per game between the two teams
          through and including game_year. Primary matchup-specific feature
          for over/under prediction — persistent high- or low-scoring tendencies
          between specific team pairings are captured here.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
  # ============================================================================
  # mart_home_away_splits
  # ============================================================================
  - name: mart_home_away_splits
    description: >
      Home/away context splits for each team's offensive and pitching performance.
      Grain: one row per team × home_away_flag × game date (regular season only).
      Rolling windows (7/14/30-day and season-to-date) are computed separately
      within each context — a team's 7-day home window includes only home games.
      Home field advantage varies significantly by team and stadium; this model
      surfaces persistent asymmetry that overall rolling stats obscure.
      Join keys: team, home_away_flag, game_date.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team, home_away_flag, game_pk]
      - dbt_utils.expression_is_true:
          arguments:
            expression: "home_away_flag in ('Home', 'Away')"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "games_std >= 1"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "games_7d >= 1"

    columns:

      # ── Grain ────────────────────────────────────────────────────────────────
      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Regular-season year the game took place.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 2015"

      - name: team
        description: Team abbreviation (canonical form from ref_teams where available).
        tests:
          - not_null

      - name: home_away_flag
        description: >
          Whether the team played at home or away in this game. Values: 'Home' or 'Away'.
          Rolling windows are partitioned by (team, home_away_flag) so that each
          context's statistics do not bleed into the other.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Home', 'Away']

      # ── Game-level offense actuals ───────────────────────────────────────────
      - name: runs_scored
        description: Runs scored by the team in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: pa_count
        description: Total plate appearances by the team's batters in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: woba
        description: >
          Weighted on-base average for the team's offense in this game.
          Null when no qualifying plate appearances (woba_denom = 0) occurred.
          Scale approximately 0–0.5 in normal conditions; can exceed 2 in early
          Statcast years (pre-2019) where woba_denom is null for batted ball events
          in the source, inflating the numerator relative to the denominator.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba >= 0)"

      - name: xwoba
        description: >
          Expected weighted on-base average based on batted ball quality for the
          team's offense in this game. Null before 2023 (bat tracking unavailable)
          and when no in-play PAs occurred.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct
        description: Strikeout rate (strikeouts / plate appearances) for the offense in this game.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct
        description: Walk rate (walks / plate appearances) for the offense in this game.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging
        description: Slugging percentage (total bases / at-bats) for the offense in this game.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct
        description: >
          Fraction of batted balls with exit velocity >= 95 mph for the offense in
          this game. Null when no batted ball data exists.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct
        description: >
          Fraction of batted balls classified as barrels (launch_speed_angle_zone = 6)
          for the offense in this game. Null when no batted ball data exists.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Game-level pitching actuals ──────────────────────────────────────────
      - name: runs_allowed
        description: Runs allowed by the team's pitching staff in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: pa_count_against
        description: Total plate appearances faced by the team's pitching staff in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: woba_against
        description: >
          Weighted on-base average allowed by the team's pitching in this game.
          Null when no qualifying plate appearances (woba_denom = 0) occurred.
          Can exceed 2 in early Statcast years (pre-2019) for the same reason
          as the offense woba column.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "is null or (woba_against >= 0)"

      - name: xwoba_against
        description: >
          Expected wOBA allowed based on batted ball quality against the team's
          pitching in this game. Null before 2023 and when no in-play PAs occurred.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 2"

      - name: k_pct_recorded
        description: Strikeout rate recorded by the team's pitchers (Ks / PA faced) in this game.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_allowed
        description: Walk rate allowed by the team's pitchers (BBs / PA faced) in this game.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: hard_hit_pct_allowed
        description: >
          Fraction of batted balls against the pitching staff with exit velocity
          >= 95 mph in this game. Null when no batted ball data exists.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: barrel_pct_allowed
        description: >
          Fraction of batted balls against the pitching staff classified as barrels
          in this game. Null when no batted ball data exists.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      # ── Rolling 7-day ────────────────────────────────────────────────────────
      - name: games_7d
        description: Games played in this home/away context in the trailing 7 days including today.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_7d
        description: Average runs scored per game in the trailing 7-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_7d
        description: Rolling 7-day wOBA for the offense in this context.

      - name: xwoba_7d
        description: Rolling 7-day expected wOBA for the offense. Null before 2023.

      - name: k_pct_7d
        description: Rolling 7-day strikeout rate for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_7d
        description: Rolling 7-day walk rate for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_7d
        description: Rolling 7-day slugging percentage for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct_7d
        description: Rolling 7-day hard-hit rate for the offense in this context.

      - name: barrel_pct_7d
        description: Rolling 7-day barrel rate for the offense in this context.

      - name: runs_allowed_per_game_7d
        description: Average runs allowed per game in the trailing 7-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_against_7d
        description: Rolling 7-day wOBA allowed by the pitching staff in this context.

      - name: xwoba_against_7d
        description: Rolling 7-day expected wOBA allowed. Null before 2023.

      - name: k_pct_recorded_7d
        description: Rolling 7-day strikeout rate recorded by the pitching staff in this context.

      - name: bb_pct_allowed_7d
        description: Rolling 7-day walk rate allowed by the pitching staff in this context.

      - name: hard_hit_pct_allowed_7d
        description: Rolling 7-day hard-hit rate allowed by the pitching staff in this context.

      - name: barrel_pct_allowed_7d
        description: Rolling 7-day barrel rate allowed by the pitching staff in this context.

      # ── Rolling 14-day ───────────────────────────────────────────────────────
      - name: games_14d
        description: Games played in this context in the trailing 14 days.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_14d
        description: Average runs scored per game in the trailing 14-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_14d
        description: Rolling 14-day wOBA for the offense in this context.

      - name: xwoba_14d
        description: Rolling 14-day expected wOBA for the offense. Null before 2023.

      - name: k_pct_14d
        description: Rolling 14-day strikeout rate for the offense in this context.

      - name: bb_pct_14d
        description: Rolling 14-day walk rate for the offense in this context.

      - name: slugging_14d
        description: Rolling 14-day slugging percentage for the offense in this context.

      - name: hard_hit_pct_14d
        description: Rolling 14-day hard-hit rate for the offense in this context.

      - name: barrel_pct_14d
        description: Rolling 14-day barrel rate for the offense in this context.

      - name: runs_allowed_per_game_14d
        description: Average runs allowed per game in the trailing 14-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_against_14d
        description: Rolling 14-day wOBA allowed by the pitching staff in this context.

      - name: xwoba_against_14d
        description: Rolling 14-day expected wOBA allowed. Null before 2023.

      - name: k_pct_recorded_14d
        description: Rolling 14-day strikeout rate recorded by the pitching staff in this context.

      - name: bb_pct_allowed_14d
        description: Rolling 14-day walk rate allowed by the pitching staff in this context.

      - name: hard_hit_pct_allowed_14d
        description: Rolling 14-day hard-hit rate allowed by the pitching staff in this context.

      - name: barrel_pct_allowed_14d
        description: Rolling 14-day barrel rate allowed by the pitching staff in this context.

      # ── Rolling 30-day ───────────────────────────────────────────────────────
      - name: games_30d
        description: Games played in this context in the trailing 30 days.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_30d
        description: Average runs scored per game in the trailing 30-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_30d
        description: Rolling 30-day wOBA for the offense in this context.

      - name: xwoba_30d
        description: Rolling 30-day expected wOBA for the offense. Null before 2023.

      - name: k_pct_30d
        description: Rolling 30-day strikeout rate for the offense in this context.

      - name: bb_pct_30d
        description: Rolling 30-day walk rate for the offense in this context.

      - name: slugging_30d
        description: Rolling 30-day slugging percentage for the offense in this context.

      - name: hard_hit_pct_30d
        description: Rolling 30-day hard-hit rate for the offense in this context.

      - name: barrel_pct_30d
        description: Rolling 30-day barrel rate for the offense in this context.

      - name: runs_allowed_per_game_30d
        description: Average runs allowed per game in the trailing 30-day window in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_against_30d
        description: Rolling 30-day wOBA allowed by the pitching staff in this context.

      - name: xwoba_against_30d
        description: Rolling 30-day expected wOBA allowed. Null before 2023.

      - name: k_pct_recorded_30d
        description: Rolling 30-day strikeout rate recorded by the pitching staff in this context.

      - name: bb_pct_allowed_30d
        description: Rolling 30-day walk rate allowed by the pitching staff in this context.

      - name: hard_hit_pct_allowed_30d
        description: Rolling 30-day hard-hit rate allowed by the pitching staff in this context.

      - name: barrel_pct_allowed_30d
        description: Rolling 30-day barrel rate allowed by the pitching staff in this context.

      # ── Season-to-date ───────────────────────────────────────────────────────
      - name: games_std
        description: >
          Games played in this home/away context season-to-date through and including
          this game. Resets each season year. Note: games_7d uses a date-range window
          with no year partition, so at season boundaries it can exceed games_std.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"

      - name: runs_per_game_std
        description: Average runs scored per game season-to-date in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_std
        description: Season-to-date wOBA for the offense in this context.

      - name: xwoba_std
        description: Season-to-date expected wOBA for the offense. Null before 2023.

      - name: k_pct_std
        description: Season-to-date strikeout rate for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_std
        description: Season-to-date walk rate for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: slugging_std
        description: Season-to-date slugging percentage for the offense in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 4"

      - name: hard_hit_pct_std
        description: Season-to-date hard-hit rate for the offense in this context.

      - name: barrel_pct_std
        description: Season-to-date barrel rate for the offense in this context.

      - name: runs_allowed_per_game_std
        description: Average runs allowed per game season-to-date in this context.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: woba_against_std
        description: Season-to-date wOBA allowed by the pitching staff in this context.

      - name: xwoba_against_std
        description: Season-to-date expected wOBA allowed. Null before 2023.

      - name: k_pct_recorded_std
        description: Season-to-date strikeout rate recorded by the pitching staff in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: bb_pct_allowed_std
        description: Season-to-date walk rate allowed by the pitching staff in this context.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"

      - name: hard_hit_pct_allowed_std
        description: Season-to-date hard-hit rate allowed by the pitching staff in this context.

      - name: barrel_pct_allowed_std
        description: Season-to-date barrel rate allowed by the pitching staff in this context.

  # ============================================================================
  # mart_team_schedule_context
  # ============================================================================
  - name: mart_team_schedule_context
    description: >
      Schedule fatigue context for each team entering each regular season game.
      One row per team_abbrev × game_pk (home and away each get a row). Built
      from mart_game_results and stg_statsapi_venues. Captures days rest,
      recent game frequency, home/away streak length, and timezone travel
      signal. No leakage risk: all values look strictly backward from game_date.
      Join to feature_pregame_team_features on team_abbrev + game_pk.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, team_abbrev]

    columns:

      - name: game_pk
        tests:
          - not_null

      - name: game_date
        tests:
          - not_null

      - name: game_year
        tests:
          - not_null

      - name: team_abbrev
        tests:
          - not_null

      - name: side
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['home', 'away']

      - name: days_rest
        description: >
          Days since this team's previous game. Null for each team's first game
          of the season. 0 is valid for the second game of a doubleheader.
        tests:
          - not_null:
              config:
                warn_if: ">= 100"
                error_if: ">= 10000"

      - name: games_last_7d
        description: >
          Games this team played in the 7 calendar days before this game.
          Exceeds 7 when doubleheaders fall within the window (max observed: ~10).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 14"

      - name: games_last_14d
        description: >
          Games this team played in the 14 calendar days before this game.
          Exceeds 14 when doubleheaders fall within the window (max observed: ~19).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 28"

      - name: is_home_game
        description: True when the team is the home team for this game.
        tests:
          - not_null

      - name: consecutive_home_games
        description: >
          Length of current home stand including this game. Null when side = away.
          Resets to 1 at the start of each new home stand.

      - name: consecutive_away_games
        description: >
          Length of current road trip including this game. Null when side = home.
          Resets to 1 at the start of each new road trip.

      - name: tz_changed_from_last_game
        description: >
          True when the venue timezone for this game differs from the team's
          previous game. Proxy for cross-timezone travel fatigue. False on
          Opening Day (no prior game in season) and when venue data is missing.
        tests:
          - not_null

      - name: travel_distance_miles
        description: >
          Haversine distance (miles) from the previous game's venue to the
          current venue. NULL on Opening Day or when venue coordinates are
          unavailable. For home teams starting a new home stand this is the
          distance from their last road venue. Added Story 28.4.

      - name: tz_delta_hours
        description: >
          Absolute difference in UTC offset (hours) between the current venue
          and the previous game's venue. 0 when the timezone is unchanged or
          when Opening Day (no prior game). Maximum observed value is 3
          (Eastern ↔ Pacific). Added Story 28.4.
        tests:
          - not_null

      - name: is_3rd_consecutive_road_game
        description: >
          True when the team is playing their 3rd or later consecutive road game
          in the current road trip. Always false for home rows. Captures
          cumulative travel fatigue. Added Story 28.4.
        tests:
          - not_null

      - name: is_getaway_day
        description: >
          True when this is the last game before the team switches between home
          and away (i.e. a getaway day — the team travels after this game).
          Computed via LEAD on streak_group. False for the last game of the
          season (no subsequent game). Added Story 28.4.
        tests:
          - not_null

  # ============================================================================
  # mart_batter_woba_vs_cluster
  # ============================================================================
  - name: mart_batter_woba_vs_cluster
    description: >
      Rolling 30-day batter wOBA performance vs. each pitcher cluster.
      Grain: batter_id × cluster_id × game_date (one row per batter per cluster
      per calendar day they appear in the data). The game_date here is the
      anchor date — rolling stats cover game_date in [anchor_date - 30 days,
      anchor_date - 1 day] (strictly prior, no leakage).

      Availability: cluster data begins 2020; all rows have game_year >= 2020.
      Minimum sample gate: only rows with pa_count >= 10 are emitted.

      Shrinkage: both wOBA and xwOBA are shrunk toward league average
      (0.320 and 0.315 respectively) using a prior of 30 PA. adj_woba and
      adj_xwoba are the primary features for downstream use.

      Joined by feature_pitcher_cluster_matchups using game_date = game_date - 1
      (i.e., the day-before row) to align with pre-game leakage constraints.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [batter_id, cluster_id, game_date]

    columns:
      - name: batter_id
        description: MLB Player ID for the batter.
        tests:
          - not_null

      - name: cluster_id
        description: Pitcher cluster ID the batter faced (from pitcher_clusters).
        tests:
          - not_null

      - name: game_date
        description: >
          Anchor date for the rolling window. Rows cover pitches from
          [game_date - 30 days, game_date - 1 day] strictly.
        tests:
          - not_null

      - name: pa_count
        description: >
          Plate appearances by this batter vs. this cluster in the rolling 30-day
          window ending the day before game_date. Always >= 10 (model gate).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 10"

      - name: raw_woba
        description: >
          Raw wOBA = woba_sum / woba_denom_sum over the rolling window.
          Null when woba_denom_sum = 0 (no wOBA-eligible PA).
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2
              config:
                where: "raw_woba is not null"

      - name: raw_xwoba
        description: >
          Average xwOBA over the rolling window. Null when no balls in play
          contribute xwOBA within the window.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2
              config:
                where: "raw_xwoba is not null"

      - name: shrink_weight
        description: >
          Bayesian shrinkage weight: pa_count / (pa_count + 30). Range [0, 1).
          Higher values indicate the raw estimate is trusted more; at the gate
          minimum of 10 PA this equals ~0.25.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: adj_woba
        description: >
          Shrinkage-adjusted wOBA toward league average (0.320).
          adj_woba = shrink_weight × raw_woba + (1 − shrink_weight) × 0.320.
          Primary feature for downstream ML use.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2

      - name: adj_xwoba
        description: >
          Shrinkage-adjusted xwOBA toward league average (0.315).
          adj_xwoba = shrink_weight × raw_xwoba + (1 − shrink_weight) × 0.315.
          Primary feature for downstream ML use.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2

  # mart_bullpen_handedness_splits
  # ============================================================================
  - name: mart_bullpen_handedness_splits
    description: >
      Grain: team_abbrev × game_pk. One row per team per game where the team
      deployed at least one reliever against a batter with known handedness.
      Provides rolling 30-day bullpen xwOBA-against split by batter handedness
      (L or R). Leakage guard: rolling window upper bound is 1 day preceding.

      Reliever definition: same as mart_bullpen_effectiveness — any pitcher NOT
      identified as the qualifying starter per mart_starting_pitcher_game_log.

      PA-count columns (bp_pa_vs_rhb_30d / bp_pa_vs_lhb_30d) indicate sample
      size. Values may be null early in the season or for teams with few
      appearances against a given handedness in the 30-day window.

      Companion to mart_bullpen_workload and mart_bullpen_effectiveness.
      Join all three on team_abbrev + game_pk for a complete pre-game bullpen view.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team_abbrev, game_pk]

    columns:

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year.
        tests:
          - not_null

      - name: team_abbrev
        description: Statcast abbreviation of the pitching team. Matches pitching_team in mart_bullpen_workload.
        tests:
          - not_null

      - name: bp_xwoba_vs_rhb_30d
        description: >
          Rolling 30-day bullpen xwOBA against right-handed batters.
          Null when fewer than 1 PA vs RHB in the window.

      - name: bp_xwoba_vs_lhb_30d
        description: >
          Rolling 30-day bullpen xwOBA against left-handed batters.
          Null when fewer than 1 PA vs LHB in the window.

      - name: bp_pa_vs_rhb_30d
        description: PA count against right-handed batters in the rolling 30-day window. Sample size indicator.

      - name: bp_pa_vs_lhb_30d
        description: PA count against left-handed batters in the rolling 30-day window. Sample size indicator.

  # mart_bullpen_leverage
  # ============================================================================
  - name: mart_bullpen_leverage
    description: >
      Grain: team_abbrev × game_pk. Pre-game bullpen leverage exhaustion per team.
      Measures situational intensity of recent bullpen use via |delta_home_win_exp|
      summed within each reliever plate appearance and rolled up over trailing 1
      and 3 calendar days. Distinguishes a closer who worked a 1-run game (high
      leverage) from a mop-up reliever in a blowout (low leverage) — both scenarios
      produce similar raw inning counts but very different delta_home_win_exp sums.

      Leakage guard: rolling window upper bound is 1 day preceding. Only appearances
      strictly before the game date are included.

      Starter exclusion: pitchers listed in mart_starting_pitcher_game_log are
      excluded from all calculations.

      Doubleheader handling: stats are aggregated to the calendar-date level before
      rolling windows, so both games in a doubleheader share the same prior-day values.

      NULL when no reliever appearances in the trailing window. Impute to 0.0 in
      betting_ml/utils/preprocessing.py. Card 8.U.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team_abbrev, game_pk]

    columns:

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year.
        tests:
          - not_null

      - name: team_abbrev
        description: Statcast abbreviation of the pitching team.
        tests:
          - not_null

      - name: bp_leverage_sum_3d
        description: >
          Sum of |delta_home_win_exp| for all reliever plate appearances over the
          trailing 3 calendar days. Higher = more high-leverage recent use.
          Null when no reliever appearances in the window.

      - name: bp_high_lev_appearances_3d
        description: >
          Count of reliever plate appearances where the at-bat-level
          |delta_home_win_exp| exceeded 0.05 (5pp win-probability swing) over the
          trailing 3 calendar days. Null when no reliever appearances in the window.

      - name: bp_leverage_sum_1d
        description: >
          Sum of |delta_home_win_exp| for all reliever plate appearances on the
          calendar day immediately preceding the game. Captures freshness of
          leverage exhaustion. Null when no reliever appearances on that day.

  # ============================================================================
  # mart_reliever_top3_availability (Story 6.6)
  # ============================================================================
  - name: mart_reliever_top3_availability
    description: >
      Grain: team_abbrev × game_pk. Pre-game availability of the three highest-leverage
      relievers for each team entering a given game.

      The top-3 arms are ranked by their trailing 30-day leverage workload
      (sum of |delta_home_win_exp|) using appearances strictly before this game.
      Rank-1 = "closer", rank-2 = "setup1", rank-3 = "setup2".

      Per-arm outputs:
        {role}_available  — 1 = arm did NOT pitch yesterday (rest_days >= 2);
                            defaults to 1 (rested) when no prior 30-day data.
        {role}_rest_days  — days since last outing; NULL when arm hasn't appeared
                            in the trailing 30 days (implicitly fully rested).

      Leakage guard: rolling window upper bound is strictly 1 day preceding. Only
      appearances strictly before the game date are included.

      Starter exclusion: pitchers in mart_starting_pitcher_game_log are excluded.

      Doubleheader handling: appearances collapsed to date level before rolling windows.

      Coverage: ≥95% non-null for *_available across completed regular-season game-sides.
      Season openers (no prior 30-day data) default to available=1. Story 6.6.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [team_abbrev, game_pk]

    columns:

      - name: game_pk
        description: Unique MLB game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: team_abbrev
        description: Statcast abbreviation of the pitching team.
        tests:
          - not_null

      - name: closer_available
        description: >
          1 if the rank-1 leverage arm did not pitch in the prior calendar day
          (rest_days >= 2 or no prior 30-day appearance). 0 = used yesterday.
          Defaults to 1 at season open.
        tests:
          - not_null

      - name: closer_rest_days
        description: Days since the closer's last outing. NULL if no appearance in the prior 30 days.

      - name: setup1_available
        description: >
          1 if the rank-2 leverage arm did not pitch yesterday. Defaults to 1 at season open.
        tests:
          - not_null

      - name: setup1_rest_days
        description: Days since setup1's last outing. NULL if no appearance in the prior 30 days.

      - name: setup2_available
        description: >
          1 if the rank-3 leverage arm did not pitch yesterday. Defaults to 1 at season open.
        tests:
          - not_null

      - name: setup2_rest_days
        description: Days since setup2's last outing. NULL if no appearance in the prior 30 days.

  # ============================================================================
  # mart_pitcher_batter_history (Card 8.J)
  # ============================================================================
  - name: mart_pitcher_batter_history
    description: >
      Per-game plate-appearance aggregates between each pitcher-batter pair.
      Source for the head-to-head historical wOBA / xwOBA features in
      feature_pitcher_batter_h2h_matchups. Grain: (pitcher_id, batter_id,
      game_date) — one row per pair per game on which they faced each other.

      Bayesian shrinkage and the leakage guard
      (history.game_date < prediction_game_date) are applied at the feature
      join layer, NOT here. The mart stores all historical PA. Card 8.J.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, batter_id, game_date]

    columns:
      - name: pitcher_id
        description: MLBAM pitcher identifier.
        tests: [not_null]
      - name: batter_id
        description: MLBAM batter identifier.
        tests: [not_null]
      - name: game_date
        description: Calendar date the PA(s) occurred on.
        tests: [not_null]
      - name: pa_count
        description: Number of plate appearances between the pair on this date.
        tests: [not_null]
      - name: woba_value_sum
        description: Sum of Statcast woba_value across the date's PAs (numerator for wOBA).
      - name: woba_denom_sum
        description: >
          Sum of Statcast woba_denom across the date's PAs (denominator for wOBA;
          excludes IBB and similar non-counting events).
      - name: xwoba_sum
        description: Sum of xwOBA across PAs where xwOBA is observed (numerator for AVG xwOBA).
      - name: xwoba_obs
        description: Count of PAs with non-null xwOBA on the date (denominator for AVG xwOBA).

  # ============================================================================
  # mart_catcher_framing
  # ============================================================================
  - name: mart_catcher_framing
    description: >
      Season-level catcher defensive metrics with reliability regression.
      Source: FanGraphs leaderboard API (xMLBAMID → MLBAM player_id).
      Grain: player_id × season (latest weekly snapshot).
      Blended: 70% current season + 30% prior season (NULL prior → 100% current).
      Regressed toward 0 for catchers with < 60 innings caught.
      Card 8.K.

    columns:
      - name: player_id
        description: MLBAM player ID (xMLBAMID from FanGraphs).
        tests: [not_null]
      - name: season
        description: Season year.
        tests: [not_null]
      - name: innings_caught
        description: Innings caught in the current season (sample size proxy).
      - name: framing_runs_above_average
        description: >
          CFraming blended and regressed. Pure pitch-framing runs above average.
          0 = league average. Positive = better-than-average framer.
      - name: defensive_runs_above_average
        description: >
          FRP blended and regressed. Total catcher defensive value: framing +
          blocking + arm strength + range. More comprehensive than framing alone.
      - name: stolen_base_runs_above_average
        description: >
          rSB blended and regressed. Arm/throwing runs saved on stolen base attempts.
      - name: is_reliable
        description: >
          TRUE when innings_caught >= 60 (no regression applied).
          FALSE when below the 60-inning reliability threshold.

  # ============================================================================
  # mart_starter_csw_rolling
  # ============================================================================
  - name: mart_starter_csw_rolling
    description: >
      One row per pitcher_id × game_pk (regular season starts with ≥ 20 pitches).
      CSW% = (called_strike + swinging_strike + swinging_strike_blocked) / total_pitches.
      Rolling windows include the current start — leakage guard is enforced at the
      feature join layer in feature_pregame_starter_features via strict
      game_date < prediction_game_date. NULL for a pitcher's first start of the
      season (debut row). Card 8.Q.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, game_pk]

    columns:
      - name: pitcher_id
        description: Statcast/BAM integer pitcher ID.
        tests: [not_null]
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: game_date
        description: Calendar date of the start.
        tests: [not_null]
      - name: game_year
        description: Season year.
        tests: [not_null]
      - name: csw_pct_3start
        description: >
          Trailing 3-start CSW%: SUM(csw_pitches) / SUM(total_pitches) over the
          current start and the 2 preceding starts in the same season. NULL for
          the pitcher's first start of the season.
      - name: csw_pct_season
        description: >
          Season-to-date CSW% through this start (inclusive). NULL for the
          pitcher's first start of the season.
      - name: pitches_3start
        description: >
          Total pitches in the trailing 3 starts (reliability flag). Values
          below ~150 indicate a thin sample. NULL for debut starts.

  # ============================================================================
  # mart_starter_pitch_mix_rolling
  # ============================================================================
  - name: mart_starter_pitch_mix_rolling
    description: >
      One row per pitcher_id × game_pk (starts with ≥ 20 pitches). Trailing
      5-start and season-to-date pitch mix percentages by pitch group:
      fastball (FF/SI/FC), breaking (SL/CU/SV/KC), offspeed (CH/FS/FO).
      Rolling windows include the current start — leakage guard is enforced
      at the feature join layer (feature_pregame_starter_features) via strict
      game_date < prediction_game_date. Mix percentages are NULL when
      career_starts_before_game < 5; the consuming feature model imputes
      drift to 0.0 in that case. Card 8.M.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [pitcher_id, game_pk]

    columns:
      - name: pitcher_id
        description: Statcast/BAM integer pitcher ID.
        tests: [not_null]
      - name: game_pk
        description: MLB Stats API game identifier.
        tests: [not_null]
      - name: game_date
        description: Calendar date of the start.
        tests: [not_null]
      - name: game_year
        description: Season year.
        tests: [not_null]
      - name: career_starts_before_game
        description: >
          Count of strictly-prior career starts (excluding the current row).
          Used as the gate for nulling pct columns; values < 5 produce NULL
          mix percentages.
      - name: total_pitches_5start
        description: Total pitches across the trailing 5 starts (reliability flag).
      - name: fastball_pct_5start
        description: Trailing 5-start fastball usage (FF+SI+FC) / total. NULL when career_starts_before_game < 5.
      - name: breaking_pct_5start
        description: Trailing 5-start breaking usage (SL+CU+SV+KC) / total. NULL when career_starts_before_game < 5.
      - name: offspeed_pct_5start
        description: Trailing 5-start offspeed usage (CH+FS+FO) / total. NULL when career_starts_before_game < 5.
      - name: fastball_pct_season
        description: Season-to-date fastball usage through this start. NULL when career_starts_before_game < 5.
      - name: breaking_pct_season
        description: Season-to-date breaking usage through this start. NULL when career_starts_before_game < 5.
      - name: offspeed_pct_season
        description: Season-to-date offspeed usage through this start. NULL when career_starts_before_game < 5.

  # mart_batter_archetype_vs_pitcher_cluster
  # ============================================================================
  - name: mart_batter_archetype_vs_pitcher_cluster
    description: >
      Population-level rolling soft-weighted wOBA for each batter-archetype × pitcher-archetype pair.
      Grain: batter_cluster_label × pitcher_cluster_label × game_date (anchor).

      Soft-assignment weighting (Epic 7A.3): each PA contributes fractionally to all 25 cells
      with weight p_batter_b × p_pitcher_p, drawn from mart_player_archetype_posteriors using
      the latest snapshot strictly before game_date. pa_weight replaces the old hard pa_count.

      Leakage guard: posteriors joined on as_of_date < game_date (strict less-than).
      Rolling window: 180-day preceding. Gate: pa_weight >= 50.
      Shrinkage toward league average (wOBA=0.320, xwOBA=0.315) with prior weight 100.
      Availability: effective from 2021 games (posteriors begin 2021).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [batter_cluster_label, pitcher_cluster_label, game_date]

    columns:
      - name: batter_cluster_label
        description: Batter archetype name from mart_player_archetype_posteriors MAP cluster.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['groundball_speed', 'high_whiff', 'contact_spray', 'patient_obp', 'power_pull']

      - name: pitcher_cluster_label
        description: Pitcher archetype name from mart_player_archetype_posteriors MAP cluster.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['changeup_deceptive', 'multi_pitch_mix', 'power_swing_and_miss', 'contact_sinker_ball', 'soft_command']

      - name: game_date
        description: Anchor date for the rolling window.
        tests:
          - not_null

      - name: pa_weight
        description: >
          Sum of soft joint weights (p_batter × p_pitcher) over the 180-day rolling window
          ending the day before game_date. Replaces hard pa_count. Always >= 50 (model gate).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 50"

      - name: raw_woba
        description: Soft-weighted wOBA = woba_num / woba_denom over the rolling window. Null when woba_denom = 0.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2
              config:
                where: "raw_woba is not null"

      - name: raw_xwoba
        description: Soft-weighted xwOBA average over the rolling window. Null when no xwOBA-eligible PAs exist.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2
              config:
                where: "raw_xwoba is not null"

      - name: shrink_weight
        description: >
          Bayesian shrinkage weight: pa_weight / (pa_weight + 100). Range [0, 1).
          At the gate minimum of 50 this equals ~0.33.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: adj_woba
        description: >
          Shrinkage-adjusted wOBA toward league average (0.320).
          adj_woba = shrink_weight × raw_woba + (1 − shrink_weight) × 0.320.
          Primary feature for downstream ML use.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2

      - name: adj_xwoba
        description: >
          Shrinkage-adjusted xwOBA toward league average (0.315).
          adj_xwoba = shrink_weight × raw_xwoba + (1 − shrink_weight) × 0.315.
          Primary feature for downstream ML use.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 2

  # ============================================================================
  # mart_clv_labeled_games  (Epic 12.0)
  # ============================================================================
  - name: mart_clv_labeled_games
    description: >
      One row per (game_pk, market_type) for each live game meeting all four
      CLV label conditions: (1) live pre-game prediction exists, (2) opening
      market price exists, (3) closing market price exists, (4) game result
      exists. market_type in {h2h, totals}. This is the canonical source for
      Epic 12 gate thresholds. "50 CLV-labeled games" means 50 distinct
      game_pk values in this mart. Live data only (2026-05-10+).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_pk, market_type]

    columns:

      - name: game_pk
        description: MLB Stats API game identifier.
        tests:
          - not_null

      - name: game_date
        description: Date of the game.
        tests:
          - not_null

      - name: market_type
        description: "Betting market: 'h2h' (moneyline) or 'totals' (over/under)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['h2h', 'totals']

      - name: predicted_at
        description: Timestamp when predict_today.py produced this prediction.
        tests:
          - not_null

      - name: bovada_open_devig_prob
        description: >
          Vig-free opening implied probability for the reference side
          (home win for h2h; over for totals), averaged across bookmakers
          in mart_closing_line_value.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: bovada_close_devig_prob
        description: Vig-free closing implied probability for the reference side.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

      - name: model_prob
        description: >
          Model predicted probability for the reference side
          (consensus_win_prob for h2h; totals_model_prob for totals).
        tests:
          - not_null

      - name: clv
        description: >
          bovada_close_devig_prob minus bovada_open_devig_prob. Positive means
          the market moved toward the reference side by close.
        tests:
          - not_null

      - name: clv_positive
        description: "Boolean; true when clv > 0."
        tests:
          - not_null

      - name: actual_outcome
        description: >
          1 if the reference side won: home team won for h2h; over won
          (total runs > opening total line) for totals.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

  # ============================================================================
  # mart_clv_label_count  (Epic 12.0)
  # ============================================================================
  - name: mart_clv_label_count
    description: >
      Single-row summary view over mart_clv_labeled_games. Canonical gate
      threshold tracker for Epic 12. live_total_count is the authoritative
      count checked against the 50/100/200/500/1000-game gates.

  # ============================================================================
  # mart_pipeline_status  (A1.3)
  # ============================================================================
  - name: mart_pipeline_status
    description: >
      View over baseball_data.betting_ml.pipeline_status. One row per game day
      summarising the daily pipeline run: when it started, when predictions
      completed, signal quality score, games scored vs. scheduled, and
      pipeline_status ∈ {complete, partial, failed}. The derived is_fresh flag
      is TRUE when pipeline_status = complete and predict_today_complete_ts is
      within the last 6 hours. Queried by the Streamlit app to decide whether
      to show a freshness warning banner.

    columns:
      - name: run_date
        description: Calendar date of the pipeline run.
        tests: [not_null, unique]

      - name: pipeline_status
        description: "complete, partial, or failed."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [complete, partial, failed]

      - name: is_fresh
        description: >
          TRUE when pipeline_status = complete and predict_today_complete_ts
          is within 6 hours of current UTC time.
        tests: [not_null]

      - name: signal_completeness_score
        description: >
          Average completeness fraction (0–1) over the five floor signal groups
          on the latest completed game slate. Mirrors the value computed by
          check_signal_freshness.py.

      - name: n_games_scored
        description: Distinct game_pks with predictions in daily_model_predictions for this run_date.

      - name: n_qualified_bets
        description: Rows where qualified_bet = TRUE in daily_model_predictions for this run_date.

  # ============================================================================
  # mart_team_defense_quality_rolling  (Story 27.4 — defensive quality signal)
  # ============================================================================
  - name: mart_team_defense_quality_rolling
    description: >
      Story 27.4 — team defensive quality composite per game-side, combining
      prior-season OAA (Baseball Savant) and prior-season team mean sprint speed
      (Statcast, EB-smoothed).  Both components are leakage-safe (game_year-1 only).
      Grain: game_pk × side (fielding-team perspective).
      Shared signal for Epic 27 (totals) and Epic 28 (H2H) per R33.
    columns:
      - name: game_pk
        description: MLB game identifier.
        tests: [not_null]
      - name: side
        description: "'home' or 'away' — the FIELDING team for this row."
        tests: [not_null]
      - name: team_abbrev
        description: Canonical team abbreviation for the fielding team.
        tests: [not_null]
      - name: oaa_prior_season
        description: Prior-season Outs Above Average (OAA) from Baseball Savant. NULL for pre-2017 games.
      - name: sprint_speed_prior_eb
        description: Prior-season team mean sprint speed (ft/s), EB-smoothed toward league mean with K=8 pseudo-obs.
      - name: n_sprint_players
        description: Number of players with measured sprint speed in the prior season for this team.
      - name: oaa_z
        description: Per-season z-score of oaa_prior_season. 0.0 when OAA is missing.
      - name: sprint_z
        description: Per-season z-score of sprint_speed_prior_eb. 0.0 when sprint speed is missing.
      - name: defense_quality_mu
        description: >
          Composite defensive quality z-score: (oaa_z + sprint_z)/sqrt(2) when both available,
          otherwise available component's z-score, 0.0 when neither is present.
          Higher = better team defense.
        tests: [not_null]
      - name: oaa_available
        description: TRUE when prior-season OAA data exists for this team × season.
        tests: [not_null]
      - name: sprint_available
        description: TRUE when prior-season sprint speed data exists for this team × season.
        tests: [not_null]

  # ============================================================================
  # mart_pitcher_batted_ball_profile  (Story 27.5 — GB/FB × park interaction)
  # ============================================================================
  - name: mart_pitcher_batted_ball_profile
    description: >
      Story 27.5 — pitcher-season batted-ball profile derived from Statcast.
      Grain: pitcher_id × game_year.  Computes GB%, FB%, LD%, Popup% from
      stg_batter_pitches for regular-season appearances (≥50 BF gate).
      Coverage: 2015+.
      LEAKAGE GUARD: consumers must join on game_year - 1 (prior season only).
      Used to build fb_pct × eb_hr_factor and gb_pct × eb_so_factor interaction
      features for Epic 27.5 ablation and run_env_v5 challenger.
    columns:
      - name: pitcher_id
        description: MLB Stats API player ID for the pitcher.
        tests: [not_null]
      - name: game_year
        description: Season year.
        tests: [not_null]
      - name: bf_count
        description: Total batters faced in this season (≥50 required to appear in mart).
        tests: [not_null]
      - name: total_batted_balls
        description: Balls in play with a non-null batted_ball_type (excludes K/BB/HBP).
        tests: [not_null]
      - name: gb_pct
        description: Ground balls / total_batted_balls. NULL when total_batted_balls = 0.
      - name: fb_pct
        description: Fly balls / total_batted_balls. NULL when total_batted_balls = 0.
      - name: ld_pct
        description: Line drives / total_batted_balls.
      - name: popup_pct
        description: Infield pop-ups / total_batted_balls.
