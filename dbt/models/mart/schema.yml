  # ============================================================================
  # mart_pitcher_rolling_stats
  # ============================================================================
  - name: mart_pitcher_rolling_stats
    description: >
      Rolling pitcher performance statistics for every pitcher across four
      aggregation windows: trailing 7 days, trailing 14 days, trailing 30 days,
      and season-to-date. Designed as a primary feature source for game outcome
      prediction — a starter's recent form is more predictive than their season
      line, especially after injuries or mechanical changes. Includes K%, BB%,
      whiff rate, swinging strike rate, batter chase rate, barrel rate allowed,
      hard-hit rate allowed, xwOBA against, average fastball velocity, and
      average release extension. Starter is defined as the pitcher who threw
      the first pitch for their team in the game. Regular season only
      (game_type = 'R'). Grain: one row per pitcher × game. Join keys: pitcher_id, game_date.

    tests:
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_7d <= games_14d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "games_14d <= games_30d"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "batters_faced >= 1"
      - dbt_utils.expression_is_true:
            arguments:
              expression: "pitch_count >= batters_faced"

    columns:

      - name: game_pk
        description: Unique MLB game identifier. Foreign key to mart_game_results.
        tests:
          - not_null

      - name: game_date
        description: Date the game was played.
        tests:
          - not_null

      - name: game_year
        description: Season year the game took place.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 2008"

      - name: pitcher_id
        description: >
          MLB Player ID for the pitcher. Renamed from pitcher in stg_batter_pitches.
        tests:
          - not_null

      - name: pitcher_hand
        description: >
          Pitching hand of the pitcher. Renamed from p_throws in stg_batter_pitches.
        tests:
          - not_null
          - accepted_values:
                arguments:
                  values: ['L', 'R']

      - name: pitching_team
        description: >
          Statcast abbreviation for the pitcher's team. Derived from home_team or
          away_team based on inning_half.
        tests:
          - not_null

      - name: facing_team
        description: Statcast abbreviation for the opposing (batting) team.
        tests:
          - not_null

      - name: is_starter
        description: >
          True when this pitcher was the starter (threw the first pitch for their
          team in this game). False for all relief appearances.
        tests:
          - not_null

      # ── Single-game actuals ───────────────────────────────────────────────────

      - name: batters_faced
        description: Total plate appearances faced by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: pitch_count
        description: Total pitches thrown by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 1"

      - name: strikeouts
        description: Strikeouts recorded by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: walks
        description: Walks (BB + IBB) allowed by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: hits_allowed
        description: Hits allowed (1B + 2B + 3B + HR) by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: home_runs_allowed
        description: Home runs allowed by this pitcher in this game.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"

      - name: woba_against
        description: >
          Realized wOBA against this pitcher for this game. Computed as
          sum(woba_value) / sum(woba_denom).

      - name: xwoba_against
        description: >
          Expected wOBA against based on exit velocity and launch angle for
          this game. Null when no in-play contact data is available.

      - name: k_pct
        description: >
          Strikeout rate for this game: strikeouts / batters faced.

      - name: bb_pct
        description: >
          Walk rate for this game: walks / batters faced.

      - name: whiff_rate
        description: >
          Whiff rate for this game: swing-and-miss pitches / total swings.
          A swing is any pitch the batter offered at (including fouls and
          in-play contact). A whiff excludes foul_tip (contact made).

      - name: swinging_strike_rate
        description: >
          Swinging strike rate (SwStr%) for this game: swing-and-miss pitches /
          total pitches thrown. Differs from whiff_rate in the denominator.

      - name: batter_chase_rate
        description: >
          Rate at which batters swung at pitches outside the strike zone
          (Statcast zones 11-14) in this game. Higher values favor the pitcher.

      - name: hard_hit_pct_allowed
        description: >
          Hard-hit rate allowed for this game: batted balls with exit velocity
          >= 95 mph / total batted balls against.

