      - name: obp_14d
        description: Rolling 14-day on-base percentage.

      - name: slg_14d
        description: Rolling 14-day slugging percentage.

      - name: ops_14d
        description: Rolling 14-day OPS.

      - name: woba_14d
        description: Rolling 14-day realized wOBA.

      - name: xwoba_14d
        description: Rolling 14-day expected wOBA.

      - name: xba_14d
        description: Rolling 14-day expected batting average.

      - name: xslg_14d
        description: Rolling 14-day expected slugging.

      - name: k_pct_14d
        description: Rolling 14-day strikeout rate.

      - name: bb_pct_14d
        description: Rolling 14-day walk rate.

      - name: hard_hit_pct_14d
        description: Rolling 14-day hard-hit rate.

      - name: barrel_pct_14d
        description: Rolling 14-day barrel rate.

      - name: whiff_rate_14d
        description: Rolling 14-day whiff rate.

      - name: swinging_strike_rate_14d
        description: Rolling 14-day swinging strike rate.

      - name: chase_rate_14d
        description: Rolling 14-day chase rate.

      - name: zone_swing_rate_14d
        description: Rolling 14-day zone swing rate.

      # ── Rolling 30-day ────────────────────────────────────────────────────────

      - name: games_30d
