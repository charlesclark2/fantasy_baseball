
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'baseball_betting_and_fantasy'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'baseball_betting_and_fantasy'

# E11.1-W1: dbt-duckdb adapter adds `format` and `overwrite` to the `external`
# materialization config, but dbt-fusion's schema only knows `location`. Demote
# UnusedConfigKey (dbt1060) to a warning so the adapter-specific keys pass through.
flags:
  warn_error_options:
    warn:
      - UnusedConfigKey

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
seeds:
  baseball_betting_and_fantasy:
    ref_teams:
      +column_types:
        team_id:          integer
        is_legacy_abbrev: boolean
        is_active:        boolean
    ref_team_aliases:
      +column_types:
        team_id:          integer
    ref_venues:
      +column_types:
        venue_id:             integer
        park_facing_degrees:  integer
    # Story A2.11 — EB priors flattened from betting_ml/models/eb_priors/*.json
    # (flatten_priors_to_seeds.py). band_rank encodes the Python band-fallback order.
    ref_eb_starter_priors:
      +column_types:
        season:      integer
        band_rank:   integer
        mu:          float
        sigma:       float
        n_starters:  integer
    ref_eb_lineup_priors:
      +column_types:
        season: integer
        alpha:  float
        beta:   float
        mu:     float
        sigma:  float
    ref_eb_bullpen_priors:
      +column_types:
        season:       integer
        band_rank:    integer
        mu:           float
        sigma:        float
        n_relievers:  integer

# E11.3 — tag every dbt query with the calling job so ACCOUNT_USAGE.QUERY_HISTORY
# gives a cost-by-job breakdown. DBT_JOB_NAME is injected by the Dagster op
# (see pipeline/ops/*_ops.py _run_dbt helpers); falls back to 'dbt_manual' for
# local / CI runs. TARGET_ENV is set by Dagster as 'prod' (default 'dev').
#
# E11.9 — the PRIMARY tagging mechanism is now the connection-level `query_tag` in
# profiles.yml: the 6/22 audit proved this on-run-start ALTER SESSION did NOT reach
# dbt-fusion's per-model queries (96.7% untagged). The profile key tags every
# connection at connect time. This hook is RETAINED as a belt-and-suspenders for the
# hook connection, and is now kept IDENTICAL to the profile tag (no invocation_id) so
# every query — model, test, hook — groups under the same job|env value in the
# cost-by-job report rather than fragmenting one connection per run.
on-run-start:
  # E11.1-W1: ALTER SESSION is Snowflake-only; skip for the duckdb lakehouse target.
  - "{% if target.name != 'duckdb' %}ALTER SESSION SET QUERY_TAG = '{{ env_var('DBT_JOB_NAME', 'dbt_manual') }}|{{ env_var('TARGET_ENV', 'dev') }}'{% endif %}"
  # E11.1-W1: dbt-fusion does not apply env_var() from profiles.yml settings to DuckDB;
  # inject S3 credentials via CREATE PERSISTENT SECRET instead (macro in macros/lakehouse.sql).
  - "{{ setup_duckdb_s3_secret() }}"

query-comment:
  comment: "job={{ env_var('DBT_JOB_NAME', 'dbt_manual') }} model={{ node.name }}"
  append: true

models:
  baseball_betting_and_fantasy:
    staging:
      +materialized: table
    mart:
      +materialized: view
    marts:
      +materialized: view
    feature:
      +materialized: table
      +schema: betting_features
