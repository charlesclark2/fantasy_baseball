# Shared new-sports dbt-duckdb project (NCAAF-P0.2).
#
# ⚠️ SEPARATE from MLB's Snowflake dbt project ON PURPOSE (sport_data_platform.md §16.1):
# MLB's dbt is Snowflake-targeted with its own manifest / state:modified+ CI / type-contract
# guards. The new sports are DuckDB/S3-native with a fully DISJOINT DAG (zero cross-sport
# refs). ONE project shared across NCAAF/NFL/NCAAB, per-sport model FOLDERS + SCHEMAS
# (ncaaf_staging / ncaaf_marts, …). Split into per-sport projects only if they later diverge.
name: sports_intel
version: "0.1.0"
config-version: 2
profile: sports_lake

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # The sports lake bucket (cross-sport decision #2). `lake_root` overrides to a LOCAL FS
  # Delta tree for offline dev / the P0.2 smoke (empty = read from S3).
  lake_bucket: "credence-sports-lakehouse"
  lake_root: ""

models:
  sports_intel:
    ncaaf:
      staging:
        +schema: ncaaf_staging
        +materialized: view
      marts:
        +schema: ncaaf_marts
        +materialized: table
    nfl:
      staging:
        +schema: nfl_staging
        # N0.3: materialized as TABLES, not views. The raw tier is Delta; DuckDB's delta
        # extension cannot serialize a DeltaScan operator inside a complex plan (multiple stacked
        # window fns / heavy joins) → a mart reading staging-views-over-delta_scan fails with
        # "DeltaScan serialization not implemented" (hit by dim_player_role + fct_player_week).
        # Physical staging tables read each Delta table ONCE into the local DuckDB, so mart plans
        # contain no delta_scan → the limit is sidestepped (and repeated mart reads are cheaper).
        +materialized: table
      marts:
        # N0.3: the ported `refined` IP (fct_player_week, dim_player[_role], calendars, NGS/snap
        # satellites, opportunity/efficiency/season/projections, dim_nfl_betting). Tables in the
        # nfl_marts schema. dim_player_role + mart_projections_preseason set materialized='table'
        # inline (jaffle carried the config in-model).
        +schema: nfl_marts
        +materialized: table
