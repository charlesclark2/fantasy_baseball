# dbt-duckdb profile for the shared new-sports project (NCAAF-P0.2).
#
# DuckDB reads S3 Delta directly — no warehouse, free compute (sport_data_platform.md §6/§7A).
# S3 auth via the credential chain (the instance role on the box; ambient keys on a laptop) —
# NO inline keys (the AKID landmine). Region pinned per resource.
sports_lake:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Default DB path is the project root (NOT build/…) — DuckDB won't create a missing
      # parent dir, so a subdir default fails on a fresh checkout. Gitignored via *.duckdb.
      path: "{{ env_var('SPORTS_DUCKDB_PATH', 'sports.duckdb') }}"
      extensions:
        - httpfs
        - parquet
        - delta
      secrets:
        - type: s3
          provider: credential_chain
          region: "{{ env_var('SPORTS_LAKE_REGION', 'us-east-2') }}"
      settings:
        # Box-aware: the daily/weekly build runs on the shared EC2 box; keep DuckDB from
        # over-committing RAM (the INC-22 OOM class). Overridable per host.
        memory_limit: "{{ env_var('SPORTS_DUCKDB_MEMORY', '4GB') }}"
        threads: 4
    # `ci` target (NFL-N0.3): the OFFLINE parse+compile gate. NO `secrets` block — dbt-duckdb
    # runs the profile's secrets on connect, and `CREATE SECRET (... PROVIDER credential_chain)`
    # HARD-FAILS on a runner with no AWS creds ("Secret Validation Failure"). compile only RENDERS
    # the delta_scan(...) SQL (it never scans S3), so it needs no S3 secret at all → this target
    # opens a plain local DuckDB and the structural gate runs credential-free. Do NOT `dbt run`
    # with this target (a real build needs the S3 secret → use `dev`).
    ci:
      type: duckdb
      path: "{{ env_var('SPORTS_DUCKDB_PATH', 'sports.duckdb') }}"
      extensions:
        - httpfs
        - parquet
        - delta
      settings:
        memory_limit: "{{ env_var('SPORTS_DUCKDB_MEMORY', '4GB') }}"
        threads: 4
