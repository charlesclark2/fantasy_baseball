version: 2

models:
  - name: xref_college_nfl_players
    description: >
      The college↔NFL player-ID crosswalk (NCAAF-P0.3) — the NFL-feeder spine (MLB Edge-E7
      analog). One row per matched NFL player, keyed to a CFBD college_athlete_id via the
      deterministic draft slot (99.7% of drafted players) or a fuzzy UDFA match. Built by
      football/ncaaf/feeder/xref.py, landed as a Delta mart, read here as a typed view.
      match_confidence + match_method source-stamp how each row was resolved. target_* are
      POST-draft NFL outcomes (the P1A modelling target) — NEVER use them as features.
    columns:
      - name: gsis_id
        description: The NFL player key (nflverse). Unique across the crosswalk; may be null only if a fuzzy source lacked one (it does not here).
        data_tests:
          - not_null
          - unique
      - name: sport
        data_tests: [not_null]
      - name: college_athlete_id
        description: CFBD ESPN-numeric athlete id — the bridge to college production. Null for a UDFA whose fuzzy match failed.
      - name: match_method
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["deterministic_slot", "fuzzy_udfa"]
      - name: match_confidence
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["high", "medium", "low"]
      - name: match_score
        description: 1.0 for a deterministic slot match; the Jaro-Winkler name similarity for a fuzzy UDFA match.
        data_tests: [not_null]
      - name: is_udfa
        data_tests: [not_null]

  - name: ncaaf_team_roster_continuity
    description: >
      The per-team-season roster-continuity / talent-flux signal (NCAAF-P0.4) — the FREE
      transfer/roster signal the game model needs so it doesn't misprice teams whose roster
      turned over. ONE row per (season, team), FBS universe (spine = CFBD returning production).
      Combines: returning production % (CFBD /player/returning), transfer-portal flux
      (/player/portal — in/out counts, star- & rating-weighted, blue-chip, attrition), roster
      year-over-year continuity (/roster head-count overlap), and the 247 talent composite +
      its YoY delta (/talent). ⭐ Leakage-safe / point-in-time: every input is set PRE-SEASON
      for `season`, so a downstream model joins it by season as-of kickoff with no future leak;
      it carries no in-season/outcome columns. Feeds P1.2 (team-strength covariate) + P1.3
      (features). The PAID NIL-$ valuations (On3/Rivals) are documented + DEFERRED
      (ncaaf_data_inventory.md §10) — NOT a dependency of this model.
      Coverage caveats: portal is 0/covered only from 2021 (portal_data_covered flags it);
      talent is NULL for 2014 (CFBD talent starts 2015) and a couple of 2025 expansion teams.
    columns:
      - name: team_season_key
        description: season||'-'||team grain surrogate — one row per team per season (the grain contract).
        data_tests: [not_null, unique]
      - name: sport
        data_tests: [not_null]
      - name: season
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: returning_ppa_pct
        description: The headline CFBD returning-production % (share of prior-season PPA returning). 0-1-ish (can slightly exceed 1).
        data_tests: [not_null]
      - name: roster_continuity_pct
        description: >
          roster_returning_players / roster_size — share of THIS year's roster that was also on
          the team last year. NULL for the 2014 backfill-floor season (no prior-year roster to
          compare — unknown, not zero); populated for every later season.
        data_tests:
          - not_null:
              config:
                where: "roster_prev_size is not null"
      - name: portal_data_covered
        description: True from 2021 (CFBD portal era); false pre-2021 where portal_* are 0 by absence, not by a zero-churn team.
        data_tests: [not_null]
      - name: portal_net_count
        description: portal_in_count − portal_out_count (negative = net roster exodus).
        data_tests: [not_null]
      - name: team_talent
        description: 247Sports team talent composite (level). Null for 2014 and a couple of 2025 expansion teams (left-joined).

  - name: ncaaf_team_coaching_change
    description: >
      The per-team-season HEAD-COACHING-continuity signal (NCAAF-P0.5) — the game model's
      coaching-change input. ONE row per (season, team), FBS universe (spine = CFBD returning
      production, same as P0.4). FREE from CFBD /coaches. Carries: HC identity + tenure,
      year-over-year HC-change flag, mid-season-change flag, and ⭐ the coach's PRIOR SP+
      track record (career-to-date avg + most-recent prior season) so a new coach's expected
      impact ≈ their history, not just a binary flag. ⭐ Leakage-safe / point-in-time: HC
      identity + change/tenure are known pre-season; the prior-SP+ profile aggregates STRICTLY
      over seasons before `season` (never the current season's outcome). Feeds P1.3 (coaching
      feature block). The OC/DC coordinator layer is a GAP not in CFBD (no free API) —
      documented + DEFERRED (ncaaf_data_inventory.md §11), NOT a dependency here.
      Coverage caveats: 2014 is the history floor → hc_change_from_prev is NULL and
      tenure/prior-SP+ are left-censored there (is_hc_history_censored flags it); a first-time
      HC has NULL prior-SP+ (is_first_time_hc); ~7% of cells had a mid-season change
      (hc_midseason_change; coach of record = the most-games coach).
    columns:
      - name: team_season_key
        description: season||'-'||team grain surrogate — one row per team per season (the grain contract).
        data_tests: [not_null, unique]
      - name: sport
        data_tests: [not_null]
      - name: season
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: head_coach
        description: The coach of record (most games that season). Null only if /coaches lacks the team-season (rare — a spine team with no coach row).
      - name: hc_change_from_prev
        description: >
          True when this season's HC differs from last season's HC. NULL at the 2014 history
          floor (no prior year — unknown, not false). Populated for every later season with a
          prior-year coach of record.
        data_tests:
          - not_null:
              config:
                where: "season > 2014 and prev_head_coach is not null"
          - accepted_values:
              arguments:
                values: [true, false]
      - name: hc_tenure_years
        description: Consecutive seasons the coach of record has led this team through `season` (left-censored at the 2014 floor). ≥ 1.
      - name: is_first_time_hc
        description: True when the coach has NO prior head-coaching season in-window (2014+) → prior-SP+ columns are NULL by absence, not a real zero.
        data_tests: [not_null]
      - name: hc_prior_seasons
        description: Count of the coach's prior head-coaching seasons in-window (any school). 0 = first-time/censored.
        data_tests: [not_null]
      - name: hc_prior_sp_overall_avg
        description: The coach's career-to-date average SP+ overall (strictly seasons before `season`; leakage-safe). NULL for a first-time HC.
      - name: hc_recent_sp_overall
        description: The coach's most-recent prior season's SP+ overall (freshest track-record read; leakage-safe). NULL for a first-time HC.
      - name: is_hc_history_censored
        description: True for season=2014 (the backfill floor left-censors change/tenure/prior history).
        data_tests: [not_null]
