version: 2

models:
  - name: stg_ncaaf_games
    description: >
      Flattened CFBD /games — one row per game, sport-tagged. The minimum-bar box-score
      spine (ncaaf_data_inventory.md §2.1). Reads the raw Delta table via the ncaaf_delta()
      macro (delta_scan). FBS-only matchups flagged (is_fbs_matchup).
    columns:
      - name: game_id
        description: CFBD game id (ESPN-style).
        data_tests: [not_null, unique]
      - name: season
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_odds
    description: >
      Flattened Odds API NCAAF game lines — one row per (event, bookmaker, market, outcome).
      h2h/spreads/totals across US books incl. Bovada. Reads the raw Delta table via
      ncaaf_delta(). Intraday cadence in-season.
    columns:
      - name: event_id
        data_tests: [not_null]
      - name: market
        data_tests:
          - accepted_values:
              arguments:
                values: ["h2h", "spreads", "totals"]

  - name: stg_ncaaf_cfbd_draft_picks
    description: >
      Flattened CFBD /draft/picks — the COLLEGE side of the NFL-feeder draft-slot key
      (NCAAF-P0.3). One row per draft slot (year, overall). collegeAthleteId bridges back to
      the CFBD college universe. Consumed by the feeder xref builder + downstream P1A.
    columns:
      - name: draft_year
        data_tests: [not_null]
      - name: overall_pick
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_returning_production
    description: >
      Flattened CFBD /player/returning (NCAAF-P0.4) — CFBD's returning-production metric per
      (season, team): the share of prior-season PPA/usage carried by returning players.
      returning_ppa_pct is the headline "returning production %". Leakage-safe (known
      pre-season). Materialized as a TABLE (the delta_scan-stacking cure). Feeds P0.4 mart.
    columns:
      - name: season
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_transfer_portal
    description: >
      Flattened CFBD /player/portal (NCAAF-P0.4) — one row per portal entry. season = the
      season the window PRECEDES (a season-N entry is the N-1/N off-season) ⇒ leakage-safe.
      origin=team left, destination=team joined (null=uncommitted/left CFB). CFBD coverage
      2021+. Materialized as a TABLE. Feeds the P0.4 mart's portal-flux aggregates.
    columns:
      - name: season
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_talent
    description: >
      Flattened CFBD /talent (NCAAF-P0.4) — the 247 team talent composite per (season, team).
      A roster-talent LEVEL indicator complementing the flux signals. CFBD coverage 2015+.
      Leakage-safe (recruiting-based, pre-season). Materialized as a TABLE. Feeds the P0.4 mart.
    columns:
      - name: season
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_roster
    description: >
      Flattened CFBD /roster (NCAAF-P0.4) — one row per player on a team's season roster
      (athlete id = stable key; season from the Delta partition, not the JSON). Covers all
      divisions; the P0.4 mart's returning-production spine restricts to FBS. Feeds the
      year-over-year roster-continuity computation. Leakage-safe. Materialized as a TABLE.
    columns:
      - name: season
        data_tests: [not_null]
      - name: player_id
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_coaches
    description: >
      Flattened CFBD /coaches (NCAAF-P0.5) — the head-coach history, EXPLODED to one row per
      (coach, team, season). Carries each coach-year's SP+ splits (sp_overall/sp_offense/
      sp_defense) — the raw material for the coaching-change mart's HC-change flags, tenure, and
      each coach's PRIOR-season track record. season is taken from the season ROW ($.year), not
      the partition. coach_name (first+last) is the only stable cross-school key (no coach id).
      Materialized as a TABLE (the delta_scan-stacking cure). ⚠️ sp_*/wins on a row are that
      season's OUTCOME — leakage-safe only when read strictly-prior (the mart enforces this).
    columns:
      - name: season
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: coach_name
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_nflverse_draft_picks
    description: >
      Flattened nflverse draft_picks — the NFL side of the draft-slot key (`pick` = overall)
      PLUS the feeder TARGET outcomes (target_car_av/…). ⚠️ target_* are POST-draft — the P1A
      modelling target, NOT features. cfb_player_id is the sports-reference slug (combine
      attach), NOT joinable to CFBD's numeric collegeAthleteId.
    columns:
      - name: draft_year
        data_tests: [not_null]
      - name: overall_pick
        data_tests: [not_null]
      - name: gsis_id
        description: NFL player key. Non-null for the vast majority of picks (a few pre-gsis historical picks can be null); unique within the deduped table.
      - name: sport
        data_tests: [not_null]

  # ── NCAAF-P1.1 — the raw tables the dimensional model is built from ────────────────────

  - name: stg_ncaaf_teams
    description: >
      Flattened CFBD /teams/fbs (P1.1) — one row per (season, team_id): the FBS registry as it
      stood that season, carrying the DRIFTING attributes (conference, division, classification)
      plus the stable identity/venue block. The raw record has no season field (a year-only pull),
      so season comes from the Delta PARTITION — which is exactly what makes realignment
      observable. Source for the SCD-2 dim_ncaaf_team and for dim_ncaaf_conference.
    columns:
      - name: sport
        data_tests: [not_null]
      - name: season
        data_tests: [not_null]
      - name: team_id
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]

  - name: stg_ncaaf_game_team_stats
    description: >
      Flattened CFBD /games/teams (P1.1) — one row per (game_id, team_id), the team-game box line.
      Explodes teams[] -> stats[] and PIVOTS the ~35 string categories into typed columns.
      Composites are split ONCE here rather than re-parsed by every consumer: completionAttempts
      "27-39" → completions/pass_attempts, third/fourthDownEff → conversions/attempts,
      totalPenaltiesYards → penalties/penalty_yards, possessionTime "31:14" → possession_seconds.
      season from the Delta partition; week from the ingest's _week tag.
    columns:
      - name: sport
        data_tests: [not_null]
      - name: game_id
        data_tests: [not_null]
      - name: team_id
        data_tests: [not_null]
      - name: season
        data_tests: [not_null]

  - name: stg_ncaaf_game_player_stats
    description: >
      Flattened CFBD /games/players (P1.1) — four chained UNNESTs (teams -> categories -> types ->
      athletes) producing the LONG grain CFBD publishes: one row per (game_id, player_id, category,
      stat_type). ⚠️ Stays LONG on purpose — the stat vocabulary differs per category and CFBD adds
      types over time, so a pivot here would silently drop anything not enumerated;
      fact_ncaaf_player_game pivots the modelled subset and the rest stays reachable.
      Values remain STRINGS (CFBD's wire format), including composites like passing C/ATT.
      ⚠️ /games/players carries no teamId — the team key is the NAME; dim_ncaaf_team resolves it.
      🧯 Pinned to threads=1 + preserve_insertion_order=false: ~13.8k records explode to ~5.2M rows
      and the model OOMs a 4 GB / 4-thread DuckDB otherwise.
    columns:
      - name: sport
        data_tests: [not_null]
      - name: game_id
        data_tests: [not_null]
      - name: player_id
        data_tests: [not_null]
      - name: category
        data_tests: [not_null]
      - name: stat_type
        data_tests: [not_null]

  - name: stg_ncaaf_drives
    description: >
      Flattened CFBD /drives (P1.1) — one row per drive, the unit for scoring-opportunity and
      field-position efficiency. CFBD's {minutes, seconds} objects are flattened to
      elapsed_seconds. season from the Delta partition; week from the _week tag.
    columns:
      - name: sport
        data_tests: [not_null]
      - name: drive_id
        data_tests: [not_null, unique]
      - name: game_id
        data_tests: [not_null]

  - name: stg_ncaaf_plays
    description: >
      Flattened CFBD /plays (P1.1) — ~2.2M rows, the raw material every efficiency metric
      decomposes to (ppa is CFBD's EPA-analog). ⭐ Defines success rate ONCE on the standard
      convention (1st down >= 50% of distance, 2nd >= 70%, 3rd/4th >= 100%) plus is_scrimmage_play,
      is_pass/rush_play and is_passing_down, so no two consumers can disagree. Non-scrimmage plays
      are FLAGGED, not dropped. ⚠️ wallclock stays VARCHAR (INC-23 — the reader casts at use-site).
    columns:
      - name: sport
        data_tests: [not_null]
      - name: play_id
        data_tests: [not_null, unique]
      - name: game_id
        data_tests: [not_null]
      - name: is_scrimmage_play
        data_tests: [not_null]

  - name: stg_ncaaf_game_advanced
    description: >
      Flattened CFBD /stats/game/advanced (P1.1) — one row per (game_id, team): the PBP-derived
      advanced box for BOTH sides, with the down splits (standard/passing downs) and run-game block
      (line/second-level/open-field yards, power success, stuff rate). ⚠️ def_* is what THIS team's
      DEFENSE ALLOWED (CFBD emits both sides on each team's record) — the off_/def_ prefixes exist
      so the perspective cannot be misread. The offense/defense sub-objects are extracted once per
      row: reaching into the full document ~100x re-parses the JSON per column and OOM'd a 4 GB
      DuckDB. Unlike the box/PBP tables this record carries its own season/week/team.
    columns:
      - name: sport
        data_tests: [not_null]
      - name: game_id
        data_tests: [not_null]
      - name: team
        data_tests: [not_null]
      - name: season
        data_tests: [not_null]
