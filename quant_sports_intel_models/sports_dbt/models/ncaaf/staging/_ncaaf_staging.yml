version: 2

models:
  - name: stg_ncaaf_games
    description: >
      Flattened CFBD /games — one row per game, sport-tagged. The minimum-bar box-score
      spine (ncaaf_data_inventory.md §2.1). Reads the raw Delta table via the ncaaf_delta()
      macro (delta_scan). FBS-only matchups flagged (is_fbs_matchup).
    columns:
      - name: game_id
        description: CFBD game id (ESPN-style).
        data_tests: [not_null, unique]
      - name: season
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_ncaaf_odds
    description: >
      Flattened Odds API NCAAF game lines — one row per (event, bookmaker, market, outcome).
      h2h/spreads/totals across US books incl. Bovada. Reads the raw Delta table via
      ncaaf_delta(). Intraday cadence in-season.
    columns:
      - name: event_id
        data_tests: [not_null]
      - name: market
        data_tests:
          - accepted_values:
              arguments:
                values: ["h2h", "spreads", "totals"]

  - name: stg_ncaaf_cfbd_draft_picks
    description: >
      Flattened CFBD /draft/picks — the COLLEGE side of the NFL-feeder draft-slot key
      (NCAAF-P0.3). One row per draft slot (year, overall). collegeAthleteId bridges back to
      the CFBD college universe. Consumed by the feeder xref builder + downstream P1A.
    columns:
      - name: draft_year
        data_tests: [not_null]
      - name: overall_pick
        data_tests: [not_null]
      - name: sport
        data_tests: [not_null]

  - name: stg_nflverse_draft_picks
    description: >
      Flattened nflverse draft_picks — the NFL side of the draft-slot key (`pick` = overall)
      PLUS the feeder TARGET outcomes (target_car_av/…). ⚠️ target_* are POST-draft — the P1A
      modelling target, NOT features. cfb_player_id is the sports-reference slug (combine
      attach), NOT joinable to CFBD's numeric collegeAthleteId.
    columns:
      - name: draft_year
        data_tests: [not_null]
      - name: overall_pick
        data_tests: [not_null]
      - name: gsis_id
        description: NFL player key. Non-null for the vast majority of picks (a few pre-gsis historical picks can be null); unique within the deduped table.
      - name: sport
        data_tests: [not_null]
