apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: user-confirms-first-predictions-run
  namespace: default
spec:
  gateType: review
  description: >
    USER CONFIRMATION GATE. Blocks after implement-predict-today.

    After manually running:
      uv run python betting_ml/scripts/predict_today.py

    Confirm to the agent that ALL of the following are true:
      1. The script exited with code 0.
      2. A picks table was printed to stdout with at least one row.
      3. betting_ml/outputs/probability_outputs_{date}.parquet was written.
      4. The parquet contains the required schema columns:
           game_key, market, model_prob, market_implied_prob,
           alpha, posterior_prob, edge, implied_kelly_fraction.

    If no games were available for today, confirm that the script exited 0
    with the "No games found" message and that you verified the --date flag
    works for a date with known games.
  reviewers:
    - user:charlesclark
