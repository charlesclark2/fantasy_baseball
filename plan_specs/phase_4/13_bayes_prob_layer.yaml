    and p_over_line(); Snowflake table baseball_data.betting_ml.cv_results_tot_runs
    must contain rows for model='ngboost_normal'.
    Card 4.10 provides betting_ml/scripts/train_run_diff_baselines.py (confirms
    NGBoost run diff is viable); Snowflake table
    baseball_data.betting_ml.cv_results_run_diff must contain rows for
    model='ngboost_normal'.
    Card 4.11 provides baseline classification results in
    baseball_data.betting_ml.cv_results_win_outcome.
    Cards 4.12a–4.12c provide hyperparameter-tuned XGBoost models (total_runs,
    run_differential, home_win) documented in
    betting_ml/evaluation/hyperparameter_tuning_xgb_total_runs.md,
    betting_ml/evaluation/hyperparameter_tuning_xgb_run_diff.md, and
    betting_ml/evaluation/hyperparameter_tuning_xgb_home_win.md respectively,
    with serialized models persisted via model_io.py. These tuned XGBoost models
    are not consumed directly by Card 4.13 but must be complete to close out the
    full hyperparameter phase before the probability layer begins; Phase 6 will
    load the xgb_tuned and xgb_classifier_tuned models for ensemble use.
    Cards 4.12d and 4.12e provide the best NGBoost hyperparameter configurations
    for total_runs and run_differential via grid search, documented in
    betting_ml/evaluation/hyperparameter_tuning_ngboost_total_runs.md and
    betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md respectively,
    with tuning results written to
    betting_ml/evaluation/tuning_results_ngboost_total_runs.json and
    betting_ml/evaluation/tuning_results_ngboost_run_diff.json. Card 4.13 loads
    these JSON files to extract best_n_estimators and best_dist for each target
    and passes them to train_ngboost() in the CV loop and final prediction step.
    The has_odds column must be present in the loaded feature DataFrame —
    validated by confirming that load_features() from betting_ml/utils/data_loader.py
    returns a DataFrame with 'has_odds'.
