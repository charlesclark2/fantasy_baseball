---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: bayesian-probability-layer-plan
  namespace: default
spec:
  description: >
    Three-task DAG with a user-confirmation gate. implement-probability-layer-utils
    creates betting_ml/utils/probability_layer.py with all core math functions.
    run-probability-layer-pipeline implements the end-to-end script (CV α tuning,
    final predictions for 2026, parquet output, and Snowflake persistence); the
    script is USER-EXECUTED — the agent waits at user-confirms-pipeline-complete
    before proceeding. generate-probability-results queries Snowflake tables,
    produces the report, and updates project_context.md.
  goalRef:
    name: bayesian-probability-layer
  graph:
    nodes:

      - id: implement-probability-layer-utils
        kind: Task
        description: >
          Create betting_ml/utils/probability_layer.py with five pure functions
          covering vig removal, log-odds Bayesian update, edge, Kelly, and α tuning.

          vig_adjust(home_price, away_price, odds_format='american') -> tuple[float, float]:
            Convert home_price and away_price to implied probabilities, remove vig,
            return (home_prob_vig_adjusted, away_prob_vig_adjusted).
            For American odds:
              Positive odds (e.g. +150): decimal = odds/100 + 1; implied = 1/decimal
              Negative odds (e.g. -120): decimal = 100/abs(odds) + 1; implied = 1/decimal
            For decimal odds (odds_format='decimal'):
              implied = 1/price directly
            Vig removal: total = home_implied + away_implied
              home_prob = home_implied / total
              away_prob = away_implied / total
            Raise ValueError if total <= 0.

          log_odds(p: float) -> float:
            Clip p to [1e-9, 1 - 1e-9] before computing log(p / (1 - p)).
            Raise ValueError if p is not in (0, 1) after clipping would be
            needed but the input is 0.0 or 1.0 exactly (edge protection).

          sigmoid(x: float) -> float:
            1.0 / (1.0 + math.exp(-x))

          compute_posterior(model_prob, market_prob, alpha) -> float:
            Validate alpha ∈ [0, 1]; raise ValueError otherwise.
            log_odds_post = alpha * log_odds(model_prob) + (1 - alpha) * log_odds(market_prob)
            return sigmoid(log_odds_post)
            When alpha=1.0 the posterior equals the model probability.
            When alpha=0.0 the posterior equals the market probability.

          compute_edge(model_prob, market_prob) -> float:
            return model_prob - market_prob
            Positive = model sees value over the market; negative = market is
            more confident than model.

          compute_kelly(edge, market_implied_prob) -> float:
            Simple Kelly approximation: edge / decimal_odds where
            decimal_odds = 1.0 / market_implied_prob.
            Returns edge * market_implied_prob.
            Raises ValueError if market_implied_prob <= 0.

          tune_alpha(
            model_probs: np.ndarray,
            market_probs: np.ndarray,
            outcomes: np.ndarray,
            alpha_grid: np.ndarray | None = None
          ) -> tuple[float, list[dict]]:
            alpha_grid defaults to np.round(np.arange(0.0, 1.01, 0.1), 2).
            For each α: compute posterior for all games, measure sklearn log_loss
            (clip posteriors to [1e-7, 1-1e-7] before passing to log_loss).
            Returns (best_alpha, [{'alpha': float, 'log_loss': float}, ...]).
            If fewer than 100 games are available for tuning, log a warning and
            return (0.5, results) — default to equal weighting. With historical
            odds backfill complete (2021–2025, ~8,297 matched games), the expected
            tuning set is several thousand games; the small-sample path should be
            rare and would only trigger if the backfill data is unavailable.
        dependsOn:
          - cards-4-9-through-4-12-complete
        acceptanceCriteria:
          - type: artifact_exists
            name: Probability layer utility module
            path: betting_ml/utils/probability_layer.py
          - type: command_succeeds
            name: All functions import and the spot-check passes
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                from betting_ml.utils.probability_layer import (
                    vig_adjust, log_odds, sigmoid, compute_posterior,
                    compute_edge, compute_kelly, tune_alpha,
                )
                # Spot-check: model=0.60, market=0.52
                edge = compute_edge(0.60, 0.52)
                assert edge > 0, f"Expected positive edge, got {edge}"
                kelly = compute_kelly(edge, 0.52)
                assert kelly > 0, f"Expected positive Kelly fraction, got {kelly}"
                posterior = compute_posterior(0.60, 0.52, alpha=0.5)
                assert 0.52 < posterior < 0.60, (
                    f"Expected posterior between 0.52 and 0.60, got {posterior}"
                )
                # Verify alpha=1 collapses to model prob
                p_model_only = compute_posterior(0.60, 0.52, alpha=1.0)
                assert abs(p_model_only - 0.60) < 1e-6, (
                    f"alpha=1 should return model prob, got {p_model_only}"
                )
                # Verify alpha=0 collapses to market prob
                p_market_only = compute_posterior(0.60, 0.52, alpha=0.0)
                assert abs(p_market_only - 0.52) < 1e-6, (
                    f"alpha=0 should return market prob, got {p_market_only}"
                )
                # Vig removal: -110/-110 standard line
                home, away = vig_adjust(-110, -110, odds_format='american')
                assert abs(home - 0.5) < 0.01, f"Expected ~0.50 for -110/-110, got {home}"
                assert abs(home + away - 1.0) < 1e-6, "Vig-adjusted probs must sum to 1"
                print('All spot-checks passed')

      - id: run-probability-layer-pipeline
        kind: Task
        description: >
          Implement betting_ml/scripts/run_probability_layer.py. Runs the full
          pipeline: CV α tuning on has_odds games, final predictions on 2026
          has_odds games, output to parquet, and result persistence to Snowflake.

          Setup:
            Load data via load_features() from betting_ml/utils/data_loader.py.
            Load the canonical retained feature list via load_retained_features()
            from betting_ml/utils/feature_selection.py.
            Import train_ngboost and p_over_line from
            betting_ml.models.total_runs_trainer — these functions are generic
            NGBoost utilities used for both total_runs and run_differential targets.
            Verify 'has_odds' column is present in df; raise with descriptive
            message if not.
            Verify 'home_win_prob_consensus' and 'over_prob_consensus' are present in df;
            raise with descriptive message if not — these are the market_implied_prob
            sources (already vig-adjusted from mart_odds_consensus; Card 4.7 complete).
            Feature matrix for model training (same as Cards 4.9/4.10):
              X = df[load_retained_features()]
              (Consensus odds columns are IN the retained feature list per Card 4.8.
              They are legitimate pre-game features and must NOT be dropped from X;
              the model learns to combine market signals with non-market signals.)
            y_runs = df['total_runs']
            y_diff = df['run_differential']

            Load best NGBoost hyperparameters from Card 4.12d/4.12e tuning results:
              import json
              with open('betting_ml/evaluation/tuning_results_ngboost_total_runs.json') as f:
                  ngb_total_runs_cfg = json.load(f)
              ngb_total_runs_n_est = ngb_total_runs_cfg['best_n_estimators']
              ngb_total_runs_dist  = ngb_total_runs_cfg['best_dist']   # 'Normal' or 'LogNormal'

              with open('betting_ml/evaluation/tuning_results_ngboost_run_diff.json') as f:
                  ngb_run_diff_cfg = json.load(f)
              ngb_run_diff_n_est = ngb_run_diff_cfg['best_n_estimators']
              ngb_run_diff_dist  = ngb_run_diff_cfg['best_dist']       # expected 'Normal'

            Raise with a descriptive message if either JSON is missing or the
            required keys (best_n_estimators, best_dist) are absent.

          CV α tuning loop — for each fold from all_season_splits(df, min_train_seasons=3):
            1. Build and fit imputation pipeline on X_train; transform X_train and X_eval.
            2. train_ngboost(X_train_imp, y_runs_train, X_eval_imp,
                 dist=ngb_total_runs_dist, n_estimators=ngb_total_runs_n_est)
               → total runs dist_params; compute:
               p_over_total = p_over_line(ngb_total_runs_dist, dist_params,
                 total_line=df.loc[eval_idx, 'total_line_consensus'].values)
               (Use total_line_consensus — the only total line column in the
               feature store; plain total_line does not exist in the DataFrame.)
            3. train_ngboost(X_train_imp, y_diff_train, X_eval_imp,
                 dist=ngb_run_diff_dist, n_estimators=ngb_run_diff_n_est)
               → run diff dist_params; compute:
               p_home_win = p_over_line(ngb_run_diff_dist, dist_params, total_line=0)
               (scalar total_line=0 for P(run_diff > 0))
            4. Filter eval rows to has_odds=True AND home_win_prob_consensus is not null.
               These are the rows with usable market data for α tuning. If zero such rows
               exist for this fold, skip α tuning data collection for this fold (continue).
               With historical backfill complete, folds 2021–2025 will typically have
               hundreds of qualifying rows each.
            5. For h2h market on qualifying eval rows:
               market_home_prob = df.loc[qualifying_idx, 'home_win_prob_consensus'].values
               (home_win_prob_consensus is already vig-adjusted in mart_odds_consensus;
               do not call vig_adjust() on raw price columns — they are not in the
               feature DataFrame.)
               Record model_prob=p_home_win[qualifying_mask], market_prob=market_home_prob,
               outcome=df.loc[qualifying_idx, 'home_win'].astype(int).values.
            6. For totals market on eval rows where over_prob_consensus is not null:
               Record model_prob=p_over_total[totals_mask],
               market_prob=df.loc[totals_mask_idx, 'over_prob_consensus'].values,
               outcome=(df.loc[totals_mask_idx, 'total_runs'] >
                 df.loc[totals_mask_idx, 'total_line_consensus']).astype(int).values.
               Use total_line_consensus (not total_line) since it is the consensus
               market line already in the feature store.
            Accumulate all qualifying eval records across folds for α tuning.

          After CV loop:
            Concatenate all accumulated has_odds records.
            n_tuning_games = len(accumulated records)
            Call tune_alpha(model_probs_all, market_probs_all, outcomes_all)
            → best_alpha, alpha_scores
            Print α tuning table (α | log-loss) and selected best_alpha.

          Final predictions — 2026 has_odds games:
            Identify 2026 rows: df[df['game_year'] == 2026]
            Train on all pre-2026 rows (no eval fold — use full pre-2026 train set):
              X_train_final = X[df['game_year'] < 2026]; apply imputation pipeline.
              X_2026_imp = pipeline.transform(X[df['game_year'] == 2026])
            Run train_ngboost(X_train_final_imp, y_runs_pretrain, X_2026_imp,
              dist=ngb_total_runs_dist, n_estimators=ngb_total_runs_n_est) and
            train_ngboost(X_train_final_imp, y_diff_pretrain, X_2026_imp,
              dist=ngb_run_diff_dist, n_estimators=ngb_run_diff_n_est)
            to get 2026 predictions.
            Rows qualify for output when has_odds=True AND home_win_prob_consensus is not null
            (h2h market) or over_prob_consensus is not null (totals market).
            If no qualifying 2026 rows exist: write an empty parquet with
            the correct schema, skip Snowflake probability_outputs INSERT (leave table
            empty but created), print a warning, and exit 0.

          Build output rows:
            For each qualifying 2026 game, emit one row per available market:
            Row (h2h market) — emit when home_win_prob_consensus is not null:
              game_key: df index or unique game identifier column if present
              market: 'h2h'
              model_prob: p_home_win for this game
              market_implied_prob: df.loc[idx, 'home_win_prob_consensus']
                (already vig-adjusted from mart_odds_consensus)
              alpha: best_alpha
              posterior_prob: compute_posterior(model_prob, market_implied_prob, best_alpha)
              edge: compute_edge(model_prob, market_implied_prob)
              implied_kelly_fraction: compute_kelly(edge, market_implied_prob)
            Row (totals market) — emit when over_prob_consensus is not null:
              game_key: same identifier
              market: 'totals'
              model_prob: p_over_total for this game
              market_implied_prob: df.loc[idx, 'over_prob_consensus']
                (already vig-adjusted from mart_odds_consensus)
              alpha: best_alpha
              posterior_prob, edge, implied_kelly_fraction: same pattern

          Create betting_ml/outputs/ directory if it does not exist.
          Write output rows as parquet: betting_ml/outputs/probability_outputs.parquet.

          Write results to Snowflake after all steps complete. Use
          get_snowflake_connection() from betting_ml/utils/data_loader.py (same
          RSA key and connection parameters used for data loading). Target schema:
          baseball_data.betting_ml. CREATE TABLE IF NOT EXISTS for each table;
          TRUNCATE before INSERT to allow clean reruns.

          Table baseball_data.betting_ml.probability_outputs:
            game_key VARCHAR, market VARCHAR, model_prob FLOAT,
            market_implied_prob FLOAT, alpha FLOAT, posterior_prob FLOAT,
            edge FLOAT, implied_kelly_fraction FLOAT,
            loaded_at TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP
          INSERT one row per 2026 has_odds game per market from the output rows.

          Table baseball_data.betting_ml.alpha_tuning_results:
            alpha FLOAT, log_loss FLOAT,
            loaded_at TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP
          INSERT one row per alpha candidate from alpha_scores (11 rows for the
          default grid [0.0, 0.1, ..., 1.0]).

          Table baseball_data.betting_ml.probability_layer_summary:
            n_tuning_games INTEGER, best_alpha FLOAT,
            small_sample_warning BOOLEAN,
            h2h_mean_edge FLOAT, totals_mean_edge FLOAT,
            h2h_positive_edge_pct FLOAT, totals_positive_edge_pct FLOAT,
            n_games_2026_with_odds INTEGER, n_output_rows INTEGER,
            loaded_at TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP
          INSERT one summary row derived from the pipeline results.

          Print a summary table: market | n games | mean edge | % positive edge | mean Kelly.
          Script exits 0 on success.
        dependsOn:
          - implement-probability-layer-utils
        acceptanceCriteria:
          - type: artifact_exists
            name: Probability layer pipeline script
            path: betting_ml/scripts/run_probability_layer.py
          - type: manual
            name: Pipeline script runs to completion with exit code 0
            description: >
              USER-EXECUTED STEP — this script runs CV α tuning, final 2026
              predictions, and Snowflake persistence (estimated ~30–60 minutes
              depending on 2026 odds coverage). Do not run via Claude.
              Execute from the project root:
                uv run python betting_ml/scripts/run_probability_layer.py
              Verify the script exits 0 and that all three Snowflake tables
              (probability_outputs, alpha_tuning_results, probability_layer_summary)
              are written and betting_ml/outputs/probability_outputs.parquet exists
              before confirming user-confirms-pipeline-complete.

      - id: generate-probability-results
        kind: Task
        description: >
          Query Snowflake tables (baseball_data.betting_ml.probability_outputs,
          alpha_tuning_results, probability_layer_summary) and write
          betting_ml/evaluation/probability_layer_results.md, then update
          project_context.md Phase 4 section with Card 4.13 findings.

          probability_layer_results.md must contain these sections in order:

          ## Bayesian Update Method
            Describe the log-odds formulation:
              log_odds_posterior = α × log_odds_model + (1 − α) × log_odds_market
              posterior_prob = sigmoid(log_odds_posterior)
            Note that α=1 collapses to model probability and α=0 collapses to
            market probability. Note the vig-removal step (why raw bookmaker
            implied probabilities are biased upward before adjustment).

          ## α Mixing Weight Tuning
            Table: α | Log-Loss | Δ vs. best.
            State the selected best_alpha, the validation game count, and whether
            a small-sample warning was triggered (< 100 games). If small-sample
            warning was triggered, state that α=0.5 was used as the default.
            Historical odds backfill (Cards 1–4) completed 2026-04-23 covering
            2021–2025 at ~72–78% match rate; the expected tuning set is several
            thousand games. A small-sample warning indicates a data availability
            issue, not a design limitation.

          ## Output Summary
            State the number of 2026 has_odds games and the number of output rows.
            Table: Market | N Games | Mean Edge | % Positive Edge | Mean Kelly Fraction.
            Interpret: if mean edge is near zero, the model and market broadly
            agree; if mean edge is consistently positive or negative, comment on
            model vs. market divergence direction.

          ## Edge Signal Validation
            Report near-agreement games (|edge| < 0.02): mean absolute edge
            should be near zero — confirms the edge formula is working correctly.
            Report high-divergence games (|edge| >= 0.05): mean absolute edge
            should be notably higher — confirms non-zero signal is detected.

          ## Known Limitations and Next Steps
            α tuning uses historical has_odds games from 2021–2025 CV folds
            (historical odds backfill complete as of 2026-04-23; ~8,297 matched games).
            This provides a statistically reliable tuning sample. Remaining limitations:
            the Kelly fraction is a simplified approximation (does not account for
            bankroll, simultaneous bets, or market liquidity); α is tuned globally
            across all seasons and may not capture drift in model vs. market accuracy
            over time. Forward reference to Phase 6 betting application layer which
            will consume probability_outputs.parquet.

          Update project_context.md: add a "Card 4.13 Results" subsection in the
          Phase 4 tracking section containing: best_alpha, n_tuning_games,
          small_sample_warning (bool), h2h_mean_edge, totals_mean_edge,
          and a one-sentence interpretation of the edge signal.
        dependsOn:
          - user-confirms-pipeline-complete
        acceptanceCriteria:
          - type: artifact_exists
            name: Probability layer results report
            path: betting_ml/evaluation/probability_layer_results.md
          - type: command_succeeds
            name: Results report contains all required sections and keywords
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                with open('betting_ml/evaluation/probability_layer_results.md') as f:
                    content = f.read().lower()
                required_keywords = [
                    'log-odds', 'posterior', 'bayesian', 'alpha', 'vig',
                    'market_implied_prob', 'model_prob', 'edge', 'kelly',
                    'h2h', 'totals', 'mixing weight', 'log loss',
                    'small-sample', 'phase 6', 'backfill'
                ]
                missing = [kw for kw in required_keywords if kw not in content]
                assert not missing, f'Missing sections/keywords in report: {missing}'
          - type: command_succeeds
            name: project_context.md updated with Card 4.13 results
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                with open('project_context.md') as f:
                    content = f.read().lower()
                required = ['card 4.13', 'alpha', 'edge']
                missing = [kw for kw in required if kw not in content]
                assert not missing, f'project_context.md missing Card 4.13 updates: {missing}'
          - type: command_succeeds
            name: Snowflake alpha_tuning_results has expected alpha candidates
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                from betting_ml.utils.data_loader import get_snowflake_connection
