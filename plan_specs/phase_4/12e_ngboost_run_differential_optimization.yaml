---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: ngboost-run-differential-hyperparameter-optimization
  namespace: default
spec:
  description: >
    Apply grid search hyperparameter tuning to NGBoost for the run_differential
    prediction target using the temporal CV splits from Card 4.6. Grid covers
    n_estimators ∈ {200, 500, 1000} and dist ∈ {Normal, LogNormal}. LogNormal
    is expected to fail due to negative target support and must be handled
    gracefully. Persist the best viable NGBoost model via model_io.py and log
    results to betting_ml/evaluation/tuning_results_ngboost_run_diff.json and
    betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md.
  acceptanceCriteria:
    - description: >
        NGBoost grid search completed for run_differential across all 6
        combinations (3 n_estimators × 2 distributions); LogNormal failure
        handled gracefully with viable=false and a descriptive note; results
        recorded in tuning_results_ngboost_run_diff.json
    - description: >
        Best viable NGBoost configuration identified (Normal dist) and
        documented; grid results include attempted LogNormal entries
    - description: >
        Best NGBoost model (Normal dist) persisted via save_model() with
        model_name='ngboost_tuned' and target='run_differential'
    - description: >
        Grid results and best configuration documented in
        betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md;
        project_context.md Phase 4 section updated with Card 4.12e findings

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: card-4-8-complete-for-ngboost-run-diff
  namespace: default
spec:
  gateType: review
  description: >
    Card 4.8 must be complete before Card 4.12e begins.
    Card 4.8 provides betting_ml/utils/model_io.py (save_model / load_model via
    joblib; path convention betting_ml/models/{target}/{model_name}_{eval_year}.pkl).
    No Snowflake baseline comparison is required for NGBoost — the grid search
    identifies the best config within its own results.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: ngboost-run-differential-optimization-plan
  namespace: default
spec:
  description: >
    Two-task DAG. run-ngboost-run-diff-search runs the grid search and persists
    the tuned model, writing tuning_results_ngboost_run_diff.json.
    generate-ngboost-run-diff-report reads that JSON and produces
    hyperparameter_tuning_ngboost_run_diff.md plus the project_context.md update.
  goalRef:
    name: ngboost-run-differential-hyperparameter-optimization
  graph:
    nodes:

      - id: run-ngboost-run-diff-search
        kind: Task
        description: >
          Implement betting_ml/scripts/run_ngboost_run_diff_search.py. Runs a
          grid search for NGBoost on run_differential, then persists the best
          viable model.

          Setup:
            Load the canonical retained feature list via
            load_retained_features() from betting_ml/utils/feature_selection.py.
            Build CV folds via all_season_splits(df, min_train_seasons=3).
            Feature matrices:
              X = df[load_retained_features()]
              y_run_diff = df['run_differential']

          Grid search:
            Grid: n_estimators ∈ [200, 500, 1000], dist ∈ ['Normal', 'LogNormal']
            For each of the 6 combinations:
              Import NGBRegressor and the appropriate distribution from
              ngboost.distns (Normal, LogNormal).
              For each fold: apply build_imputation_pipeline().fit(X_train).transform;
              fit NGBRegressor(n_estimators=n, Dist=dist_cls) on X_train_imp;
              predict on X_eval_imp; compute MAE.
              Wrap in try/except: if LogNormal raises (negative target support —
              run_differential can be negative) or produces NaN predictions,
              record cv_mae=null, viable=false, and a note in lognormal_note
              explaining the failure (e.g., "LogNormal distribution requires
              strictly positive targets; run_differential contains negative values").
              This failure is expected and is not an error condition.
            Identify the best viable configuration (lowest mean CV MAE among
            viable=true results, expected to be a Normal dist entry).

          Persist best model — retrain best viable NGBRegressor on the training
          data of the last CV fold (max-index train split), then persist:
            save_model(ngb_run_diff, target='run_differential',
              model_name='ngboost_tuned', eval_year=<last_fold_eval_year>)
          last_fold_eval_year is determined from game_year values in the last
          fold's eval index: int(df.loc[last_eval_idx, 'game_year'].mode()[0]).

          Print a summary table of grid results (n_estimators, dist, CV MAE,
          viable) including the LogNormal failure note.

          Write betting_ml/evaluation/tuning_results_ngboost_run_diff.json:
            {
              "target": "run_differential",
              "model": "ngboost",
              "grid_results": [
                {"n_estimators": int, "dist": str,
                 "cv_mae": float | null, "viable": bool,
                 "lognormal_note": str | null},
                ...
              ],
              "best_n_estimators": int,
              "best_dist": str,
              "best_cv_mae": float,
              "lognormal_viable": false,
              "lognormal_note": str,
              "persisted_models": [
                {"target": "run_differential", "model_name": "ngboost_tuned",
                 "eval_year": int, "path": str}
              ]
            }
        dependsOn:
          - card-4-8-complete-for-ngboost-run-diff
        acceptanceCriteria:
          - type: artifact_exists
            name: NGBoost run_differential search script
            path: betting_ml/scripts/run_ngboost_run_diff_search.py
          - type: manual
            name: Search script runs to completion with exit code 0
            description: >
              USER-EXECUTED STEP — this script runs the NGBoost grid search
              (6 combinations × full CV each; LogNormal entries fail gracefully).
              Do not run via Claude.
              Execute from the project root:
                uv run python betting_ml/scripts/run_ngboost_run_diff_search.py
              Verify the script exits 0 and that
              tuning_results_ngboost_run_diff.json is written before marking
              this criterion complete.
          - type: artifact_exists
            name: Tuning results JSON written
            path: betting_ml/evaluation/tuning_results_ngboost_run_diff.json
          - type: command_succeeds
            name: tuning_results_ngboost_run_diff.json has required keys and grid coverage
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import json
                with open('betting_ml/evaluation/tuning_results_ngboost_run_diff.json') as f:
                    r = json.load(f)
                assert r.get('target') == 'run_differential', "Wrong target"
                assert r.get('model') == 'ngboost', "Wrong model"
                grid = r.get('grid_results', [])
                assert len(grid) >= 6, f"Expected 6 grid combinations, got {len(grid)}"
                dists = {g['dist'] for g in grid}
                assert 'Normal' in dists, f"Missing Normal dist; got: {dists}"
                assert 'LogNormal' in dists, f"Missing LogNormal dist entries; got: {dists}"
                lognormal_entries = [g for g in grid if g['dist'] == 'LogNormal']
                non_viable = [g for g in lognormal_entries if not g['viable']]
                assert len(non_viable) > 0, "LogNormal entries should be non-viable for run_differential"
                assert 'best_n_estimators' in r, "Missing best_n_estimators"
                assert 'best_cv_mae' in r, "Missing best_cv_mae"
                assert r.get('best_dist') == 'Normal', f"Best dist should be Normal; got: {r.get('best_dist')}"
          - type: command_succeeds
            name: Persisted ngboost_tuned model file exists for run_differential
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import json, os
                with open('betting_ml/evaluation/tuning_results_ngboost_run_diff.json') as f:
                    r = json.load(f)
                models = r.get('persisted_models', [])
                assert len(models) >= 1, "No persisted models recorded"
                for m in models:
                    assert os.path.exists(m['path']), f"Model file missing: {m['path']}"

      - id: generate-ngboost-run-diff-report
        kind: Task
        description: >
          Read tuning_results_ngboost_run_diff.json and write
          betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md,
          then update project_context.md with Card 4.12e findings.

          hyperparameter_tuning_ngboost_run_diff.md must contain:

          ## NGBoost run_differential Grid Search Results
            Table: n_estimators | Dist | CV MAE | Viable
            All 6 grid combinations listed; LogNormal rows show "N/A" for CV MAE
            and "No" for Viable.
            State the best viable configuration.

          ## LogNormal Distribution Note
            Explain why LogNormal is not viable for run_differential: the
            distribution requires strictly positive support, but run_differential
            contains negative values (home team can lose by any margin).

          ## Best NGBoost Configuration
            State best_n_estimators and best_dist (Normal) with the CV MAE.

          ## Persisted Model
            Table: Target | Model Name | Eval Year | Path.
            Confirm the model saved successfully.

          Update project_context.md: add a "Card 4.12e Results" subsection in
          the Phase 4 tracking section containing: best_ngboost_config_run_diff
          ({n_estimators, dist}), best CV MAE, lognormal_viable=false, and a
          one-sentence summary.
        dependsOn:
          - run-ngboost-run-diff-search
        acceptanceCriteria:
          - type: artifact_exists
            name: NGBoost run_differential tuning report
            path: betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md
          - type: command_succeeds
            name: Report contains required sections and keywords
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                with open('betting_ml/evaluation/hyperparameter_tuning_ngboost_run_diff.md') as f:
                    content = f.read().lower()
                required_keywords = [
                    'ngboost', 'mae', 'n_estimators', 'normal', 'lognormal',
                    'run_differential', 'viable', 'persisted', 'grid', 'negative'
                ]
                missing = [kw for kw in required_keywords if kw not in content]
                assert not missing, f'Missing sections/keywords in report: {missing}'
          - type: command_succeeds
            name: project_context.md updated with Card 4.12e results
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                with open('project_context.md') as f:
                    content = f.read().lower()
                required = ['card 4.12e', 'ngboost']
                missing = [kw for kw in required if kw not in content]
                assert not missing, f'project_context.md missing Card 4.12e updates: {missing}'
