---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: champion-challenger-model-versioning
  phase: "7"
  card: "7.L2"
  priority: P2
  blocker: "Card 7.L1 (historical feature backfill) must complete first"
spec:
  description: |
    Build a champion/challenger model versioning framework that enables any two
    deployed model versions to be compared head-to-head on the same historical
    date range before a new version is promoted to production.

    MOTIVATION:
      Before this card, there is no systematic way to validate that a retrained
      model actually performs better than its predecessor. The current deploy
      process (8.H2) sets an acceptance bar on CV metrics but not on live-game
      prediction quality. This card closes that gap: re-scoring a historical
      window with both the champion (current deployed model) and the challenger
      (newly retrained model) produces a direct metric comparison on real games,
      making the promotion decision evidence-based rather than CV-only.

    WHAT CHANGES:
      1. model_registry.yaml gains feature_columns_path and
         rollback_feature_columns_path so each model version knows exactly
         which feature set it was trained on. This is required because v0 uses
         267 features and v1 uses 292 — passing the wrong feature set to the
         wrong artifact produces silently wrong predictions.

      2. predict_today.py gains --start-date, --end-date, --model-tag, and
         --feature-version flags. --model-tag ('v0' or 'v1') controls which
         artifacts and feature column list are loaded from the registry;
         --feature-version is a metadata string written to the DB row.

      3. daily_model_predictions gains a feature_version column. Existing v0
         rows are backfilled with feature_version = 'v0'.

      4. scripts/compare_model_versions.py computes side-by-side metrics for
         any two model_version tags over a shared date range and outputs a
         markdown report.

      5. The 8.H2 deploy runbook is updated to require a comparison run as
         Step 1 before any model is promoted. The comparison is the primary
         gate; CV metrics are a secondary signal.

    ONGOING USE:
      Every future retrain follows this protocol:
        1. Train challenger; save artifact; update registry rollback fields.
        2. Re-score the last two full seasons with --model-tag=<challenger_tag>.
        3. Run compare_model_versions.py for challenger vs. champion.
        4. If challenger wins on the primary metric (mean_h2h_edge, 2024+
           window), promote. If not, revert or investigate.

    CURRENT STATE (as of 2026-05-04):
      - daily_model_predictions has 1,215 v0 rows (2026-03-27 through 2026-05-04).
        feature_version column does not yet exist.
      - v0 artifacts: ngboost_tuned_prod.pkl (total_runs, run_diff; 267 features)
        and xgb_classifier_tuned_2026.pkl (home_win; 267 features).
      - v1 artifacts: currently deployed (292 features; all three targets).
      - feature_columns_v0.json does not exist as a named file. It must be
        extracted from git history before the v0 backfill can run.
      - v0 baseline metrics: mean_h2h_edge = −0.017, pct_positive = 35.39%
        (2026 dates only — statistically weak; goal of this card is to establish
        a multi-season baseline).

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: champion-challenger-model-versioning-plan
  phase: "7"
  card: "7.L2"
spec:
  goal:
    name: champion-challenger-model-versioning

  tasks:

    - id: save-v0-feature-columns
      name: Extract and save v0 feature column list from git history
      description: |
        The v0 models (ngboost_tuned_prod.pkl, xgb_classifier_tuned_2026.pkl) were
        trained on 267 features. The current feature_columns.json has 292 features.
        Passing the wrong feature set to the wrong artifact produces silently wrong
        predictions. Before any v0 backfill can run, the v0 feature column list must
        be saved as a named, versioned file.

        STEPS:
          1. Find the commit immediately before the 7.MA retrain (tag: model/total_runs/v1
             was created at commit 7c2aaf0 on 2026-05-04). The commit just prior is the
             last state where feature_columns.json had 267 features.

             git log --oneline | grep -A1 "7c2aaf0"
             git show <prior-commit>:betting_ml/models/feature_columns.json \
                 > betting_ml/models/feature_columns_v0.json

          2. Verify the file has ~267 feature entries:
             python3 -c "import json; cols = json.load(open('betting_ml/models/feature_columns_v0.json')); print(len(cols))"
             Expected: 267 (±2 for pipeline-generated indicators).

          3. Commit the file:
             git add betting_ml/models/feature_columns_v0.json
             git commit -m "Save v0 feature column list for champion/challenger backfill"

        NOTE: feature_columns_v0.json must be added to .gitignore exceptions so it is
        tracked (same pattern as elasticnet_2026.pkl exception in 8.H2).

      dependsOn: []
      acceptanceCriteria:
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import json, pathlib
            cols = json.loads(pathlib.Path('betting_ml/models/feature_columns_v0.json').read_text())
            assert 260 <= len(cols) <= 275, f"Expected ~267 v0 features, got {len(cols)}"
            print(f'feature_columns_v0.json: {len(cols)} features — OK')
            EOF

    - id: registry-feature-columns
      name: Add feature_columns_path fields to model_registry.yaml
      description: |
        Each entry in model_registry.yaml should declare which feature column file
        maps to the artifact_path and to the rollback_artifact_path. This makes the
        mapping explicit and machine-readable so predict_today.py can look up the
        right feature set by model tag without hard-coding paths.

        Add two fields to each target in model_registry.yaml:

          feature_columns_path: betting_ml/models/feature_columns.json
          rollback_feature_columns_path: betting_ml/models/feature_columns_v0.json

        These fields apply to all three targets (total_runs, run_differential,
        home_win) because all three models were retrained together at 7.MA and
        all three rollback artifacts use the 267-feature set.

      dependsOn:
        - save-v0-feature-columns
      acceptanceCriteria:
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import yaml, pathlib
            reg = yaml.safe_load(pathlib.Path('betting_ml/models/model_registry.yaml').read_text())
            for target in ['total_runs', 'run_differential', 'home_win']:
                assert 'feature_columns_path' in reg[target], \
                    f"{target} missing feature_columns_path"
                assert 'rollback_feature_columns_path' in reg[target], \
                    f"{target} missing rollback_feature_columns_path"
            print('model_registry.yaml: feature_columns_path fields present for all targets — OK')
            EOF

    - id: schema-migration
      name: Add feature_version column and backfill existing rows
      description: |
        Add feature_version VARCHAR(30) to daily_model_predictions and backfill
        all existing rows. This is a one-time DDL + DML pair, safe to run
        idempotently (IF NOT EXISTS / WHERE model_version IS NULL).

        SQL to execute via mcp__snowflake__run_snowflake_query:

          ALTER TABLE baseball_data.betting_ml.daily_model_predictions
              ADD COLUMN IF NOT EXISTS feature_version VARCHAR(30);

          UPDATE baseball_data.betting_ml.daily_model_predictions
          SET feature_version = 'v0'
          WHERE feature_version IS NULL;

        After migration, verify:
          SELECT feature_version, COUNT(*) FROM daily_model_predictions
          GROUP BY feature_version;
          -- Expected: all rows show feature_version = 'v0'

      dependsOn: []
      acceptanceCriteria:
        - type: manual
          description: |
            Run via mcp__snowflake__run_snowflake_query:
              SELECT COUNT(*) FROM baseball_data.betting_ml.daily_model_predictions
              WHERE feature_version IS NULL;
            Expected: 0 rows with NULL feature_version.

    - id: extend-predict-script
      name: Add batch flags and model-tag loading to predict_today.py
      description: |
        Extend predict_today.py to support batch re-scoring over a date range
        with any registered model version.

        NEW CLI FLAGS:
          --start-date   YYYY-MM-DD   First game date to score (inclusive).
                                       When present, --date is ignored.
          --end-date     YYYY-MM-DD   Last game date to score (inclusive).
                                       Required when --start-date is provided.
          --model-tag    STRING       Which model version to load from the registry.
                                       'v1' (default) → artifact_path +
                                                         feature_columns_path.
                                       'v0' → rollback_artifact_path +
                                               rollback_feature_columns_path.
          --feature-version STRING    Tag written to the feature_version column.
                                       Default: 'v1_full'. Set to 'v1_partial'
                                       for seasons with known feature gaps per
                                       7.L1 coverage audit.
          --dry-run                   Print date range and game count; skip writes.

        MODEL LOADING CHANGES:
          The existing MODEL_VERSION constant and load_model() calls must be
          replaced with a registry-aware loader:
            1. Read model_registry.yaml.
            2. Based on --model-tag, select artifact_path vs rollback_artifact_path
               for each target, and the corresponding feature_columns_path.
            3. Load the feature column list from that path (replaces the static
               feature_columns.json import).
            4. Write --model-tag value (e.g., 'v0', 'v1') as model_version to DB.
               Write --feature-version value as feature_version to DB.

        BATCH LOOP:
          When --start-date and --end-date are provided:
            1. Query distinct game_dates in that range from
               baseball_data.statsapi.schedule (or equivalent source table).
            2. For each date, call the existing single-date scoring logic.
            3. Skip dates where a row with the same game_pk AND model_version
               already exists (idempotent guard — INSERT only, never MERGE).
            4. Print progress: "Scoring YYYY-MM-DD (N games) [model_tag=X]".

        FEATURE SET MISMATCH GUARD:
          After loading the feature column list, assert that the number of features
          matches the model's expected input width. For sklearn Pipeline (home_win),
          use m.n_features_in_. For NGBoost (total_runs, run_diff), use m.n_features.
          Raise a clear error if they do not match — do not silently score.

      dependsOn:
        - registry-feature-columns
        - schema-migration
      acceptanceCriteria:
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import ast, pathlib
            src = pathlib.Path('betting_ml/scripts/predict_today.py').read_text()
            for flag in ['start_date', 'end_date', 'model_tag', 'feature_version', 'dry_run']:
                assert flag in src, f"CLI flag '{flag}' not found in predict_today.py"
            print('predict_today.py: all required CLI flags present — OK')
            EOF
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import subprocess
            result = subprocess.run(
                ['uv', 'run', 'python', 'betting_ml/scripts/predict_today.py',
                 '--start-date', '2025-04-01', '--end-date', '2025-04-02',
                 '--model-tag', 'v1', '--dry-run'],
                capture_output=True, text=True
            )
            assert result.returncode == 0, f"predict_today.py dry-run failed:\n{result.stderr}"
            assert 'dry' in result.stdout.lower() or '2025-04' in result.stdout, \
                "Expected dry-run output not found"
            print('predict_today.py: batch dry-run v1 succeeded — OK')
            EOF
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import subprocess
            result = subprocess.run(
                ['uv', 'run', 'python', 'betting_ml/scripts/predict_today.py',
                 '--start-date', '2025-04-01', '--end-date', '2025-04-02',
                 '--model-tag', 'v0', '--dry-run'],
                capture_output=True, text=True
            )
            assert result.returncode == 0, f"predict_today.py v0 dry-run failed:\n{result.stderr}"
            print('predict_today.py: batch dry-run v0 succeeded — OK')
            EOF

    - id: add-compare-script
      name: Build compare_model_versions.py
      description: |
        Create scripts/compare_model_versions.py. This script queries
        daily_model_predictions for two model_version tags over a shared date
        range and outputs a side-by-side metrics report as both a markdown table
        (printed to stdout) and optionally written to betting_ml/evaluation/.

        USAGE:
          uv run python scripts/compare_model_versions.py \
              --champion v0 \
              --challenger v1 \
              --start-date 2024-04-01 \
              --end-date 2026-05-04 \
              --output-md betting_ml/evaluation/model_comparison_v0_v1.md

        METRICS COMPUTED (for each model_version × season × aggregate):
          mean_h2h_edge   — mean(h2h_edge) where has_odds = TRUE
          pct_positive    — % rows where h2h_edge > 0 (has_odds = TRUE)
          brier_score     — mean((calibrated_win_prob - home_win_actual)^2)
                            requires joining to game outcomes; skip if outcomes
                            not yet resolved (game_date > today - 1)
          totals_mae      — mean(|pred_total_runs - actual_total_runs|)
                            requires joining to game outcomes
          run_diff_mae    — mean(|pred_run_diff_loc - actual_run_diff|)
          n_games         — total games scored
          n_odds_games    — games where has_odds = TRUE

        OUTPUT FORMAT — markdown table, one row per season per model_version,
        plus an aggregate row for 2024+ (primary evaluation window):

          | Season | Model | N | N_Odds | Mean_H2H_Edge | Pct_Pos | Brier | Tot_MAE |
          |--------|-------|---|--------|---------------|---------|-------|---------|
          | 2024   | v0    | … | …      | …             | …       | …     | …       |
          | 2024   | v1    | … | …      | …             | …       | …     | …       |
          ...
          | 2024+  | v0    | … | …      | ...           | …       | …     | …       |
          | 2024+  | v1    | … | …      | …             | …       | …     | …       |

        PROMOTION VERDICT:
          Print a clear PROMOTE / DO NOT PROMOTE / INCONCLUSIVE verdict based on:
            PROMOTE if:
              challenger mean_h2h_edge (2024+) > champion mean_h2h_edge (2024+)
              AND challenger brier_score (2024+) ≤ champion brier_score + 0.002
            DO NOT PROMOTE if:
              challenger mean_h2h_edge (2024+) ≤ champion mean_h2h_edge
              AND no other metric shows meaningful improvement
            INCONCLUSIVE if:
              h2h_edge improves but brier_score regresses beyond +0.002, or
              n_odds_games < 100 (insufficient sample for reliable comparison)

        OUTCOME DATA DEPENDENCY:
          Brier and MAE metrics require game outcomes. Query from:
            baseball_data.statsapi.schedule (home_score, away_score, status)
          Rows where status != 'Final' are excluded from outcome-dependent metrics.
          h2h_edge and pct_positive do not require outcomes and are always computed.

      dependsOn:
        - extend-predict-script
      acceptanceCriteria:
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import ast, pathlib
            src = pathlib.Path('scripts/compare_model_versions.py').read_text()
            for symbol in ['champion', 'challenger', 'start_date', 'end_date',
                           'mean_h2h_edge', 'brier', 'PROMOTE']:
                assert symbol.lower() in src.lower(), \
                    f"Expected symbol '{symbol}' not found in compare_model_versions.py"
            print('compare_model_versions.py: required symbols present — OK')
            EOF

    - id: run-initial-comparison
      name: Run v0 and v1 backfills and produce initial comparison report
      description: |
        Execute the initial champion/challenger comparison that motivated this card.
        Run in the following order — each command is idempotent and can be safely
        re-run if interrupted.

        STEP 1 — Backfill v0 for 2021–2025 (use rollback artifacts, 267 features):
          Per 7.L1 coverage audit, 2021–2023 have known feature gaps. Use
          feature-version tags accordingly:

          uv run python betting_ml/scripts/predict_today.py \
              --start-date 2021-04-01 --end-date 2023-10-31 \
              --model-tag v0 --feature-version v0_partial

          uv run python betting_ml/scripts/predict_today.py \
              --start-date 2024-04-01 --end-date 2025-10-31 \
              --model-tag v0 --feature-version v0_full

        STEP 2 — Backfill v1 for 2021–2026 (use current artifacts, 292 features):

          uv run python betting_ml/scripts/predict_today.py \
              --start-date 2021-04-01 --end-date 2023-10-31 \
              --model-tag v1 --feature-version v1_partial

          uv run python betting_ml/scripts/predict_today.py \
              --start-date 2024-04-01 --end-date 2026-05-04 \
              --model-tag v1 --feature-version v1_full

        STEP 3 — Run comparison:

          uv run python scripts/compare_model_versions.py \
              --champion v0 \
              --challenger v1 \
              --start-date 2024-04-01 \
              --end-date 2026-05-04 \
              --output-md betting_ml/evaluation/model_comparison_v0_v1.md

        POST-RUN VERIFICATION:
          SELECT model_version, feature_version, MIN(game_date), MAX(game_date), COUNT(*)
          FROM baseball_data.betting_ml.daily_model_predictions
          GROUP BY model_version, feature_version
          ORDER BY model_version, feature_version;

          Expected groups: v0/v0_partial, v0/v0_full, v1/v0 (existing 2026 rows
          backfilled), v1/v1_partial, v1/v1_full.

          No game_pk should have two rows with the same model_version (idempotent guard).

      dependsOn:
        - extend-predict-script
        - add-compare-script
      acceptanceCriteria:
        - type: manual
          description: |
            Verify via Snowflake:
              SELECT model_version, feature_version, MIN(game_date), MAX(game_date), COUNT(*)
              FROM baseball_data.betting_ml.daily_model_predictions
              GROUP BY model_version, feature_version ORDER BY 1, 2;
            Expected: v0 rows span 2021–2026; v1 rows span 2021–2026.
            No NULL feature_version values.
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import pathlib
            report = pathlib.Path('betting_ml/evaluation/model_comparison_v0_v1.md').read_text()
            for required in ['mean_h2h_edge', 'brier', 'PROMOTE', '2024', 'v0', 'v1']:
                assert required.lower() in report.lower(), \
                    f"Required content '{required}' missing from comparison report"
            print('model_comparison_v0_v1.md: all required sections present — OK')
            EOF

    - id: update-deploy-runbook
      name: Update 8.H2 deploy runbook to require comparison as a pre-promotion gate
      description: |
        Edit docs/model_deploy_runbook.md to replace the current Step 1
        (train and evaluate) with a two-part step that makes the champion/challenger
        comparison a required pre-promotion gate.

        CHANGES TO RUNBOOK:
          Step 1 becomes two sub-steps:
            1a. Train challenger and record CV metrics (existing).
            1b. Re-score the last two full seasons with --model-tag=<challenger_tag>
                and run compare_model_versions.py. The comparison report must show
                PROMOTE or INCONCLUSIVE before proceeding. A DO NOT PROMOTE verdict
                requires investigation before continuing.

          Add a new entry to the registry version history table after each deploy
          (already established in 8.H2; no format change needed).

          Add a note: "The compare_model_versions.py output file must be committed
          to betting_ml/evaluation/ as part of the deploy commit (Step 5)."

      dependsOn:
        - add-compare-script
      acceptanceCriteria:
        - type: command_succeeds
          command: |
            python3 - <<'EOF'
            import pathlib
            runbook = pathlib.Path('docs/model_deploy_runbook.md').read_text()
            assert 'compare_model_versions' in runbook, \
                "Runbook missing compare_model_versions.py reference"
            assert 'PROMOTE' in runbook, \
                "Runbook missing PROMOTE verdict language"
            print('model_deploy_runbook.md: comparison gate documented — OK')
            EOF
