---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: model-selection-evaluation
  namespace: default
spec:
  description: >
    Run a rigorous walk-forward cross-validation harness across candidate model
    architectures on the full Phase 7 feature set to determine whether XGBoost
    and NGBoost remain the best choices, or whether LightGBM, CatBoost, or a
    calibrated ensemble produces meaningfully better predictions.

    BACKGROUND: XGBoost and NGBoost were selected early in the project without
    a comparative evaluation. The Phase 6 postmortem confirmed the model is not
    beating the market (mean h2h edge = −0.017 after consensus fix). Phase 7
    cards 7.A–7.K add material new features (weather, Stuff+, umpire tendencies,
    injury status, pitch-archetype matchups, pitcher clusters). Model selection
    on an incomplete feature set is fragile — the architecture that performs best
    on today's features is not guaranteed to be best on the full Phase 7 feature
    set, particularly because the P2 features (7.F–7.K) introduce high-cardinality
    categoricals (pitch_archetype, cluster_id) where LightGBM and CatBoost have
    structural advantages over XGBoost.

    CALIBRATOR FLAG FROM 7.MA (2026-05-04): The Card 7.MA retrain produced a
    raw XGBoost model with ECE 0.0247 — already better calibrated than the
    previous Platt-scaled model (ECE 0.0370). Applying Platt scaling degraded
    ECE to 0.0420 on the 2026 eval window (217 rows). The calibration task in
    this card MUST evaluate whether the Platt calibrator in the inference path
    should be removed or replaced. The baseline for calibration comparison is
    the raw 7.MA model ECE of 0.0247, not the prior calibrated ECE of 0.0370.
    See betting_ml/evaluation/v1_retrain_impact.md § Calibrator ECE for details.

    TRIGGER: Run this evaluation after Card 7.MA (full model retraining on the
    complete Phase 7 feature set) is complete — or at end of the 2026 regular
    season (whichever comes first). Card 7.MA must precede this card so that
    the architecture comparison uses the production-ready retrained models as the
    baseline, not the interim per-feature-card retrains. The time-based fallback
    prevents indefinite deferral if any P2 card stalls.

    DATA COMPLETENESS PREREQUISITE — 2021 WEATHER BACKFILL (added 2026-05-04):
    The Card 7.MA retrain was run before Card 7.L1 (2021 weather backfill)
    completed. As a result, the production 7.MA models were trained with 0%
    coverage for 2021 weather features (~2,429 rows mean-imputed). The CV harness
    in this card trains ALL candidate models (including the XGBoost baseline) from
    scratch on the fold data — so if the harness runs after the 2021 weather
    backfill is applied and propagated via `dbtf build`, all architectures compete
    on the same richer dataset and the comparison is fair. Running the harness
    BEFORE the 2021 weather backfill is complete would give challengers and the
    baseline equal access to imputed data, but would waste an opportunity to
    evaluate on complete data.
    GATE: The build-cv-harness task checks 2021 weather coverage. If coverage
    is below 80% for game_year = 2021, the script halts with an error message
    directing the user to complete the 2021 weather backfill (Card 7.L1) and
    re-run `dbtf build` before proceeding.

    CANDIDATE MODELS:
      1. XGBoost + NGBoost (current — the baseline to beat)
      2. LightGBM (gradient boosting with faster training, leaf-wise splits,
         native handling of missing values and categoricals)
      3. CatBoost (ordered boosting, native categorical encoding via target
         statistics — most relevant for pitch_archetype, cluster_id, park)
      4. Stacked ensemble (XGBoost + LightGBM + CatBoost as base estimators →
         ridge regression or logistic regression meta-learner)
      5. Isotonic recalibration layer (applied on top of the best base model;
         re-maps raw probability outputs to better-calibrated probabilities
         using sklearn CalibratedClassifierCV with method='isotonic')
      6. ElasticNet Logistic Regression (linear baseline for win probability;
         Ridge regression for runs targets). Literature review (Cui 2020,
         Wharton/Penn thesis) found ElasticNet logistic regression achieves
         61.77% accuracy / AUC 0.67 on this exact problem class and outperforms
         XGBoost at typical baseball sample sizes (~10K rows). Fast to train,
         interpretable, and low operational overhead. If ElasticNet matches
         gradient boosting on Brier score, prefer ElasticNet for simplicity.
         Evaluation script: eval_elasticnet.py. Solver: lbfgs, max_iter=1000,
         l1_ratio=0.5, C tuned via 5-fold inner CV (C ∈ [0.001, 0.01, 0.1, 1.0]).

    EVALUATION PROTOCOL:
      Walk-forward cross-validation with four folds (time-series aware;
      no future data leaks into training):
        Fold 1: train 2016–2021, test 2022
        Fold 2: train 2016–2022, test 2023
        Fold 3: train 2016–2023, test 2024
        Fold 4: train 2016–2024, test 2025
      All folds use identical feature sets and train/test indices so model
      comparisons are directly apples-to-apples.

    PRIMARY METRICS (betting-context priority order):
      1. Brier score — probability calibration; primary metric for model selection
      2. Mean h2h edge vs. market — business metric (target: improve from −0.017)
      3. % positive-edge games — target: improve from 35.39%
      4. Log-loss — consistent with alpha-tuning methodology (Card 7.A)
      5. Totals MAE — for the runs total target
      6. Run-line P&L (simulated) — arXiv:2511.02815 validated this as a better
         proxy for betting model quality than accuracy alone. Simulate flat-stake
         bets on the run line (−1.5 / +1.5) using each model's predicted win
         probability and run differential; record ROI per fold. A model whose
         win probabilities correlate with run-line edge generates positive
         simulated ROI. This maps directly to real betting value and is a
         stronger business metric than h2h moneyline edge alone.

    SELECTION DECISION RULE:
      A challenger model beats the baseline if it achieves lower mean Brier score
      across all four folds with a Cohen's d effect size ≥ 0.10 (small but
      consistent effect). If no challenger clears this bar, retain XGBoost/NGBoost
      and document the result as a confirmed negative finding.

    Source: Phase 7 planning, sequenced after 7.K. Expected effort: ~1.5 days.

  acceptanceCriteria:
    - description: >
        cv_harness.py exists; produces fold results for all candidate models
        using identical train/test indices. Output parquet files written to
        betting_ml/evaluation/model_evaluation/.
    - description: >
        All five candidate models (XGBoost baseline, LightGBM, CatBoost,
        stacked ensemble, isotonic recalibration) evaluated on all four folds.
        Brier score, log-loss, and totals MAE recorded per fold per model.
    - description: >
        betting_ml/evaluation/model_selection_v1.md documents: per-fold metrics
        for all candidates, the selection decision with reasoning, known
        limitations, and the Cohen's d effect size for the winner vs. baseline.
    - description: >
        If a challenger model is selected: training scripts updated to use the
        new model class; model_version tag updated; isotonic calibration layer
        applied if not already built into the chosen model.
    - description: >
        dbtf parse succeeds and all existing tests pass after any changes to
        training scripts.

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: model-selection-evaluation-plan
  namespace: default
spec:
  description: >
    Four-task sequential DAG. Task 1 builds the walk-forward CV harness shared
    across all models. Task 2 trains and scores all candidate models across all
    folds. Task 3 applies and evaluates isotonic recalibration on the best base
    model. Task 4 selects the winner, updates training scripts if needed, and
    produces the selection report.
  goalRef:
    name: model-selection-evaluation
  graph:
    nodes:

      - id: build-cv-harness
        kind: Task
        description: >
          Write betting_ml/scripts/model_evaluation/cv_harness.py — a reusable
          walk-forward fold generator and metric evaluator shared across all
          candidate models.

          PREREQUISITES: confirm data completeness before building folds.

          Step 1 — Check 2021 weather backfill gate (BLOCKING).
          Run via Snowflake MCP:
            SELECT game_year,
                   COUNT(*) as rows,
                   COUNT(home_weather_temp_f) as has_weather,
                   ROUND(COUNT(home_weather_temp_f) / COUNT(*), 3) as weather_coverage
            FROM baseball_data.betting_ml.feature_pregame_game_features
            WHERE game_year IN (2021, 2022, 2023, 2024, 2025)
            GROUP BY game_year
            ORDER BY game_year;
          IF weather_coverage for game_year = 2021 is below 0.80:
            HALT with error: "2021 weather backfill incomplete (coverage = X%).
            Complete Card 7.L1 and run `dbtf build` before running this harness.
            All CV folds include 2021 training data; imputed weather in 2021
            would give all models equal-but-diminished signal, wasting the backfill."

          Step 2 — Check Phase 7 feature presence (non-blocking, log only).
          Run via Snowflake MCP:
            SELECT COUNT(*) as rows,
                   COUNT(home_lineup_woba_vs_starter_archetype) as has_archetype,
                   COUNT(home_lineup_wrc_vs_cluster) as has_cluster
            FROM baseball_data.betting_ml.feature_pregame_game_features
            WHERE game_year >= 2022;
          If any column is NULL-dominant (< 10% coverage), note the gap in the
          fold preparation log but proceed — the harness should be built on
          whatever feature set is available at run time.

          FOLD DEFINITIONS (hardcode; these must never change between runs):
            FOLDS = [
                {"name": "fold_2022", "train_years": range(2016, 2022), "test_year": 2022},
                {"name": "fold_2023", "train_years": range(2016, 2023), "test_year": 2023},
                {"name": "fold_2024", "train_years": range(2016, 2024), "test_year": 2024},
                {"name": "fold_2025", "train_years": range(2016, 2025), "test_year": 2025},
            ]

          DATA LOADING:
            Load from Snowflake via snowflake-connector-python (same pattern as
            existing training scripts). Pull only rows where has_full_data = true
            and game_type = 'R'. Separate feature matrices and targets:
              X — all numeric feature columns (exclude game identifiers, targets,
                  dates, team names, model_version, any _flag columns)
              y_win  — home_win (binary classification target)
              y_runs — total_runs (regression target)
              y_diff — run_differential (regression target; also used for run_line_roi)
            Write X, y_win, y_runs, y_diff as parquet to
              betting_ml/evaluation/model_evaluation/features_{fold_name}.parquet
              betting_ml/evaluation/model_evaluation/targets_{fold_name}.parquet
            so that all candidate model scripts read identical data (no re-fetching).

          METRIC FUNCTIONS (implement in cv_harness.py, import in model scripts):
            def brier_score(y_true, y_prob) -> float
            def mean_h2h_edge(y_prob, market_implied_prob) -> float
              -- market_implied_prob from consensus_win_prob column in feature data
            def pct_positive_edge(y_prob, market_implied_prob,
                                  threshold=0.0) -> float
            def log_loss_score(y_true, y_prob) -> float
            def totals_mae(y_true, y_pred) -> float
            def run_line_roi(y_win, y_run_diff_pred, run_line=-1.5,
                             flat_stake=1.0) -> float
              -- simulates flat-stake run-line bets using predicted run differential
              -- a bet is placed on the home team −1.5 when predicted run diff > 1.5,
                 on the away team +1.5 when predicted run diff < −1.5
              -- ROI = (total_profit - total_staked) / total_staked
              -- requires run_diff (actual) and run_diff_pred (predicted) in targets
              -- arXiv:2511.02815 validated run-line P&L as a better proxy for
                 betting model quality than accuracy or Brier alone

          CLI:
            python betting_ml/scripts/model_evaluation/cv_harness.py --prepare-folds
            -- loads data, writes fold parquet files, prints fold sizes
            python betting_ml/scripts/model_evaluation/cv_harness.py --check
            -- verifies all fold parquet files exist and prints column counts

          Do NOT train any models in this script — it is data preparation only.
        dependsOn: []
        acceptanceCriteria:
          - type: artifact_exists
            name: cv_harness.py
            path: betting_ml/scripts/model_evaluation/cv_harness.py
          - type: command_succeeds
            name: cv_harness.py syntax is valid
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/cv_harness.py').read_text()
                ast.parse(src)
                print('cv_harness.py syntax OK')
          - type: command_succeeds
            name: cv_harness.py defines all required metric functions
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/cv_harness.py').read_text()
                tree = ast.parse(src)
                fn_names = {n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)}
                required = {'brier_score', 'mean_h2h_edge', 'pct_positive_edge',
                            'log_loss_score', 'totals_mae', 'run_line_roi'}
                missing = required - fn_names
                assert not missing, f'Missing metric functions: {missing}'
                print(f'cv_harness.py defines all required metric functions: {required}')
          - type: command_succeeds
            name: cv_harness.py defines four walk-forward folds
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/cv_harness.py').read_text()
                assert 'fold_2022' in src, 'fold_2022 not defined in FOLDS'
                assert 'fold_2023' in src, 'fold_2023 not defined in FOLDS'
                assert 'fold_2024' in src, 'fold_2024 not defined in FOLDS'
                assert 'fold_2025' in src, 'fold_2025 not defined in FOLDS'
                print('cv_harness.py defines all four walk-forward folds')

      - id: evaluate-candidate-models
        kind: Task
        description: >
          Train and score all candidate model architectures on the four CV folds
          from Task 1. Each model is a separate script; all share the fold parquet
          files and metric functions from cv_harness.py.

          FILE STRUCTURE:
            betting_ml/scripts/model_evaluation/
              eval_xgboost_ngboost.py    -- baseline (current production model)
              eval_lightgbm.py
              eval_catboost.py
              eval_ensemble_stacked.py
              eval_elasticnet.py         -- linear baseline (literature-validated)

          SCRIPT CONTRACT (each evaluation script must follow this pattern):
            1. Load fold parquet files from betting_ml/evaluation/model_evaluation/
            2. For each fold: fit on train split, predict on test split
            3. Compute all six metrics (brier_score, mean_h2h_edge, pct_positive_edge,
               log_loss_score, totals_mae, run_line_roi) using functions imported
               from cv_harness
            4. Write results to:
                 betting_ml/evaluation/model_evaluation/results_{model_name}.parquet
               Schema: fold_name, model_name, brier_score, log_loss, mean_h2h_edge,
                       pct_positive_edge, totals_mae, run_line_roi, train_rows,
                       test_rows, fit_time_seconds
            5. Print a per-fold summary table to stdout

          MODEL CONFIGURATIONS:

            eval_xgboost_ngboost.py (BASELINE):
              Use the exact hyperparameters from the current production training
              scripts. Read the existing training scripts to extract them before
              writing this file.

            eval_lightgbm.py:
              LGBMClassifier for win probability (use_label_encoder=False,
              verbose=-1, n_estimators=500, learning_rate=0.05, num_leaves=63,
              min_child_samples=20, colsample_bytree=0.8, subsample=0.8,
              categorical_feature='auto' for any string/category columns)
              LGBMRegressor for total runs (same hyperparams, objective='regression')
              Use early stopping on a 10% internal validation split (no fold leakage).

            eval_catboost.py:
              CatBoostClassifier for win probability (iterations=500,
              learning_rate=0.05, depth=6, loss_function='Logloss',
              eval_metric='Logloss', verbose=0,
              cat_features=[list of categorical column indices])
              CatBoostRegressor for total runs (same, loss_function='RMSE')
              Categorical columns: pitch_archetype, cluster_id (if present),
              home_team_abbrev, away_team_abbrev, park_name — detect by dtype
              (object or category) at fit time.

            eval_ensemble_stacked.py:
              Base estimators: XGBoost, LightGBM, CatBoost (from above configs)
              Meta-learner:
                - Win prob: LogisticRegression(C=1.0) on out-of-fold base predictions
                - Totals: Ridge(alpha=1.0) on out-of-fold base predictions
              Use 5-fold inner CV to generate out-of-fold predictions for meta-learner
              training. Ensure inner folds respect temporal ordering (use time-based
              split within the outer training window, not random k-fold).

            eval_elasticnet.py:
              LogisticRegression for win probability (penalty='elasticnet', solver='saga',
              l1_ratio=0.5, max_iter=1000). Tune C via 5-fold inner time-series CV
              over [0.001, 0.01, 0.1, 1.0] — select best C per fold outer training
              window. StandardScaler applied before fitting (required for ElasticNet).
              Ridge regression (alpha tuned over [0.1, 1.0, 10.0, 100.0]) for total
              runs. No categorical encoding needed — one-hot encode any object/category
              columns using pd.get_dummies before scaling.
              RATIONALE: Cui (2020) Wharton thesis found ElasticNet logistic regression
              outperforms XGBoost at ~10K sample sizes for MLB win prediction, achieving
              61.77% accuracy / AUC 0.67. This candidate validates whether a fast linear
              model matches boosting quality on our feature set, and if so, warrants
              replacing XGBoost for the win probability target.

          HYPERPARAMETER NOTE: Do NOT tune hyperparameters per fold. Use the
          fixed configurations above. The goal is architecture comparison, not
          hyperparameter sensitivity. A single hyperparameter tuning pass on the
          selected model is a separate (optional) step documented in Task 4.
        dependsOn:
          - build-cv-harness
        acceptanceCriteria:
          - type: command_succeeds
            name: all four evaluation scripts exist and have valid syntax
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                scripts = [
                    'betting_ml/scripts/model_evaluation/eval_xgboost_ngboost.py',
                    'betting_ml/scripts/model_evaluation/eval_lightgbm.py',
                    'betting_ml/scripts/model_evaluation/eval_catboost.py',
                    'betting_ml/scripts/model_evaluation/eval_ensemble_stacked.py',
                    'betting_ml/scripts/model_evaluation/eval_elasticnet.py',
                ]
                for path in scripts:
                    src = pathlib.Path(path).read_text()
                    ast.parse(src)
                    print(f'{path}: syntax OK')
                print('All evaluation scripts valid')
          - type: command_succeeds
            name: all evaluation scripts import from cv_harness
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                scripts = [
                    'betting_ml/scripts/model_evaluation/eval_xgboost_ngboost.py',
                    'betting_ml/scripts/model_evaluation/eval_lightgbm.py',
                    'betting_ml/scripts/model_evaluation/eval_catboost.py',
                    'betting_ml/scripts/model_evaluation/eval_ensemble_stacked.py',
                    'betting_ml/scripts/model_evaluation/eval_elasticnet.py',
                ]
                for path in scripts:
                    src = pathlib.Path(path).read_text()
                    tree = ast.parse(src)
                    imports = []
                    for node in ast.walk(tree):
                        if isinstance(node, ast.ImportFrom) and node.module and 'cv_harness' in node.module:
                            imports.append(node.module)
                        if isinstance(node, ast.Import):
                            for alias in node.names:
                                if 'cv_harness' in alias.name:
                                    imports.append(alias.name)
                    assert imports, f'{path}: does not import from cv_harness'
                print('All evaluation scripts import from cv_harness')
          - type: command_succeeds
            name: result parquet files exist for all five models
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import pathlib
                results_dir = pathlib.Path('betting_ml/evaluation/model_evaluation')
                expected = [
                    'results_xgboost_ngboost.parquet',
                    'results_lightgbm.parquet',
                    'results_catboost.parquet',
                    'results_ensemble_stacked.parquet',
                    'results_elasticnet.parquet',
                ]
                for f in expected:
                    assert (results_dir / f).exists(), f'Missing results file: {f}'
                print('All model result parquet files exist')

      - id: analyze-feature-importance
        kind: Task
        description: >
          Run SHAP-based feature importance analysis on the XGBoost baseline model
          to identify low-signal and potentially noisy features across the 292-feature
          set. The 7.MA retrain showed total_runs and run_differential regressed
          slightly after adding 25 new features — this task determines whether any
          of those features (or existing ones) are adding noise rather than signal.

          CONTEXT: The 7.MA retrain (2026-05-04) recommended this analysis in
          v1_retrain_impact.md § Recommendation for 7.MB. Features to scrutinize
          include the Phase 7 additions (umpire tendencies, pythagorean win exp,
          bullpen fatigue IP, injury counts, pitch archetype matchup, cluster matchup)
          which were flagged as potentially adding context without offsetting signal
          for total_runs and run_differential.

          IMPLEMENTATION — write betting_ml/scripts/model_evaluation/analyze_feature_importance.py:

            1. Load the fold_2025 training parquet (largest training window, produced
               by cv_harness.py) for both X and y_win targets.
            2. Fit an XGBoostClassifier using the baseline hyperparameters from
               eval_xgboost_ngboost.py on the full fold_2025 training split.
            3. Compute SHAP values using shap.TreeExplainer. Use shap.summary_plot
               to produce a bar plot saved to:
                 betting_ml/evaluation/model_evaluation/shap_importance_fold2025.png
            4. Also compute XGBoost native feature importance (gain-based) as a
               cross-check.
            5. Build a DataFrame with columns:
                 feature, mean_abs_shap, xgb_gain_importance, feature_group
               where feature_group is inferred from column name prefix
               (e.g. "ump_" → umpire, "pythagorean" → pythagorean, etc.).
            6. Sort by mean_abs_shap ascending (lowest signal first).
            7. Flag features as PRUNE_CANDIDATE if:
                 mean_abs_shap < 0.001 AND xgb_gain_importance < 0.0005
               Flag features as NOISE_RISK if they belong to Phase 7 feature groups
               (7.H, 7.I, 7.J, 7.K, 7.K2, 7.Q, 7.R) AND mean_abs_shap is below
               the median SHAP value for ALL features.
            8. Write results to:
                 betting_ml/evaluation/model_evaluation/feature_importance_v1.parquet
               Schema: feature, mean_abs_shap, xgb_gain_importance, feature_group,
                       phase7_addition (bool), prune_candidate (bool), noise_risk (bool)
            9. Print a summary: total features, prune candidate count, noise risk count,
               and the top-10 and bottom-10 features by mean_abs_shap.

          REPORT — append a § Feature Importance Analysis section to
          betting_ml/evaluation/model_selection_v1.md (written in Task 4) containing:
            - Count of prune candidates and noise risk features
            - Table of bottom-20 features by SHAP (with flags)
            - Table of Phase 7 additions ranked by SHAP (to evaluate 7.MA additions)
            - Recommendation: list features to remove in the next retrain if
              prune_candidate = True; list features to monitor if noise_risk = True

          NOTE: This analysis does NOT modify any model or feature set — it is
          diagnostic only. Feature removal is deferred to the next scheduled retrain
          (All-Star break or later). The output informs the select-and-document task.

        dependsOn:
          - evaluate-candidate-models
        acceptanceCriteria:
          - type: artifact_exists
            name: feature importance analysis script
            path: betting_ml/scripts/model_evaluation/analyze_feature_importance.py
          - type: command_succeeds
            name: analyze_feature_importance.py syntax is valid
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/analyze_feature_importance.py').read_text()
                ast.parse(src)
                print('analyze_feature_importance.py syntax OK')
          - type: command_succeeds
            name: analyze_feature_importance.py uses SHAP and defines prune/noise flags
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/analyze_feature_importance.py').read_text()
                tree = ast.parse(src)
                found_shap = False
                for node in ast.walk(tree):
                    if isinstance(node, ast.Import):
                        for alias in node.names:
                            if 'shap' in alias.name.lower():
                                found_shap = True
                    if isinstance(node, ast.ImportFrom) and node.module and 'shap' in node.module.lower():
                        found_shap = True
                assert found_shap, 'shap not imported in analyze_feature_importance.py'
                assert 'prune_candidate' in src, 'prune_candidate flag not defined'
                assert 'noise_risk' in src, 'noise_risk flag not defined'
                print('analyze_feature_importance.py uses SHAP and defines required flags')
          - type: artifact_exists
            name: feature importance results parquet
            path: betting_ml/evaluation/model_evaluation/feature_importance_v1.parquet

      - id: evaluate-isotonic-calibration
        kind: Task
        description: >
          Apply isotonic recalibration on top of each base model's win probability
          predictions and measure Brier score improvement.

          PREREQUISITE — CHECK EXISTING CALIBRATOR FIRST:
          The 7.MA retrain (2026-05-04) found that the raw XGBoost model has
          ECE 0.0247, which is better than both: (a) the previous Platt-calibrated
          model (ECE 0.0370) and (b) the new Platt-calibrated model (ECE 0.0420).
          Before evaluating isotonic calibration, explicitly test whether the
          current production inference path (with Platt calibrator) produces
          better or worse ECE than the raw model on the 7.MB eval window.
          If raw > calibrated (raw ECE lower), recommend removing the calibrator.
          Document this comparison in results_calibration.parquet and in the
          § Calibration Analysis section of model_selection_v1.md.

          Isotonic recalibration post-processes raw model probability outputs to
          improve calibration (reliability) without changing the ranking of
          predictions. It fits a monotone step function mapping raw scores to
          calibrated probabilities using sklearn's IsotonicRegression.

          IMPLEMENTATION — write betting_ml/scripts/model_evaluation/eval_calibration.py:

            For each base model (xgboost_ngboost, lightgbm, catboost, ensemble_stacked):
              Load the fold parquet results from Task 2.
              For each fold:
                1. Split the test set into two halves (first half = calibration set,
                   second half = hold-out evaluation set). Use temporal ordering
                   (earlier games in test year → calibration; later games → eval).
                2. Fit IsotonicRegression on (raw_prob, y_win) from calibration half.
                3. Apply to hold-out half. Compute Brier score before and after.
                4. Record: fold_name, model_name, brier_before, brier_after,
                   brier_delta, calibration_set_size, eval_set_size.

          Write results to:
            betting_ml/evaluation/model_evaluation/results_calibration.parquet

          IMPORTANT LIMITATION: The calibration set is carved from the test set,
          so hold-out evaluation sample is smaller than other models' test sets.
          Document this limitation clearly — isotonic calibration results should
          be interpreted directionally, not as a head-to-head Brier score comparison
          against the uncalibrated models (different sample sizes).

          Print a summary table to stdout:
            model | fold | brier_before | brier_after | delta
          A negative delta means calibration improved the score. Flag any fold
          where calibration made the score worse (possible with small samples).

          SELECTION GUIDANCE FOR TASK 4:
            If avg(brier_delta) across folds < −0.002 for any model: apply
            calibration to the selected model as a mandatory step.
            If avg(brier_delta) is between −0.002 and 0: apply as an optional
            improvement.
            If avg(brier_delta) > 0: isotonic calibration is not recommended
            for this dataset; document as a confirmed negative finding.
        dependsOn:
          - evaluate-candidate-models
          - analyze-feature-importance
        acceptanceCriteria:
          - type: artifact_exists
            name: calibration evaluation script
            path: betting_ml/scripts/model_evaluation/eval_calibration.py
          - type: command_succeeds
            name: eval_calibration.py syntax is valid
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/eval_calibration.py').read_text()
                ast.parse(src)
                print('eval_calibration.py syntax OK')
          - type: command_succeeds
            name: eval_calibration.py uses IsotonicRegression and temporal split
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/model_evaluation/eval_calibration.py').read_text()
                tree = ast.parse(src)
                found_isotonic = False
                for node in ast.walk(tree):
                    if isinstance(node, ast.Constant) and isinstance(node.value, str):
                        if 'IsotonicRegression' in node.value:
                            found_isotonic = True
                for node in ast.walk(tree):
                    if isinstance(node, ast.Attribute) and node.attr == 'IsotonicRegression':
                        found_isotonic = True
                    if isinstance(node, ast.Name) and node.id == 'IsotonicRegression':
                        found_isotonic = True
                assert found_isotonic, 'IsotonicRegression not used in eval_calibration.py'
                print('eval_calibration.py uses IsotonicRegression')
          - type: artifact_exists
            name: calibration results parquet
            path: betting_ml/evaluation/model_evaluation/results_calibration.parquet

      - id: select-and-document
        kind: Task
        description: >
          Compile all fold results, apply the selection decision rule, update
          training scripts if a challenger wins, and produce the final selection
          report.

          STEP 1 — Compile comparison table.
          Write a short script (or inline in the report) that loads all four
          results_{model}.parquet files and computes:
            - mean Brier score across folds (primary sort key)
            - mean log-loss across folds
            - mean h2h edge across folds
            - mean % positive edge across folds
            - mean totals MAE across folds
          Print the table sorted by mean Brier score ascending (lower = better).

          STEP 2 — Apply selection decision rule.
          A challenger beats the baseline if:
            (baseline_brier - challenger_brier) / baseline_brier_std >= 0.10
            (Cohen's d-equivalent: effect size ≥ 0.10)
          If multiple challengers clear the bar, select the one with the lowest
          mean Brier score. In case of tie on Brier score (< 0.001 difference),
          prefer the simpler model (LightGBM > CatBoost > Stacked Ensemble) to
          minimize operational complexity.

          STEP 3 — If a challenger is selected:
            a. Update the primary training script (confirm path from project_context.md
               or betting_ml/ directory) to use the new model class.
               - Replace the XGBoost/NGBoost model instantiation with the new class.
               - If isotonic calibration was beneficial (results_calibration.parquet
                 shows avg brier_delta < −0.002), wrap the model with a
                 CalibratedClassifierCV(method='isotonic', cv='prefit') step.
            b. Update model_version in the training script or config to reflect
               the new model (e.g., 'v2_lgbm' or 'v2_catboost').
            c. Run both training scripts on the full 2016–2025 training set to
               produce updated model artifacts.

          STEP 4 — Create betting_ml/evaluation/model_selection_v1.md with sections:

            ## Evaluation Summary
            Full comparison table (all models × all metrics × all folds).

            ## Selection Decision
            Which model was selected and why. Cohen's d effect size vs. baseline.
            If no challenger beat the baseline: document as a confirmed negative
            finding — "XGBoost/NGBoost retained; challenger models did not clear
            the Brier score improvement threshold (Cohen's d ≥ 0.10)."

            ## Calibration Analysis
            Summary of isotonic recalibration results per model.
            Whether calibration is applied to the selected model.
            REQUIRED: explicitly state whether the Platt calibrator in the
            current predict_today.py inference path should be kept, removed,
            or replaced. Reference the 7.MA baseline (raw ECE 0.0247) as the
            threshold — any calibration method must beat this to justify its
            inclusion. If no calibration method beats the raw model, the
            recommended action is to remove PlattCalibratedXGBClassifier from
            the inference path and serve raw XGBoost probabilities directly.

            ## Hyperparameter Tuning (optional)
            If time permits: run Optuna or RandomizedSearchCV on the selected model
            with 50 trials on fold_2025 only. Document best params. Apply if
            CV Brier score improves by > 0.001.

            ## Known Limitations
            - Fixed hyperparameters were used for fairness; the winning model may
              improve further with tuning.
            - Isotonic calibration was evaluated on a split test set (smaller
              hold-out); Brier improvements should be verified on full 2026 season.
            - Annual feature snapshots (archetype, cluster assignment) mean
              early-season predictions rely on prior-year data; this affects all
              candidate models equally.

            ## Next Steps
            - Run Card 7.L (prediction backfill) with the selected model to
              measure real-season impact on mean h2h edge.
            - Re-evaluate after a full 2026 season of live predictions to confirm
              or update the selection.
        dependsOn:
          - evaluate-isotonic-calibration
          - analyze-feature-importance
        acceptanceCriteria:
          - type: artifact_exists
            name: model selection report
            path: betting_ml/evaluation/model_selection_v1.md
          - type: command_succeeds
            name: model_selection_v1.md contains required sections
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import pathlib
                text = pathlib.Path('betting_ml/evaluation/model_selection_v1.md').read_text().lower()
                assert 'evaluation summary' in text or 'comparison' in text, \
                    'Evaluation summary section not found'
                assert 'selection decision' in text or 'selected' in text, \
                    'Selection decision section not found'
                assert 'calibration' in text, \
                    'Calibration analysis section not found'
                assert 'known limitations' in text or 'limitations' in text, \
                    'Known limitations section not found'
                print('model_selection_v1.md contains all required sections')
          - type: command_succeeds
            name: training scripts reference the selected model (not a stale import)
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib, glob
                # Confirm the selected model's import is present in at least one training script
                training_scripts = glob.glob('betting_ml/scripts/train_*.py')
                assert training_scripts, 'No training scripts found matching betting_ml/scripts/train_*.py'
                combined = ' '.join(
                    pathlib.Path(p).read_text() for p in training_scripts
                )
                # Must reference at least one of: xgboost, lightgbm, catboost
                has_model = any(lib in combined.lower()
                                for lib in ['xgboost', 'lightgbm', 'catboost'])
                assert has_model, 'No recognizable model library import found in training scripts'
                print(f'Training scripts reference a model library. Scripts checked: {training_scripts}')
