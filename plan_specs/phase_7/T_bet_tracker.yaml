---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: bet-tracker
  phase: "7"
  card: "7.T"
  priority: P1
  blocker: none (unblocked)
spec:
  description: >
    Add a Bet Tracker section to the EV Tracker & Kelly Sizer page so the user
    can log individual bets placed on Bovada (or any bookmaker), record the
    stake and American odds at the time the bet was placed, and review a running
    P&L history across all bets.

    MOTIVATION: The user has started placing real bets and needs a lightweight
    way to record what was bet, at what line, and for how much — without leaving
    the app. Outcome settlement should be automatic where possible (derive from
    Snowflake game scores) and manual where not.

    SCOPE — this card:
      1. Snowflake DDL: baseball_data.betting_ml.placed_bets table.
      2. "Log a Bet" expander on the EV Tracker page — select game + market
         from the current date's EV rows, enter stake and actual odds, submit
         to Snowflake.
      3. "Bet History" section on the EV Tracker page — table of all logged
         bets with auto-settled outcomes where game scores are available, plus
         summary P&L metrics.

    OUT OF SCOPE for this card (see Card 7.U):
      Live odds refresh from the Odds API (fetching current bookmaker-specific
      odds in real time). That feature is a nice-to-have and depends on OddsAPI
      plan access (see Card 7.P1).

  acceptanceCriteria:
    - description: >
        baseball_data.betting_ml.placed_bets table created with the schema
        defined in Task create-placed-bets-table. DDL script committed to
        scripts/ddl/placed_bets.sql.
    - description: >
        "Log a Bet" expander appears on the EV Tracker page beneath the
        Suggested Slate section. The user can select any game + market from
        the loaded EV table for the selected date, enter a stake ($) and the
        American odds at which the bet was placed, and submit. On submit the
        row is written to placed_bets and a success toast is shown. Fields
        auto-populate model_prob, market_prob, ev, and kelly_capped from the
        EV table row for the selected game + market.
    - description: >
        "Bet History" section appears below "Log a Bet". It loads all rows
        from placed_bets (all dates, not just today) and displays a table
        with columns: Date, Matchup, Market, Bookmaker, Odds, Stake ($),
        Model Prob, EV, Outcome, P&L ($). Outcome and P&L are auto-filled
        for settled games and blank for pending games.
    - description: >
        Auto-settlement derives outcomes from stg_statsapi_games final scores.
        For h2h home: win if home_score > away_score. For h2h away: win if
        away_score > home_score. For over: win if (home_score + away_score) >
        total_line recorded at bet time. For under: win if (home_score +
        away_score) < total_line recorded at bet time. Push if scores are
        exactly equal to the total line for totals markets. P&L computed as:
        win → stake × (decimal_odds − 1); loss → −stake; push → 0.
    - description: >
        Summary metrics row above the Bet History table: Total Wagered ($),
        Total P&L ($), ROI%, Record (W-L-P). Only counts settled bets in
        metrics; pending bets are shown in the table but excluded from
        summary totals.

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: bet-tracker-plan
  phase: "7"
  card: "7.T"
spec:
  goalRef:
    name: bet-tracker
  graph:
    nodes:

      - id: create-placed-bets-table
        kind: Task
        description: >
          Create the placed_bets table in Snowflake and commit the DDL script.

          Schema:

            CREATE TABLE IF NOT EXISTS baseball_data.betting_ml.placed_bets (
                bet_id         VARCHAR(36) DEFAULT UUID_STRING(),
                placed_at      TIMESTAMP_NTZ DEFAULT CURRENT_TIMESTAMP(),
                score_date     DATE NOT NULL,
                game_pk        INTEGER NOT NULL,
                matchup        VARCHAR(100),
                market         VARCHAR(20) NOT NULL,
                bookmaker      VARCHAR(50),
                american_odds  INTEGER NOT NULL,
                stake          FLOAT NOT NULL,
                total_line     FLOAT,
                model_prob     FLOAT,
                market_prob    FLOAT,
                ev             FLOAT,
                kelly_capped   FLOAT,
                outcome        VARCHAR(10),
                profit_loss    FLOAT,
                notes          VARCHAR(500)
            );

          Field notes:
            - bet_id: UUID primary key auto-generated by Snowflake.
            - market: one of 'h2h home', 'h2h away', 'over', 'under' —
              matches the market values in daily_model_predictions.
            - bookmaker: free text (e.g. 'bovada', 'draftkings'). Nullable.
            - american_odds: the line at the time the bet was placed, in
              American format (e.g. -110, +150). Stored as INTEGER.
            - total_line: the over/under total line at bet time. Required for
              auto-settlement of over/under markets; nullable for h2h.
            - outcome: NULL = pending, 'win', 'loss', 'push'.
            - profit_loss: NULL until settled; win = stake × (decimal − 1),
              loss = −stake, push = 0. Stored as FLOAT.

          Run the DDL via Snowflake MCP to create the table.
          Write the DDL to scripts/ddl/placed_bets.sql.

        dependsOn: []
        acceptanceCriteria:
          - type: artifact_exists
            name: placed_bets DDL script
            path: scripts/ddl/placed_bets.sql
          - type: command_succeeds
            name: placed_bets DDL script contains required columns
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import pathlib
                ddl = pathlib.Path('scripts/ddl/placed_bets.sql').read_text()
                required_cols = [
                    'bet_id', 'placed_at', 'score_date', 'game_pk', 'matchup',
                    'market', 'bookmaker', 'american_odds', 'stake', 'total_line',
                    'model_prob', 'outcome', 'profit_loss',
                ]
                missing = [c for c in required_cols if c not in ddl]
                assert not missing, f'DDL missing columns: {missing}'
                print('placed_bets.sql contains all required columns')

      - id: build-log-a-bet-ui
        kind: Task
        description: >
          Add a "Log a Bet" expander to app/pages/3_EV_Kelly.py, positioned
          immediately after the Suggested Slate section.

          The expander contains:

            Row 1 — Game + Market selector:
              - Selectbox "Game" populated from df_ev["matchup_label"].unique()
                for the selected date (empty if no EV data loaded).
              - Selectbox "Market" populated from the markets available for
                the selected game (h2h home, h2h away, over, under).
              - When both are selected, auto-populate read-only fields:
                Model Prob, Market Prob, Consensus Odds (American), EV,
                Capped Kelly%.

            Row 2 — Bet details:
              - Text input "Bookmaker" (default: "bovada").
              - Number input "Actual Odds (American)" (integer; pre-filled
                with the consensus American odds for the selected market but
                editable so the user can enter the exact line they got).
              - Number input "Stake ($)" (float, min 0.01).
              - For over/under markets: Number input "Total Line" (float;
                pre-filled from df_today["total_line_consensus"] if available,
                editable). Hidden for h2h markets.
              - Text area "Notes" (optional, max 500 chars).

            Submit button "Log Bet":
              - Validates stake > 0 and odds != 0.
              - Inserts one row into baseball_data.betting_ml.placed_bets via
                Snowflake MCP / run_query().
              - On success: st.toast("Bet logged ✓") and clear the form.
              - On failure: st.error() with the exception message.

          Implementation note: use st.session_state to hold the selected
          game/market between rerenders so the auto-populated fields are
          stable. The insert must be a parameterised query — never use
          f-string interpolation for user-supplied values (bookmaker, notes).

        dependsOn:
          - create-placed-bets-table
        acceptanceCriteria:
          - type: command_succeeds
            name: Log a Bet expander present in 3_EV_Kelly.py
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('app/pages/3_EV_Kelly.py').read_text()
                assert 'Log a Bet' in src, '"Log a Bet" label not found in 3_EV_Kelly.py'
                assert 'placed_bets' in src, 'placed_bets table reference not found'
                assert 'american_odds' in src, 'american_odds field not found'
                assert 'stake' in src, 'stake field not found'
                print('3_EV_Kelly.py: Log a Bet section present with required fields')
          - type: command_succeeds
            name: No f-string SQL interpolation for user-supplied fields
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('app/pages/3_EV_Kelly.py').read_text()
                # Confirm bookmaker and notes are not directly interpolated into SQL
                lines = src.splitlines()
                for i, line in enumerate(lines, 1):
                    if ('bookmaker' in line or 'notes' in line) and 'f"' in line and 'INSERT' in ''.join(lines[max(0,i-5):i+5]):
                        raise AssertionError(f'Potential f-string SQL injection at line {i}: {line.strip()}')
                print('No f-string SQL injection for user-supplied fields')

      - id: build-bet-history-ui
        kind: Task
        description: >
          Add a "Bet History" section to app/pages/3_EV_Kelly.py, below the
          "Log a Bet" expander. This section is always visible (not inside an
          expander) so the user can immediately see their running P&L.

          Data loading:
            Query baseball_data.betting_ml.placed_bets for all rows, joined
            to stg_statsapi_games for settled scores.

            Auto-settlement query logic (run at load time):
              SELECT
                  b.*,
                  g.home_score,
                  g.away_score,
                  g.status_code
              FROM baseball_data.betting_ml.placed_bets b
              LEFT JOIN baseball_data.betting.stg_statsapi_games g
                  ON b.game_pk = g.game_pk
                  AND g.status_code = 'F'  -- final only
              ORDER BY b.placed_at DESC

            Derive outcome in Python (do NOT update the table on every page
            load; treat auto-settlement as display-only here):
              h2h home win  : home_score > away_score
              h2h away win  : away_score > home_score
              over win      : (home_score + away_score) > total_line
              under win     : (home_score + away_score) < total_line
              push (totals) : (home_score + away_score) == total_line
              pending       : status_code is NULL or not 'F'

            P&L computation:
              decimal_odds = (american_odds / 100 + 1)         if american_odds > 0
              decimal_odds = (100 / abs(american_odds) + 1)    if american_odds < 0
              profit_loss  = stake × (decimal_odds − 1)        if win
              profit_loss  = −stake                             if loss
              profit_loss  = 0                                  if push
              profit_loss  = None                               if pending

          Display:
            Summary metrics row (settled bets only):
              Total Wagered ($) | Total P&L ($) | ROI% | Record (W-L-P)

            Bet history table with columns:
              Date | Matchup | Market | Bookmaker | Odds | Stake ($) |
              Model Prob | EV | Outcome | P&L ($)

            Colour-code the Outcome column: green for win, red for loss,
            grey for push, italic for pending. Use st.dataframe with
            column_config for this.

            Empty state: if no bets logged, show
            st.info("No bets logged yet. Use 'Log a Bet' above to record
            your first bet.")

        dependsOn:
          - build-log-a-bet-ui
        acceptanceCriteria:
          - type: command_succeeds
            name: Bet History section present in 3_EV_Kelly.py
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import pathlib
                src = pathlib.Path('app/pages/3_EV_Kelly.py').read_text()
                assert 'Bet History' in src, '"Bet History" label not found'
                assert 'stg_statsapi_games' in src, 'auto-settlement join to stg_statsapi_games not found'
                assert 'profit_loss' in src, 'profit_loss computation not found'
                required_cols = ['Date', 'Matchup', 'Market', 'Odds', 'Stake', 'Outcome', 'P&L']
                missing = [c for c in required_cols if c not in src]
                assert not missing, f'Bet History table missing display columns: {missing}'
                print('3_EV_Kelly.py: Bet History section present with required columns')
          - type: command_succeeds
            name: Summary metrics include ROI and record
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import pathlib
                src = pathlib.Path('app/pages/3_EV_Kelly.py').read_text()
                assert 'ROI' in src, 'ROI metric not found in Bet History section'
                assert 'Record' in src or 'record' in src, 'W-L-P record metric not found'
                print('Summary metrics (ROI, Record) present')

---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: live-odds-bookmaker-selector
  phase: "7"
  card: "7.U"
  priority: P3
  blocker: "7.P1 (OddsAPI access confirmed), 7.T (bet tracker shipped)"
spec:
  description: >
    NICE-TO-HAVE — implement after Card 7.T is complete and OddsAPI access
    is confirmed (Card 7.P1).

    Add a bookmaker selector and live-odds refresh button to the EV Tracker
    & Kelly Sizer page. When triggered, the app fetches the current odds for
    the selected bookmaker from the OddsAPI and recomputes EV, Kelly, and
    edge against those specific odds rather than the consensus odds stored in
    Snowflake. This makes the EV Tracker a real-time tool for sizing bets
    at the exact line available on Bovada (or another bookmaker) right now.

    SCOPE:
      - Bookmaker selectbox in the sidebar (default: consensus / no override).
        Supported bookmakers: bovada, draftkings, fanduel, betmgm, caesars.
      - "Refresh Live Odds" button that calls the OddsAPI current odds endpoint
        for baseball_mlb, regions=us, markets=h2h,totals, for today's games.
      - Recompute EV/Kelly/edge in the current session using the live odds
        for the selected bookmaker. The Snowflake-stored consensus odds are
        not overwritten — this is display-only.
      - Cache live odds for 5 minutes (st.cache_data with ttl) to avoid
        hammering the OddsAPI on every rerender.
      - If the bookmaker has no odds for a game (game not listed or market
        not available), fall back to the consensus odds and show a warning
        indicator in that row.

    OUT OF SCOPE: historical odds snapshots, line movement tracking,
    OddsAPI ingestion to Snowflake (those are Cards 7.P1–7.P3).

  acceptanceCriteria:
    - description: >
        Bookmaker selectbox appears in the sidebar. Default option is
        "Consensus (Snowflake)" which reproduces current behaviour exactly.
        When a specific bookmaker is selected and "Refresh Live Odds" is
        clicked, the EV table recomputes using that bookmaker's odds.
    - description: >
        Live odds are fetched from the OddsAPI current endpoint
        (/v4/sports/baseball_mlb/odds). ODDS_API_KEY read from environment
        (.env). A failed API call (network error, 401, 429) shows an
        st.error() and falls back to consensus odds — it never crashes the page.
    - description: >
        Live odds are cached for 5 minutes per (date, bookmaker) pair.
        The "Refresh Live Odds" button clears the cache for the current
        selection and re-fetches.
    - description: >
        Rows where the selected bookmaker has no odds are flagged with a
        "consensus fallback" indicator in the EV table rather than being
        silently dropped.
