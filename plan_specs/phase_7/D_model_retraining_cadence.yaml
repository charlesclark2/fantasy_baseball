---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: model-retraining-cadence
  namespace: default
spec:
  description: >
    Define and implement a retraining schedule for the three production models
    (NGBoost total_runs, NGBoost run_differential, XGBoost isotonic home_win) once
    the model has demonstrated positive edge in live use.

    IMPORTANT PREREQUISITE: This card should not be executed until the model is
    actually beating the market. As of the Phase 6 post-mortem (Card 6.H), mean
    h2h edge is approximately −0.017 (consensus_win_prob blend) with only ~35%
    positive-edge predictions. Retraining the current architecture on more data
    will not close that gap — the Phase 7A feature and calibration work (weather
    features, home-win probability recalibration, alpha grid validation) must come
    first. This card is Phase 7B: operationalize retraining once Phase 7A work has
    produced a model that demonstrably adds value over the market.

    This card has two deliverables:

    1. Retraining runbook — a documented section in scripts/daily_run.md specifying
       the trigger criteria (performance-based, not purely calendar-based), the exact
       commands to run, and the verification steps to confirm the retrained models
       are not degraded before promoting them to prod.

    2. Retraining script — betting_ml/scripts/retrain_models.py that automates the
       five retraining steps: re-run probability layer for full α grid, persist
       best_alpha.json, conditionally re-run NGBoost hyperparameter grid search
       (only if 2026 hold-out MAE degrades >1% vs. current), run the 3-way
       calibration split with ECE guard, and update model_registry.yaml with new
       selected_at and eval_year. Old artifact paths are renamed with a date suffix
       for rollback.

    Trigger criteria (all must be satisfied before retraining is warranted):
      performance gate  — model shows positive mean h2h edge (> +0.01) across at
                          least 50 has_odds games in daily_model_predictions
      data volume gate  — at least 50 2026 regular-season game results exist in
                          mart_game_results for hold-out evaluation
      calendar gate     — at or after the All-Star break (~late July 2026), OR
                          after the 2026 World Series ends (~November 2026) for
                          the post-season refit that becomes the 2027 artifact

    If the performance gate is not met by the All-Star break, defer retraining
    until Phase 7A improvements have been implemented and validated.

    ONE-TIME RETRAIN INPUT — 2021 weather backfill (Card 7.L1, completed 2026-05-04):
    The Card 7.MA retrain (2026-05-04) was executed before Card 7.L1 completed the
    historical weather backfill. As a result, all 2,429 2021 rows (~23.7% of training
    data) had weather features imputed with training-set mean rather than actual values.
    Card 7.L1 has since backfilled actual 2021 weather data into the feature store.
    The next scheduled retrain (All-Star break or later, subject to performance gate)
    should incorporate actual 2021 weather to replace the mean-imputed values. No
    emergency retrain is required — mean imputation is a principled fallback and the
    improvement is expected to be within CV noise — but the correction should be
    included in the first retrain that clears all gates.
  acceptanceCriteria:
    - description: >
        scripts/daily_run.md contains a "Model Retraining" section documenting
        the performance-based trigger criteria (positive mean h2h edge > +0.01
        across ≥50 has_odds games), the data volume gate, and the calendar gate
    - description: >
        betting_ml/scripts/retrain_models.py exists, accepts --eval-year and
        --targets flags, and exits 0 on a dry run (--dry-run flag skips all
        Snowflake writes and model file mutations)
    - description: >
        retrain_models.py fails with a non-zero exit code and a descriptive error
        message when the post-retrain ECE delta exceeds 0.005 — the calibration
        guard prevents promoting a degraded model
    - description: >
        model_registry.yaml contains old artifact paths renamed with a date suffix
        (e.g. xgb_isotonic_home_win_2026-07-15.pkl) after a retrain run, confirming
        the rollback mechanism works
    - description: >
        Pitcher cluster monthly retraining cadence is implemented and documented:
        cluster_pitchers.py accepts --snapshot-date (default today); pitcher_clusters
        table PK is (pitcher_id, season, snapshot_date); feature_pitcher_cluster_matchups
        joins on MAX(snapshot_date) < game_date.  Retraining schedule:
        April–early May use prior-season end-of-year snapshot (no in-season run needed);
        first in-season snapshot run on or around June 1 once starters accumulate
        ~750 pitches (stability analysis ARI ~0.63, 2024 season); monthly snapshots
        on or around the 1st of July, August, and September; post-World-Series run
        produces the off-season baseline for the following year.
        Command: uv run python betting_ml/scripts/pitcher_clustering/cluster_pitchers.py
        --season <year> --snapshot-date <YYYY-MM-DD>

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: model-demonstrates-positive-edge
  namespace: default
spec:
  gateType: review
  description: >
    The model must demonstrate positive mean h2h edge before retraining is a
    meaningful investment. Retraining a model that is not beating the market
    on more data produces a better-calibrated bad model, not a good model.

    Required conditions (all must be met):
      - Mean h2h edge (consensus_win_prob - h2h_market_implied_prob) > +0.01
        across at least 50 has_odds rows in daily_model_predictions
      - At least 40% of has_odds rows show positive edge (baseline after Phase 6
        post-mortem fix is ~35%; target > 40% to confirm consistent directional
        accuracy gained from Phase 7A work)
      - The improvement is attributable to Phase 7A feature/calibration work,
        not to a lucky stretch of correct predictions

    Verify with:
      SELECT
        COUNT(*) AS odds_rows,
        AVG(consensus_win_prob - h2h_market_implied_prob) AS mean_edge,
        SUM(CASE WHEN consensus_win_prob > h2h_market_implied_prob
                 THEN 1 ELSE 0 END)::FLOAT / COUNT(*) AS pct_positive
      FROM baseball_data.betting_ml.daily_model_predictions
      WHERE has_odds = TRUE
        AND h2h_market_implied_prob IS NOT NULL
        AND score_date >= <phase_7a_completion_date>
    Expected: odds_rows >= 50, mean_edge > 0.01, pct_positive > 0.40.

    If this gate cannot be cleared, revisit Phase 7A priority items rather than
    proceeding with retraining.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: phase-7a-feature-work-complete
  namespace: default
spec:
  gateType: review
  description: >
    At minimum, the highest-priority Phase 7A improvements (weather features,
    home-win probability recalibration, and the full α grid re-run) must be
    complete before retraining is executed. Retraining on the Phase 6 feature
    set will produce the same underperforming model with more data.

    Required conditions (Phase 7A minimum bar):
      - Weather features (temperature, wind) integrated into the feature store
        and used in all three production models
      - Home-win classifier recalibrated (ECE reduced relative to Phase 6 baseline)
      - alpha_tuning_results contains 11 rows with non-null log_loss from a run
        using the corrected odds data and Phase 7A feature set
      - best_alpha confirmed and best_alpha.json written to betting_ml/models/

    This gate exists to prevent retraining from being treated as a substitute
    for the more impactful feature and calibration improvements.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: card-5-2-prediction-log-for-retraining
  namespace: default
spec:
  gateType: review
  description: >
    Card 5.2 (predict_today.py prediction_log write step) must be complete before
    CLV before/after retraining can be measured.

    Required conditions:
      - predict_today.py writes one row per game × market to
        baseball_data.config.prediction_log after each scoring run
      - The table has rows covering the Phase 7A evaluation window so there is
        a pre-retrain CLV baseline to compare against

    The retrain_models.py script reads from prediction_log to compute hold-out
    CLV; if the table is empty the script cannot perform this verification check.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: model-retraining-cadence-plan
  namespace: default
spec:
  description: >
    Two-task DAG, gated on Phase 7A completion and model demonstrating positive
    edge. document-retraining-runbook adds the retraining section to
    scripts/daily_run.md with performance-based (not purely calendar-based) trigger
    criteria. create-retraining-script builds retrain_models.py and depends on the
    runbook task. Both gates (phase-7a-feature-work-complete and
    model-demonstrates-positive-edge) must clear before implementation begins —
    there is no value in building retraining infrastructure for a model that is
    not beating the market.
  goalRef:
    name: model-retraining-cadence
  graph:
    nodes:

      - id: document-retraining-runbook
        kind: Task
        description: >
          Add a "Model Retraining" section to scripts/daily_run.md immediately
          after the existing "Snowflake Task DAG" section. The runbook must be
          self-contained — an engineer (or the project owner returning after weeks
          away) should be able to execute a full retrain from this document alone.

          SECTION STRUCTURE:

          ## Model Retraining

          ### Trigger Criteria

          Retraining is only warranted when ALL of the following are true:

          **Performance gate (must clear first):**
            SELECT
              COUNT(*) AS odds_rows,
              AVG(consensus_win_prob - h2h_market_implied_prob) AS mean_edge,
              SUM(CASE WHEN consensus_win_prob > h2h_market_implied_prob
                       THEN 1 ELSE 0 END)::FLOAT / COUNT(*) AS pct_positive
            FROM baseball_data.betting_ml.daily_model_predictions
            WHERE has_odds = TRUE AND h2h_market_implied_prob IS NOT NULL
              AND score_date >= '<phase_7a_completion_date>';
          Expected: odds_rows >= 50, mean_edge > 0.01, pct_positive > 0.40.
          If this query returns mean_edge <= 0.01, do NOT retrain — revisit Phase 7A.

          **Data volume gate:**
            SELECT COUNT(*) FROM baseball_data.betting.mart_game_results
            WHERE game_type = 'R' AND season = 2026;
          Minimum: 50 regular-season game results for hold-out evaluation.

          **Calendar gates:**

          | Checkpoint         | Condition                                           | Approx. date   |
          |--------------------|-----------------------------------------------------|----------------|
          | All-Star break     | After All-Star break games complete                 | Late July 2026 |
          | Post-season refit  | After 2026 World Series ends                        | Nov 2026       |

          If the performance gate is not met by the All-Star break, skip that
          refit and revisit after further Phase 7A improvements.

          ### Pre-Retrain Checks

          1. Confirm the Performance Tracker Brier trend in the Streamlit app shows
             model Brier improving relative to the market baseline (0.2395).
             If model Brier is not improving, retraining is unlikely to help.

          2. Record the current model artifacts for rollback reference:
               grep 'artifact_path\|selected_at\|eval_year' \
                 betting_ml/models/model_registry.yaml

          3. Confirm alpha_tuning_results has 11 rows from the Phase 7A re-run:
               SELECT COUNT(*), MIN(log_loss), MAX(log_loss)
               FROM baseball_data.betting_ml.alpha_tuning_results;
             Expected: COUNT = 11, log_loss NOT NULL.

          ### Retraining Commands

          Run retrain_models.py for all three targets:
            uv run python betting_ml/scripts/retrain_models.py \
              --eval-year 2026_allstar \
              --targets total_runs run_differential home_win

          For a dry run (no files mutated, no Snowflake writes):
            uv run python betting_ml/scripts/retrain_models.py \
              --eval-year 2026_allstar \
              --targets total_runs run_differential home_win \
              --dry-run

          ### Post-Retrain Verification

          1. Confirm alpha_tuning_results updated:
               SELECT COUNT(*), MIN(log_loss) AS best_log_loss
               FROM baseball_data.betting_ml.alpha_tuning_results
               ORDER BY loaded_at DESC LIMIT 11;
             Expected: 11 rows, log_loss NOT NULL.

          2. Confirm best_alpha.json updated:
               python -c "import json; print(json.load(open('betting_ml/models/best_alpha.json')))"

          3. Confirm model_registry.yaml updated:
               grep 'selected_at\|eval_year' betting_ml/models/model_registry.yaml

          4. Confirm old artifacts renamed with date suffix (rollback available):
               ls betting_ml/models/*_2026-*.pkl

          5. Run predict_today.py for today and confirm rows logged to Snowflake:
               uv run python betting_ml/scripts/predict_today.py --date $(date +%Y-%m-%d)
             Confirm no "Feature shape mismatch" error and no
             "_FEATURES_ADDED_AFTER_LAST_RETRAIN" warning in output — the retrain
             should have produced a model that accepts all retained features.

          6. Check Streamlit app Today's Picks page — confirm picks load and
             Model Win% values are plausible (not all 0.5, not null).

          ### Rollback Procedure

          If post-retrain verification fails or Brier score degrades:
            1. Identify the backup artifact:
                 ls betting_ml/models/*_2026-*.pkl
            2. Restore the artifact path in model_registry.yaml to the backup filename
            3. Restore best_alpha.json to the pre-retrain value (check git history)
            4. Re-run predict_today.py to confirm restored model scores cleanly
        dependsOn:
          - phase-7a-feature-work-complete
          - model-demonstrates-positive-edge
        acceptanceCriteria:
          - type: command_succeeds
            name: Model Retraining section exists in daily_run.md
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('scripts/daily_run.md').read()
                assert 'Model Retraining' in content, (
                    '"Model Retraining" section not found in scripts/daily_run.md'
                )
                print('Model Retraining section found')
          - type: command_succeeds
            name: Performance gate query documented in runbook
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('scripts/daily_run.md').read().lower()
                assert 'mean_edge' in content or 'mean edge' in content, (
                    'Performance gate (mean_edge > 0.01) not documented in runbook'
                )
                assert '0.01' in content, (
                    'Edge threshold 0.01 not documented in runbook'
                )
                print('Performance gate documented')
          - type: command_succeeds
            name: Calendar trigger checkpoints documented
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('scripts/daily_run.md').read().lower()
                for term in ['all-star', 'post-season']:
                    assert term in content, (
                        f'Trigger checkpoint "{term}" not documented in daily_run.md'
                    )
                print('Calendar trigger checkpoints present')
          - type: command_succeeds
            name: Rollback procedure documented
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('scripts/daily_run.md').read().lower()
                assert 'rollback' in content, (
                    'Rollback procedure not documented in Model Retraining section'
                )
                print('Rollback procedure present')
          - type: command_succeeds
            name: retrain_models.py command with --dry-run shown
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('scripts/daily_run.md').read()
                assert 'retrain_models.py' in content, (
                    'retrain_models.py command not shown in runbook'
                )
                assert '--dry-run' in content, (
                    '--dry-run flag not documented in runbook'
                )
                print('retrain_models.py and --dry-run reference OK')

      - id: create-retraining-script
        kind: Task
        description: >
          Create betting_ml/scripts/retrain_models.py implementing the five-step
          retraining process as a single CLI script.

          CLI INTERFACE:
            uv run python betting_ml/scripts/retrain_models.py \
              --eval-year 2026_allstar \
              --targets total_runs run_differential home_win \
              [--dry-run]

            --eval-year   STRING  Label written to model_registry.yaml (e.g.
                                  "2026_allstar", "2026_postseason", "2027_preseason")
            --targets     LIST    One or more of: total_runs, run_differential, home_win
                                  Default: all three
            --dry-run     FLAG    Print all planned actions but do not write any
                                  files or Snowflake rows. Exits 0 if all checks pass.

          STEP 1 — Re-run probability layer (full α grid):
            Import and call the main function from run_probability_layer.py (or
            invoke it as a subprocess) WITHOUT --use-alpha. Confirm that
            alpha_tuning_results receives 11 rows for the current run.
            Read the resulting best_alpha from the most recent alpha_tuning_results row.
            Write best_alpha to betting_ml/models/best_alpha.json:
              {"best_alpha": <value>, "written_at": "<ISO timestamp>",
               "source": f"retrain_models.py --eval-year {eval_year}"}
            If --dry-run: print planned α grid run but skip Snowflake write.

          STEP 2 — Conditional NGBoost hyperparameter re-search:
            For targets [total_runs, run_differential] only (home_win uses XGBoost):
              Load the current production NGBoost artifact from model_registry.yaml.
              Run a 3-fold CV on the 2026 hold-out year using the existing
              hyperparameters. Compare CV MAE to the registered baseline MAE stored
              in model_registry.yaml under cv_mae_baseline.
              If hold_out_mae > cv_mae_baseline * 1.01 (>1% degradation):
                Re-run the full NGBoost grid search (Card 4.12d/e pattern).
                Print: "NGBoost grid search triggered for {target}: hold-out MAE
                {hold_out_mae:.4f} vs baseline {cv_mae_baseline:.4f}"
              Else:
                Print: "NGBoost grid search skipped for {target}: hold-out MAE
                {hold_out_mae:.4f} within 1% of baseline"
                Reuse existing hyperparameters.
            If --dry-run: print the comparison but skip the grid search.

          STEP 3 — Calibration split and ECE guard:
            For the home_win classifier (XGBoost isotonic):
              Run the 3-way split: train on 2016–(N−2), calibrate on (N−1),
              verify calibration on N (most recent full season).
              Compute Expected Calibration Error (ECE) on the verify set.
              Compare to baseline ECE stored in model_registry.yaml under ece_baseline.
              If ece_delta = new_ece − ece_baseline > 0.005:
                Print error: f"Calibration guard FAILED for home_win: ECE delta
                {ece_delta:.4f} exceeds 0.005 threshold. Aborting retrain."
                sys.exit(1) — DO NOT promote the new model.
              Else:
                Print: f"Calibration guard passed: ECE delta {ece_delta:.4f}"
            If --dry-run: print the planned split but skip training.

          STEP 4 — Persist new artifacts and update model registry:
            For each successfully retrained model:
              1. Rename the existing production artifact with a date suffix:
                   <artifact_stem>_<today_YYYY-MM-DD>.pkl
                 Example: xgb_isotonic_home_win.pkl → xgb_isotonic_home_win_2026-07-15.pkl
              2. Write the new artifact to the canonical production path (no date suffix).
              3. Update model_registry.yaml:
                   selected_at: <ISO timestamp>
                   eval_year: <--eval-year argument>
                   cv_mae_baseline: <new CV MAE if NGBoost was re-searched>
                   ece_baseline: <new ECE if calibration was re-run>
              4. If home_win was retrained and the retrain included weather features
                 (humidity_pct, temp_f, wind_component_mph, wind_direction_deg):
                 Clear the _FEATURES_ADDED_AFTER_LAST_RETRAIN exclusion set in both
                 betting_ml/scripts/predict_today.py and scripts/predict_today.py.
                 The set was added as a temporary workaround (2026-05-02) when weather
                 features were added to feature_selection.md before the model was
                 retrained. Once the model includes those features natively, the
                 exclusion must be removed so weather signals reach the classifier.
                 Replace the block with just:
                   X_clf = X_vals
            If --dry-run: print planned renames and registry updates; write nothing.

          STEP 5 — Update selection log:
            Append a dated entry to betting_ml/evaluation/selection_log.md:
              ## Retrain — {eval_year} ({today})
              - Targets retrained: {targets}
              - best_alpha: {best_alpha} (prior: {prior_alpha})
              - NGBoost grid search triggered: {True/False} per target
              - ECE delta (home_win): {ece_delta:.4f}
              - Old artifacts renamed: {list of renamed files}
            If --dry-run: print the planned log entry but do not write it.

          ERROR HANDLING:
            - Any exception in Steps 1–5 must terminate the script with sys.exit(1)
              and print the step name and error message. Partial retrain state
              (e.g. new artifact written but registry not updated) must be detected
              and reported — do not leave the system in a half-promoted state.
            - The script must print a final "Retrain complete" or "Dry run complete"
              summary showing which targets were retrained, the new best_alpha,
              and any skipped steps.
        dependsOn:
          - document-retraining-runbook
          - card-5-2-prediction-log-for-retraining
        acceptanceCriteria:
          - type: artifact_exists
            name: Retraining script
            path: betting_ml/scripts/retrain_models.py
          - type: command_succeeds
            name: Script parses without syntax error
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/retrain_models.py').read_text()
                ast.parse(src)
                print('retrain_models.py syntax OK')
          - type: command_succeeds
            name: Script accepts --dry-run and --eval-year flags
            command: uv
            args:
              - run
              - python
              - betting_ml/scripts/retrain_models.py
              - "--help"
          - type: command_succeeds
            name: All five steps referenced in script
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                src = open('betting_ml/scripts/retrain_models.py').read().lower()
                checks = {
                    'alpha_tuning_results or run_probability_layer': (
                        'alpha_tuning_results' in src or 'run_probability_layer' in src
                    ),
                    'best_alpha.json write': 'best_alpha.json' in src,
                    'ECE guard (0.005 threshold)': '0.005' in src,
                    'artifact rename with date suffix': 'strftime' in src or 'date' in src,
                    'selection_log.md update': 'selection_log' in src,
                }
                failures = [k for k, v in checks.items() if not v]
                assert not failures, f'Missing references in retrain_models.py: {failures}'
                print('All five step references found')
          - type: command_succeeds
            name: ECE guard triggers sys.exit(1) on delta > 0.005
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                src = open('betting_ml/scripts/retrain_models.py').read()
                assert 'sys.exit(1)' in src or 'raise SystemExit' in src, (
                    'sys.exit(1) not found — ECE guard must terminate the script '
                    'with a non-zero exit code on calibration failure'
                )
                assert '0.005' in src, (
                    'ECE threshold 0.005 not found in script'
                )
                print('ECE guard sys.exit(1) OK')
          - type: command_succeeds
            name: --dry-run exits 0 without writing any files
            command: uv
            args:
              - run
              - python
              - betting_ml/scripts/retrain_models.py
              - "--eval-year"
              - "dry_run_test"
              - "--dry-run"
