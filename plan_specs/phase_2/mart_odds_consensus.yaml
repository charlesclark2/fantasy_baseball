---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: mart-odds-consensus
  namespace: default
spec:
  description: >
    Build the mart_odds_consensus dbt model — a pre-game bookmaker consensus
    aggregation table (one row per event_id) derived from mart_odds_outcomes.
    Card 3.11 (Bookmaker Calibration, 2026-04-24) confirmed consensus features
    carry signal (H7 supported: consensus Brier = 0.2395 < 0.240 threshold,
    include_consensus_features = True) and set queue_mart_odds_consensus_card = True.
    This mart is the direct prerequisite for adding odds features to the Phase 4
    model training pipeline (Cards 4.8–4.12). Once built, feature_pregame_odds_features
    and feature_pregame_game_features must be updated to pass all 10 consensus
    columns through to the feature layer.
  acceptanceCriteria:
    - description: >
        dbt/models/mart/mart_odds_consensus.sql created; materialized as table;
        grain is one row per event_id
    - description: >
        Pre-game leakage guard enforced: only ingestion_ts < commence_time snapshots
        included; spot-check confirms no rows with ingestion_ts >= commence_time
    - description: >
        Latest-per-book selection uses QUALIFY ROW_NUMBER() pattern;
        no duplicate (event_id, bookmaker_key) rows in h2h or totals CTEs
    - description: >
        All 10 output columns present: home_win_prob_consensus, home_win_prob_sharp,
        home_win_prob_soft, sharp_soft_ml_delta, ml_consensus_std,
        market_bookmaker_count, total_line_consensus, total_line_std,
        over_prob_consensus, totals_bookmaker_count
    - description: >
        home_win_prob_consensus is non-null for all events with at least one
        h2h bookmaker; sharp/soft columns are null (not 0.0) for events where
        that book group had no coverage
    - description: >
        Spot-check Snowflake query joining mart_odds_consensus to mart_game_results
        for 2021–2025 produces consensus Brier within ±0.002 of the 0.2395
        Card 3.11 benchmark
    - description: >
        feature_pregame_odds_features updated to join mart_odds_consensus on event_id
        and pass through all 9 signal columns (excludes totals_bookmaker_count
        which is a count diagnostic, not a signal feature)
    - description: >
        feature_pregame_game_features passes through all new consensus columns
        from feature_pregame_odds_features without modification
    - description: >
        schema.yml updated for mart_odds_consensus (with unique test on event_id),
        feature_pregame_odds_features, and feature_pregame_game_features
        with column descriptions for all new columns
    - description: >
        dbtf build --select mart_odds_consensus feature_pregame_odds_features
        feature_pregame_game_features passes all tests with no new failures

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: mart-odds-consensus-plan
  namespace: default
spec:
  description: >
    Eight-task DAG implementing mart_odds_consensus and wiring it through the
    feature layer. create-mart-sql is the root node with no blockers (mart_odds_outcomes
    and historical odds backfill are already complete). add-schema-mart and
    build-and-test-mart proceed sequentially. verify-brier-benchmark and
    update-feature-odds both depend on build-and-test-mart and can run in parallel.
    update-feature-game depends on update-feature-odds. update-schema-features
    depends on update-feature-game. validate-full-build is the final convergence
    node requiring all prior tasks.
  goalRef:
    name: mart-odds-consensus
  graph:
    nodes:

      - id: create-mart-sql
        kind: Task
        description: >
          Create dbt/models/mart/mart_odds_consensus.sql. This is a new file;
          no existing model is being modified. Structure as a single CTE chain:

          (1) pre_game_snapshots: SELECT * FROM {{ ref('mart_odds_outcomes') }}
              WHERE ingestion_ts < commence_time

          (2) latest_per_book: Apply QUALIFY ROW_NUMBER() OVER
              (PARTITION BY event_id, bookmaker_key, market_key, outcome_name
               ORDER BY ingestion_ts DESC) = 1 to select the most recent pre-game
              snapshot per bookmaker-market-outcome combination.

          (3) h2h_per_book: Filter to market_key = 'h2h'. Pivot to one row per
              (event_id, bookmaker_key) using conditional aggregation:
                home_price = MAX(CASE WHEN is_home_outcome THEN outcome_price_american END)
                away_price = MAX(CASE WHEN is_away_outcome THEN outcome_price_american END)
              Compute vig-adjusted implied probabilities:
                raw_home_prob = CASE WHEN home_price < 0
                                     THEN ABS(home_price) / (ABS(home_price) + 100)
                                     ELSE 100.0 / (home_price + 100) END
                raw_away_prob = CASE WHEN away_price < 0
                                     THEN ABS(away_price) / (ABS(away_price) + 100)
                                     ELSE 100.0 / (away_price + 100) END
                home_imp = raw_home_prob / NULLIF(raw_home_prob + raw_away_prob, 0)
              Add is_sharp = bookmaker_key IN ('lowvig', 'betonlineag', 'bovada')
              Add is_soft  = bookmaker_key IN ('draftkings', 'fanduel', 'betmgm',
                                               'williamhill_us', 'betrivers')

          (4) totals_per_book: Filter to market_key = 'totals'. Pivot to one row per
              (event_id, bookmaker_key) using conditional aggregation:
                total_line = MAX(outcome_point)
                over_price  = MAX(CASE WHEN outcome_name = 'Over'  THEN outcome_price_american END)
                under_price = MAX(CASE WHEN outcome_name = 'Under' THEN outcome_price_american END)
              Compute vig-adjusted over implied probability:
                raw_over_prob  = CASE WHEN over_price  < 0 THEN ABS(over_price)  / (ABS(over_price)  + 100)
                                                           ELSE 100.0 / (over_price  + 100) END
                raw_under_prob = CASE WHEN under_price < 0 THEN ABS(under_price) / (ABS(under_price) + 100)
                                                           ELSE 100.0 / (under_price + 100) END
                over_imp = raw_over_prob / NULLIF(raw_over_prob + raw_under_prob, 0)

          (5) consensus: GROUP BY event_id across h2h_per_book and totals_per_book to
              compute the 10 final output columns (see Goal acceptance criteria for
              column definitions). Use NULLIF guards on STDDEV to return null (not 0.0)
              when only one book is present. Use IFF / CASE to ensure sharp and soft
              averages are null when that book group has zero rows for an event.

          Final SELECT: event_id plus all 10 consensus columns.

          Model config block at the top:
            {{ config(materialized = 'table') }}
        acceptanceCriteria:
          - type: artifact_exists
            name: mart_odds_consensus SQL file created
            path: dbt/models/mart/mart_odds_consensus.sql
          - type: command_succeeds
            name: SQL file references mart_odds_outcomes via ref()
            command: grep
            args:
              - "-q"
              - "ref('mart_odds_outcomes')"
              - "dbt/models/mart/mart_odds_consensus.sql"
          - type: command_succeeds
            name: Leakage guard present in SQL
            command: grep
            args:
              - "-q"
              - "ingestion_ts < commence_time"
              - "dbt/models/mart/mart_odds_consensus.sql"
          - type: command_succeeds
            name: QUALIFY ROW_NUMBER pattern present for latest-per-book selection
            command: grep
            args:
              - "-q"
              - "QUALIFY"
              - "dbt/models/mart/mart_odds_consensus.sql"
          - type: command_succeeds
            name: All 10 output column names present in SQL
            command: bash
            args:
              - "-c"
              - |-
                file="dbt/models/mart/mart_odds_consensus.sql"
                for col in home_win_prob_consensus home_win_prob_sharp home_win_prob_soft \
                           sharp_soft_ml_delta ml_consensus_std market_bookmaker_count \
                           total_line_consensus total_line_std over_prob_consensus \
                           totals_bookmaker_count; do
                  grep -q "$col" "$file" || { echo "Missing column: $col"; exit 1; }
                done

      - id: add-schema-mart
        kind: Task
        description: >
          Add a mart_odds_consensus block to dbt/models/mart/schema.yml
          (or create schema.yml if not present in that directory). The block must
          include: model name, a description matching the mart's stated grain and
          purpose, a unique test on event_id, and column-level descriptions for all
          10 output columns. Descriptions should reference Card 3.11 provenance
          (e.g. "sharp books: lowvig, betonlineag, bovada as identified by Card 3.11").
          Use the existing mart schema.yml style for consistency.
        dependsOn:
          - create-mart-sql
        acceptanceCriteria:
          - type: command_succeeds
            name: schema.yml contains mart_odds_consensus model entry
            command: grep
            args:
              - "-rq"
              - "mart_odds_consensus"
              - "dbt/models/mart/"
          - type: command_succeeds
            name: unique test on event_id present in schema
            command: bash
            args:
              - "-c"
              - |-
                grep -A 20 "mart_odds_consensus" dbt/models/mart/schema.yml | grep -q "unique"

      - id: build-and-test-mart
        kind: Task
        description: >
          Run dbtf build --select mart_odds_consensus to compile and execute the
          model in Snowflake. Confirm the table is created in the baseball_data.betting
          schema. Run dbtf test --select mart_odds_consensus to verify the unique
          test on event_id passes. Verify row count is non-zero and that the model
          compiles without SQL errors.
        dependsOn:
          - add-schema-mart
        acceptanceCriteria:
          - type: command_succeeds
            name: dbtf build succeeds for mart_odds_consensus
            command: bash
            args:
              - "-c"
              - "cd dbt && dbtf build --select mart_odds_consensus 2>&1 | grep -q 'Completed successfully\\|1 of 1 OK'"
          - type: command_succeeds
            name: dbtf test passes unique test on event_id
            command: bash
            args:
              - "-c"
              - "cd dbt && dbtf test --select mart_odds_consensus 2>&1 | grep -qv 'ERROR\\|FAIL'"

      - id: verify-brier-benchmark
        kind: Task
        description: >
          Run a Snowflake spot-check query joining mart_odds_consensus to
          mart_game_results (on event_id) for games in 2021–2025 where
          home_win_prob_consensus is non-null. Compute the Brier score:
            AVG(POW(home_win_prob_consensus - home_win::float, 2))
          Confirm the result is within ±0.002 of 0.2395 (the Card 3.11 benchmark).
          Also verify: no rows have ingestion_ts >= commence_time (leakage spot-check);
          market_bookmaker_count >= 1 for all rows; sharp/soft columns are null
          (not 0.0) for events where no sharp or soft book had coverage.
          Write results to betting_ml/evaluation/mart_odds_consensus_validation.md
          with the Brier score, row counts, and null-check results.
        dependsOn:
          - build-and-test-mart
        acceptanceCriteria:
          - type: artifact_exists
            name: Validation results markdown written
            path: betting_ml/evaluation/mart_odds_consensus_validation.md
          - type: command_succeeds
            name: Validation file records Brier score near 0.2395 benchmark
            command: grep
            args:
              - "-q"
              - "0.23\\|0.24"
              - "betting_ml/evaluation/mart_odds_consensus_validation.md"
          - type: command_succeeds
            name: Validation file records leakage check passed
            command: grep
            args:
              - "-iq"
              - "leakage\\|no rows"
              - "betting_ml/evaluation/mart_odds_consensus_validation.md"

      - id: update-feature-odds
        kind: Task
        description: >
          Update dbt/models/mart/feature_pregame_odds_features.sql (or wherever
          the feature_pregame_odds_features model lives — check dbt/models/ for
          the correct path). Add a CTE or LEFT JOIN that brings in mart_odds_consensus
          on event_id. Pass through 9 of the 10 consensus columns in the final
          SELECT (all except totals_bookmaker_count, which is a diagnostic count
          not a model signal feature):
            home_win_prob_consensus, home_win_prob_sharp, home_win_prob_soft,
            sharp_soft_ml_delta, ml_consensus_std, market_bookmaker_count,
            total_line_consensus, total_line_std, over_prob_consensus
          Use a LEFT JOIN so games with no odds data still appear in the feature
          table with null consensus columns rather than being dropped. The join
          condition is event_id. Do not modify any existing columns or logic in
          the model — append only.
        dependsOn:
          - build-and-test-mart
        acceptanceCriteria:
          - type: command_succeeds
            name: feature_pregame_odds_features references mart_odds_consensus via ref()
            command: bash
            args:
              - "-c"
              - |-
                grep -rq "ref('mart_odds_consensus')" dbt/models/
          - type: command_succeeds
            name: home_win_prob_consensus column present in feature_pregame_odds_features
            command: bash
            args:
              - "-c"
              - |-
                grep -rq "home_win_prob_consensus" dbt/models/

      - id: update-feature-game
        kind: Task
        description: >
          Update the feature_pregame_game_features dbt model to pass through all 9
          new consensus columns sourced from feature_pregame_odds_features. This
          model aggregates all feature sub-models into the final training-ready
          feature table. Add each new column to the final SELECT. Do not alter any
          existing columns or join logic — append only. The columns to add are the
          same 9 passed through in update-feature-odds.
        dependsOn:
          - update-feature-odds
        acceptanceCriteria:
          - type: command_succeeds
            name: home_win_prob_consensus present in feature_pregame_game_features SQL
            command: bash
            args:
              - "-c"
              - |-
                file=$(find dbt/models -name "feature_pregame_game_features.sql")
                grep -q "home_win_prob_consensus" "$file"
          - type: command_succeeds
            name: All 9 consensus columns present in feature_pregame_game_features SQL
            command: bash
            args:
              - "-c"
              - |-
                file=$(find dbt/models -name "feature_pregame_game_features.sql")
                for col in home_win_prob_consensus home_win_prob_sharp home_win_prob_soft \
                           sharp_soft_ml_delta ml_consensus_std market_bookmaker_count \
                           total_line_consensus total_line_std over_prob_consensus; do
                  grep -q "$col" "$file" || { echo "Missing: $col"; exit 1; }
                done

      - id: update-schema-features
        kind: Task
        description: >
          Update schema.yml entries for feature_pregame_odds_features and
          feature_pregame_game_features to include column-level descriptions for
          all 9 new consensus columns. Descriptions must note: the source mart
          (mart_odds_consensus), whether the feature should be used in model training
          (include_sharp_soft_features = False per Card 3.11 means
          home_win_prob_sharp, home_win_prob_soft, and sharp_soft_ml_delta are
          present for diagnostics but not recommended as primary training features),
          and the Card 3.11 benchmark context for home_win_prob_consensus.
        dependsOn:
          - update-feature-game
        acceptanceCriteria:
          - type: command_succeeds
            name: schema.yml contains home_win_prob_consensus description for feature models
            command: bash
            args:
              - "-c"
              - |-
                grep -rq "home_win_prob_consensus" dbt/models/

      - id: validate-full-build
        kind: Task
        description: >
          Run dbtf build --select mart_odds_consensus feature_pregame_odds_features
          feature_pregame_game_features to compile and execute all three models
          end-to-end in Snowflake. Run dbtf test --select on all three to confirm
          no new test failures. Verify feature_pregame_game_features row count is
          unchanged from before (new columns, no dropped rows). This is the final
          integration gate for the card — if it passes, Card 4.7 is complete and
          Cards 4.8–4.12 may use consensus odds features in model training.
        dependsOn:
          - verify-brier-benchmark
          - update-schema-features
        acceptanceCriteria:
          - type: command_succeeds
            name: dbtf build passes for all three models
            command: bash
            args:
              - "-c"
              - |-
                cd dbt && dbtf build \
                  --select mart_odds_consensus feature_pregame_odds_features feature_pregame_game_features \
                  2>&1 | grep -q "Completed successfully\\|3 of 3 OK"
          - type: command_succeeds
            name: dbtf test passes for all three models with no new failures
            command: bash
            args:
              - "-c"
              - |-
                cd dbt && dbtf test \
                  --select mart_odds_consensus feature_pregame_odds_features feature_pregame_game_features \
                  2>&1 | grep -qv "ERROR\\|FAIL"
          - type: command_succeeds
            name: mart_odds_consensus unique test on event_id confirmed passing
            command: bash
            args:
              - "-c"
              - |-
                cd dbt && dbtf test --select mart_odds_consensus --store-failures \
                  2>&1 | grep -q "unique_mart_odds_consensus_event_id\\|1 of 1 PASS"
