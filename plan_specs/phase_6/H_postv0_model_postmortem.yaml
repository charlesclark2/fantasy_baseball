---
apiVersion: planspec.io/v1alpha1
kind: Goal
metadata:
  name: postv0-model-postmortem
  namespace: default
spec:
  description: >
    Conduct a structured post-mortem of the v0 model system (Phases 1–6 through
    Card 6.G) and produce a prioritized Phase 7 improvement roadmap. The v0 system
    has produced 1,098 scored game rows across 36 dates (2026-03-27 through
    2026-05-01); this card formalizes what was learned before Phase 7 investment
    begins.

    IMPORTANT FRAMING: The v0 model is not currently beating the market. The mean
    h2h edge is −0.036 (NGBoost alone) or −0.017 (consensus_win_prob blend), and
    only ~35% of predictions show positive edge. This means periodic model
    retraining is not a meaningful near-term investment — the architecture and
    feature set need fundamental improvement first. The Phase 7 roadmap should
    be oriented toward closing that gap, not scheduling retraining of the current
    model.

    This card has two code changes and two documentation deliverables:

    CODE CHANGES (pre-Phase 7 quick fixes):

    1. Implement consensus_win_prob as the official model_prob for h2h edge
       calculation in predict_today.py. Currently line ~178 uses ngb_win alone:
         h2h_edge = compute_edge(ngb_win, h2h_mkt_v)
       Replace with:
         h2h_edge = compute_edge(cons_win, h2h_mkt_v)
         h2h_post = compute_posterior(cons_win, h2h_mkt_v, best_alpha)
         h2h_kelly = compute_kelly(h2h_edge, h2h_mkt_v)
       cons_win is already computed at line ~173 (0.5 * ngb_win + 0.5 * clf_win).
       This is not a model retrain — it changes which probability feeds the edge
       formula, improving mean edge from −0.036 to an expected −0.017.

    2. Measure the actual before/after impact on mean h2h edge across the 1,023
       has_odds rows in daily_model_predictions (as of 2026-05-01). Document the
       before/after comparison in betting_ml/evaluation/selection_log.md.

    DOCUMENTATION DELIVERABLES:

    3. Gap audit document — betting_ml/evaluation/postmortem_v0.md containing a
       structured analysis of all seven known gaps (Gaps 1–7 from project_context.md),
       each with: quantified impact using 2026 backfill data where available,
       root-cause confirmation or revision, and a Phase 7 priority ranking (P1/P2/P3).

    4. Phase 7 roadmap — a prioritized improvement list appended to
       betting_ml/evaluation/postmortem_v0.md as a separate "Phase 7 Roadmap"
       section, ordered by expected lift / implementation cost ratio. The roadmap
       must be grounded in closing the model-vs-market gap (improving edge
       distribution and calibration), not on operational cadence like retraining.

    The consensus_win_prob fix (deliverable 1) must be applied to predict_today.py
    before the gap audit (deliverable 3) is written, so the audit reflects the
    corrected h2h edge distribution.

    This is primarily an analysis and documentation card. No model retraining,
    no new Snowflake tables, and no new page builds are part of this card.
  acceptanceCriteria:
    - description: >
        predict_today.py uses consensus_win_prob (cons_win = 0.5 × ngb_win + 0.5
        × clf_win) as the model_prob input to compute_edge, compute_posterior, and
        compute_kelly for the h2h market — not NGBoost alone
    - description: >
        betting_ml/evaluation/selection_log.md contains a dated Card 6.H entry
        showing mean h2h edge before (NGBoost alone, ~−0.036) and after
        (consensus_win_prob, ~−0.017) the fix, computed across the has_odds rows
        in daily_model_predictions
    - description: >
        betting_ml/evaluation/postmortem_v0.md exists and contains a structured
        analysis of all seven known gaps (Gap 1 through Gap 7) each with quantified
        impact, root-cause analysis, and a P1/P2/P3 priority ranking
    - description: >
        postmortem_v0.md contains a "Phase 7 Roadmap" section listing improvement
        initiatives ordered by expected lift / implementation cost ratio, with the
        roadmap focused on closing the model-vs-market gap rather than operational
        retraining cadence
    - description: >
        Gap 1 analysis in postmortem_v0.md references the current alpha_tuning_results
        state (1 row, log_loss NULL — Card 6.F fix still pending as of writing)
        and notes that best_alpha cannot be validated until the full 11-row grid
        is re-run with corrected odds data
    - description: >
        Gap 2 analysis in postmortem_v0.md quantifies the actual before/after
        mean h2h edge change from the consensus_win_prob fix using live data from
        daily_model_predictions (1,023 has_odds rows as of 2026-05-01)

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: card-6g-backfill-complete
  namespace: default
spec:
  gateType: review
  description: >
    Card 6.G (2026 season prediction backfill) must be complete before the
    post-mortem analysis can be performed.

    Required conditions (confirmed as of 2026-05-01):
      - daily_model_predictions contains rows for all scored dates from 2026-03-27
        onward, with daily ingestion keeping it current
      - As of 2026-05-01: 1,098 total rows, 1,023 has_odds rows, 36 distinct dates
      - has_odds rows have non-null h2h_market_implied_prob and h2h_edge

    Verify with:
      SELECT COUNT(*), COUNT(CASE WHEN has_odds THEN 1 END) AS odds_rows,
             MIN(score_date), MAX(score_date), COUNT(DISTINCT score_date)
      FROM baseball_data.betting_ml.daily_model_predictions
      WHERE YEAR(score_date) = 2026
    Expected: total >= 1098, odds_rows >= 1023.

    NOTE: This gate is already satisfied. Mark it immediately upon starting this card.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Gate
metadata:
  name: card-6f-alpha-fix-complete
  namespace: default
spec:
  gateType: review
  description: >
    The alpha_tuning_results pre-Phase 7 quick fix from Card 6.F must be complete
    before the Gap 1 analysis is written. The post-mortem's Gap 1 section must
    reflect the re-run α grid (all 11 rows) and verify whether best_alpha shifts
    from 0.0 after the corrected odds backfill.

    CURRENT STATE (as of 2026-05-01): alpha_tuning_results has only 1 row
    (alpha=0.0, log_loss=NULL) — the 6.F fix is NOT yet complete. This gate is
    blocking the gap-audit-and-phase7-roadmap task. If this gate cannot be
    satisfied before post-mortem writing begins, the Gap 1 section must explicitly
    document this as an open issue (best_alpha unvalidated, full grid not yet run).

    Required conditions:
      - alpha_tuning_results contains 11 rows (one per α in [0.0, 0.1, ..., 1.0])
        from a run after the odds pipeline bugs documented in Gap 9 were fixed
      - betting_ml/models/best_alpha.json exists with the confirmed best_alpha value

    Verify with:
      SELECT COUNT(*), MIN(alpha), MAX(alpha), MIN(log_loss) AS best_log_loss
      FROM baseball_data.betting_ml.alpha_tuning_results
      ORDER BY loaded_at DESC
      LIMIT 11;
    Expected: COUNT = 11, log_loss NOT NULL.

    The consensus-win-prob-fix task does NOT depend on this gate and can proceed
    immediately.
  reviewers:
    - user:charlesclark

---
apiVersion: planspec.io/v1alpha1
kind: Plan
metadata:
  name: postv0-model-postmortem-plan
  namespace: default
spec:
  description: >
    Three-task DAG. consensus-win-prob-fix applies the one-line code change to
    predict_today.py (~line 178: swap ngb_win for cons_win in compute_edge /
    compute_posterior / compute_kelly calls), then measures the before/after h2h
    edge impact using the 1,023 has_odds rows in daily_model_predictions. It
    depends only on the 6.G backfill gate and can start immediately.

    gap-audit-and-phase7-roadmap writes postmortem_v0.md covering all seven gaps
    with quantified impact; it depends on consensus-win-prob-fix (so Gap 2
    reflects corrected data) and the 6.F alpha fix gate (so Gap 1 reflects the
    full 11-row α grid — or explicitly documents that the grid is pending).

    update-selection-log records the consensus_win_prob before/after comparison
    in selection_log.md and can proceed in parallel with gap-audit-and-phase7-roadmap
    after consensus-win-prob-fix completes.
  goalRef:
    name: postv0-model-postmortem
  graph:
    nodes:

      - id: consensus-win-prob-fix
        kind: Task
        description: >
          Apply the consensus_win_prob fix to make it the official model_prob for
          h2h edge calculation, then measure and document the impact.

          CHANGE — predict_today.py (around line 178):
            Currently:
              h2h_edge  = compute_edge(ngb_win, h2h_mkt_v)
              h2h_post  = compute_posterior(ngb_win, h2h_mkt_v, best_alpha)
              h2h_kelly = compute_kelly(h2h_edge, h2h_mkt_v)
            Replace ngb_win with cons_win (already computed at ~line 173):
              h2h_edge  = compute_edge(cons_win, h2h_mkt_v)
              h2h_post  = compute_posterior(cons_win, h2h_mkt_v, best_alpha)
              h2h_kelly = compute_kelly(h2h_edge, h2h_mkt_v)

            Also update the DDL comment at ~line 82 to reflect the new formula:
              h2h_edge  FLOAT,   -- consensus_win_prob - h2h_market_implied_prob

            Note: the Streamlit Today's Picks page (app/pages/1_Today_Picks.py)
            reads h2h_edge directly from daily_model_predictions — it does not
            recompute edge inline — so no Streamlit change is needed. The page
            will automatically reflect the corrected values once new predictions
            are written.

          MEASURE IMPACT — query daily_model_predictions to compute before/after:
            The 1,023 has_odds rows already have both p_home_win_ngboost and
            consensus_win_prob stored, so the counterfactual edge can be computed
            without re-running predict_today.py:

              SELECT
                AVG(p_home_win_ngboost - h2h_market_implied_prob) AS current_mean_edge,
                AVG(consensus_win_prob - h2h_market_implied_prob) AS corrected_mean_edge,
                SUM(CASE WHEN consensus_win_prob > h2h_market_implied_prob
                         THEN 1 ELSE 0 END)::FLOAT / COUNT(*) AS corrected_pct_positive
              FROM baseball_data.betting_ml.daily_model_predictions
              WHERE has_odds = TRUE
                AND h2h_market_implied_prob IS NOT NULL

            Known baseline (2026-03-27 through 2026-05-01, 1,023 rows):
              current_mean_edge    ≈ −0.036
              corrected_mean_edge  ≈ −0.017
              corrected_pct_positive ≈ 35.4%

            Record the actual query results (not these estimates) for the
            selection_log entry. Even after the fix, edge is still negative —
            note this as the primary motivation for Phase 7 fundamental model work.
        dependsOn:
          - card-6g-backfill-complete
        acceptanceCriteria:
          - type: command_succeeds
            name: predict_today.py uses consensus_win_prob (cons_win) for h2h edge
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/predict_today.py').read_text()
                tree = ast.parse(src)
                # Check that compute_edge is not called with ngb_win alone — look
                # for the h2h edge assignment and verify cons_win is the argument
                found_cons = False
                for node in ast.walk(tree):
                    if isinstance(node, ast.Assign):
                        for t in node.targets:
                            if isinstance(t, ast.Name) and t.id == 'h2h_edge':
                                call = node.value
                                if isinstance(call, ast.Call):
                                    # First arg should reference cons_win
                                    arg0 = call.args[0] if call.args else None
                                    if isinstance(arg0, ast.Name) and arg0.id == 'cons_win':
                                        found_cons = True
                assert found_cons, (
                    'h2h_edge is not assigned from compute_edge(cons_win, ...) — '
                    'consensus_win_prob fix not applied in predict_today.py'
                )
                print('consensus_win_prob (cons_win) used for h2h edge — OK')
          - type: command_succeeds
            name: predict_today.py syntax valid after change
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import ast, pathlib
                src = pathlib.Path('betting_ml/scripts/predict_today.py').read_text()
                ast.parse(src)
                print('predict_today.py syntax OK after consensus_win_prob change')
          - type: command_succeeds
            name: Impact query returns numeric before/after values
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                from betting_ml.utils.data_loader import get_snowflake_connection
                conn = get_snowflake_connection()
                cur = conn.cursor()
                cur.execute("""
                    SELECT
                      AVG(p_home_win_ngboost - h2h_market_implied_prob) AS current_mean_edge,
                      AVG(consensus_win_prob - h2h_market_implied_prob) AS corrected_mean_edge,
                      SUM(CASE WHEN consensus_win_prob > h2h_market_implied_prob
                               THEN 1 ELSE 0 END)::FLOAT / COUNT(*) AS corrected_pct_positive
                    FROM baseball_data.betting_ml.daily_model_predictions
                    WHERE has_odds = TRUE
                      AND h2h_market_implied_prob IS NOT NULL
                """)
                row = cur.fetchone()
                conn.close()
                current_edge, corrected_edge, pct_positive = row
                assert current_edge is not None, 'current_mean_edge is NULL — no has_odds rows found'
                assert corrected_edge is not None, (
                    'corrected_mean_edge is NULL — consensus_win_prob column may be null'
                )
                print(f'current h2h mean edge (NGBoost alone):    {current_edge:.4f}')
                print(f'corrected h2h mean edge (consensus_win):  {corrected_edge:.4f}')
                print(f'corrected pct positive edge:              {pct_positive:.1%}')

      - id: update-selection-log
        kind: Task
        description: >
          Append a dated entry to betting_ml/evaluation/selection_log.md documenting
          the consensus_win_prob change and the before/after h2h edge comparison.

          ENTRY FORMAT:

          ## consensus_win_prob fix — {today} (Card 6.H)

          **Change:** Replaced NGBoost-alone model_prob with 50/50 blend of
          NGBoost run_differential win probability and XGBoost isotonic classifier
          for h2h edge calculation in predict_today.py.

          **Before (NGBoost alone, {N} has_odds rows, 2026-03-27 to {last_date}):**
          - Mean h2h edge: {current_mean_edge:.4f}
          - % positive edge: {current_pct_positive:.1%}

          **After (consensus_win_prob, same {N} rows retroactively):**
          - Mean h2h edge: {corrected_mean_edge:.4f}
          - % positive edge: {corrected_pct_positive:.1%}

          **Interpretation:** Edge improved by ~{delta:.3f} but remains negative
          (−0.017). The model is not beating the market. Phase 7 must address
          fundamental feature/architecture gaps — periodic retraining of the current
          model is not a useful investment until calibration improves.

          Note: The Streamlit app reads h2h_edge from daily_model_predictions and
          does not recompute inline, so no Streamlit code change was required.

          Populate the numeric values from the actual query results in the
          consensus-win-prob-fix task.
        dependsOn:
          - consensus-win-prob-fix
        acceptanceCriteria:
          - type: command_succeeds
            name: selection_log.md contains a Card 6.H entry
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/selection_log.md').read()
                assert 'Card 6.H' in content or 'consensus_win_prob fix' in content, (
                    'Card 6.H entry not found in selection_log.md'
                )
                print('Card 6.H selection_log entry found')
          - type: command_succeeds
            name: Entry contains numeric before/after mean edge values
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import re
                content = open('betting_ml/evaluation/selection_log.md').read()
                matches = re.findall(r'[-+]?\d+\.\d{3,4}', content)
                assert len(matches) >= 2, (
                    f'Expected at least 2 numeric edge values in selection_log.md, '
                    f'found {len(matches)}: {matches}'
                )
                print(f'Numeric edge values found: {matches[:4]}')

      - id: gap-audit-and-phase7-roadmap
        kind: Task
        description: >
          Create betting_ml/evaluation/postmortem_v0.md containing the full
          structured post-mortem. Use the 2026 data (1,098 rows, 1,023 has_odds,
          36 dates through 2026-05-01) and the corrected h2h edge distribution
          from consensus-win-prob-fix as the evidence base.

          FILE: betting_ml/evaluation/postmortem_v0.md

          DOCUMENT STRUCTURE:

          # v0 Model System Post-Mortem

          ## Overview
          One paragraph: what the v0 system covers (Phases 1–6 through Card 6.G),
          the evidence base (1,098 scored game rows, 1,023 has_odds, 36 dates from
          2026-03-27 through 2026-05-01), and the central finding: the model is not
          beating the market (mean h2h edge ~−0.017 after the consensus fix, ~35%
          positive). The purpose of this document is to identify the highest-impact
          architectural and feature improvements before Phase 7 investment begins.
          Periodic retraining of the current model is not on the roadmap — model
          quality must improve first.

          ## Known Gaps — Analysis

          For each gap, use this sub-structure:
            ### Gap N — {title}
            **What:** One sentence stating the observed problem.
            **Evidence:** Quantified with actual numbers from daily_model_predictions
              or alpha_tuning_results where available; note data limitations.
            **Root cause (confirmed/revised):** Whether the root-cause candidates
              from project_context.md hold up against the data. Mark each candidate
              as "confirmed", "likely", "inconclusive", or "ruled out".
            **Phase 7 priority:** P1 / P2 / P3
            **Recommended action:** One to three sentences on the highest-expected-lift
              next step.

          GAP CONTENT REQUIREMENTS:

          Gap 1 — Model does not improve on market calibration (best_alpha = 0.0)
            Evidence must state the current alpha_tuning_results status: as of
            2026-05-01, the table has only 1 row (alpha=0.0, log_loss=NULL) because
            the Card 6.F full-grid re-run is pending. best_alpha cannot be validated
            against corrected odds data. Note: even if best_alpha remains 0.0 after
            the re-run, this may mean the model needs better probability calibration
            (ECE) rather than a different Bayesian blend weight. Priority: P1.

          Gap 2 — Systematic home-team underestimation in h2h edge
            Evidence must use the before/after values from the consensus_win_prob
            fix (from update-selection-log): current ≈ −0.036 (NGBoost alone),
            corrected ≈ −0.017 (consensus blend), ~35% positive. The fix halves the
            negative bias but edge is still significantly negative — the model
            systematically underpredicts home win probability relative to the market.
            Priority: P1 (edge still clearly negative, ~35% positive after fix).

          Gap 3 — Total runs MAE barely improves over naive baseline
            Evidence: current CV MAE from model_registry.yaml vs. naive global mean
            baseline. Quantify the expected lift from weather features using the
            Card 3.9 / Card 4.12 EDA findings (park factor r=0.122, elevation
            r=0.111, away pitching asymmetry). Priority: P1 (weather) / P2 (umpires).

          Gap 4 — alpha_tuning_results table incomplete (1 row vs. 11 needed)
            Evidence: as of 2026-05-01, table has 1 row (alpha=0.0, log_loss=NULL).
            Card 6.F fix is not yet complete. Priority: P1 (blocking calibration
            validation).

          Gap 5 — best_alpha.json local fallback not written
            Evidence: tied to Gap 4 / Card 6.F fix status. Priority: P1 if not
            resolved; link to Gap 4.

          Gap 6 — Intraday feature assembly fallback not fully reliable
            Evidence: describe the window during which predict_today.py returns
            "No games found." Note: with GHA `daily_ingestion.yml` now triggering
            dbt immediately after ingestion (via workflow_call), the dbt build
            completes ~08:30–09:00 ET — narrowing but not eliminating the gap.
            Priority: P2.

          Gap 7 — Feature set excludes highest-signal missing inputs
            Evidence: reproduce the Card 3.9 / Card 4.12 correlation table for
            weather, umpires, and injury status. Estimate expected MAE improvement
            for each (weather: ~0.2–0.3 runs; umpires: ~0.1 runs; injury status:
            market-facing, hard to quantify). Priority: weather=P1, umpires=P2,
            injury=P2.

          ## Phase 7 Roadmap

          A prioritized list of improvement initiatives. Format:

          ### P1 — {initiative title}
          **Why P1:** One paragraph justifying the ranking in terms of expected
          lift on the primary output metric (h2h edge distribution or totals MAE)
          and implementation complexity. Only write this paragraph for the top
          three P1 items.

          REQUIRED P1 ITEMS (minimum; add others if gap analysis surfaces new P1s):
          - Re-run probability layer (full 11-row α grid) with corrected odds data
            to validate best_alpha — blocking calibration validation (Gaps 1, 4, 5)
          - Feature additions: weather (temperature, wind, humidity) for outdoor parks
            — highest-signal missing feature based on EDA (park r=0.122, Wrigley swing)
          - Home-team probability calibration — model systematically underpredicts
            home win probability; investigate classifier calibration curve and
            consider Platt re-scaling or isotonic recalibration with 2026 season data

          REQUIRED P2 ITEMS (minimum):
          - Intraday feature fallback (load_todays_features_via_statsapi)
          - Umpire tendency features
          - Injury status features (sourced from MLB Stats API or external feed)

          REQUIRED P3 ITEMS (minimum):
          - Production web app to replace Streamlit MVP (Phase 7 app card)
          - Model retraining — only after P1 calibration and feature work is complete
            and edge distribution shows meaningful improvement; retraining the current
            architecture on more data without fixing the feature/calibration gaps is
            not expected to produce market-beating predictions

          Close with a one-sentence summary: the single most impactful Phase 7
          investment based on this analysis.
        dependsOn:
          - consensus-win-prob-fix
          - card-6f-alpha-fix-complete
        acceptanceCriteria:
          - type: artifact_exists
            name: Post-mortem document
            path: betting_ml/evaluation/postmortem_v0.md
          - type: command_succeeds
            name: All seven gaps present in document
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                for i in range(1, 8):
                    assert f'Gap {i}' in content, (
                        f'Gap {i} not found in postmortem_v0.md — '
                        f'all 7 gaps must be analyzed'
                    )
                print('All 7 gaps present')
          - type: command_succeeds
            name: Phase 7 Roadmap section present
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                assert 'Phase 7 Roadmap' in content, (
                    '"Phase 7 Roadmap" section not found in postmortem_v0.md'
                )
                print('Phase 7 Roadmap section found')
          - type: command_succeeds
            name: Each gap has a P1/P2/P3 priority label
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                import re
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                priority_labels = re.findall(r'\bP[123]\b', content)
                assert len(priority_labels) >= 7, (
                    f'Expected at least 7 priority labels (one per gap), '
                    f'found {len(priority_labels)}: {priority_labels}'
                )
                print(f'Priority labels found: {priority_labels}')
          - type: command_succeeds
            name: Gap 2 references corrected mean h2h edge from consensus_win_prob fix
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                assert 'consensus_win_prob' in content, (
                    'consensus_win_prob not referenced in postmortem — '
                    'Gap 2 must use the corrected edge values from the fix'
                )
                print('consensus_win_prob reference in postmortem OK')
          - type: command_succeeds
            name: Gap 1 references alpha_tuning_results pending state
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read().lower()
                has_alpha_ref = (
                    'alpha_tuning_results' in content or
                    '11 rows' in content or
                    'full alpha grid' in content or
                    'full α grid' in content
                )
                assert has_alpha_ref, (
                    'Gap 1 does not reference alpha_tuning_results status — '
                    'post-mortem must acknowledge the pending 11-row grid re-run'
                )
                print('alpha_tuning_results reference present in postmortem')
          - type: command_succeeds
            name: Weather features identified in Phase 7 Roadmap
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                roadmap_section = content[content.find('Phase 7 Roadmap'):]
                assert 'weather' in roadmap_section.lower(), (
                    'Weather features not mentioned in Phase 7 Roadmap section'
                )
                assert 'P1' in roadmap_section, (
                    'No P1 items in Phase 7 Roadmap section'
                )
                print('Weather features and P1 label present in Phase 7 Roadmap')
          - type: command_succeeds
            name: Roadmap correctly deprioritizes periodic model retraining
            command: uv
            args:
              - run
              - python
              - "-c"
              - |-
                content = open('betting_ml/evaluation/postmortem_v0.md').read()
                roadmap_section = content[content.find('Phase 7 Roadmap'):]
                # Retraining should appear in P3, not P1
                import re
                p1_block = re.search(r'P1.*?(?=P2|Phase 7|$)', roadmap_section, re.S)
                if p1_block:
                    p1_text = p1_block.group(0).lower()
                    assert 'retrain' not in p1_text, (
                        'Model retraining appears in P1 items — it should be P3 '
                        'until fundamental feature/calibration gaps are closed'
                    )
                print('Retraining correctly placed outside P1 items')
