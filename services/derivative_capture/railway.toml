# Railway config for the E2.0b derivative-odds live capture cron service.
#
# In the Railway service settings:
#   Settings -> Config-as-code (Railway Config File) -> services/derivative_capture/railway.toml
#   Root Directory: repo root (dockerfilePath and COPY paths are repo-root-relative)
#
# BEFORE DEPLOYING: run the probe to determine the correct cronSchedule:
#   uv run python scripts/derivative_odds_backfill.py probe
# The probe output will recommend a cronSchedule based on the observed last_update cadence
# and will confirm which markets to set in DERIVATIVE_CAPTURE_MARKETS.
#
# ALSO set DERIVATIVE_CAPTURE_MARKETS in the Railway service env after the probe:
#   - If F5 (h2h_h1/totals_h1) is offered:   team_totals,alternate_totals,h2h_h1,totals_h1
#   - If F5 is NOT offered:                   team_totals,alternate_totals

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/derivative_capture/Dockerfile"

[deploy]
# Cadence sized from E2.0b probe (2026-06-18): last_update ~every 30min on team_totals/alternate_totals.
# F5 (h2h_h1/totals_h1) NOT OFFERED by any bookmaker — DERIVATIVE_CAPTURE_MARKETS=team_totals,alternate_totals
cronSchedule = "*/30 * * * *"
restartPolicyType = "NEVER"
