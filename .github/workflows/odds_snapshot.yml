name: Odds Snapshot

# CLV ARCHITECTURE — odds capture timeline (all UTC, EDT = UTC-4):
#
# Step 1 — Opening snapshot (08:00 EDT = 12:00 UTC):
#   Captured by daily_ingestion.yml (morning prediction run). This is the
#   "opening market" baseline used to compute CLV in mart_closing_line_value.
#
# Step 2 — Hourly line-movement path (10:00–19:00 EDT = 14:00–23:00 UTC):
#   Captures market drift through the day. Feeds mart_odds_line_movement and
#   provides the post-lineup snapshot needed after confirmed lineups trigger
#   a second predictions run in lineup_monitor.yml.
#
# Step 3 — Near-close snapshots (~5 min before typical first pitches):
#   23:00 UTC = 19:00 EDT — 5 min before 7:05 PM ET starts (most common)
#   23:55 UTC = 19:55 EDT — 5 min before 8:00 PM ET (Saturday primetime)
#   00:05 UTC = 20:05 EDT — closing line for 8:10 PM ET late starts
#   01:30 UTC = 21:30 EDT — closing line for early west coast (9:05 PM ET)
#   02:00 UTC = 22:00 EDT — closing line for late west coast (10:05 PM ET)
#   03:00 UTC = 23:00 EDT — safety net for extra-late starts and late innings
#
# This schedule gives ~15 snapshots per game day, sufficient for:
#   - Hourly line-movement path tracking (Step 3 of CLV architecture)
#   - True closing lines for standard, primetime, and west-coast start times
#   - Post-lineup feature rebuild + second predictions pass (lineup_monitor.yml)

on:
  schedule:
    # ── Hourly morning / midday coverage (10:00–17:00 EDT) ───────────────────
    - cron: '0 14 * * *'   # 10:00 EDT
    - cron: '0 15 * * *'   # 11:00 EDT
    - cron: '0 16 * * *'   # 12:00 EDT (noon)
    - cron: '0 17 * * *'   # 13:00 EDT — also ~5 min before 1:05 PM afternoon starts
    - cron: '0 18 * * *'   # 14:00 EDT
    - cron: '30 18 * * *'  # 14:30 EDT — T-1h pre-afternoon
    - cron: '0 19 * * *'   # 15:00 EDT
    - cron: '0 20 * * *'   # 16:00 EDT
    - cron: '0 21 * * *'   # 17:00 EDT
    # ── Pre-evening coverage (18:00–19:00 EDT) ───────────────────────────────
    - cron: '0 22 * * *'   # 18:00 EDT — pre-evening games
    - cron: '0 23 * * *'   # 19:00 EDT — ~5 min before 7:05 PM ET starts
    - cron: '30 23 * * *'  # 19:30 EDT — T-30min for typical 8:00 PM ET starts
    # ── Near-close snapshots (closing line for each start-time band) ─────────
    - cron: '55 23 * * *'  # 19:55 EDT — closing line for 8:00 PM ET primetime
    - cron: '5 0 * * *'    # 20:05 EDT — closing line for 8:10 PM ET late starts
    - cron: '30 1 * * *'   # 21:30 EDT — closing line for 9:05 PM ET (west coast early)
    - cron: '0 2 * * *'    # 22:00 EDT — closing line for 10:05 PM ET (west coast late)
    - cron: '0 3 * * *'    # 23:00 EDT — safety net: extra-late starts, extra innings
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sudo sh -s -- --to /usr/local/bin
          sudo ln -sf /usr/local/bin/dbt /usr/local/bin/dbtf

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Check for games scheduled today
        id: games_check
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          uv run python - <<'EOF'
          import os, sys
          from datetime import date
          import snowflake.connector
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.serialization import (
              Encoding, NoEncryption, PrivateFormat, load_pem_private_key,
          )

          key_path = os.environ["SNOWFLAKE_PRIVATE_KEY_PATH"]
          with open(key_path, "rb") as f:
              pem = f.read()
          key = load_pem_private_key(pem, password=None, backend=default_backend())
          private_key_bytes = key.private_bytes(Encoding.DER, PrivateFormat.PKCS8, NoEncryption())

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
              role=os.environ.get("SNOWFLAKE_ROLE", ""),
              database="baseball_data",
              private_key=private_key_bytes,
          )
          cur = conn.cursor()
          cur.execute(
              "SELECT COUNT(*) FROM baseball_data.betting.stg_statsapi_games "
              "WHERE official_date = %s AND game_type = 'R'",
              [date.today().isoformat()],
          )
          count = cur.fetchone()[0]
          cur.close()
          conn.close()

          gho = os.environ.get("GITHUB_OUTPUT", "")
          result = f"has_games={'true' if count > 0 else 'false'}\n"
          if gho:
              with open(gho, "a") as out:
                  out.write(result)
          print(result.strip())
          EOF

      - name: Ingest Odds API events
        if: steps.games_check.outputs.has_games == 'true'
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: uv run odds_api_ingestion.py events

      - name: Ingest Odds API odds
        if: steps.games_check.outputs.has_games == 'true'
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: uv run odds_api_ingestion.py odds

      - name: Rebuild odds dbt models
        if: steps.games_check.outputs.has_games == 'true'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select +stg_oddsapi_events+ +stg_oddsapi_odds+ mart_closing_line_value mart_prediction_clv --project-dir dbt --profiles-dir dbt
