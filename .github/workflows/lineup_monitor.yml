name: Lineup Monitor

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sudo sh -s -- --to /usr/local/bin
          sudo ln -sf /usr/local/bin/dbt /usr/local/bin/dbtf

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Re-ingest schedule (current and prior month for retroactive lineups)
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          PRIOR_MONTH=$(python3 -c "
          from datetime import date
          d = date.today().replace(day=1)
          m = d.month - 1 or 12
          y = d.year if d.month > 1 else d.year - 1
          print(f'{y:04d}-{m:02d}-01')
          ")
          uv run ingest_statsapi.py schedule --start-date "$PRIOR_MONTH"

      - name: Rebuild staging lineup and probable pitcher models
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select stg_statsapi_lineups stg_statsapi_lineups_wide stg_statsapi_probable_pitchers --project-dir dbt --profiles-dir dbt

      - name: Check for newly confirmed lineups
        id: lineup_check
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: uv run lineup_monitor.py

      - name: Rebuild lineup-dependent feature models
        if: steps.lineup_check.outputs.has_new_games == 'true'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select +stg_statsapi_lineups+ --project-dir dbt --profiles-dir dbt

      # CLV architecture step 4: run predictions only for the games that just got
      # lineups confirmed. Passing --game-pks avoids re-scoring games that were
      # already predicted in the morning run.
      - name: Run predictions for newly-lined-up games
        if: steps.lineup_check.outputs.has_new_games == 'true'
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: uv run predict_today.py --game-pks "${{ steps.lineup_check.outputs.new_game_pks }}" --prediction-type post_lineup

      # Capture odds after lineup confirmation so the post-lineup snapshot reflects
      # the market's reaction to confirmed lineups. This becomes the "post-lineup"
      # market reference in mart_closing_line_value.
      - name: Capture odds snapshot after lineup confirmation
        if: steps.lineup_check.outputs.has_new_games == 'true'
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          uv run odds_api_ingestion.py events
          uv run odds_api_ingestion.py odds

      # Rebuild CLV mart to incorporate the new post-lineup odds snapshot
      - name: Rebuild CLV mart after post-lineup odds capture
        if: steps.lineup_check.outputs.has_new_games == 'true'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select mart_closing_line_value mart_prediction_clv --project-dir dbt --profiles-dir dbt
