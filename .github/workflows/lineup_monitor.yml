name: Lineup Monitor

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dbt-fusion
        run: curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sudo sh -s -- --to /usr/local/bin

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Re-ingest schedule (current and prior month for retroactive lineups)
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          PRIOR_MONTH=$(python3 -c "
          from datetime import date
          d = date.today().replace(day=1)
          m = d.month - 1 or 12
          y = d.year if d.month > 1 else d.year - 1
          print(f'{y:04d}-{m:02d}-01')
          ")
          uv run ingest_statsapi.py schedule --start-date "$PRIOR_MONTH"

      - name: Rebuild staging lineup models
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select stg_statsapi_lineups stg_statsapi_lineups_wide --project-dir dbt --profiles-dir dbt

      - name: Check for newly confirmed lineups
        id: lineup_check
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: uv run lineup_monitor.py

      - name: Rebuild lineup-dependent feature models
        if: steps.lineup_check.outputs.has_new_games == 'true'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select +stg_statsapi_lineups+ --project-dir dbt --profiles-dir dbt
