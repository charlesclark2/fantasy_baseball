name: Staging dbt Build (Lineup-Triggered)

on:
  workflow_dispatch:
    inputs:
      game_pk:
        description: game_pk that triggered the lineup confirmation
        required: true
        type: string
      triggered_by:
        description: caller identifier (e.g. lineup_monitor)
        required: false
        type: string
        default: manual

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    env:
      DBT_FUSION_VERSION: "2026-05"  # bump to force cache invalidation and pull latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache dbt-fusion
        id: cache-dbtf
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/dbtf
          key: dbtf-${{ env.DBT_FUSION_VERSION }}-${{ runner.os }}

      - name: Install dbt-fusion
        run: |
          mkdir -p ~/.local/bin
          if [ ! -f ~/.local/bin/dbtf ]; then
            curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          fi

      - name: Add dbt-fusion to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Run dbtf build for lineup-dependent models
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf build --select +stg_statsapi_lineups+ --project-dir dbt --profiles-dir dbt
