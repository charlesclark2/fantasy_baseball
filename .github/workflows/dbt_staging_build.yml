name: Staging dbt Build (Lineup-Triggered)

on:
  workflow_dispatch:
    inputs:
      game_pk:
        description: game_pk that triggered the lineup confirmation
        required: true
        type: string
      triggered_by:
        description: caller identifier (e.g. lineup_monitor)
        required: false
        type: string
        default: manual

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sudo sh -s -- --to /usr/local/bin
          sudo ln -sf /usr/local/bin/dbt /usr/local/bin/dbtf

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Run dbtf run for lineup-dependent models
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf run --select +stg_statsapi_lineups+ --project-dir dbt --profiles-dir dbt
