name: Deploy dbt-runner

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - 'services/dbt_runner/**'

jobs:
  deploy:
    name: Build & deploy dbt-runner to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy dbt-runner
        working-directory: services/dbt_runner
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service dbt-runner \
            --project faa64ea4-7d9e-4d7f-97e3-db5e3de746b3 \
            --environment production \
            --detach
