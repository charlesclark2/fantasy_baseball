name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev-packages || uv sync

      - name: Run unit tests
        run: uv run pytest -v --tb=short

      - name: predict_today.py syntax check
        run: uv run python -m py_compile scripts/predict_today.py

      - name: Block MERGE patterns in ingest scripts
        run: |
          if grep -rE "MERGE[[:space:]]+INTO|WHEN[[:space:]]+MATCHED" scripts/ingest_*.py; then
            echo "ERROR: MERGE/WHEN MATCHED pattern found in scripts/ingest_*.py"
            echo "All ingestion must be append-only INSERT. See Epic T conventions."
            exit 1
          fi
          echo "OK — no MERGE patterns found in ingest scripts"

  model-smoke-test:
    name: Model Artifact Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev-packages || uv sync

      - name: Smoke test home_win model
        run: |
          uv run python -c "
          import numpy as np
          from betting_ml.utils.model_io import load_model
          m = load_model('home_win')
          p = m.predict_proba(np.zeros((1, m.n_features_in_)))[0, 1]
          assert 0.0 < p < 1.0, f'Bad probability: {p}'
          print(f'OK — p={p:.4f}, n_features={m.n_features_in_}')
          "

  dbt-compile:
    name: dbt Compilation Check
    runs-on: ubuntu-latest
    env:
      DBT_FUSION_VERSION: latest
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache dbt-fusion binary
        id: cache-dbtf
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/dbt
          key: dbtf-${{ runner.os }}-${{ env.DBT_FUSION_VERSION }}

      - name: Install dbt-fusion
        if: steps.cache-dbtf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --to ~/.local/bin

      - name: Create dbtf symlink
        run: ln -sf ~/.local/bin/dbt ~/.local/bin/dbtf

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Compile dbt project
        run: dbtf compile --project-dir dbt --profiles-dir dbt

  dbt-build-ci:
    name: dbt Build (CI — state:modified+)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
    env:
      DBT_FUSION_VERSION: latest
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache dbt-fusion binary
        id: cache-dbtf
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/dbt
          key: dbtf-${{ runner.os }}-${{ env.DBT_FUSION_VERSION }}

      - name: Install dbt-fusion
        if: steps.cache-dbtf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --to ~/.local/bin

      - name: Create dbtf symlink
        run: ln -sf ~/.local/bin/dbt ~/.local/bin/dbtf

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Download dbt manifest (from latest prod build)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dbt/state
          run_id=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=dbt-manifest&per_page=5" \
            --jq '[.artifacts[] | select(.expired == false)] | .[0].workflow_run.id' \
            2>/dev/null) || run_id=""
          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            gh run download "$run_id" \
              --repo ${{ github.repository }} \
              --name dbt-manifest \
              --dir dbt/state \
            && echo "Manifest downloaded from run $run_id" \
            || echo "Manifest download failed — will fall back to full build"
          else
            echo "No dbt-manifest artifact found — will fall back to full build"
          fi

      - name: Build modified models in CI schemas
        run: |
          if [ -f dbt/state/manifest.json ]; then
            dbtf build \
              --target ci \
              --project-dir dbt \
              --profiles-dir dbt \
              --select state:modified+ \
              --state dbt/state
          else
            echo "No manifest artifact found — falling back to full build"
            dbtf build \
              --target ci \
              --project-dir dbt \
              --profiles-dir dbt
          fi

      - name: Tear down CI schemas
        if: always()
        run: |
          dbtf run-operation drop_ci_schemas \
            --target ci \
            --project-dir dbt \
            --profiles-dir dbt
