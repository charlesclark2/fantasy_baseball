name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # E11.13 — fast gate: every test EXCEPT the `slow` Monte-Carlo calibration guards,
  # run in parallel (-n auto). This is the per-push handoff gate; ~15s vs the old ~4.5min
  # serial run. Both this job AND `slow-tests` are required for merge (see branch protection).
  unit-tests:
    name: Unit Tests (fast gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev-packages || uv sync

      - name: Run unit tests (fast gate — excludes slow MC calibration tests)
        run: uv run pytest -m "not slow" -n auto --tb=short

      - name: predict_today.py syntax check
        run: uv run python -m py_compile scripts/predict_today.py

      - name: Block MERGE patterns in ingest scripts
        run: |
          if grep -rE "MERGE[[:space:]]+INTO|WHEN[[:space:]]+MATCHED" scripts/ingest_*.py; then
            echo "ERROR: MERGE/WHEN MATCHED pattern found in scripts/ingest_*.py"
            echo "All ingestion must be append-only INSERT. See Epic T conventions."
            exit 1
          fi
          echo "OK — no MERGE patterns found in ingest scripts"

  # E11.13 — slow gate: the heavy `slow`-marked Monte-Carlo PIT/coverage calibration guards.
  # Parallelised (-n auto) so the 3 ~75s totals tests overlap across workers (~96s vs ~250s
  # serial). Separate job so a slow-MC run never blocks the fast per-push gate, but it is
  # still REQUIRED for merge — these pin E2.3 totals + E5.2 strikeout calibration discipline.
  slow-tests:
    name: Unit Tests (slow — Monte-Carlo calibration)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev-packages || uv sync

      - name: Run slow tests (Monte-Carlo calibration guards)
        run: uv run pytest -m slow -n auto --tb=short

  model-smoke-test:
    name: Model Artifact Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev-packages || uv sync

      - name: Smoke test home_win model
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          uv run python -c "
          import numpy as np
          from betting_ml.utils.model_io import load_model
          m = load_model('home_win')
          p = m.predict_proba(np.zeros((1, m.n_features_in_)))[0, 1]
          assert 0.0 < p < 1.0, f'Bad probability: {p}'
          print(f'OK — p={p:.4f}, n_features={m.n_features_in_}')
          "



