name: dbt Build CI

on:
  push:
    branches: [main]
    paths:
      - 'dbt/models/**'
      - 'dbt/tests/**'
      - 'dbt/macros/**'
      - 'dbt/seeds/**'
      - 'dbt/snapshots/**'
      - 'dbt/dbt_project.yml'
      - 'dbt/profiles.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/models/**'
      - 'dbt/tests/**'
      - 'dbt/macros/**'
      - 'dbt/seeds/**'
      - 'dbt/snapshots/**'
      - 'dbt/dbt_project.yml'
      - 'dbt/profiles.yml'

jobs:
  dbt-compile:
    name: dbt Compilation Check
    runs-on: ubuntu-latest
    env:
      DBT_FUSION_VERSION: latest
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache dbt-fusion binary
        id: cache-dbtf
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/dbt
          key: dbtf-${{ runner.os }}-${{ env.DBT_FUSION_VERSION }}

      - name: Install dbt-fusion
        if: steps.cache-dbtf.outputs.cache-hit != 'true'
        env:
          SHELL: /bin/bash
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --to ~/.local/bin

      - name: Create dbtf symlink
        run: ln -sf ~/.local/bin/dbt ~/.local/bin/dbtf

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      # INC-19 type-contract guard — RED (pure stdlib, no deps) if an incremental
      # feature model's generated ::double TYPE-PIN block drifted from its manifest
      # (the recurring NUMBER<->FLOAT HALT class). Also in the Python fast gate via
      # betting_ml/tests/test_type_contract_guard.py; duplicated here so a dbt-models-only
      # PR (which the Python CI paths filter skips) is still gated before merge.
      - name: Type-contract guard (INC-19 — no NUMBER<->FLOAT drift)
        run: python3 scripts/gen_type_contract.py --check

      - name: Compile dbt project
        run: dbtf compile --project-dir dbt --profiles-dir dbt

      # Story I.5 Task 1 (2026-06-15) — publish the compiled manifest as the state
      # baseline the PR build job diffs against for `state:modified+ --defer`. The
      # prior producer (dbt_daily_build.yml) was decommissioned to manual-only in the
      # Dagster migration and its artifacts had 7-day retention, so by ~2026-06-08 the
      # baseline was always expired and CI silently full-built all 117 models on every
      # PR. Producing it here on every push to main (the moment the DAG actually
      # changes) + 90-day retention keeps a fresh baseline available. Main-only so a
      # PR's manifest never overwrites the baseline. Bootstraps on the next merge to
      # main after this lands.
      - name: Publish manifest baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: dbt/target/manifest.json
          retention-days: 90
          if-no-files-found: error

  dbt-build-ci:
    name: dbt Build (CI — state:modified+)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
    env:
      DBT_FUSION_VERSION: latest
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache dbt-fusion binary
        id: cache-dbtf
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/dbt
          key: dbtf-${{ runner.os }}-${{ env.DBT_FUSION_VERSION }}

      - name: Install dbt-fusion
        if: steps.cache-dbtf.outputs.cache-hit != 'true'
        env:
          SHELL: /bin/bash
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --to ~/.local/bin

      - name: Create dbtf symlink
        run: ln -sf ~/.local/bin/dbt ~/.local/bin/dbtf

      - name: Add ~/.local/bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Download dbt manifest (from latest prod build)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dbt/state
          run_id=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=dbt-manifest&per_page=5" \
            --jq '[.artifacts[] | select(.expired == false)] | .[0].workflow_run.id' \
            2>/dev/null) || run_id=""
          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            gh run download "$run_id" \
              --repo ${{ github.repository }} \
              --name dbt-manifest \
              --dir dbt/state \
            && echo "Manifest downloaded from run $run_id" \
            || echo "Manifest download failed — will fall back to full build"
          else
            echo "No dbt-manifest artifact found — will fall back to full build"
          fi

      - name: Pre-build teardown (ensure clean CI schemas)
        run: |
          dbtf run-operation drop_ci_schemas \
            --target ci \
            --project-dir dbt \
            --profiles-dir dbt

      - name: Build modified models in CI schemas
        run: |
          if [ -f dbt/state/manifest.json ]; then
            dbtf build \
              --target ci \
              --project-dir dbt \
              --profiles-dir dbt \
              --select state:modified+ \
              --state dbt/state \
              --defer
          else
            # Story I.5 Task 1 — surface the fallback LOUDLY (GitHub warning
            # annotation in the PR checks UI) instead of silently full-building all
            # ~117 models. A silent fallback hid a 6-week cost regression (the
            # decommissioned/expired manifest producer). Not a hard fail, so a
            # manifest-infra hiccup never blocks merges — but it's now visible.
            # Flip to `exit 1` if you'd rather hard-block once the producer is proven.
            echo "::warning title=CI manifest missing — full build::No dbt-manifest baseline found, so CI is FULL-BUILDING all models (expensive). Producer = 'Publish manifest baseline' on push to main (I.5 Task 1); it may not have run since this landed, or the 90d artifact expired. Merge to main to refresh the baseline."
            dbtf build \
              --target ci \
              --project-dir dbt \
              --profiles-dir dbt
          fi

      - name: Tear down CI schemas
        if: always()
        run: |
          dbtf run-operation drop_ci_schemas \
            --target ci \
            --project-dir dbt \
            --profiles-dir dbt
