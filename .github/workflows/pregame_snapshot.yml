name: Pre-Game Snapshot Monitor

# Runs every 30 minutes. For each MLB game starting in the next 5-40 minutes,
# checks whether a pre-game odds snapshot has already been captured (i.e. an
# ingestion_ts exists in [commence_time-40min, commence_time-5min]).
# If any such game is missing a snapshot, runs the full odds ingestion and
# rebuilds the CLV mart so the closing-line computation has the latest prices.

on:
  schedule:
    - cron: '0,30 * * * *'   # every 30 minutes at :00 and :30
  workflow_dispatch: {}

jobs:
  pregame:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sudo sh -s -- --to /usr/local/bin
          sudo ln -sf /usr/local/bin/dbt /usr/local/bin/dbtf

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 600 /tmp/snowflake_rsa_key.pem

      - name: Check for games needing pre-game snapshot
        id: pregame_check
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: uv run pregame_snapshot.py

      - name: Capture pre-game odds snapshot
        if: steps.pregame_check.outputs.needs_snapshot == 'true'
        working-directory: scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
        run: |
          uv run parlay_api_ingestion.py events
          uv run parlay_api_ingestion.py odds
          uv run parlay_api_ingestion.py line-movement

      - name: Rebuild CLV mart with pre-game snapshot
        if: steps.pregame_check.outputs.needs_snapshot == 'true'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_rsa_key.pem
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
        run: dbtf run --select mart_closing_line_value mart_prediction_clv --project-dir dbt --profiles-dir dbt
