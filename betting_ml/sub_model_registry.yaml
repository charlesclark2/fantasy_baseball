  cand_b_cv_nll: 1.8852          # Candidate B 5 recent folds — WINNER (Δ=−0.0088 vs A)
  cand_b_cv_calib_80: 0.9248
  tuned_cv_nll: 1.8852   # operative champion NLL (Candidate B)
  negbin_r: 1.4853   # Candidate B r (fitted on exposure-scaled mu; all-data)
  league_avg_bullpen_outs: 15.268   # Candidate B: mean(27 − starter_ip_p20) from full training set
  cand_a_cv_nll: 2.0504
  cand_c_glm_cv_nll: 1.9603
  candidate_architecture: B
  candidate_b_status: CHAMPION   # won 2026-06-01; NLL 1.8852 < Candidate A 1.8940
  promotion_gate:
    metric: negbin_nll
    direction: lower_is_better
    nll_b_vs_a: 1.8852 < 1.8940 (PASS; Δ=−0.0088 nats)
    calib_80_gate: 0.9248 >= 0.80 (PASS)
    case: 1  # new distributional model; lower NLL wins outright
  parent_features:
    - feature_pregame_bullpen_state_features
