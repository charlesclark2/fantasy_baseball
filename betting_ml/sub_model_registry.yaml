    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: 3.5104
  promotion_gate:
    metric: mae
    threshold: 3.4604    # set after baseline established in Story 3.2
    direction: lower_is_better
  parent_features:
    - feature_pregame_park_features
    - feature_pregame_weather_features
    - feature_pregame_umpire_features
  output_signals:
