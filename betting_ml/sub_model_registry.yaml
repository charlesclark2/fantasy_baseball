    See implementation_guide.md Story 2.8 for supervised target specification.

matchup_v1:
  artifact_path: models/sub_models/matchup_v1.pkl
  feature_columns_path: models/sub_models/matchup_v1_features.json
  target:
    source_table: baseball_data.betting.mart_batter_archetype_vs_pitcher_cluster
    primary_column: avg_woba    # population-level; individual batter-vs-starter too sparse
    auxiliary_columns:
      - avg_xwoba
      - avg_k_pct
      - avg_bb_pct
      - avg_hard_hit_pct
    grain: game_pk    # aggregated to game level via archetype composition
  training_window:
    start: '2020-01-01'    # batter_clusters and pitcher_clusters data begins 2020; no matchup signal pre-2020
    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: null
  promotion_gate:
    metric: mae
    threshold: null
    direction: lower_is_better
  parent_features:
    - feature_pregame_lineup_features    # bat-tracking cols (lineup_avg_bat_speed, lineup_bat_speed_std,
                                         # lineup_bat_speed_vs_starter_velo) added Story 2.9; NULL pre-2023-07-14
  output_signals:
    - matchup_advantage_signal
  downstream_consumers: []
  promotion_status: pending
  promoted_at: null
  notes: |
    Requires Epic 7 (archetype clustering revalidation) before training.
    See quant_sports_intel_models/baseball/archetype_definitions.md for cluster definitions,
    feature drivers, example players, and stability analysis (Story 2.9, 2026-05-19).
    Training filter: exclude (cluster_label, season) pairs where member_count < 50
    (see stability tables in archetype_definitions.md). Problem seasons: contact_spray
    absent 4/6 seasons; elite_breaking_ball 2021-2022 < 50; contact_sinker_ball 2024 = 6;
    multi_pitch_mix absent 2021/2023/2025; soft_command absent 2023/2025.
    Effective usable range: 2021-2025 with per-archetype season filters applied.
    Bat-tracking features (lineup_avg_bat_speed, lineup_bat_speed_std,
    lineup_bat_speed_vs_starter_velo) live in feature_pregame_lineup_features — not a
    separate model. Available 2023-07-14+; NULL for prior games — treated as
    signal_available=false, not imputed. Rookie batters in top-5 slots: bat-tracking NULL;
    use archetype mean. Rookie starters (<50 IP): fall back to ZiPS projections for
    pitch-mix opponent model.
    mart_batter_archetype_vs_pitcher_cluster confirmed as canonical training source (2026-05-12).
