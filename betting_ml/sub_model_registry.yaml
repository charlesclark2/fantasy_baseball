# =============================================================================
# Sub-Model Registry
# =============================================================================
# Each entry represents one (sub_model_name, version) combination.
# Naming convention: <domain>_v<N>  (e.g. run_env_v1, offense_v1)
#
# Schema reference:
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Field                  │ Type   │ Description                            │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ artifact_path          │ str    │ Path to serialized model (.pkl)         │
# │ feature_columns_path   │ str    │ Path to JSON list of input features     │
# │ target.source_table    │ str    │ Fully-qualified Snowflake table         │
# │ target.primary_column  │ str    │ Target column name                      │
# │ target.auxiliary_cols  │ list   │ Additional target columns (optional)    │
# │ target.grain           │ str    │ game_pk | game_pk_side | pitcher_id_pk  │
# │ training_window.start  │ date   │ Inclusive training start date           │
# │ training_window.end    │ date   │ Inclusive training end date             │
# │ cv_strategy            │ str    │ walk_forward | time_series_split        │
# │ cv_metric              │ str    │ mae | rmse | brier | log_loss           │
# │ cv_score               │ float  │ Best CV score achieved                  │
# │ promotion_gate         │ dict   │ metric, threshold, direction            │
# │ parent_features        │ list   │ Feature mart dbt model names consumed   │
# │ output_signals         │ list   │ signal_name values → mart_sub_model_signals │
# │ downstream_consumers   │ list   │ Layer 3 models that ingest these signals│
# │ promotion_status       │ str    │ pending | challenger | champion | deprecated │
# │ promoted_at            │ date   │ Date promoted to champion (null if not) │
# │ notes                  │ str    │ Training decisions, caveats, known gaps │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Promotion-status state machine:
#   pending → challenger  (artifact trained, not yet evaluated)
#   challenger → champion (promotion gate passed; only one champion per domain)
#   champion → deprecated (superseded by a newer version; never deleted)
#   pending → deprecated  (decided not to build; document reason in notes)
#
# Only one entry per domain may be champion at a time. When a new champion
# is promoted, the prior champion is marked deprecated immediately.
# =============================================================================

run_env_v1:
  artifact_path: models/sub_models/run_env_v1.pkl
  feature_columns_path: models/sub_models/run_env_v1_features.json
  target:
    source_table: baseball_data.betting.mart_game_results
    primary_column: home_final_score + away_final_score    # no total_runs col; computed inline
    auxiliary_columns: []
    grain: game_pk
  training_window:
    start: '2021-01-01'    # earliest year with full weather coverage (100% from 2021; 0% pre-2021)
    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: null
  promotion_gate:
    metric: mae
    threshold: null    # set after baseline established in Story 3.2
    direction: lower_is_better
  parent_features:
    - feature_pregame_park_features
    - feature_pregame_weather_features
    - feature_pregame_umpire_features
  output_signals:
    - run_env_signal
    - environment_volatility
  downstream_consumers: []
  promotion_status: pending
  promoted_at: null
  notes: |
    Training window: 2021-01-01 onward (Story 2.5 weather coverage audit, 2026-05-18).
    Weather coverage by season (forecast_pregame, regular season games):
      2021: 94.8% | 2022: 96.6% | 2023: 96.5% | 2024: 96.4% | 2025: 96.5%
    Miss (~3-5%) is dome games (roof_type=Dome, correctly NULL) + retractable-roof-closed
    games. Outdoor coverage is effectively 100%. Pre-2021 weather: 0 rows — no backfill
    feasible. 2020 (COVID shortened season, 898 games) naturally excluded.
    Weather feature uses forecast_pregame observation type (canonical pre-game feature).
    forecast_intraday and observed_at_first_pitch available in weather_raw but deferred
    to a future feature enhancement — not included in v1 training features.
    Umpire join: 100% for 2021-2022; 96-100% for 2023-2025 (known permanent gap on
    special event dates — Jackie Robinson Day, Flag Day, Field of Dreams games).
    No market features. Opponent offensive/starter quality used as controls only.
    total_runs column does not exist in mart_game_results; compute inline as
    home_final_score + away_final_score. Filter game_type = 'R' (regular season only).

offense_v1:
  artifact_path: models/sub_models/offense_v1.pkl
  feature_columns_path: models/sub_models/offense_v1_features.json
  target:
    source_table: baseball_data.betting.mart_game_results
    primary_column: home_score    # one model per side; away uses away_score
    auxiliary_columns: []
    grain: game_pk_side
  training_window:
    start: '2016-01-01'
    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: null
  promotion_gate:
    metric: mae
    threshold: null
    direction: lower_is_better
  parent_features:
    - feature_pregame_lineup_features
  output_signals:
    - lineup_run_creation_signal
  downstream_consumers: []
  promotion_status: pending
  promoted_at: null
  notes: |
    ZiPS hitting projections (stg_fangraphs__zips_hitting) wired in via Story 2.6.
    proj_xfip excluded — 100% NULL across all seasons (confirmed 2026-05-12).
    Use proj_fip, proj_era, proj_k_pct, proj_bb_pct for pitcher opponent controls.
    Rookie batters (<200 career PA): regress to league-mean via Bayesian shrinkage
    (k=200). ZiPS projections fill most call-up gaps even without MLB rolling history.
    See implementation_guide.md Story 2.6 for rookie cold-start policy.

starter_v1:
  artifact_path: models/sub_models/starter_v1.pkl
  feature_columns_path: models/sub_models/starter_v1_features.json
  target:
    source_table: baseball_data.betting.mart_starting_pitcher_game_log
    primary_column: xwoba_against
    auxiliary_columns:
      - k_per_bf     # strikeouts / batters_faced (compute inline)
      - bb_per_bf    # walks / batters_faced (compute inline)
      - ip           # outs_recorded / 3 (compute inline)
    grain: pitcher_id_game_pk
  training_window:
    start: '2016-01-01'
    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: null
  promotion_gate:
    metric: mae
    threshold: null
    direction: lower_is_better
  parent_features:
    - feature_pregame_starter_features
  output_signals:
    - starter_suppression_signal
  downstream_consumers: []
  promotion_status: pending
  promoted_at: null
  notes: |
    Target mart already complete: mart_starting_pitcher_game_log has xwoba_against
    for 50,292/50,293 rows back to 2015-04-05 (confirmed 2026-05-12). No new mart needed.
    LEAKAGE GUARD: training queries must use game_date < model_run_date strictly.
    proj_xfip EXCLUDED (100% NULL). Use proj_fip, proj_era, proj_k_pct, proj_bb_pct.
    Rookie starters (<50 MLB career IP): fall back to ZiPS projections; no rolling Statcast.

