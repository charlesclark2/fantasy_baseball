# =============================================================================
# Sub-Model Registry
# =============================================================================
# Each entry represents one (sub_model_name, version) combination.
# Naming convention: <domain>_v<N>  (e.g. run_env_v1, offense_v1)
#
# Schema reference:
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Field                  │ Type   │ Description                            │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ artifact_path          │ str    │ Path to serialized model (.pkl)         │
# │ feature_columns_path   │ str    │ Path to JSON list of input features     │
# │ target.source_table    │ str    │ Fully-qualified Snowflake table         │
# │ target.primary_column  │ str    │ Target column name                      │
# │ target.auxiliary_cols  │ list   │ Additional target columns (optional)    │
# │ target.grain           │ str    │ game_pk | game_pk_side | pitcher_id_pk  │
# │ training_window.start  │ date   │ Inclusive training start date           │
# │ training_window.end    │ date   │ Inclusive training end date             │
# │ cv_strategy            │ str    │ walk_forward | time_series_split        │
# │ cv_metric              │ str    │ mae | rmse | brier | log_loss           │
# │ cv_score               │ float  │ Best CV score achieved                  │
# │ promotion_gate         │ dict   │ metric, threshold, direction            │
# │ parent_features        │ list   │ Feature mart dbt model names consumed   │
# │ output_signals         │ list   │ signal_name values → mart_sub_model_signals │
# │ downstream_consumers   │ list   │ Layer 3 models that ingest these signals│
# │ promotion_status       │ str    │ pending | challenger | champion | deprecated │
# │ promoted_at            │ date   │ Date promoted to champion (null if not) │
# │ notes                  │ str    │ Training decisions, caveats, known gaps │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Promotion-status state machine:
#   pending → challenger  (artifact trained, not yet evaluated)
#   challenger → champion (promotion gate passed; only one champion per domain)
#   champion → deprecated (superseded by a newer version; never deleted)
#   pending → deprecated  (decided not to build; document reason in notes)
#
# Only one entry per domain may be champion at a time. When a new champion
# is promoted, the prior champion is marked deprecated immediately.
# =============================================================================

# =============================================================================
# Bet Permission Gate — Story 19.1 (2026-05-29)
# =============================================================================
# Controls which games qualify as "approved bets" based on multi-signal alignment.
# A game qualifies when gate_signals_met >= min_criteria_met.
#
# Architectural rationale (Penumbra ETF study, 2026-01-14):
#   Forecast magnitude does not reliably map to returns. Signal value is
#   concentrated on rare days where multiple independent signals align.
#   The gate separates the decision to bet (Epic 19) from how much to bet
#   (Kelly sizing). Most games, most days, do nothing.
#
# Criteria rollout status:
#   offensive_signal_qualifies — ENABLED (Epic 4A shipped)
#   run_env_supports           — disabled until Epic 9 wires run_env_v4 into inference
#   uncertainty_below_threshold — disabled until Epic 9.F1 (game_uncertainty_score)
#   market_disagreement_visible — disabled until Epic 12 CLV/market layer
#   prior_fresh                — disabled until EB prior tracking ships (post-10M)
# =============================================================================

bet_gate:
  min_criteria_met: 3
  rationale: |
    N=3 of M=5 initial setting provides meaningful signal concentration filtering while
    remaining achievable as additional sub-model signals come online. Tune after 19.3
    backtest confirms CLV lift ≥ 0.3% for qualified vs. non-qualified bets.
  criteria:
    offensive_signal_qualifies:
      threshold: 0.5       # run disagreement vs. market line (model pred_total_runs − total_line_consensus)
      enabled: true
      depends_on_epic: "4A"
      description: "EB-stabilized offensive quality signal implies run total ≥ 0.5 run disagreement with market line"
    run_env_supports:
      threshold: null      # directional check only; no numeric threshold
      enabled: false
      depends_on_epic: "9"
      description: "Run environment signal (run_env_v4) directionally supports the offensive call"
    uncertainty_below_threshold:
      threshold: null      # defined in Epic 9.F1 (game_uncertainty_score)
      enabled: false
      depends_on_epic: "9.F1"
      description: "game_uncertainty_score below threshold — excludes debut starters, opening-week games, stale posteriors"
    market_disagreement_visible:
      threshold: null      # sharp-money alignment sourced from mart_game_odds_bridge
      enabled: false
      depends_on_epic: "12"
      description: "Bookmaker line spread or public betting skew indicates sharp money on the same side"
    prior_fresh:
      threshold: 7         # prior_age_days for key players in the game
      enabled: false
      depends_on_epic: "I"
      description: "prior_age_days ≤ 7 for key players — beliefs are fresh, not stale IL-return guesses"

run_env_v1:
  artifact_path: s3://baseball-betting-ml-artifacts/sub_models/run_env_v1.pkl
  feature_columns_path: models/sub_models/run_env_v1_features.json
  target:
    source_table: baseball_data.betting.mart_game_results
    primary_column: home_final_score + away_final_score    # no total_runs col; computed inline
    auxiliary_columns: []
    grain: game_pk
  training_window:
    start: '2021-01-01'    # earliest year with full weather coverage (100% from 2021; 0% pre-2021)
    end: null
  cv_strategy: walk_forward
  cv_metric: mae
  cv_score: 3.5104
  promotion_gate:
    metric: mae
    threshold: 3.4604    # set after baseline established in Story 3.2
    direction: lower_is_better
  parent_features:
    - feature_pregame_park_features
    - feature_pregame_weather_features
    - feature_pregame_umpire_features
  output_signals:
    - run_env_signal
    - environment_volatility
  downstream_consumers: []
  promotion_status: deprecated
  promoted_at: null
  notes: |
    Training window: 2021-01-01 onward (Story 2.5 weather coverage audit, 2026-05-18).
    Weather coverage by season (forecast_pregame, regular season games):
      2021: 94.8% | 2022: 96.6% | 2023: 96.5% | 2024: 96.4% | 2025: 96.5%
    Miss (~3-5%) is dome games (roof_type=Dome, correctly NULL) + retractable-roof-closed
    games. Outdoor coverage is effectively 100%. Pre-2021 weather: 0 rows — no backfill
    feasible. 2020 (COVID shortened season, 898 games) naturally excluded.
    Weather feature uses forecast_pregame observation type (canonical pre-game feature).
    forecast_intraday and observed_at_first_pitch available in weather_raw but deferred
    to a future feature enhancement — not included in v1 training features.
    Umpire join: 100% for 2021-2022; 96-100% for 2023-2025 (known permanent gap on
    special event dates — Jackie Robinson Day, Flag Day, Field of Dreams games).
    No market features. Opponent offensive/starter quality used as controls only.
    total_runs column does not exist in mart_game_results; compute inline as
    home_final_score + away_final_score. Filter game_type = 'R' (regular season only).

offense_v1:
  artifact_path: s3://baseball-betting-ml-artifacts/sub_models/offense_v1.pkl
  feature_columns_path: models/sub_models/offense_v1/feature_columns.json
  mlflow_run_id: null  # set on next retrain (MLflow instrumentation added 2026-05-28)
  target:
    source_table: baseball_data.betting.mart_game_results
    primary_column: runs_scored   # one row per game-side (home or away)
    auxiliary_columns: []
    grain: game_pk_side
  training_window:
    start: '2015-01-01'
    end: null
  cv_strategy: walk_forward_season
  cv_folds: 8   # eval years 2018-2025; fold 9 (2026 partial) excluded from CV
  cv_metric: mae
  cv_score: 2.4504
  promotion_gate:
    metric: mae
    threshold: null   # new model; no prior baseline
    direction: lower_is_better
  parent_features:
    - feature_pregame_lineup_features
  output_signals:
    - pred_runs_raw
    - runs_index
  downstream_consumers: []
  promotion_status: deprecated
  promoted_at: '2026-05-28'
  notes: |
    Story 4.2 (2026-05-28). Training window 2015+; target = runs_scored (one row per game-side).
    Features: Groups A-G (55 numeric + one-hot starter_pitch_archetype = 60 total).
    Group A (EB rates) fully populated 2015+; backfilled via mart_batter_rolling_stats fallback for 2015-2019.
    Group C bat-tracking ~50% null (data available from ~2023-07-14).
    Architecture: LightGBM; Optuna 50 trials; best_iter=54.
    CV: walk-forward, folds 1-8 (eval years 2018-2025); fold 9 (2026 partial) excluded.
    Champion selection (Case 1 — new model): Ridge MAE 2.4923 vs LightGBM 2.4504; delta +0.0419; LGBM wins 7/8 folds; Wilcoxon p=0.0156. Winner: LGBM.
    LightGBM mean CV bias: -0.530 runs/game-side (systematic under-prediction; apply scalar bias correction in generate_offense_signals.py).
    eb_uncertainty_rank: avg_eb_woba_uncertainty rank 13 / 60.
    Story 4.4 ablation (2026-05-28): total_runs delta=-0.0084, run_diff delta=-0.0097 (Ridge, 3 folds 2024-2026, 564 baseline features). April delta: total_runs -0.0213, run_diff -0.0078. Gate clear (<+0.05). Near-zero delta expected; true integration at Epic 9 Layer 3.
    Ablation artifact: models/sub_models/offense_v1/ablation_game_signals_20260528T225937Z.json

