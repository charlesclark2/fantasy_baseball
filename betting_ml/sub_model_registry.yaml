  promoted_at: null
  notes: |
    Training window: 2021-01-01 onward (Story 2.5 weather coverage audit, 2026-05-18).
    Weather coverage by season (forecast_pregame, regular season games):
      2021: 94.8% | 2022: 96.6% | 2023: 96.5% | 2024: 96.4% | 2025: 96.5%
    Miss (~3-5%) is dome games (roof_type=Dome, correctly NULL) + retractable-roof-closed
