  training_window:
    start: null
    end: null
  cv_strategy: null    # rules-based; no CV
  cv_metric: null
  cv_score: null
  promotion_gate:
    metric: null
    threshold: null
    direction: null
  parent_features:
    - feature_pregame_bullpen_state_features
  output_signals:
    - bullpen_state_signal
  downstream_consumers: []
