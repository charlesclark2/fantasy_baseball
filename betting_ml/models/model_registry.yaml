      \ a TRUSTED manual-bet signal \u2014 still placed by hand. KILL \u2192 stop\
      \ surfacing as actionable."
    confirm_gate:
      n_settled: 60
      real_book_roi_lower_ci_95_gt: 0
      model_brier_lt_market_brier: true
      notes: 95% lower-CI ROI uses actual Bovada American odds (layer4_h2h_bovada_ml_home/away),
