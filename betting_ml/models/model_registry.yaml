  backfill_date: '2026-06-01'
  calibrator_last_fit_date: '2026-05-08'
  cv_brier: 0.1978
  deployed_date: '2026-06-02'
  promoted_at: '2026-06-04'
  bet_posture: evaluation-pending
  automated_bets: false
  kill_criterion:
    story: 28.3
    attribution_start: '2026-06-04'
    monitor_script: scripts/ops/monitor_magnitude_h2h.py
    confirm_gate:
      n_settled: 150
      real_book_roi_lower_ci_95_gt: 0
      model_brier_lt_market_brier: true
      notes: |
        95% lower-CI ROI uses actual Bovada American moneyline odds
        (layer4_h2h_bovada_ml_home / layer4_h2h_bovada_ml_away), not de-vigged probs.
        Both conditions must pass simultaneously. automated_bets stays false until
        this gate fires.
    kill_gates:
      - trigger: n_at_full_gate
        condition: n=150 AND 95%-lower-CI real-book ROI <= 0
        action: kill_magnitude_strategy
      - trigger: early_tripwire
        condition: "at n=50, real-book win rate < avg break-even implied by actual Bovada odds"
        action: kill_magnitude_strategy
    until_confirm: automated_bets=false; magnitude is manual-review/informational only
    model_version_policy: |
      The kill criterion tracks the champion model active at attribution_start (currently
      v4 — XGBoost sequential-enriched + Platt calibrator). If a new champion is promoted
      mid-season (e.g., Epic 17 PyMC NegBin), RESET attribution_start to the promotion
      date and restart the n=150 count from zero against the new model. Do NOT mix bets
      scored under different champion versions in the same kill window — pre/post-replacement
      bets would conflate two distinct models and corrupt the CONFIRM/KILL signal.
      Procedure on promotion: update attribution_start here, update ATTRIBUTION_START in
      scripts/ops/monitor_magnitude_h2h.py, and note the prior window outcome (accrual
      count + direction at time of reset) in the notes field above.
  ece_raw: 0.0430
  eval_year: 2026
  feature_columns_path: betting_ml/models/home_win/feature_columns_xgb_classifier_tuned_2026.json
  features: 377
  mlflow_run_id: 523298ed749543bbabd339aa1e57cf68  # instrumented re-run on recovered bullpen data (2026-06-04); CV Brier 0.1978 (base 0.2459)
  model_name: xgboost_sequential_enriched
  model_version: v4
  notes: |
    Sequential-enriched retrain (Epic 16.5/16.6) -- seq challenger REGISTERED AS CHAMPION on a
    CALIBRATION basis (NOT a discrimination upgrade). 377 features = 367 base + 10 Epic-16
    sequential cols (6 team + 4 player/starter) + 2 imputation indicators (379 input dim).
    Clean 2026 OOS head-to-head (n=660) on recovered bullpen data vs the faithful 369-feat
    nonseq reproduction of the documented champion (deployed v3 S3 binary drifted/unrecoverable):
    seq WINS calibration (ECE 0.043, passes <=0.05 gate; nonseq ECE 0.063, fails gate) at the
    cost of slightly worse discrimination (NLL 0.5958 vs 0.5906, raw Brier 0.2044 vs 0.2015).
    L4 roi_devig marginally favors nonseq (+0.2459 vs +0.2356) but both are pre-vig upper
    bounds on n<400. Both head-to-head gates FAIL -- challenger NLL (0.5958) and raw Brier
    (0.2044) are ABOVE the champion's (0.5906 / 0.2015), not below. Neither beats market
    (alpha=0 -> blended output equals market; L3 market gate vacuous).
    Rationale for seq adoption: calibration is the operative property for current use cases
    (live attribution magnitude-hypothesis tracking on real book prices; future H2H activation
    with non-zero alpha). A model that fails the ECE gate should not be the production champion
    when a better-calibrated alternative exists. Posture unchanged: automated_bets: false,
    evaluation-pending. Revisit head-to-head when H2H is activated with live data and alpha > 0.
    Provenance: seq MLflow 523298ed... ; nonseq champion MLflow 70736a4b... . The prior
    (superseded) note claimed seq beat nonseq on L1/ECE/raw Brier -- an artifact of a
    bullpen-stale nonseq baseline; corrected on clean data (seq now wins ONLY calibration).
    HARD PROD PREREQ: feature_pregame_game_features must carry all 10 sequential cols
    (commit dbt edits -> Railway build -> Dagster deploy -> prod dbt rebuild -> spot-check
    10 non-null cols). A 379-feature model scoring a 373-col matrix is the failure this prevents.
    Rollback: xgb_eb_enriched_2026.pkl (v3) / elasticnet_market_blind_2026.pkl (v2).
  rollback_artifact_path: s3://baseball-betting-ml-artifacts/home_win/elasticnet_market_blind_2026.pkl
  rollback_feature_columns_path: betting_ml/models/home_win/feature_columns_market_blind.json
  selected_at: '2026-06-02T00:00:00Z'
  training_cutoff: 2021+
  training_rows: 10272
  wave5_gates:
    card: 8.W
    evaluated: '2026-05-08'
    cv_brier:
      value: 0.2422
      threshold: < 0.2439 (7.MA baseline)
      pass: true
    ece_after_calibrator_fix:
      value: 0.0053
      threshold: <= 0.045
      pass: true
    decision: PROMOTED
    notes: '8.W per-target feature importance revealed market circularity: away_moneyline_decimal
      (#3), home_win_prob_sharp (#6), home_open_win_prob (#11) in top-20 elasticnet
      coefficients. _MARKET_COLS_TO_EXCLUDE populated in train_elasticnet_prod.py
      for ~2026-05-22 market-blind retrain. 4 all-NaN columns dropped by SimpleImputer:
      home_starter_proj_xfip, away_starter_proj_xfip, home_consecutive_away_games,
      away_consecutive_home_games. Report: betting_ml/evaluation/phase_8_batch_retrain_impact.md.

      '
  challengers:
  - card: Epic 1 / Story 1.1
    model_name: elasticnet_market_blind
    artifact_path: betting_ml/models/home_win/elasticnet_market_blind_2026.pkl
    feature_columns_path: betting_ml/models/home_win/feature_columns_market_blind.json
    features: 545
    cv_brier: 0.2446
    market_blind: true
    promoted: true
    promoted_date: '2026-05-11'
    status: promoted
    gate_threshold: 0.2446
    offline_comparison:
