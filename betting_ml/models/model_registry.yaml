  deployed_date: '2026-06-12'   # Story 30.4 market-blind re-promotion (was 2026-06-11)
  promoted_at: '2026-06-12'     # Story 30.4 (was 2026-06-11)
  bet_posture: evaluation-pending
  automated_bets: false
  kill_criterion:
    story: 28.3
    attribution_start: '2026-06-12'   # RESET on Story 30.4 home_win market-blind re-promotion (was 2026-06-11); n=150 count restarts from zero against the market-blind champion. Prior window: no settled-bet accrual at reset (evaluation-pending, automated_bets=false).
    monitor_script: scripts/ops/monitor_magnitude_h2h.py
    confirm_gate:
      n_settled: 150
      real_book_roi_lower_ci_95_gt: 0
      model_brier_lt_market_brier: true
      notes: '95% lower-CI ROI uses actual Bovada American moneyline odds

        (layer4_h2h_bovada_ml_home / layer4_h2h_bovada_ml_away), not de-vigged probs.

        Both conditions must pass simultaneously. automated_bets stays false until

        this gate fires.

        '
    kill_gates:
    - trigger: n_at_full_gate
      condition: n=150 AND 95%-lower-CI real-book ROI <= 0
      action: kill_magnitude_strategy
    - trigger: early_tripwire
      condition: at n=50, real-book win rate < avg break-even implied by actual Bovada
        odds
      action: kill_magnitude_strategy
    until_confirm: automated_bets=false; magnitude is manual-review/informational
      only
    model_version_policy: 'The kill criterion tracks the champion model active at
      attribution_start (currently

      v4 — XGBoost sequential-enriched + Platt calibrator). If a new champion is promoted

      mid-season (e.g., Epic 17 PyMC NegBin), RESET attribution_start to the promotion

      date and restart the n=150 count from zero against the new model. Do NOT mix
      bets

      scored under different champion versions in the same kill window — pre/post-replacement

      bets would conflate two distinct models and corrupt the CONFIRM/KILL signal.

      Procedure on promotion: update attribution_start here, update ATTRIBUTION_START
      in

      scripts/ops/monitor_magnitude_h2h.py, and note the prior window outcome (accrual

      count + direction at time of reset) in the notes field above.

      '
  conviction_kill_criterion:
    story: 28.6b
    attribution_start: '2026-06-12'   # RESET on Story 30.4 home_win + run_diff market-blind re-promotion (was 2026-06-11); conviction gate mixes classifier + run_diff, both re-promoted.
    monitor_script: scripts/ops/monitor_conviction_h2h.py
    strategy: 'Conviction gate (28.2): bet only games where the two INDEPENDENT H2H
      estimators agree, |calibrated_win_prob - P_run_diff(home)| <= 0.02, on the
      model''s favored side. Tagged live by layer4_h2h_conviction_flag in
      daily_model_predictions (predict_today.py).'
    status: 'SHADOW/informational — NOT a confirmed edge. The 28.2 backtest model-vs-market
      Brier gap is within noise on n=85 (95% CI [-0.053,+0.032], ~68% bootstrap
      confidence); the 28.6a real-book ROI (lower-CI +0.16) is GO but selection-inflated.
      This forward test on real Bovada prices is the only honest arbiter.'
    placement_policy: 'MANUAL-ONLY ALWAYS — operator is US-based; there is no platform to
      automate bet placement (and manual is preferred). No automated_bets flag ever flips
      true. Until CONFIRM, conviction picks are surfaced via conviction_pick_alert_sensor
      as INFORMATIONAL (review at discretion). On CONFIRM, they are promoted to a TRUSTED
      manual-bet signal — still placed by hand. KILL → stop surfacing as actionable.'
    confirm_gate:
      n_settled: 60        # PROVISIONAL — finalize from 28.6a real-book-ROI power (h2h_conviction_gate_28_6a.md)
      real_book_roi_lower_ci_95_gt: 0
      model_brier_lt_market_brier: true
      notes: '95% lower-CI ROI uses actual Bovada American odds
        (layer4_h2h_bovada_ml_home/away), not de-vigged probs. Both conditions must
        pass simultaneously.'
    kill_gates:
    - trigger: n_at_full_gate
      condition: n=60 AND 95%-lower-CI real-book ROI <= 0
      action: kill_conviction_strategy
    - trigger: early_tripwire
      condition: at n=20, real-book win rate < avg break-even implied by actual Bovada
        odds
      action: kill_conviction_strategy
    until_confirm: conviction is informational-only (surfaced via conviction_pick_alert_sensor);
      promote to TRUSTED manual-bet signal on CONFIRM. Placement is always manual (US).
    model_version_policy: 'Tracks the champion active at attribution_start. The gate
      mixes the classifier (calibrated_win_prob) and run_diff (pred_run_diff_loc/scale)
      sub-models; if EITHER is re-promoted mid-season, RESET attribution_start to the
      promotion date and restart the n=60 count (do not mix pre/post-promotion bets).
      Update attribution_start here AND ATTRIBUTION_START in monitor_conviction_h2h.py
      in lockstep, noting the prior window accrual + direction.'
