total_runs:
  bet_paused: true                 # totals_paused — Epic 10.6 (2026-06-02; confirmed under a Bayesian three-layer framework 2026-06-03). On 560 shared 2026 OOS games BOTH v4 and the Layer 3 challenger FAIL Layer 1 (NLL >= prior-predictive 2.8893 — no info over the training marginal) and Layer 3 (blended Brier ~0.279 >= prior-naive 0.248 and >= market 0.228); they pass only calibration (calib_80 ~0.776). Persistent OVER bias (mean P(over) 0.51 vs actual 0.45); matchup-drop ablation ruled out cluster-mismatch (regime-adaptation). The challenger wins the head-to-head but fails the operational gate. Epic 19 gate must surface NO totals bets until a model beats BOTH the prior-predictive NLL and prior-naive Brier (ideally the market) on the current season. Evidence: ablation_results/totals_bayesian_evaluation.md + totals_2026_failure_analysis.md.
  unpause_conditions: "Beat prior-predictive NLL 2.8893 AND prior-naive Brier 0.248 on a rolling 60-game live window (ideally also beat the market). Until then Epic 19 surfaces NO totals bets."
  sequential_retrain_verdict: |
    DO NOT PROMOTE (2026-06-04, Epic 16.6) -- THIRD independent confirmation of the pause
    (1: Epic 10.6 CV/champion-vs-challenger; 2: Epic 26.3 Layer-4 backtest; 3: this production
    harness). Clean 2026 OOS fold (n=660) on recovered bullpen data: the sequential challenger
    is ~= the nonseq champion and is NOT promotable. Both marginally clear L1 (NLL champion
    2.8566 / challenger 2.8588, both < prior NegBin 2.8608) but BOTH FAIL the decisive gates:
    L3 (blended Brier champion 0.2697 / challenger 0.2702, both > market 0.2297 AND > prior-naive
    0.2470) and L4 (negative roi_110 at every threshold 0.5-2.0). Calibration passes
    (calib_80 ~0.81). Head-to-head: challenger does NOT beat champion on NLL or blended Brier;
    seq is marginally worse (CV MAE 3.3694 vs nonseq 3.3675). The 10 sequential features add
    nothing for totals. v4 stays the nominal source for INFORMATIONAL scoring only -- bets
    gated off.
    Provenance: seq MLflow 9f89b9b8... ; nonseq champion MLflow 9e90b9b6... ; seq artifact
