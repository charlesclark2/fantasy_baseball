    card: 8.W
    evaluated: '2026-05-08'
    cv_mae:
      value: 3.5107
      threshold: "<= 3.5190 (v1 baseline)"
      pass: true
    pct_pred_over:
      value: 83.7
      threshold: ">= 25%"
      pass: true
    mean_residual:
      value: 0.048
      threshold: "|x| <= 0.5"
      pass: true
    std_pred:
      value: 0.77
