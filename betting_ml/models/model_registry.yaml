      - 2024
      - 2025
      - 2026
      brier_champion: 0.2392
      brier_challenger: 0.239
      delta_brier: -0.0002
      verdict: PROMOTE
    notes: "Epic 1 market-blind retrain (2026-05-10). Excludes 33 market-derived columns\
      \ (_MARKET_COLS_TO_EXCLUDE). 545 features vs 487 in v1. CV: 2024=0.2481, 2025=0.2360,\
      \ 2026=0.2497 (n=342 partial season), mean=0.2446. Gate 0.2446 is the true market-blind\
      \ baseline; v1 gate 0.2422 benefited from market circularity (away_moneyline_decimal\
      \ #3, home_win_prob_sharp #6). Promoted 2026-05-11 via compare_market_blind_challengers.py\
