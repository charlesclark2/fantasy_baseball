layer3_architecture_finding:
  recorded: '2026-06-03'
  finding: 'The static sub-model -> pseudo-BMA combiner (Layer 3) stack does NOT beat
    a sharp market on clean 2026 data for EITHER target. H2H: market beats model on
    2026. Totals: combiner loses every season, decisively on the credible 2026 market
    (0.303 vs 0.228).'
  failure_mode: temporal adaptation (regime). The combiner/classifier means are anchored
    to the 2021-2025 training distribution with NO within-season updating mechanism.
    This is NOT a signal-quality failure -- the individual sub-models are well-calibrated
    and OOS-stable on 2021-2025. It is a temporal-adaptation failure that Epic 16
    is specifically designed to address.
  june_2026_context: Scoring volatility is bidirectional (Apr 9.09 -> early-May 8.31
    -> Jun 10.08 runs/game; over-rate 57% -> 34% -> 67%). May suppression was transient.
    The Epic 16 mechanism must track swings both ways, NOT apply a one-time downward
    debias.
  evidence:
  - ablation_results/totals_v2_leakage_free.md
  - ablation_results/h2h_v2_leakage_free.md
  - ablation_results/totals_bayesian_evaluation.md
  remedy: Epic 16 sequential posteriors (in-season Bayesian belief updating) over
    the static Layer 3 stack.
  unpause_conditions_both_targets:
    rule: beat prior-predictive NLL AND prior-naive Brier on a rolling 60-game LIVE
      window on the current season (ideally also beat market) before any autonomous
      betting
    status: not_met
  operational_posture: totals bet_paused stays true (no autonomous totals bets); the
    Layer 3 challenger continues logging daily to daily_model_predictions and remains
    visible in the dashboard with the MANUAL REVIEW indicator (informational input
    to the profitable human selection process, which the automated system does not
    replicate).
