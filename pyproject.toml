[project]
name = "baseball-betting"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "numpy>=1.26",
    "scikit-learn>=1.3",
    "joblib>=1.3",
    "snowflake-connector-python>=3.6",
    "cryptography>=41.0",
    "pytest>=7.0",
    "statsmodels>=0.14",
    "scipy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["betting_ml"]
